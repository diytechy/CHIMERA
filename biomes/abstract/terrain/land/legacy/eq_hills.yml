id: EQ_HILLS
type: BIOME
abstract: true

# Basic hilly terrain.

vars: &variables
  base: $customization.yml:terrain-base-y-level
  height: 35
  scale: $customization.yml:terrain-height

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: -y + base + elevationDetailedBlockHeight(x,z) + 5 + (simplex(x, z)+1)/2 * height * biomeInfluence(x,z)
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
