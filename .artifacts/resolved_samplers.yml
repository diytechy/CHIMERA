  BiomeShapeOceanContinents:
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 20
    warp:
      type: SIMPLEX
      frequency: 0.02
    sampler:
      dimensions: 2
      type: DOMAIN_WARP
      amplitude: 60
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.003
      sampler:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 300
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.0001
        sampler:
          type: CELLULAR
          frequency: 0.008
          jitter: 0.9
          distance: Hybrid
          salt: 105.0
          return: NoiseLookup
          lookup:
            dimensions: 2
            type: CACHE
            sampler:
              dimensions: 2
              type: EXPRESSION
              expression: |
                max(
                  sampler(x / scale / globalScale, z / scale / globalScale),
                  spawnIsland(x, z)
                )
              variables:
                globalScale: 1
                scale: 2
              samplers:
                sampler:
                  dimensions: 2
                  type: DOMAIN_WARP
                  amplitude: 1500
                  sampler:
                    dimensions: 2
                    type: EXPRESSION
                    expression: |
                      if(continental_sampler(x,z) < island_threshold,
                        // Islands: 0 to max island ratio, need to normalize with land range
                        lerp(continental_sampler(x,z),-0.5,max_island_ratio,island_threshold,-1),
                        if(continental_sampler(x,z) < land_threshold,
                          //Ocean: 0 to 1
                          lerp(continental_sampler(x,z),island_threshold,-1,land_threshold,0),
                          //Check for lakes / continental land-masses.
                          if(continental_sampler(x,z) > lake_threshold,
                            // Lakes: 0 to -max lake ratio, need to normalize with ocean range.
                            lerp(continental_sampler(x,z),lake_threshold,1,0.5,-max_lake_ratio),
                            // Continents: 0 to 1
                            lerp(continental_sampler(x,z),land_threshold,0,lake_threshold,1)
                          )
                        )
                      )
                    variables:
                      island_threshold: -0.35
                      land_threshold: -0.2
                      lake_threshold: 0.35
                      max_island_ratio: 0.4
                      max_lake_ratio: 0.1
                    functions:
                      lerp:
                        arguments:
                        - t
                        - at
                        - a
                        - bt
                        - b
                        expression: |
                          if(at<bt,
                            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                          )
                      lerp3:
                        arguments:
                        - t
                        - at
                        - a
                        - bt
                        - b
                        - ct
                        - c
                        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
                        functions:
                          lerp:
                            arguments:
                            - t
                            - at
                            - a
                            - bt
                            - b
                            expression: |
                              if(at<bt,
                                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                              )
                      herp:
                        arguments:
                        - t
                        - at
                        - a
                        - bt
                        - b
                        expression: |
                          if(at<bt,
                            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                          )
                        functions:
                          hermite:
                            arguments:
                            - x
                            expression: 3*x^2-2*x^3
                      parabolicMap:
                        arguments:
                        - t
                        - bt
                        - b
                        - at
                        - a
                        expression: |
                          if(at<bt,
                            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                          )
                        functions:
                          interpolation:
                            arguments:
                            - x
                            expression: x^2
                  warp:
                    type: RIDGED
                    lacunarity: 3
                    gain: 0.45
                    octaves: 4
                    sampler:
                      type: OPEN_SIMPLEX_2
                      salt: 1.0
                      frequency: 0.0002
