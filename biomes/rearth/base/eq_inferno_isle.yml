id: EQ_INFERNO_ISLE
type: BIOME
abstract: true

vars: &variables
  middleHeight: -7
  #"<<":
  #  - biomes/equations/caverns/eq_carving_land.yml:variables

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10
    
carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(
        -clamp(
          // Main cavity with smoother transitions
          // special_caves ranges [-1, 0], shift to [-0.8, 0.2] for gentler edge
          (special_caves(x, y, z) + 0.2) * 2.5
          
          // Add wall texture with reduced amplitude to avoid overpowering the base shape
          + wallOffset(x, y, z) * 1.2
          
          // Platform creation with smooth falloff
          + platformShape(x, y, z),
          
        -2.5, 2.5),
        carver_fade(x, y, z)
      )
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
      smoothstep:
        arguments: [edge0, edge1, x]
        expression: |
          if(x <= edge0, 0,
            if(x >= edge1, 1,
              ((x - edge0) / (edge1 - edge0))^2 * (3 - 2 * ((x - edge0) / (edge1 - edge0)))
            )
          )
    samplers:
      platformShape:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          // Distance from platform height
          if(abs(middleHeight - y) > 6, 0,
            // Smooth vertical falloff from platform height
            smoothstep(6, 3, abs(middleHeight - y))
            // Platform presence based on cellular pattern
            * (-platforms(x, z) - 0.25)
            // Scale by distance from cavity edge for natural integration
            * smoothstep(-0.3, -0.6, special_caves(x, y, z))
            * 3.5
          )
        functions:
          smoothstep:
            arguments: [edge0, edge1, x]
            expression: |
              if(x <= edge0, 0,
                if(x >= edge1, 1,
                  ((x - edge0) / (edge1 - edge0))^2 * (3 - 2 * ((x - edge0) / (edge1 - edge0)))
                )
              )
        samplers:
          platforms:
            dimensions: 2
            type: DOMAIN_WARP
            amplitude: 5
            warp:
              type: OPEN_SIMPLEX_2
              frequency: 0.02
            sampler:
              type: CELLULAR
              frequency: 0.05 
      carver_fade: 
        dimensions: 3
        type: EXPRESSION
        variables:
          act_dist: ${customization.yml:special_cave_biome_activation}
        expression: |
          //For inferno, just preserve the lower hemisphere, everything else can carve into
          // the upper hemisphere.
          if(y<0,
            //When in the lower hemisphere, fade out global carver as we approach the transition threshold.
            lerp(min(y,pass_if_greater_than(special_caves(x, y, z)*50,-5,0)),-5,-10,0,carver(x,y,z))
            ,
            //When in the upper hemisphere, just use the global carver.
            carver(x,y,z)
          )
        functions:
          pass_if_greater_than:
            arguments: [x, a, b]
            expression: if(x>a,x,b)
        samplers:
          carver: $biomes/equations/caverns/eq_carving_land.yml:carving.sampler
        #dimensions: 3
        #type: EXPRESSION
        #variables: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.variables
        #expression: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.expresion
        
      wallOffset:
        dimensions: 3
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.035
        octaves: 3
        lacunarity: 2.2
        gain: 0.45
  #sampler-2d:
  #  dimensions: 2
  #  type: CONSTANT
  #  value: 0
