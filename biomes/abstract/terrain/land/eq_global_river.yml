id: EQ_GLOBAL_RIVER
type: BIOME
abstract: true

ocean:
  level: $meta.yml:ocean-level
  # Water level rises with the river's regional elevation so rivers at higher
  # terrain still have water in them.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
    expression: if(continentalRiverDist(x,z)<0,olevel + continentalRiverBlockElevChange(x, z), olevel)

terrain:
  blend:
    distance: 2     # 0 = disabled (sharp edges)
    step: 2
    weight: 3.0
  min-density:
    sampler:
      dimensions: 3
      type: EXPRESSION
      expression: RiverSupportDensity(x,y,z)
    smooth: false      # Smooth or hard
  sampler:
    type: EXPRESSION
    dimensions: 3
    expression: riverTerrainSampler(x, y, z)

  # Will always return y value for surface
  sampler-2d:
    type: EXPRESSION
    #Make sure general surface is above riverbed leading up to river.
    expression: minimumRiverBankHeight(x,z)
