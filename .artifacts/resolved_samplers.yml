          - bt
          - b
          - ct
          - c
          expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
          functions:
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
        herp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            hermite:
              arguments:
              - x
              expression: 3*x^2-2*x^3
        parabolicMap:
          arguments:
          - t
          - bt
          - b
          - at
          - a
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            interpolation:
              arguments:
              - x
              expression: x^2
      variables:
        lapseRate: 0.8
        lapseStart: 0.2
      samplers: {}
    int: true
    resolution: 4
  elevationFromSpots:
    dimensions: 2
    type: EXPRESSION
    expression: |
      (blotSpots(x,z)^2*(continentalRiseRate / (continentalRiseRate+verticalLift))) * (1-flatness(x, z))
      * if(factorContinental, herp(blotSpots(x, z), continentZero, 0, continentFull, 1), 1)
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
