id: PRISMATIC_DEAD_TREES
type: FEATURE

# Heat-killed dead trees (the Yellowstone "ghost forest" look) scattered sparsely on the
# apron around a prismatic spring (distanceToPrismaticRim 0.10 .. 0.60), thinning toward
# the living biome. Much rarer than PRISMATIC_DEAD_BUSHES, so the snags read as occasional
# silhouettes rather than a stand.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    dimensions: 2
    # place where value < threshold; out-of-band sentinel 1 never places. Sparse.
    expression: if(distanceToPrismaticRim(x, z) > 0.10 && distanceToPrismaticRim(x, z) < 0.60, rarity(x, z), 1)
    samplers:
      rarity:
        dimensions: 2
        type: POSITIVE_WHITE_NOISE
        salt: 71014
  threshold: 0.012

locator:
  type: AND
  locators:
    - type: TOP
      range: &range
        min: ${meta.yml:ocean-level} + 1
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: -1
          - type: MATCH_AIR
            offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: dead_tree_procedural
