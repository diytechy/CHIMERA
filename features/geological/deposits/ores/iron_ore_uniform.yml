id: IRON_ORE_UNIFORM
type: FEATURE

anchors:
  - &structure IRON_ORE
  - &densityThreshold 1/256 * ${features/geological/deposits/distribution.yml:iron-uniform.averageCountPerChunk} # Divide by 16^2 to get % per column
  - &salt $features/geological/deposits/distribution.yml:iron-uniform.salt
  - &range $features/geological/deposits/distribution.yml:iron-uniform.range

distributor:
  type: SAMPLER
  sampler:
    type: POSITIVE_WHITE_NOISE
    salt: *salt
  threshold: *densityThreshold

locator:
  type: AND
  locators:
    - type: RANDOM
      amount: 1
      height: *range
      salt: *salt
    - type: BELOW_TOP_TERRAIN_SURFACE  # keep ore at least 7 blocks below the terrain surface
      offset: -7

structures:
  distribution:
    type: CONSTANT
  structures: *structure