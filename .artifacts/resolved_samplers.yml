    type: EXPRESSION
    expression: noise(x / scale / globalScale, z / scale / globalScale)
    variables:
      globalScale: 1
      scale: 1.05
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: PROBABILITY
          sampler:
            type: FBM
            gain: 0.3
            lacunarity: 2.3
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.001
  flatness:
    dimensions: 2
    type: EXPRESSION
    expression: herp(rawFlatness(x, z), threshold, factor, threshold + blend, 0)
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
    variables:
      threshold: 0.26
      blend: 0.35
      factor: 0.95
    samplers:
      rawFlatness:
        dimensions: 2
        type: EXPRESSION
        expression: noise(x / scale / globalScale, z / scale / globalScale)
        variables:
          globalScale: 1
          scale: 1.05
        samplers:
          noise:
            dimensions: 2
            type: TRANSLATE
            x: 10000
            z: 10000
            sampler:
              type: PROBABILITY
              sampler:
                type: FBM
                gain: 0.3
                lacunarity: 2.3
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 0.001
