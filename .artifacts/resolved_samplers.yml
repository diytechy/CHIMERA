# --- RESOLVED SAMPLERS BELOW ---
  combinedClimate:
    dimensions: 2
    type: EXPRESSION
    expression: |
      // ===== COMBINED CLIMATE EXPRESSION =====
      // Auto-derived from source sampler files

      // --- Shared: Continent value (used by elevation and precipitation) ---
      // Derived from: continents.yml
      c = max(
        max(
          -continentNoise(x / scale / globalScale, z / scale / globalScale) * spread + offset,
          spawnIsland(x, z)
        ),
        // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
        // and decrease quadratically moving further outwards
        spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2));

      // --- Elevation calculation ---
      // Derived from: elevation.yml
      elev = rawElevation(x, z) * (1-flatness(x, z))
      * if(factorContinental, herp(c, continentZero, 0, continentFull, 1), 1)
      * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
      * if(factorRiver, (1-riverTerrainErosion(x, z)), 1);

      // --- Temperature calculation ---
      // Derived from: temperature.yml
      temp = rawTemperature(x, z) - lerp(elev, lapseStart, 0, 1, lapseRate);

      // --- Precipitation calculation ---
      // Derived from: precipitation.yml
      precip = lerp(c, oceanThreshold, 1, landThreshold, rawPrecipitation(x, z));

      // --- Climate Index Encoding ---
      // Convert continuous T/P/E to discrete indices and encode
      tempIdx = floor(clamp((temp + 1) / 2, 0, 0.9999) * 12);
      precipIdx = floor(clamp((precip + 1) / 2, 0, 0.9999) * 6);
      elevIdx = floor(clamp(elev * 4, 0, 3.9999));

      // Final encoded value in [-1, 1] range
      (tempIdx * 24 + precipIdx * 4 + elevIdx) / 287 * 2 - 1
    variables:
      globalScale: 1
      scale: 2
      offset: 0.1
      spread: 1
      spotContinentalFactor: 0.3
      continentZero: -0.3
      continentFull: 0.35
      factorContinental: 1
      factorRiver: 1
      factorSpawnIsland: 1
      spawnIslandScale: 0.2
      threshold: 0.26
      blend: 0.35
      factor: 0.95
      lapseRate: 0.8
      lapseStart: 0.2
      oceanThreshold: -1
      landThreshold: 0.4
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
      clamp:
        arguments:
        - x
        - minVal
        - maxVal
        expression: max(min(x, maxVal), minVal)
    samplers:
      continentNoise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: RIDGED
          lacunarity: 3
          gain: 0.35
          octaves: 3
          sampler:
            type: OPEN_SIMPLEX_2
            salt: 1.0
            frequency: 0.0002
      spawnIsland:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 150
        warp:
          type: FBM
          octaves: 2
          sampler:
            type: TRANSLATE
            x: 5000
            z: -5000
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.004
        sampler:
          type: EXPRESSION_NORMALIZER
          expression: |
            if(in < middleRadius/outerRadius,
              herp        (in, innerRadius/outerRadius,  1, middleRadius/outerRadius, 0),
              parabolicMap(in, middleRadius/outerRadius, 0, 1,                       -1))
          variables:
            innerRadius: 20
            middleRadius: 125
            outerRadius: 400
          functions:
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
            lerp3:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              - ct
              - c
              expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
              functions:
                lerp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                      if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                    )
            herp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                  if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                )
              functions:
                hermite:
                  arguments:
                  - x
                  expression: 3*x^2-2*x^3
            parabolicMap:
              arguments:
              - t
              - bt
              - b
              - at
              - a
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                  if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                )
              functions:
                interpolation:
                  arguments:
                  - x
                  expression: x^2
          sampler:
            type: PROBABILITY
            sampler:
              type: DISTANCE
              point:
                x: 0
                z: 0
              normalize: true
              radius: 400
      spotDistance:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 7
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.015
        sampler:
          type: EXPRESSION
          expression: (noise(x, z)+1)*spread
          variables:
            spread: 1500
            largeSpawnRadiusOffset: 2000
            biomeBorder: 15
            largeBiomeBorder: 100
            minRadius: 50
            maxRadius: 150
            minHeight: 0.05
            maxHeight: 0.5
            spotMinEdgeRadius: 0.1
            spotMaxEdgeRadius: 0.5
            largeMinRadius: 500
            largeMaxRadius: 1500
            volcanoMinCenterDepth: 0.01
            volcanoMaxCenterDepth: 0.3
            prismaticMinCenterDepth: 0.01
            prismaticMaxCenterDepth: 0.15
          samplers:
            noise:
              dimensions: 2
              type: CELLULAR
              frequency: 0.0006666666667
              salt: 3.0
              jitter: 0.8
              distance: Euclidean
      spotRadius:
        dimensions: 2
        type: EXPRESSION
        expression: lerp(spotSizePercent(x, z), 0, minRadius, 1, maxRadius)
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
          lerp3:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            - ct
            - c
            expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
            functions:
              lerp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                    if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                  )
          herp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              hermite:
                arguments:
                - x
                expression: 3*x^2-2*x^3
          parabolicMap:
            arguments:
            - t
            - bt
            - b
            - at
            - a
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              interpolation:
                arguments:
                - x
                expression: x^2
        variables:
          spread: 1500
          largeSpawnRadiusOffset: 2000
          biomeBorder: 15
          largeBiomeBorder: 100
          minRadius: 50
          maxRadius: 150
          minHeight: 0.05
          maxHeight: 0.5
          spotMinEdgeRadius: 0.1
          spotMaxEdgeRadius: 0.5
          largeMinRadius: 500
          largeMaxRadius: 1500
          volcanoMinCenterDepth: 0.01
          volcanoMaxCenterDepth: 0.3
          prismaticMinCenterDepth: 0.01
          prismaticMaxCenterDepth: 0.15
        samplers:
          spotSizePercent:
            dimensions: 2
            type: PROBABILITY
            sampler:
              dimensions: 2
              type: CELLULAR
              frequency: 0.0006666666667
              salt: 3.0
              jitter: 0.8
              return: CellValue
      rawElevation:
        dimensions: 2
        type: EXPRESSION
        expression: noise(x / scale / globalScale, z / scale / globalScale) * multiplier + offset
        variables:
          globalScale: 1
          scale: 1.05
          multiplier: 1
          offset: 0
        samplers:
          noise:
            dimensions: 2
            type: TRANSLATE
            x: 10000
            z: 10000
            sampler:
              type: EXPRESSION
              expression: |
                combine(
                  hills(x, z) * hillMaxElevation,
                  parabolicMap(mountainMask(x, z), mountainZero, 0, mountainFull, mountains(x, z)),
                  mountainCap)
              variables:
                mountainZero: 0.3
                mountainFull: 0.6
                hillMaxElevation: 0.3
                mountainCap: 0.9
              functions:
                lerp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                      if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                    )
                lerp3:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  - ct
                  - c
                  expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
                  functions:
                    lerp:
                      arguments:
                      - t
                      - at
                      - a
                      - bt
                      - b
                      expression: |
                        if(at<bt,
                          if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                          if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                        )
                herp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                      if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                    )
                  functions:
                    hermite:
                      arguments:
                      - x
                      expression: 3*x^2-2*x^3
                parabolicMap:
                  arguments:
                  - t
                  - bt
                  - b
                  - at
                  - a
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                      if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                    )
                  functions:
                    interpolation:
                      arguments:
                      - x
                      expression: x^2
                combine:
                  arguments:
                  - hills
                  - mountains
                  - mountainCap
                  expression: hills + mountains * min(1 - hills, mountainCap)
              samplers:
                mountainMask:
                  dimensions: 2
                  type: PROBABILITY
                  sampler:
                    type: OPEN_SIMPLEX_2
                    salt: 694.0
                    frequency: 0.0006666666667
                mountains:
                  dimensions: 2
                  type: EXPRESSION_NORMALIZER
                  expression: ((-in+1)/2)^2
                  sampler:
                    type: PSEUDOEROSION
                    erosion-frequency: 0.01
                    lacunarity: 1.5
                    branch-strength: 1
                    octaves: 3
                    strength: 0.15
                    gain: 0.3
                    sampler:
                      type: FBM
                      octaves: 3
                      sampler:
                        type: OPEN_SIMPLEX_2
                        frequency: 0.001111111111
                hills:
                  dimensions: 2
                  type: EXPRESSION_NORMALIZER
                  expression: ((in+1)/2)^2
                  sampler:
                    type: FBM
                    octaves: 6
                    sampler:
                      type: OPEN_SIMPLEX_2
                      frequency: 0.0005
      flatness:
        dimensions: 2
        type: EXPRESSION
        expression: herp(rawFlatness(x, z), threshold, factor, threshold + blend, 0)
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
          lerp3:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            - ct
            - c
            expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
