id: EQ_LAND_SHORE_BUMPY
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  scale: $customization.yml:terrain-height

terrain:
  sampler:
    type: EXPRESSION
    expression: -y + base + elevationDetailedBlockHeight(x,z) + simplex(x*20, z*20) * biomeInfluence(x,z)
    variables: *variables

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
