extrusions:
  - type: SET
    #from: SPECIAL_CAVES
    sampler:
      type: EXPRESSION
      #If inside a rift (>0) and the rift is present, force there to be no special cave.
      #If low temperature, compress the range so as to not place infernos in frozen regions.
      #Mapped into linear distribution assuming 4 regions:
      # -0.75 - Inferno
      # -0.25 - No special cave
      # 0 to 1 - Non-inferno special cave
      expression: |
        if((((warm_pit(x,z)>0)||((cold_pit(x,z)>0))&&(riftWellPlacement(x,z)>0.0))),-0.25,
          if(special_caveInferno(x,y,z),-0.75,
            if(special_caveNonInferno(x,y,z),
              special_caveNonInferno(x,y,z),-0.25)
          )
        )
    to:
      - INFERNO_ISLES: 1
      - SELF: 1
      - VINE_VAULT: 1
      - TERRACOTTA_TOMBS: 1
    range:
      min: -30
      max: 40