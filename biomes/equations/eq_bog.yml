id: EQ_BOG
type: BIOME
abstract: true


vars: &variables
  base: $customization.yml:terrain-base-y-level

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      -y + base + BiomeShapeSealevelElevation(x,z) + 
      ((-((y / (base-1))^2)) + 1) + ((simplex2(x*2, z*2)/4)) * biomeInfluence(x,z)

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
