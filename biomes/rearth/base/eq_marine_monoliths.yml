id: EQ_MARINE_MONOLITHS
type: BIOME
abstract: true

vars: &variables
  base: 40
  height: 13
  topPartHeight: 110
  oceanBase: $customization.yml:terrain-ocean-base-y-level

terrain:
  blend:
    distance: 3     # 0 = disabled (sharp edges)
    step: 3
    weight: 2
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      // positive / higher = solid
      max(-y + lerp(biomeInfluence(x,z),
        0, oceanBase + oceanElevationBlockHeight(x,z),
        1, base + sampler2d(x,z)
      ), -3.25)
      + if (y < topPartHeight, (clamp((-pillarMask(x,z) - 0.9 + pillarWidth(x,y,z) * 0.04) * 300, -4.5, 30)), 0) * pillarPresent(x,z)
      + if (y > topPartHeight - 9, clamp(height * abs(surfaceBase(x / 2, z / 2)) - abs(y - topPartHeight + surfaceBase(x + 1000,z) * 8) + 6, -2, 7), 0) * pillarPresent(x,z)
      //- (1 - biomeInfluence(x,z))
      
      
      //max(max(-y + lerp(biomeInfluence(x,z),
      //  0, oceanBase + oceanElevationBlockHeight(x,z),
      //  1, base + sampler2d(x,z)
      //), -3),
      //if (y < topPartHeight, (clamp((-pillarMask(x,z) - 0.95 + pillarWidth(x,y,z) * 0.04) * 90, -3, 7)), 0) * pillarPresent(x,z)
      //+ if (y > topPartHeight - 9, clamp(height * abs(surfaceBase(x / 2, z / 2)) - abs(y - topPartHeight + surfaceBase(x + 1000,z) * 8) + 6, -2, 7), 0) * pillarPresent(x,z)
      //)
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers:
      sampler2d:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: surfaceBase(x,z) * height
        samplers:
          surfaceBase:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2S
              frequency: 0.01
              salt: 3
            octaves: 3
            lacunarity: 2
            gain: 0.5
      pillarWidth:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          max(widthCurve((y - base - 12) / (topPartHeight - base - 30)) - 0.14, 0)
        functions:
          widthCurve:
            arguments: [x]
            expression: 1 - 4.166667*x + 4.166667*x^2
      surfaceBase:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.01
          salt: 3
        octaves: 3
        lacunarity: 2
        gain: 0.5
      pillarMask: &pillarMask
        dimensions: 2
        type: CELLULAR
        frequency: 0.03
        jitter: 1.0
      pillarPresent:
        <<: *pillarMask
        return: NoiseLookup
        salt-lookup: false
        lookup:
          dimensions: 2
          type: EXPRESSION
          expression: if(biomeInfluence(x,z) > 0.95, 1, 0)
        

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
