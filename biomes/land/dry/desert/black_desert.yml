id: BLACK_DESERT
type: BIOME
extends:
  - EQ_FLAT_BUMPY
  - CARVING_OCEAN
  - BASE
color: $biomes/colors.yml:BLACK_SAND_BEACH

colors:
  fog: 0xc0d8ff
  water: 0x000000
  water-fog: 0x157CAB
  sky: 0x78a7ff
  grass: 0x888888
  foliage: 0x884444

climate:
  precipitation: false
  temperature: 0.8

vanilla: minecraft:stony_shore


tags:
  - LAND_CAVES
  - SPECIAL_CAVES
  - USE_BLACK_RIVER

palette:
  - BLACK_DESERT: $meta.yml:top-y
  - BLACKSTONE: $meta.yml:ocean-level
  - BLOCK:minecraft:blackstone: ${meta.yml:ocean-level} - 1
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.4
    palette:
      - BLACK_DESERT: $meta.yml:top-y
      - BLACKSTONE: $meta.yml:ocean-level
      - BLOCK:minecraft:blackstone: ${meta.yml:ocean-level} - 1
      - << meta.yml:palette-bottom
