id: BLACK_RIVER_WHIRLPOOL
type: FEATURE

distributor:
  type: AND
  distributors:
    - type: PADDED_GRID
      width: 13
      padding: 7
      salt: 8841907
    - type: SAMPLER
      sampler:
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          salt: 8842031
      threshold: 0.3

locator:
  type: AND
  locators:
    - type: PATTERN
      range:
        min: ${meta.yml:ocean-level}-10
        max: ${meta.yml:ocean-level}-1
      pattern:
        type: AND
        patterns:
          - type: MATCH
            block: minecraft:water
            offset: 2
          - type: MATCH
            block: minecraft:black_terracotta
            offset: 1
          - type: MATCH_SOLID
            offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: black_river_whirlpool
