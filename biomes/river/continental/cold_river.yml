id: COLD_RIVER
type: BIOME
extends:
  - EQ_GLOBAL_RIVER
  - RIVER_DRIPSTONE
  - ENVIRONMENT_MARINE_RIVER_COLD
  - EQ_RIVER_CARVING
  - BASE
color: $biomes/colors.yml:COLD_RIVER

vanilla: minecraft:river

palette:
  - GRASS: $meta.yml:top-y
  - MUDDY_BEACH: ${meta.yml:ocean-level} + 3
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.8
    palette:
      - GRASS: $meta.yml:top-y
      - MUDDY_BEACH: ${meta.yml:ocean-level} - 1
      - << meta.yml:palette-bottom
  - threshold: 0.5
    palette:
      - BLOCK:minecraft:stone: $meta.yml:top-y
      - << meta.yml:palette-bottom

colors:
  grass: 0x8ab689
  foliage: 0x6da36b
  water: 0x007bf7
  water-fog: 0x007bf7

  water-fog: 31735
tags:
- SPECIAL_CAVES
- LOW_CAVES
features:
  flora:
  - FERNS
  - GRASS
  processors:
  - RIVER_SOULSAND
  landforms:
  - RIVER_BOULDERS
  river-decoration:
  - COVE_FROZEN_LIGHT
