
BaseBiomeCell: &BaseBiomeCell
  dimensions: 2
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
  jitter: 0.7
  distance: Hybrid

_landmassShape: &landmassShape
  <<: *BaseBiomeCell
  salt: 101

_outerWarpSmall: &outerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpSmall: &midWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpSmall: &innerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001
    
BaseBiomeCellLarge: &BaseBiomeCellLarge
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistanceLarge}
  jitter: 0.9
  distance: Hybrid

_mesaShape: &mesaShape
  <<: *BaseBiomeCellLarge
  salt: 103

_largelandShape: &largelandShape
  <<: *BaseBiomeCellLarge
  salt: 104

_outerWarpLarge: &outerWarpLarge
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpLarge: &midWarpLarge
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpLarge: &innerWarpLarge
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001


samplers:
  BiomeShapeMesaValue:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *mesaShape
          return: CellValue

  BiomeShapeMesaTemperature:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *mesaShape
          return: NoiseLookup
          lookup:
            dimensions: 2
            type: EXPRESSION
            expression: temperature(x,z)
          salt-lookup: false

  BiomeShapeMesaPrecipitation:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *mesaShape
          return: NoiseLookup
          lookup:
            dimensions: 2
            type: EXPRESSION
            expression: precipitation(x,z)
          salt-lookup: false

  BiomeShapeLargelandValue:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *largelandShape
          return: CellValue

  BiomeShapeLargelandValue2:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          salt-lookup: false
          lookup:
            type: EXPRESSION
            dimensions: 2
            expression: BiomeShapeLargelandValue(x,z)

  BiomeShapeLargelandTemperature:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *largelandShape
          return: NoiseLookup
          lookup:
            dimensions: 2
            type: EXPRESSION
            expression: temperature(x,z)
          salt-lookup: false

  BiomeShapeLargelandPrecipitation:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *largelandShape
          return: NoiseLookup
          lookup:
            dimensions: 2
            type: EXPRESSION
            expression: precipitation(x,z)
          salt-lookup: false
