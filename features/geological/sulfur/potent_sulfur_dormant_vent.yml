id: POTENT_SULFUR_DORMANT_VENT
type: FEATURE

# Dormant fumarole crust for extinct volcanoes. Same cone/rim bias as the active
# fumarole but slightly more common, since the whole cone has cooled.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(distanceToVolcanicRim(x, z) < 0.5, rarity(x, z), -1)
    samplers:
      distanceToVolcanicRim: $math/samplers/spots.yml:samplers.distanceToVolcanicRim
      rarity:
        dimensions: 2
        type: POSITIVE_WHITE_NOISE
        salt: 55122
  threshold: 0.92

locator:
  type: AND
  locators:
    - type: SURFACE
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: -1
          - type: MATCH_AIR
            offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: potent_sulfur_dormant
