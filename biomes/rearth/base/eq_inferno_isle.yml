id: EQ_INFERNO_ISLE
type: BIOME
abstract: true

vars: &variables
  middleHeight: -7
  #"<<":
  #  - biomes/equations/caverns/eq_carving_land.yml:variables

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10
    
carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      //10
      //Take the max value for carving between the special cave void and 
      // the faded standard cave carver.
      max(
        // Inverted expression, >0 evaluates to solid, <0 becomes air,
        // inheritted from previous expression that used terrain instead of carver.
        -clamp(
          //Create main cavity, where only the edge is solid with some wall noise
          max((special_caves(x, y , z) + 0.1) * 50 + wallOffset(x,y,z) * 3, -2)
          //Create a platform at the middle height
          + max((4.9 - abs(middleHeight - y)), 0) * (-platforms(x,z) - 0.29),
          //Clamp the entire expression.
        -10, 10) * 16
        ,
        carver_fade(x,y,z)
      )
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers: 
      carver_fade: 
        dimensions: 3
        type: EXPRESSION
        variables:
          act_dist: ${customization.yml:special_cave_biome_activation}
        expression: |
          //For inferno, just preserve the lower hemisphere, everything else can carve into
          // the upper hemisphere.
          if(y<0,
            //When in the lower hemisphere, fade out global carver as we approach the transition threshold.
            lerp(min(y,pass_if_greater_than(special_caves(x, y, z)*50),-5,0)),-5,-10,0,carver(x,y,z)))
            ,
            //When in the upper hemisphere, just use the global carver.
            carver(x,y,z)
          )
        functions:
          pass_if_greater_than:
            arguments: [x, a, b]
            expression: if(x>a,x,b)
        samplers:
          carver: $biomes/equations/caverns/eq_carving_land.yml:carving.sampler
        #dimensions: 3
        #type: EXPRESSION
        #variables: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.variables
        #expression: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.expresion
        
      platforms:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 5
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.02
        sampler:
          type: CELLULAR
          frequency: 0.05
      wallOffset:
        dimensions: 3
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.025
        octaves: 2
        lacunarity: 2.8
        gain: 0.5
  #sampler-2d:
  #  dimensions: 2
  #  type: CONSTANT
  #  value: 0
