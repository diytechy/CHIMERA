id: WATER_ELEVATOR_SURFACE_LOCATOR
type: FEATURE
abstract: true

# Shared locator for every water-elevator variant (extended by them, like
# BOULDER_SURFACE_LOCATOR). Finds the SINGLE topmost surface column: TOP scans top-down and
# returns the highest match, so the well anchors at -- and rises to -- the top surface,
# whether that surface is land (air above solid) or a water body (air above water).
locator:
  type: AND
  locators:
    - type: TOP
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_AIR
            offset: 0
          - type: OR
            patterns:
              - type: MATCH_SOLID
                offset: -1
              - type: MATCH_SET
                blocks:
                  - minecraft:water
                offset: -1
