samplers:
  continental_sampler:
    dimensions: 2
    type: CACHE
    sampler:
      type: EXPRESSION
      expression: sampler(x - 100000, z - 100000)
      samplers:
        sampler:
          dimensions: 2
          type: TRANSLATE
          x: 10000
          z: 10000
          sampler:
            type: FBM
            gain: 0.7
            octaves: 3
            lacunarity: 1.8121866
            sampler:
              type: PERLIN
              frequency: 0.0002
  plainsMask:
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x,z)
    samplers:
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        amplitude: 0.3
        salt: 67.0
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.0005
  continental_landmass:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(continental_sampler(x,z) < island_threshold,
        // Islands: 0 to max island ratio, need to normalize with land range
        lerp(continental_sampler(x,z),-0.5,max_island_ratio,island_threshold,-1),
        if(continental_sampler(x,z) < land_threshold,
          //Ocean: 0 to 1
          lerp(continental_sampler(x,z),island_threshold,-1,land_threshold,0),
          //Check for lakes / continental land-masses.
          if(continental_sampler(x,z) > lake_threshold,
            // Lakes: 0 to -max lake ratio, need to normalize with ocean range.
            lerp(continental_sampler(x,z),lake_threshold,1,0.5,-max_lake_ratio),
            // Continents: 0 to 1
            lerp(continental_sampler(x,z),land_threshold,0,lake_threshold,1)
          )
        )
      )
    variables:
      island_threshold: -0.35
      land_threshold: 0.0
      lake_threshold: 0.35
      max_island_ratio: 0.4
      max_lake_ratio: 0.1
    samplers: {}
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
  spawnIsland:
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 150
    warp:
      type: FBM
      octaves: 2
      sampler:
        type: TRANSLATE
        x: 5000
        z: -5000
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.004
    sampler:
      type: EXPRESSION_NORMALIZER
      expression: |
        if(in < middleRadius/outerRadius,
          herp        (in, innerRadius/outerRadius,  1, middleRadius/outerRadius, 0),
          parabolicMap(in, middleRadius/outerRadius, 0, 1,                       -1))
      variables:
        innerRadius: 20
        middleRadius: 125
        outerRadius: 400
      functions:
        lerp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
              if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
            )
        lerp3:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          - ct
          - c
          expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
          functions:
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
        herp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            hermite:
              arguments:
              - x
              expression: 3*x^2-2*x^3
        parabolicMap:
          arguments:
          - t
          - bt
          - b
          - at
          - a
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            interpolation:
              arguments:
              - x
              expression: x^2
      sampler:
        type: PROBABILITY
        sampler:
          type: DISTANCE
          point:
            x: 0
            z: 0
          normalize: true
          radius: 400
  continents:
    dimensions: 2
    type: CACHE
