variables: &variables
  detailFactor: 0.1
  detailStart: 0
  detailEnd: 0.5
  
  terraceBaseScale: 0.2
  terraceScaleVariation: 0.1
  terraceOffsetVariation: 0.25
  terraceDepthVariation: 1
  terraceDepthStart: 0.1 # At what elevation should it start to be terraced
  
  
  hillMaxElevation: 0.3
  mountainCap: 0.9

samplers:

  mountainMask: &mountainMask
    dimensions: 2
    type: PROBABILITY
    sampler:
      type: OPEN_SIMPLEX_2
      salt: 0694
      frequency: 1 / 1500
 
  mountain_sampler: &mountain_sampler
    dimensions: 2
    type: OPEN_SIMPLEX_2
    frequency: 1 / 900
          
  mountains: &mountains
    dimensions: 2
    type: EXPRESSION_NORMALIZER
    expression: ((-in+1)/2)^2
    sampler:
      type: PSEUDOEROSION
      erosion-frequency: 0.01
      lacunarity: 1.5
      branch-strength: 1
      octaves: 3
      strength: 0.15
      gain: 0.3
      sampler:
        type: FBM
        octaves: 3
        sampler: *mountain_sampler
          
  AppliedMountainHeight: &AppliedMountainHeight
    dimensions: 2
    type: EXPRESSION
    expression: min(parabolicMap(mountainMask(x, z), mountainMaskZero, 0, mountainMaskFull, mountains(x, z)),
                    parabolicMap(continents(x, z), mountainContZero, 0, mountainContFull, mountains(x, z)))
    variables:
      mountainMaskZero: 0.3
      mountainMaskFull: 0.6
      mountainContZero: 0.0
      mountainContFull: 0.3
    samplers:
      mountainMask: *mountainMask
      mountains: *mountains
      continents: $math/samplers/continents.yml:samplers.continents
    functions: $math/functions/interpolation.yml:functions

  # Smoothed version of AppliedMountainHeight for river generation
  # Uses domain warping to create smoother gradients that rivers can follow without erratic behavior
  SmoothedAppliedMountainHeight: &SmoothedAppliedMountainHeight
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 50
    warp:
      type: OPEN_SIMPLEX_2
      frequency: 0.002
      salt: 4521
    sampler:
      type: EXPRESSION
      expression: |
        (AppliedMountainHeight(x - smoothOffset, z) +
         AppliedMountainHeight(x + smoothOffset, z) +
         AppliedMountainHeight(x, z - smoothOffset) +
         AppliedMountainHeight(x, z + smoothOffset) +
         AppliedMountainHeight(x, z) * 2) / 6
      variables:
        smoothOffset: 75
      samplers:
        AppliedMountainHeight: *AppliedMountainHeight
          
  RiverMountainHeight: &RiverMountainHeight
    dimensions: 2
    type: EXPRESSION
    expression: AppliedMountainHeight(x,z)*mountainRiverScale
    #expression: min(parabolicMap(mountainMask(x, z), mountainMaskZero, 0, mountainMaskFull, mountain_sampler(x, z)),
    #                parabolicMap(continents(x, z), mountainContZero, 0, mountainContFull, mountain_sampler(x, z)))*mountainRiverScale
    variables:
      mountainMaskZero: 0.35
      mountainMaskFull: 0.65
      mountainContZero: 0.05
      mountainContFull: 0.35
      mountainRiverScale: 0.8
    samplers:
      mountainMask: *mountainMask
      mountain_sampler: *mountain_sampler
      AppliedMountainHeight: *AppliedMountainHeight
      continents: $math/samplers/continents.yml:samplers.continents
    functions: $math/functions/interpolation.yml:functions

  # Reference exports for use by other samplers (e.g., rivers.yml)
  mountainMaskRef:
    dimensions: 2
    type: PROBABILITY
    sampler:
      type: OPEN_SIMPLEX_2
      salt: 0694
      frequency: 1 / 1500

  continentalRise: &continentalRise
    dimensions: 2
    type: EXPRESSION
    expression: continents(x,z)^2*(continentalRiseRate / (continentalRiseRate+verticalLift))
    variables:
      globalScale: $customization.yml:global-scale
      verticalLift: $customization.yml:terrain-height
      scale: $customization.yml:flatness-scale
      continentalRiseRate: 30 #The amount land should rise to when continental value reaches 1, note it typically maxes out around 0.5.
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
              
  rawFlatness: &rawFlatness
    dimensions: 2
    type: EXPRESSION
    expression: noise(x / scale / globalScale, z / scale / globalScale)
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:flatness-scale
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: PROBABILITY
          sampler:
            type: FBM
            gain: 0.3
            lacunarity: 2.3
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 1 / 1000

  flatness: &flatness
    dimensions: 2
    type: EXPRESSION
    expression: herp(rawFlatness(x, z), threshold, factor, threshold + blend, 0)
    functions: $math/functions/interpolation.yml:functions
    variables:
      threshold: $customization.yml:flatness-percent
      blend: $customization.yml:flatness-blend
      factor: $customization.yml:flatness-factor
    samplers:
      rawFlatness: *rawFlatness

  rawElevation: &rawElevation
    dimensions: 2
    type: EXPRESSION
    expression: noise(x / scale / globalScale, z / scale / globalScale) * multiplier + offset
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:elevation-scale
      multiplier: $customization.yml:elevation-multiplier
      offset: $customization.yml:elevation-offset
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: EXPRESSION
          expression: |
            continentalRise(x,z) +
            combine(
              hills(x, z) * hillMaxElevation,
              AppliedMountainHeight(x,z),
              mountainCap)
          variables: *variables
          functions:
            parabolicMap: $math/functions/interpolation.yml:functions.parabolicMap
            lerp: $math/functions/interpolation.yml:functions.lerp
            herp: $math/functions/interpolation.yml:functions.herp
            combine: # Stacks scaled mountain noise on top of hill noise
              arguments:
                - hills
                - mountains
                - mountainCap
              expression: hills + mountains * min(1 - hills, mountainCap)

          samplers:
            continentalRise: *continentalRise
            AppliedMountainHeight: *AppliedMountainHeight
            hills:
              dimensions: 2
              type: EXPRESSION_NORMALIZER
              expression: ((in+1)/2)^2
              sampler:
                type: FBM
                octaves: 6
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 1 / 2000
          
  elevation: &elevation
    dimensions: 2
    type: EXPRESSION
    expression: |
      rawElevation(x, z) * (1-flatness(x, z))
      * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
      * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
      * if(factorRiver, (1-riverTerrainErosion(x, z)), 1)
    functions: $math/functions/interpolation.yml:functions
    variables:
      continentZero: $customization.yml:elevation-continental-flat-threshold
      continentFull: $customization.yml:elevation-continental-full-height-threshold
      factorContinental: $customization.yml:elevation-factor-continental
      factorRiver: $customization.yml:elevation-factor-rivers
      factorSpawnIsland: $customization.yml:elevation-factor-spawn-island
      spawnIslandScale: $customization.yml:elevation-spawn-island-scale
    samplers:
      rawElevation: *rawElevation
      flatness: *flatness
      continents: $math/samplers/continents.yml:samplers.continents
      spawnIsland: $math/samplers/spawnIsland.yml:samplers.spawnIsland
      riverTerrainErosion: $math/samplers/rivers.yml:samplers.riverTerrainErosion
  

  mesaMask: &mesaMask
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x - 6000, z - 6000)
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:continental-scale
    samplers:
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        lacunarity: 2.0
        gain: 0.4
        sampler:
          type: PERLIN
          frequency: (1 / ${customization.yml:continental-mesa-region-allowed-distance})
          salt: 200       
          
  # Defines a very slow rolling peak height, primarily intended to impact mesa height so tops are not perfectly flat.
  PeakHeightMultiplierAtPosition: &PeakHeightMultiplierAtPosition
    dimensions: 2
    type: EXPRESSION
    expression: (max_elev_prob(x,z)*VarianceRatio + (1 - VarianceRatio))
    variables:
      VarianceRatio: $customization.yml:continental-MaxPeakVariability
    samplers:
      max_elev_prob: 
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          salt: 697.0
          frequency: (1 / ${customization.yml:continental-large-features-threshold-variance-distance})
          
  # Mesa height modifier components
  prefiltered_mesa_elev: &prefiltered_mesa_elev
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(((continents(x,z)>0)&&(mesaMask(x,z)>mesa_threshold)), 
        ((max(min(round(abs((mesaMask(x, z)-mesa_threshold)/(0.5-mesa_threshold))*2* MaxNMesSteps),MaxNMesSteps),0) * MaxPeakElev * PeakHeightMultiplierAtPosition(x,z))/(MaxNMesSteps)), 
        0
      )
    variables:
      MaxNMesSteps: $customization.yml:continental-MaxNMesSteps
      MaxPeakElev: $customization.yml:continental-MaxMesaPeakHeightRatio
      mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
      mesaMask: *mesaMask
      PeakHeightMultiplierAtPosition: *PeakHeightMultiplierAtPosition

  # Elevation-shifted mesa elevation sampler - uses current elevation as offset
  elevation_shifted_prefiltered_mesa_elev: &elevation_shifted_prefiltered_mesa_elev
    dimensions: 2
    type: EXPRESSION
    expression: max(prefiltered_mesa_elev(x,z) - elevation(x,z), 0)
    samplers:
      elevation: *elevation
      prefiltered_mesa_elev: *prefiltered_mesa_elev

  # Mesa height modifier that works with current elevation
  elevation_MesaHeightModifier: &elevation_MesaHeightModifier
    dimensions: 2
    type: EXPRESSION
    expression: (abs(mesaMask(x, z))>MesaRegionActiveThresh) && (continents(x,z))
    variables:
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
      threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation: *elevation
      mesaMask: *mesaMask
      continents: $math/samplers/continents.yml:samplers.continents

  # Mesa distance calculators using current elevation
  elevation_MesaDownwardDistFromTransPnt: &elevation_MesaDownwardDistFromTransPnt
    dimensions: 2
    type: EXPRESSION
    expression: max(max((MesaRegionActiveThresh-mesaMask(x, z)),(threshold-max(continents(x,z),0))), 0)
    variables:
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
      threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation: *elevation
      mesaMask: *mesaMask
      continents: $math/samplers/continents.yml:samplers.continents

  elevation_MesaUpwardDistFromTransPnt: &elevation_MesaUpwardDistFromTransPnt
    dimensions: 2
    type: EXPRESSION
    expression: max(max((mesaMask(x, z) - MesaRegionActiveThresh),(elevation(x,z)-threshold)), 0)
    variables:
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
      threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation: *elevation
      mesaMask: *mesaMask

  # Region-filtered mesa height modifier using current elevation
  RegionFilteredMesaHeightModifier: &RegionFilteredMesaHeightModifier
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(elevation_MesaHeightModifier(x,z),
        // If above the transition threshold and the wall transition delta, need to transition to flat top.
        if(elevation_MesaUpwardDistFromTransPnt(x,z)>0,
          ((elevation_shifted_prefiltered_mesa_elev(x,z)/2) +
            ((elevation_MesaUpwardDistFromTransPnt(x,z)*elevation_shifted_prefiltered_mesa_elev(x,z)/2)/
            (MesaFlattopTransitionRate+elevation_MesaUpwardDistFromTransPnt(x,z)))),
          //Else return the transition down to floor height
          if(elevation_MesaDownwardDistFromTransPnt(x,z)>0,
          (elevation_shifted_prefiltered_mesa_elev(x,z)/2) -
            ((elevation_MesaDownwardDistFromTransPnt(x,z)*elevation_shifted_prefiltered_mesa_elev(x,z)/2)/
            (MesaFlattopTransitionRate+elevation_MesaDownwardDistFromTransPnt(x,z))),
            0)
        ),
        0)
    variables:
      MesaFlattopTransitionDelta: $customization.yml:continental-mesa-flattop-trans-delta
      MesaFlattopTransitionRate: $customization.yml:continental-mesa-flattop-trans-rate
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation_shifted_prefiltered_mesa_elev: *elevation_shifted_prefiltered_mesa_elev
      elevation_MesaHeightModifier: *elevation_MesaHeightModifier
      elevation_MesaUpwardDistFromTransPnt: *elevation_MesaUpwardDistFromTransPnt
      elevation_MesaDownwardDistFromTransPnt: *elevation_MesaDownwardDistFromTransPnt
    functions: $math/functions/interpolation.yml:functions

  elevationDetailed:
    dimensions: 2
    type: EXPRESSION
    expression: |
      terrace(
        combine(
          elevation(x, z),
          detailStart, 0,
          detailEnd, detail(x, z) * detailFactor
        ),
        terraceBaseScale + terraceScale(x, z) * terraceScaleVariation,
        terraceOffset(x, z) * terraceOffsetVariation,
        0,
        (terraceDepth(x, z)^3) * terraceDepthVariation,
        0, terraceDepthStart
      )
    variables: *variables
    samplers:
      elevation:
        dimensions: 2
        type: DOMAIN_WARP
        sampler: *elevation
        # Elevation is warped slightly by white noise, creating a small fuzzy
        # or dithered look to break up perfectly smooth noise. Produces small
        # 1 block divots in terrain, especially apparent on steeper terrain and
        # countours which is good because these areas tend to look too perfect / artifical.
        amplitude: $customization.yml:elevation-fuzz
        warp:
          type: WHITE_NOISE
          salt: 2394
      terraceScale:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.002
        salt: 1926
      terraceDepth:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 5812
      terraceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 8512
      detail:
        dimensions: 2
        type: FBM
        octaves: 4
        lacunarity: 2
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.008
          salt: 5912

    functions:
      terrace: # Terrace function but with depth masked by input value, so terracing doesn't cut down below ocean level
        arguments:
          - i  # Input
          - sc # Scale
          - o  # Offset
          - g  # Gap
          - d  # Terrace depth
          - tz # Value of i where depth = 0
          - tf # Value of i where depth = d
        expression: terraceParalinear(i,sc,o,g,lerp(i,tz,0,tf,d))
        functions:
          "<<":
            - math/functions/terrace.yml:functions
            - math/functions/interpolation.yml:functions
      combine: # Stacks a layer of noise on top scaled according to the base noise
        arguments:
          - x
          - at
          - a
          - bt
          - b
        expression: x+lerp(x,at,a,bt,b)
        functions: $math/functions/interpolation.yml:functions

  elevation_with_mesas: &elevation_with_mesas
    dimensions: 2
    type: EXPRESSION
    expression: |
      elevation(x, z) + RegionFilteredMesaHeightModifier(x, z)
    samplers:
      elevation: *elevation
      RegionFilteredMesaHeightModifier: *RegionFilteredMesaHeightModifier

  oceanElevation:
    dimensions: 2
    type: EXPRESSION
    expression: |
      (-1+rawElevation(x, z))
      * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
    functions: $math/functions/interpolation.yml:functions
    variables:
      continentZero: 0
      continentFull: -0.8
      factorContinental: $customization.yml:elevation-factor-continental
    samplers:
      rawElevation: *rawElevation
      continents: $math/samplers/continents.yml:samplers.continents

  oceanElevation:
    dimensions: 2
    type: EXPRESSION
    expression: |
      (-1+rawElevation(x, z))
      * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
    functions: $math/functions/interpolation.yml:functions
    variables:
      continentZero: 0
      continentFull: -0.8
      factorContinental: $customization.yml:elevation-factor-continental
    samplers:
      rawElevation: *rawElevation
      continents: $math/samplers/continents.yml:samplers.continents
