id: EQ_PILLARS
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  height: 7
  pillarHeight: 50

terrain:
  #blend:
  #  distance: 3     # 0 = disabled (sharp edges)
  #  step: 1
  #  weight: 1.0
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(clamp(-y+base + elevationDetailedBlockHeight(x,z)+ (5 + noiseBase(x,z) * height)*biomeInfluence(x,z), -1.75, 3),
      clamp((pillars(x,y,z)) * 24, -3.5, 3))
      
      //clamp(clamp((pillars(x,y,z)) * 24, -2, 3)+biomeInfluenceOffset(x,y,z), -2, 3))
      //clamp(min(pillars(x,y,z),biomeInfluence3D(x,y,z)*pillars(x,y,z)) * 24, -2, 3))
      //clamp(pillars(x,y,z) * 24, -2, 3)
    functions:
      clamp:
        arguments: [x, a, b] # clamps x between a (low) and b (high)

        expression: min(max(x, a), b)
    samplers:
      pillars:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          pillarsExist(x,z) * (
            -basepillars(x,z) - 0.72    // basic pillars
            + basepillarsCenter(x,z) * 0.12 // vary whole pillar size
            + pillarWidthRand(y, x / 10) * 0.09 // vary size along height
            + (min(0, base  + (BiomeShapeLandmassElevation(x,z) + pillarHeight) * (basepillarsCenter(x,z) * 0.4 + 1) - y) / 12)^3  // top cap
          //)
          ) - (1 - pillarsExist(x,z))
        samplers:
          basepillars: &pillarConf
            dimensions: 2
            type: CELLULAR
            frequency: 0.022
            jitter: 1
            distance: Euclidean
          pillarsExist:
            <<: *pillarConf
            return: NoiseLookup
            lookup: 
              dimensions: 2
              #type: CONSTANT
              #value: 1
              type: EXPRESSION
              expression: if(biomeInfluence(x,z)>0.4,1,0)
          basepillarsCenter:
            <<: *pillarConf
            return: CellValue
          pillarWidthRand:
            dimensions: 2
            type: FBM
            sampler:
              dimensions: 2
              type: OPEN_SIMPLEX_2S
              frequency: 0.1
            octaves: 2
            lacunarity: 2
            gain: 0.35
      noiseBase:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.011
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
