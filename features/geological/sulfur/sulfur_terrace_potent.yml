id: SULFUR_TERRACE_POTENT
type: FEATURE

# Sprinkles WET potent sulfur into the submerged sulfur terrace floors at ~1/16, matching
# the rate the sulfur-cave lakes use on their submerged basin lining. Runs after
# SULFUR_TERRACE_WATER (a preprocessor) so the pools already exist; placed where a sulfur
# block has water directly above it (a submerged terrace floor).
distributor:
  type: SAMPLER
  sampler:
    type: POSITIVE_WHITE_NOISE
    salt: 4419
  threshold: 0.015625 # 1/64, matching the (performance-reduced) sulfur_lake.tesf basin lining

locator:
  type: PATTERN
  range:
    min: ${meta.yml:ocean-level}
    max: $meta.yml:top-y
  pattern:
    type: AND
    patterns:
      - type: MATCH
        block: minecraft:sulfur
        offset: 0
      - type: MATCH
        block: minecraft:water
        offset: 1

structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:potent_sulfur[potent_sulfur_state=wet]
