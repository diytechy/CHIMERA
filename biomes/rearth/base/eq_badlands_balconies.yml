id: EQ_BADLANDS_BALCONIES
type: BIOME
abstract: true

vars: &variables
  base: 65
  height: 54
  variationHeight: 4
  terraceHeight: 2.5  // inverted
  terraceThinness: 3.3
  terraceStrength: 13

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      // positive / higher = solid
      -y + base + (height / 2)
      + lerp(mountainBasicShape(x,z) * height, 
        -10, lerp(terracingMask(x,z), 
          0.2, mountainResult(x,z), 
          -0.2, mountainBasicShape(x,z) * height + vallyNoise(x,z) * variationHeight * 4
          ),
        -25, vallyNoise(x,z) * variationHeight - 30
      )
    samplers:
      mountainBasicShape: &mountainShape
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: ${customization.yml:biomeSpread.mountainFrequency}
      vallyNoise:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.02
        octaves: 2
        lacunarity: 3
        gain: 0.3
      terracingMask:
        dimensions: 2
        type: CELLULAR
        frequency: 0.025
        jitter: 0.7
        return: CellValue
      mountainResult:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: |
          terrace(mountainBasicShape(x,z) * 2.5, 7) * height / 2.5
        functions:
          terrace:
            arguments: [x, terraceStrength]
            expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
        samplers:
          mountainBasicShape: *mountainShape
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
