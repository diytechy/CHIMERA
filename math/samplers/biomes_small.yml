
BaseBiomeCell: &BaseBiomeCell
  dimensions: 2
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
  jitter: 0.7
  distance: Hybrid

_landmassShape: &landmassShape
  <<: *BaseBiomeCell
  salt: 101

_highlandShape:
  <<: *BaseBiomeCell
  salt: 102

_oceanShape: &oceanShape
  <<: *BaseBiomeCell
  salt: 105

_outerWarpSmall: &outerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpSmall: &midWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpSmall: &innerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001

samplers:

  BiomeShapeLandmassValue:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: CellValue
          
  BiomeShapeLandmassValue2:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/simplex.yml:samplers.whiteNoiseExp
          salt-lookup: false

  BiomeShapeLandmassPlainsMask:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/elevation.yml:samplers.plainsMaskApplied
          salt-lookup: false
          
  BiomeShapeLandmassDistance:
    <<: *midWarpSmall
    sampler:
      <<: *innerWarpSmall
      sampler:
        <<: *landmassShape
        distance: Euclidean
        #distance: EuclideanSq

  #BiomeShapeLandmassFullDistance:
  #  <<: *outerWarpSmall
  #  sampler:
  #    <<: *midWarpSmall
  #    sampler:
  #      <<: *innerWarpSmall
  #      sampler:
  #        <<: *landmassShape
  #        distance: Euclidean
  #        #distance: EuclideanSq
          
  BiomeShapeLandmassDist2Center:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: Distance2Div
          distance: Euclidean
          #distance: EuclideanSq
          
  BiomeShapeLandmassElevationDetailed:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/elevation.yml:samplers.elevationDetailed
          salt-lookup: false
          
  BiomeShapeLandmassMountains:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/elevation.yml:samplers.mountainMask
          salt-lookup: false
          
  BiomeShapeLandmassElevation:
    type: EXPRESSION
    dimensions: 2
    variables:
      scale: $customization.yml:terrain-height
    expression: BiomeShapeLandmassElevationDetailed(x,z) * scale
          
  BiomeShapeLandmassFlatness:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/elevation.yml:samplers.flatness
          salt-lookup: false

  BiomeShapeFlattenedElevation:
    type: EXPRESSION
    dimensions: 2
    expression: |
      herp(biomeInfluence(x,z),0,elevationDetailedBlockHeight(x,z),
      1,  BiomeShapeLandmassElevation(x,z))

  BiomeShapeSealevelElevation:
    type: EXPRESSION
    dimensions: 2
    expression: |
      herp(biomeInfluence(x,z),0,elevationDetailedBlockHeight(x,z),
      1,  0)

  BiomeShapeLandmassFarRiverDistance:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/rivers.yml:samplers.continentalRiverDistSparseFarGrid
          salt-lookup: false

  BiomeShapeLandmassTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false

  BiomeShapeLandmassPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false