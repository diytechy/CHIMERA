            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
  herp:
    arguments:
    - t
    - at
    - a
    - bt
    - b
    expression: |
      if(at<bt,
        if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
        if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
      )
    functions:
      hermite:
        arguments:
        - x
        expression: 3*x^2-2*x^3
  parabolicMap:
    arguments:
    - t
    - bt
    - b
    - at
    - a
    expression: |
      if(at<bt,
        if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
        if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
      )
    functions:
      interpolation:
        arguments:
        - x
        expression: x^2
  maskSmooth:
    arguments:
    - v
    - lb
    - ub
    - m
    expression: |
      if(lb<ub,
        if(m<=lb,0,if(m>=ub,v,v*hermite((m-lb)/(ub-lb)))),
        if(m>=lb,0,if(m<=ub,v,v*hermite((m-lb)/(ub-lb))))
      )
    functions:
      hermite:
        arguments:
        - x
        expression: 3*x^2-2*x^3
  shelf:
    arguments:
    - x
    - shelfOffset
    - shelfWidth
    - shelfDepth
    expression: x + shelfDepth * shelfWidth * profile(clamp((x/shelfWidth)+1-shelfOffset))
    functions:
      clamp:
        arguments:
        - x
        expression: if(0 <= x && x < 1, x, 0)
      profile:
        arguments:
        - x
        expression: '|x - 0.5| - 0.5'
  terrace:
    arguments:
    - i
    - sc
    - o
    - g
    - d
    expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
    functions:
      clamp:
        arguments:
        - x
        expression: if(0 <= x && x < 1, x, 0)
      floorMod:
        arguments:
        - x
        - i
        expression: x - floor(x/i) * i
      profile:
        arguments:
        - x
        expression: '|x - 0.5| - 0.5'
  terraceStrata:
    arguments:
    - i
    - sc
    - o
    - g
    - d
    expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
    functions:
      clamp:
        arguments:
        - x
        expression: if(0 <= x && x < 1, x, 0)
      floorMod:
        arguments:
        - x
        - i
        expression: x - floor(x/i) * i
      profile:
        arguments:
        - x
        expression: -if(x>0.95,-(x-1)/0.05,x/0.95)
  terraceParabolic:
    arguments:
    - i
    - sc
    - o
    - g
    - d
    expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
    functions:
      clamp:
        arguments:
        - x
        expression: if(0 <= x && x < 1, x, 0)
