id: EQ_GLOBAL_RIVER
type: BIOME
abstract: true

variables: &variables
  base: $customization.yml:terrain-base-y-level   # 65
  scale: $customization.yml:terrain-height         # 180

  # --- Cave erosion parameters (block units) ---
  # Cave floor: how far below base the cave floor sits
  floorDepthBlocks: 20          # ~y45 (was depth: 0.11 → 0.11*180≈20)
  floorVariationBlocks: 9       # Floor varies ±9 blocks with noise (was depthVariation: 0.05 → 0.05*180=9)
  # Cave ceiling: where the ceiling transition zone starts and how tall it is
  ceilingStartBlocks: 18        # Ceiling begins 18 blocks above base → ~y83 (was ceilingBase: 0.1 → 0.1*180=18)
  ceilingTransitionBlocks: 31   # Ceiling fades over 31 blocks → ends ~y114 (was ceilingHeight: 0.17 → 0.17*180≈31)
  ceilingSpikeAmplitude: 18     # Max stalactite offset in blocks (was 0.1 * scale)

  # --- River channel controls (continentalRiverDist: -1=center, 0=edge, +1=far) ---
  riverBedDepth: 8     # Blocks carved below surface at river center (must be > base - ocean level = 5)
  riverInner: -0.3     # Dist where flat riverbed ends and bank roll begins
  riverOuter: -0.05    # Dist where carving reaches 0 (more negative = narrower visible river)

ocean:
  level: $meta.yml:ocean-level
  # Water level rises with the river's regional elevation so rivers at higher
  # terrain still have water in them.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
    expression: olevel + continentalRiverBlockElevChange(x, z)

terrain:
  #blend:
  #  distance: 3     # 0 = disabled (sharp edges)
  #  step: 4
  #  weight: 1.0
  # Two-stage approach:
  #   1. The 2D sampler (elevationDetailed → elevationWithRivers) provides a smooth
  #      hermite roll from normal terrain down to the river's regional elevation.
  #      This handles the broad valley shape and ensures bed height rises with
  #      continentalRiverBlockElevChange.
  #   2. The 3D sampler carves the actual river channel below water level using a
  #      narrow hermite band controlled by riverEdge (→ continentalRiverBlockDist).
  #      Cave erosion is faded near the river to prevent caves breaking into the bed.
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables: *variables
    expression: |
      -y + base -
      (erode(
        y,
        base + continentalRiverBlockElevChange(x, z),
        elevationWithRivers(x, z) * scale - continentalRiverBlockElevChange(x, z),
        floorDepthBlocks - ((1 + depthVariation(x,z)) * floorVariationBlocks),
        ceilingStartBlocks,
        ceilingTransitionBlocks,
        ceilingSpikes(x, z) * -ceilingSpikeAmplitude,
        herp(openings(x, z), 0.3, 0, 0.6, 1) * scale
      ) * (1 + erosionStrengthVariation(x/3, y, z/3)^2) *
      herp(continentalRiverDist(x,z), riverInner, 1, riverOuter, 0))
    #  -
    #riverBedDepth * herp(continentalRiverDist(x,z), riverInner, 1, riverOuter, 0)
    samplers:
      erosionStrengthVariation: # Used to roughen up the walls
        dimensions: 3
        type: FBM
        octaves: 4
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.05
          salt: 5
      openings:
        dimensions: 2
        type: EXPRESSION_NORMALIZER
        expression: "|in|"
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 1 / 1000
          salt: 9
      ceilingSpikes:
        dimensions: 2
        type: CUBIC_SPLINE
        points:
          - { from: -1, to: 1, gradient: -2 }
          - { from: -0.2, to: 0, gradient: 0 }
        sampler:
          type: CELLULAR
          distance: Euclidean
          frequency: 0.06
      depthVariation:
        dimensions: 2
        type: FBM
        octaves: 4
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.005
          salt: 9
    functions:
      
      # ──────────────────────────────────────────────────────────────────────
      # erode() — Carves a cave-like void into the terrain.
      #
      # All arguments are in BLOCK UNITS (world Y coordinates / block counts).
      # Returns a positive value where terrain should be removed.
      #
      # Two independent controls shape the cave:
      #
      #   FLOOR (caveFloor):
      #     Prevents erosion below a depth limit.
      #     At y <= base - floorDepth (e.g. y45): erosion = 0 → solid floor
      #     At y >= base             (e.g. y65): erosion = full → open cave
      #     Between: hermite transition (rounded cave floor)
      #
      #   CEILING (caveCeiling):
      #     Creates an overhanging roof that caps the cave.
      #     At y < base + ceilingStart (e.g. y83):  erosion = FULL (open cave)
      #     At y > base + ceilingStart + ceilingTransition (e.g. y114): erosion = 0 → solid cap
      #     Between: hermite transition (rounded cave ceiling)
      #
      #     The ceiling position is shifted by:
      #       - ceilingOffset: noise-driven spikes that create stalactite shapes (blocks)
      #       - surfaceOpenings: at low terrain (<72 blocks above base), the ceiling
      #         shifts down, allowing the cave to breach the surface
      #
      #   The FULL erosion value is: base + surfaceBlocks
      #     This exceeds the terrain density at any point within the cave,
      #     guaranteeing complete block removal in the open cave zone.
      #
      # Combined (floor × ceiling):
      #   y < base - floorDepth:              solid (floor wins, erosion=0)
      #   base - floorDepth → base:           floor transition (hermite)
      #   base → base + ceilingStart:         open cave (full erosion)
      #   base + ceilingStart → +transition:  ceiling transition (hermite)
      #   above ceiling:                      solid cap (erosion=0)
      # ──────────────────────────────────────────────────────────────────────
      erode:
        arguments: [ y, base, surfaceBlocks, floorDepth, ceilingStart, ceilingTransition, ceilingOffset, ceilingOpenings ]
        expression: |
          caveFloor(y, base, floorDepth,
            caveCeiling(y, base, surfaceBlocks, ceilingStart, ceilingTransition, ceilingOffset,
              surfaceOpenings(surfaceBlocks, ceilingOpenings)))
        functions:
          "<<":
            - math/functions/interpolation.yml:functions

          # How much the ceiling shifts down at low elevations, allowing caves
          # to open to the surface. Returns 0 to ceilingOpenings (in blocks).
          #   surfaceBlocks <= 72 (elev 0.4): full opening shift
          #   surfaceBlocks >= 108 (elev 0.6): no opening shift
          surfaceOpenings:
            arguments: [ surfaceBlocks, ceilingOpenings ]
            expression: herp(surfaceBlocks, 72, ceilingOpenings, 108, 0)
            functions:
              "<<":
                - math/functions/interpolation.yml:functions

          # Ceiling shaper — returns erosion amount, in blocks.
          # Transitions from full erosion (below base + ceilingStart) to 0
          # (above base + ceilingStart + ceilingTransition).
          # Full erosion = base + surfaceBlocks, which always exceeds
          # terrain density, guaranteeing air in the open cave zone.
          caveCeiling:
            arguments: [ y, base, surfaceBlocks, ceilingStart, ceilingTransition, ceilingOffset, openingShift ]
            expression: |
              herp(y - ceilingOffset - openingShift,
                base + ceilingStart, base + surfaceBlocks,
                base + ceilingStart + ceilingTransition, 0)
            functions:
              "<<":
                - math/functions/interpolation.yml:functions

          # Floor limiter — prevents erosion below the depth limit.
          # At y <= base - floorDepth: returns 0 (solid floor).
          # At y >= base: passes through ceiling erosion unchanged.
          caveFloor:
            arguments: [ y, base, floorDepth, ceilingErosion ]
            expression: herp(y, base - floorDepth, 0, base, ceilingErosion)
            functions:
              "<<":
                - math/functions/interpolation.yml:functions
  
  # Will always return y value for surface
  sampler-2d:
    type: EXPRESSION
    #Make sure general surface is above riverbed leading up to river.
    expression: max(scale * elevationDetailed(x, z),(continentalRiverBlockElevChange(x, z)))
    variables: *variables