      \    // Case 3: Open valley — herp from terrain down to bank\n    // River distance is 0 at river edge, increases up to\
      \ the threshold where it is no longer \n    // applicable (river biome only replaced up to threshold)\n      herp(continentalRiverDist(x,\
      \ z), \n      riverBiomeActivationThreshold / 2, minimumRiverBankHeight(x, z),\n      riverBiomeActivationThreshold, scale\
      \ * elevationDetailed(x, z)),\n    enclosedFullTransitionBlocks,\n    // Case 2: Enclosed cave — carve void, only start\
      \ adding above blocks back (to increase density)\n    // when above the ceiling, below the original terrain, and not in\
      \ an river opening.\n    minimumRiverBankHeight(x, z) +\n    if(y > base + minimumRiverBankHeight(x, z) + caveCeilingMinimumWithSpikes(x,\
      \ z)\n      && y < base + elevationDetailedWithHoles(x, z),\n      elevationDetailedWithHoles(x, z),\n      0)\n  )\n\
      )\n"
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
