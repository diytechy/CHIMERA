id: EQ_PLATEAO
type: BIOME
abstract: true

vars: &variables
  base: 69
  top: 109
  topWidth: 6
  biomeVariationStrength: 15
  surfaceVariationStrength: 8
  scale: $customization.yml:terrain-height

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(
        -y + base,
        -abs(top - y - topWidth) + topWidth
      ) + wallVariation(x,y,z) * clamp((-abs(base + (top - base) / 2 - y) + 10), 0, 1) * 10
    samplers:
      wallVariation:
        dimensions: 3
        type: OPEN_SIMPLEX_2S
        frequency: 0.035
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
