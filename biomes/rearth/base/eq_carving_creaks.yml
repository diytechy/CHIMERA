id: EQ_CARVING_CREAKS
type: BIOME
abstract: true

vars: &variables
  #Explored variables from before:
  floor: $customization.yml:terrain-base-y-level
  ##Needs to equal 110 or palette needs to be adjusted.
  #baseOffset: 45
  #height: 3
  #terraceCount: 15
  #floor: 67
  base: 110
  height: 3
  terraceCount: 15

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    #Original:
    #  -y + base + height * baseRandom(x,z)
    #  - min(terrace(easeInOut(max(0, -abs(rivers(x,z)) + 0.5)) * terraceCount, 9) / terraceCount * 200, base - floor)
    #  - max(0, -abs(rivers(x,z)) + 0.23)  * 45
    expression: |
     -y + floor + BiomeShapeSealevelElevation(x,z) + (base - floor + height * baseRandom(x,z)
     - min(terrace(easeInOut(max(0, -abs(rivers(x,z)) + 0.5)) * terraceCount, 9) / terraceCount * 200, base - floor)
     - max(0, -abs(rivers(x,z)) + 0.23)  * 45)* biomeInfluence(x,z)
    functions:
      easeInOut:
        arguments: [x]
        expression: x * x * (3.0 - 2.0 * x)
      terrace:
        arguments: [x, terraceStrength]
        expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
    samplers:
      rivers:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: ${customization.yml:biomeSpread.riverScale}
      baseRandom:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.01
        salt: 20
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
