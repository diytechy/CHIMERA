id: EQ_CAVE_JUNGLE
type: BIOME
abstract: true

# Tunable parameters — all sub-samplers pull from this anchor via variables: *variables.
vars: &variables
  act_thresh:    $customization.yml:special_cave_void_activation

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10

carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(
        -clamp(
          // Main hollow — same (special_caves - act_thresh) × 5 scaling as EQ_INFERNO_ISLE.
          (special_caves(x, y, z) - act_thresh) * 5.0

          // Wall texture at 0.10: FBM amplitude ±~1.5 → ±0.15 variation.
          // Kept low so negative FBM values cannot push the shell expression positive
          // (0.25 shell headroom − 0.15 max negative offset = 0.10 min → stays solid).
          + caveWallOffset(x, y, z) * 0.10

          // Rock-shelf platforms projected from cave walls.
          // No explicit height or wall-proximity gate — natural emergence:
          //   inside the cave void (special_caves ≈ -1), cave expr = -4.75, platform
          //   max = (1−0.83)×8 = 1.36 → total = -3.39 → still void.  Shelves only
          //   solidify the near-wall transition band (special_caves > ~-0.35) where
          //   the cave void signal is small enough for platforms to win.
          + platformContrib(x, y, z)

        ,-2.5, 2.5),

        // Shared carver fade — tight lower hemisphere seals the cave floor.
        caveCarverFade(x, y, z)
      )
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers:
      # Rock-shelf sampler matching original vine-vault terrain approach:
      #   (-platforms − 0.83 + wallVariation × 0.08) × 8
      #   threshold 0.83 → inner 17% of each cellular cell → narrow ledge shapes.
      #   DOMAIN_WARP amplitude=3, CELLULAR freq=0.03 (≈33-block cell period).
      #   Wall variation: abs(caveWallOffset) adds 0–0.14 to slightly widen organic edges.
      platformContrib:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          max((-platforms(x, z) - 0.83 + abs(caveWallOffset(x, y, z)) * 0.08) * 8.0, 0)
        samplers:
          platforms:
            dimensions: 2
            type: DOMAIN_WARP
            amplitude: 3
            warp:
              type: OPEN_SIMPLEX_2
              frequency: 0.02
            sampler:
              type: CELLULAR
              frequency: 0.03

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
