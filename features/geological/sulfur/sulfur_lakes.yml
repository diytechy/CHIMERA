id: SULFUR_LAKES
type: FEATURE

# Sulfur pools on the cave floors of the sulfur caves — a defining, frequent feature.
# Previously these were rock-ENCLOSED lakes whose structure failed unless fully
# surrounded by solid rock (scarce in a carved cave biome) and whose locator made a
# single random-Y attempt over the whole column. Reworked to target cave floors
# (solid below, open air above) with many attempts per column; the sulfur_pool
# structure builds its own sulfur basin so it no longer needs a rock envelope.
distributor:
  type: PADDED_GRID
  width: 7
  padding: 5
  salt: 9187

locator:
  type: AND
  locators:
    - type: RANDOM
      amount: 40                      # several attempts per cell -> reliably finds floors
      height: &range
        min: ${meta.yml:cave-bottom}
        max: ${meta.yml:ocean-level} + 40
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: 0                 # cave-floor top block (carved into)
          - type: MATCH_AIR
            offset: 1                 # open cave above -> the pool is visible
          - type: MATCH_SOLID
            offset: -4                # enough rock beneath to hold the basin

structures:
  distribution:
    type: CONSTANT
  structures: sulfur_lake
