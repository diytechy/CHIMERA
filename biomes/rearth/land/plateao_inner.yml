id: FOLIAGE_FORTRESS_INNER
type: BIOME
vanilla: minecraft:plains
extends:
- CARVING_LAND
- BASE
color: $biomes/colors.yml:SAVANNA
colors:
  grass: 8567917
  foliage: 6662473
  water: 937679
  water-fog: 12638463
tags:
- USE_RIVER
- LAND_CAVES
- SPECIAL_CAVES
- TEMPERATE_COAST_FLAT
vars: $biomes/rearth/land/plateao_middle.yml:vars
terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: $biomes/rearth/land/plateao_middle.yml:vars
    expression: |
      -y + top
    samplers: $biomes/rearth/land/plateao_middle.yml:terrain.sampler.samplers
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
palette:
- GRASS_VARIATION: 319
- << meta.yml:palette-bottom
features:
  landforms:
  - SMALL_GRANITE_BOULDER_PATCHES
  flora:
  - GRASS
  - TALL_GRASS
  - POPPY_PATCH
  - DANDELION_PATCH
  - ROSE_BUSH_PATCH
  - PEONY_PATCH
  - LILAC_PATCH
  - LILY_OF_THE_VALLEY_PATCH
  trees:
  - MESQUITE_TREES
  - MIXED_TREES
