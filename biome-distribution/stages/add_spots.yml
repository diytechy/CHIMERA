  #land spot
  - type: REPLACE
    from: _land_spot
    to:
      - sinkhole: 4
      - live-volcano: 4
      - PRISMATIC_SPRING: 1
      - extinct-volcano: 4
    sampler:
      type: EXPRESSION
      expression: spotSizePercent(x, z)*2-1

  #ocean spot
  - type: REPLACE
    from: _ocean_spot
    to:
      - live-volcano: 4
      - PRISMATIC_SPRING: 1
      - extinct-volcano: 4
    sampler:
      type: EXPRESSION
      expression: spotSizePercent(x, z)*2-1

  - type: BORDER
    from: live-volcano
    replace: ocean
    to:
      - ocean: 1
      - volcano-coast: 1
    sampler:
      type: CONSTANT

  - type: BORDER
    from: sinkhole
    replace: land
    to: sinkhole-border
    sampler:
      type: CONSTANT

  - type: BORDER
    from: sinkhole
    replace: ocean
    to: sinkhole-border-ocean
    sampler:
      type: CONSTANT

  - type: BORDER
    from: extinct-volcano
    replace: ocean
    to: sinkhole-border-ocean
    sampler:
      type: CONSTANT