riftCell: &riftCell
  dimensions: 2
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.riftDistance}
  salt: 1357
  jitter: 0.5

samplers:
  riftHybDistFromCenter:
    <<: *riftCell
    distance: Hybrid

  riftRegions:
    <<: *riftCell
    return: CellValue

  riftTemperature:
    <<: *riftCell
    return: NoiseLookup
    lookup: $math/samplers/temperature.yml:samplers.temperature
    salt-lookup: false

  riftInRangeOfSpot:
    <<: *riftCell
    return: NoiseLookup
    lookup: $math/samplers/spots.yml:samplers.nearSpotRift
    salt-lookup: false

  riftFarRiverDist:
    <<: *riftCell
    return: NoiseLookup
    lookup: $math/samplers/rivers.yml:samplers.continentalRiverDistFarGrid
    salt-lookup: false

  riftWellPlacement:
    dimensions: 2
    type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
    amplitude: 60
    warp:
      type: FBM
      octaves: 4
      gain: 0.3
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 1 / ${customization.yml:biomeSpread.riftDistance}
    sampler:
      type: EXPRESSION
      expression: if(riftHybDistFromCenter(x,z)<-0.6,1,-1)
      samplers:
        riftHybDistFromCenter: $math/samplers/rifts.yml:samplers.riftHybDistFromCenter

  riftCanyon:
    type: EXPRESSION
    dimensions: 2
    expression: |
      (-abs(base(x,z)) + 0.3) * 2 * (1 / 0.2)
    samplers:
      base:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 1 / ${customization.yml:biomeSpread.wellDistance} * 1
      mask:
        dimensions: 2
        type: CELLULAR
        frequency: 1 / ${customization.yml:biomeSpread.wellDistance} * 0.15
        seed: 23456345
