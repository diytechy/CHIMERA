id: EQ_HILLS
type: BIOME
abstract: true

# Basic hilly terrain.

vars: &variables
  base: $customization.yml:terrain-base-y-level
  height: 35

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: -y+base+BiomeShapeLandmassBaseOffset(x,z) + 5
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables: *variables
    expression: (simplex(x, z)+1)/2 * height