  special_caveNonInferno:
    dimensions: 3
    type: EXPRESSION
    variables:
      not_hot_threshold: -0.3
    expression: |
      if((special_cavePresent(x,y,z)) &&
      (special_caveVariation(x,z)<not_hot_threshold),
        (not_hot_threshold - special_caveVariation(x,z))/(1+not_hot_threshold),
        0)
  special_radius:
    dimensions: 2
    type: EXPRESSION
    variables:
      cave_dia: '150'
      cave_dist: '300'
      cave_upper: '40'
      cave_lower: '-30'
      cave_y_power: '2.5'
    expression: |
      (cell_spot(x,z)+1)*((cave_dist*2)/cave_dia)
    samplers:
      cell_spot:
        dimensions: 2
        type: CELLULAR
        frequency: 0.003333333333
        distance: Euclidean
        jitter: 0.5
        salt: 24.0
  special_radius_norm:
    dimensions: 2
    type: EXPRESSION
    variables:
      cave_dia: '150'
      cave_dist: '300'
      cave_upper: '40'
      cave_lower: '-30'
      cave_y_power: '2.5'
    expression: |
      max(pit_transition(x,z),special_radius(x,z))
    samplers:
      pit_transition:
        dimensions: 2
        type: EXPRESSION
        variables:
          cave_pit_thresh: '0.1'
          cave_pit_trans: '0.4'
        expression: "if(warped_pit(x,z),\n  lerp(riftWellPlacement(x,z),cave_pit_thresh-cave_pit_trans,0,cave_pit_thresh,1)\n\
          \  ,\n  0)\n  \n"
  special_caves_linear:
    dimensions: 3
    type: EXPRESSION
    expression: |
      0
  special_caves:
    dimensions: 3
    type: EXPRESSION
    variables:
      cave_dia: '150'
      cave_dist: '300'
      cave_upper: '40'
      cave_lower: '-30'
      cave_y_power: '2.5'
    expression: |
      normalize_shell(
        (
          //First compute normalized radius on the x/z plane:
          special_radius_norm(x,z)^2

          //Then add in the normalized y component; cave_y_power controls curvature:
          //higher values flatten the top/bottom cap, lower values approach a sphere.
          +((if(y>0,y/cave_upper,y/cave_lower))^cave_y_power)

          //Then convert back to standard normalized radius
        )^0.5-1,
        y, cave_lower, cave_upper, cave_dia/2, cave_y_power)
    functions:
      normalize_shell:
        arguments:
        - dist_into_shell
        - y
        - min_y
        - max_y
        - horz_radius
        - y_power
        expression: |
          //dist_into_shell
          if(dist_into_shell<0,
            dist_into_shell * if(y>0,
              1 + (y/max_y) * (2*max_y/(horz_radius*y_power) - 1),
              1 + (y/min_y) * (-2*min_y/(horz_radius*y_power) - 1)
            ),
            dist_into_shell)
  special_caveVariation:
    dimensions: 2
    type: CELLULAR
    frequency: 0.003333333333
    distance: Euclidean
    jitter: 0.5
    salt: 24.0
    return: CellValue
  special_caveElevation:
    dimensions: 2
    type: CELLULAR
    frequency: 0.003333333333
    distance: Euclidean
    jitter: 0.5
    salt: 24.0
    return: NoiseLookup
    salt-lookup: false
    lookup:
      dimensions: 3
      type: EXPRESSION
      expression: |
        aroundContinent(x, z)
  special_caveTemperature:
    dimensions: 2
    type: CELLULAR
    frequency: 0.003333333333
    distance: Euclidean
    jitter: 0.5
    salt: 24.0
    return: NoiseLookup
    salt-lookup: false
    lookup:
      dimensions: 3
      type: EXPRESSION
      expression: |
        temperature(x, z)
  special_caveDist:
    dimensions: 3
    type: EXPRESSION
    variables:
      cave_dia: '150'
      cave_dist: '300'
      cave_upper: '40'
      cave_lower: '-30'
      cave_y_power: '2.5'
    expression: |
      if(nDist_sq(x,y,z) > 0.000001,
        (Rxz(x,z)^2 / nDist_sq(x,y,z))
          * (cave_dia/2 - (cell_spot(x,z)+1)*cave_dist)
        + ((if(y>0,y/cave_upper,y/cave_lower))^cave_y_power / nDist_sq(x,y,z))
          * if(y>=0, cave_upper-y, y-cave_lower),
        cave_upper)
    samplers:
      cell_spot:
        dimensions: 2
        type: CELLULAR
        frequency: 0.003333333333
        distance: Euclidean
        jitter: 0.5
        salt: 24.0
      Rxz:
        dimensions: 2
        type: EXPRESSION
        expression: |
          (cell_spot(x,z)+1) *(300*2/150)
        samplers:
          cell_spot:
            dimensions: 2
            type: CELLULAR
            frequency: 0.003333333333
            distance: Euclidean
            jitter: 0.5
            salt: 24.0
      nDist_sq:
        dimensions: 3
        type: EXPRESSION
        expression: |
          ((cell_spot(x,z)+1)
            *(300*2/150))^2
          +(if(y>0,
              y/40,
              y/-30))^2.5
        samplers:
          cell_spot:
            dimensions: 2
            type: CELLULAR
            frequency: 0.003333333333
            distance: Euclidean
            jitter: 0.5
            salt: 24.0
  smallCaveRegionValue:
