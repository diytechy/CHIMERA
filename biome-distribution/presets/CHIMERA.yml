# ExploreExpand preset - Biomes NOT in default, origen2, or rearth presets
# This preset contains only biomes that don't appear in the main presets,
# allowing exploration of rare/unused biomes. Not intended for normal gameplay.

biomes:
  type: EXTRUSION
  extrusions:
    # All cave extrusions
    - << biome-distribution/extrusions/add_deep_dark.yml:extrusions
    - << biome-distribution/extrusions/add_cave_biomes.yml:extrusions
    - << biome-distribution/extrusions/add_special_caves.yml:extrusions

  # Y-axis domain warp applied before extrusion range checks.
  # Shifts the effective Y lookup up/down per-column, making cave/vertical
  # biome boundaries follow terrain elevation instead of sitting at flat planes.
  # Sampler is evaluated in 2D (x, z) so the warp is consistent within a column.
  y-blend:
    amplitude: 2
    terrain-coordinate-noise-warp: false
    sampler:
      type: EXPRESSION
      expression: |
        //0
        noisebase(x,z)+noise(x,z)*2
      samplers:
        noisebase:
          dimensions: 2
          type: OPEN_SIMPLEX_2
          frequency: 0.05
        noise:
          dimensions: 2
          type: WHITE_NOISE
          frequency: 2

  provider:
    type: PIPELINE
    resolution: 4 #Chunk sampler is actually sampling every 4 blocks so generally doesn't have a benefit with higher resolution except for block placement.
    #y-resolution: 4

    # Fast-path for stronghold ring position searches (world creation).
    # Replaces full pipeline evaluation for the 415,872 biome queries issued during
    # initial stronghold placement. A single continents noise call per
    # query determines land vs ocean, avoiding the pipeline chunk cache amplification
    # (up to ~2,000x more evaluations than needed for peripheral pipeline chunks).
    # eligible-biome maps to minecraft:plains (in #stronghold_biased_to).
    # ineligible-biome maps to minecraft:ocean (not in the tag).
    structure-search:
      classifier:
        type: EXPRESSION
        expression: continents(x, z)
      threshold: 0.0
      eligible-biome: TEMPERATE_GRASSLAND
      ineligible-biome: OCEAN

    blend:
      amplitude: 3
      terrain-coordinate-noise-warp: false
      # Stochastically select between neighbouring biome cell samples per-block,
      # dissolving the 4-block resolution grid's square border steps into a
      # noise-feathered gradient. See PipelineBiomeProvider.
      interpolate: true
      sampler:
        type: EXPRESSION
        expression: |
          noisebase(x,z)
          //+noise(x,z)
        samplers:
          noisebase:
            dimensions: 2
            type: OPEN_SIMPLEX_2
            frequency: 0.1
          noise:
            dimensions: 2
            type: WHITE_NOISE
            frequency: 2
    pipeline:
      source:
        type: SAMPLER
        sampler:
          type: EXPRESSION
          expression: spotPlacer(x, z)
        #Note ocean and land spots are always at end, the "20" here is just to give approximate 
        #distribution, but weather 20, 200, or 1 for non_spots, the same result will be yielded.
        biomes:
          _ocean_spot: 1
          _non_spot: 20
          _land_spot: 1
      stages:
        - type: REPLACE
          from: _non_spot
          to:
            - ocean: 1
            - land: 1
          sampler:
            type: EXPRESSION
            expression: continentalDistribution(x, z)
            
        #- type: REPLACE
