  elevationDetailed:
    dimensions: 2
    type: EXPRESSION
    expression: |
      terrace(
        combine(
          elevation(x, z),
          detailStart, 0,
          detailEnd, detail(x, z) * detailFactor
        ),
        terraceBaseScale + terraceScale(x, z) * terraceScaleVariation,
        terraceOffset(x, z) * terraceOffsetVariation,
        0,
        (terraceDepth(x, z)^3) * terraceDepthVariation,
        0, terraceDepthStart
      )
    variables:
      detailFactor: 0.1
      detailStart: 0
      detailEnd: 0.5
      terraceBaseScale: 0.2
      terraceScaleVariation: 0.1
      terraceOffsetVariation: 0.25
      terraceDepthVariation: 1
      terraceDepthStart: 0.1
      plainsMaskZero: 0.5
      plainsMaskFull: 0.85
      hillMaxElevation: 0.3
      mountainCap: 0.9
      mountainMaskZero: 0.2
      mountainMaskFull: 0.5
      mountainContZero: 0.05
      mountainContFull: 0.5
      globalScale: 1
      verticalLift: 180
      scale: 1.05
      continentalRiseRate: 30
    samplers:
      elevation:
        dimensions: 2
        type: DOMAIN_WARP
        sampler: *elevation
        amplitude: 0.25
        warp:
          type: WHITE_NOISE
          salt: 2394.0
      terraceScale:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.002
        salt: 1926.0
      terraceDepth:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 5812.0
      terraceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 8512.0
      detail:
        dimensions: 2
        type: FBM
        octaves: 4
        lacunarity: 2
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.008
          salt: 5912.0
    functions:
      terrace:
        arguments:
        - i
        - sc
        - o
        - g
        - d
        - tz
        - tf
        expression: terraceParalinear(i,sc,o,g,lerp(i,tz,0,tf,d))
        functions:
          terrace:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
                expression: x - floor(x/i) * i
              profile:
                arguments:
                - x
                expression: '|x - 0.5| - 0.5'
          terraceStrata:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
                expression: x - floor(x/i) * i
              profile:
                arguments:
                - x
                expression: -if(x>0.95,-(x-1)/0.05,x/0.95)
          terraceParabolic:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
                expression: x - floor(x/i) * i
              profile:
                arguments:
                - x
                expression: (x - 0.5)^2 - 0.25
          terraceParalinear:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
                expression: x - floor(x/i) * i
              profile:
                arguments:
                - x
                expression: |-
                  if(0.25 < x && x < 0.75,
                    2*(x-0.5)^2-0.375,
                    |x - 0.5| - 0.5
                  )
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
          lerp3:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            - ct
            - c
            expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
            functions:
              lerp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                    if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                  )
          herp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              hermite:
                arguments:
                - x
                expression: 3*x^2-2*x^3
          parabolicMap:
            arguments:
            - t
            - bt
            - b
            - at
            - a
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              interpolation:
                arguments:
                - x
                expression: x^2
      combine:
        arguments:
        - x
        - at
        - a
        - bt
        - b
        expression: x+lerp(x,at,a,bt,b)
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
          lerp3:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            - ct
            - c
            expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
            functions:
              lerp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                    if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                  )
          herp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              hermite:
                arguments:
                - x
                expression: 3*x^2-2*x^3
          parabolicMap:
            arguments:
            - t
            - bt
            - b
            - at
            - a
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              interpolation:
                arguments:
                - x
                expression: x^2
