id: EQ_BAMBOO_BASIN
type: BIOME
abstract: true

vars: &variables
  base: 67
  height: 55

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      // positive / higher = solid
      -y + base + elevationDetailedBlockHeight(x,z)
      + (min(-cells(x,z), 0.8) * height
      + riverMask(x, y, z) * 40) * biomeInfluence(x,z)
    functions:
      terrace:
        arguments: [x, terraceStrength]
        expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
    samplers:
      cells:
        dimensions: 2
        type: CELLULAR
        frequency: 0.045
        jitter: 0.9
        return: NoiseLookup
        lookup:
          dimensions: 2
          type: LINEAR
          min: -1
          max: 0.2
          sampler: &cellMountains
            type: EXPRESSION
            dimensions: 2
            expression: BiomeShapeLandmassDistance(x,z)
      riverMask:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          clamp(abs(abs(riverBaseAngle(x,z) * 3) +    // basic line from center
            riverAngleVariation(cellMountains(x,z) * 300, 0) * 0.24   // vary angle slightly going outwards
            - rivers(x,z)) % (6.28 / 5) * lerp(cellMountains(x,z), -0.98, -0.15, -0.2, 3.5) // ensure river has proper width, add lake on top
            - 0.25, -0.21, 0)   // set river width, clamp at max depth
        samplers:
          cellMountains:
            type: EXPRESSION
            dimensions: 2
            expression: BiomeShapeLandmassDistance(x,z)
          rivers:
            type: EXPRESSION
            dimensions: 2
            expression: BiomeShapeLandmassAngle(x,z)
          riverAngleVariation:
            dimensions: 2
            type: OPEN_SIMPLEX_2S
            frequency: 0.014
          riverBaseAngle:
            type: EXPRESSION
            dimensions: 2
            expression: BiomeShapeLandmassValue(x,z)
