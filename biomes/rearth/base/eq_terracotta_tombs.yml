id: EQ_TERRACOTTA_TOMBS
type: BIOME
abstract: true

vars: &variables
  base: -30
  pillarHeight: 38

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10
    
carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      -clamp(
        max((special_caves(x, y, z) + 0.88) * 50 + wallOffset(x,y,z) * 3, -5)
        + max((-pillars(x,z) -0.95 + abs(pillarWidthRand(y, x / 20 + z / 24)) * 0.033) * 170
          + min(base - y + elevationDetailedBlockHeight(x,z) + pillarHeight * (basepillarsCenter(x,z) * 0.4 + 1), 0)^3 * 3, 0)
         , -10, 10) * 16
      // + max((4.9 - abs(middleHeight - y)), 0) * (-platforms(x,z) - 0.29), -10, 10) * 16
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers:
      pillars:
        dimensions: 2
        type: CELLULAR
        frequency: 0.037
      basepillarsCenter:
        dimensions: 2
        type: CELLULAR
        frequency: 0.037
        return: CellValue
      pillarWidthRand:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.3
      wallOffset:
        dimensions: 3
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.025
        octaves: 2
        lacunarity: 2.8
        gain: 0.5
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
