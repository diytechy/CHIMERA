      terraceBaseScale: 0.2
      terraceScaleVariation: 0.1
      terraceOffsetVariation: 0.25
      terraceDepthVariation: 1
      terraceDepthStart: 0.1
      plainsMaskZero: 0.5
      plainsMaskFull: 0.85
      hillMaxElevation: 0.3
      mountainCap: 0.9
      mountainMaskZero: 0.2
      mountainMaskFull: 0.5
      mountainContZero: 0.05
      mountainContFull: 0.5
      globalScale: 1
      verticalLift: 180
      scale: 1.05
      continentalRiseRate: 30
    samplers:
      continents: *continents
  plainsMask: &plainsMask
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x,z)
    samplers:
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        amplitude: 0.3
        salt: 67.0
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.0005
  continentalRiseApplied: &continentalRiseApplied
    dimensions: 2
    type: EXPRESSION
    expression: |
      parabolicMap(plainsMask(x, z), plainsMaskZero, continentalRise(x,z), plainsMaskFull, continental_sampler(x,z)*(continentalRiseRate / (continentalRiseRate+verticalLift)))
    variables:
