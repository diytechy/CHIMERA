id: EQ_PILLOW_PLAINS_FLAT
type: BIOME
abstract: true

vars: &variables
  base: 70
  height: 4

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      // positive / higher = solid
      -y + base + 
      lerp(biomeInfluence(x,z),0,elevationDetailedBlockHeight(x,z),
      1,BiomeShapeLandmassElevation(x,z)) + 
      surfaceVariation(x,z) * height * biomeInfluence(x,z)
    functions:
      remapY:
        arguments: [y, base, depth]
        expression: (base - y) / depth
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
      pillarWidth:
        arguments: [x]
        expression: 8.416667*x - 19.25*x^2 + 10.83333*x^3
    samplers:
      surfaceVariation:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.011
      flatCells:
        dimensions: 2
        type: CELLULAR
        frequency: 0.018
        jitter: 1
        distance: Euclidean
      largeFlatAreas:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.0055
        octaves: 3
        lacunarity: 1
        gain: 0.5
      pillarSizing:
        dimensions: 2
        type: CELLULAR
        frequency: 0.018
        jitter: 1
        return: CellValue
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
