id: EQ_ARID_ARBORETUM
type: BIOME
abstract: true

vars: &variables
  base: 68
  height: 9
  pillarHeight: 40

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      clamp(-y + base + noiseBase(x,z) * height, -2, 3)
      + clamp(pillars(x + noiseBase(y * 3, x / 4 + z / 5) * 5, y, z + noiseBase(y * 2.5 + 500, x / 6 + z / 2) * 5) * 24, -2, 3)
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers:
      pillars:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          basePillarsExistance(x,z) * (
            -basepillars(x,z) - 0.6
            + basepillarsCenter(x,z) * 0.12
            + pillarWidthRand(y, x / 10) * 0.09
            + (min(0, base + pillarHeight * (basepillarsCenter(x,z) * 0.4 + 1) - y) / 12)^3
          )
        samplers:
          basepillars: &pillarConf
            dimensions: 2
            type: CELLULAR
            frequency: 0.013
            jitter: 1
            distance: Euclidean
          basepillarsCenter:
            <<: *pillarConf
            return: CellValue
          basePillarsExistance:
            <<: *pillarConf
            return: NoiseLookup
            lookup:
              dimensions: 2
              type: EXPRESSION
              variables: *variables
              expression: |
                if (-abs(rivers(x, z)) > -0.35 || biomeInfluence(x,z) > -0.89, 0, 1)
              samplers:
                biomeInfluence:
                  dimensions: 2
                  type: CELLULAR
                  jitter: ${customization.yml:biomeSpread.cellJitter}
                  frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
                rivers:
                  dimensions: 2
                  type: OPEN_SIMPLEX_2
                  frequency: ${customization.yml:biomeSpread.riverScale}
          pillarWidthRand:
            dimensions: 2
            type: FBM
            sampler:
              dimensions: 2
              type: OPEN_SIMPLEX_2S
              frequency: 0.1
            octaves: 2
            lacunarity: 2
            gain: 0.35
      noiseBase:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.011
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
