      -y + base + minimumRiverBankHeight(x, z) +
      if(y <= base + minimumRiverBankHeight(x, z),
        // ── Case 1: Riverbed ──
        -bedDepth(x, z),
        // ── Cases 2 & 3: Above bank, blended by enclosure ──
        // 2D sampler already places surface at bank height, so 0 = bank surface here.
        // Only add positive values to build enclosed cave roofs or border transitions.
        lerp(riverEnclosedFactor(x, z),
          enclosedStrtTransitionBlocks,
          // Case 3: Open valley — herp from terrain down to bank
          // Inside river (dist<=0): 0 = air above bank.
          // Border (dist>0): ramp from bank (0) up to terrain height.
            if(continentalRiverDist(x, z)<=0,0,herp(continentalRiverDist(x, z),
            riverBiomeActivationThreshold / 4, 0,
            riverBiomeActivationThreshold, elevationAboveBank(x,z))),
          enclosedFullTransitionBlocks,
          // Case 2: Enclosed cave — void below ceiling, roof above ceiling.
          if(y < (base + minimumRiverBankHeight(x, z) + caveCeilingMinimumWithSpikes(x, z)),
            // Below ceiling height: carve void with negative density (always empty)
            -elevationAboveBank(x,z),
