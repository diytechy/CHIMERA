id: EQ_SPOT_SINKHOLE
type: BIOME
abstract: true

vars: &variables
  base: ${customization.yml:terrain-base-y-level}
  scale: ${customization.yml:terrain-height}
  olevel: $meta.yml:sinkhole-ocean-level
  "<<":
    - math/samplers/spots.yml:variables

ocean:
  level: $meta.yml:sinkhole-ocean-level
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      "<<":
        - biomes/abstract/terrain/spot/eq_spot_sinkhole.yml:vars
    # Water spans from sinkhole bottom (sinkholeFluidPercent=0) to 50% of the way up
    # to the minimum surrounding terrain (sinkholeFluidPercent=1), guaranteeing no overflow.
    # sinkholeMinElev is the min of elevationSparse at 8 cardinal+diagonal points at spotRadius,
    # evaluated once per spot at the cell center for a constant per-spot reference.
    expression: |
      if(distanceToSpotEdge(x, z) < 0.9,
        base + scale * (sinkholeMinElev(x, z)
          + lerp(sinkholeFluidPercent(x, z), 0, 0.35, 1, 0.75)
            * SinkholeDepth(x,z)),
        olevel)

terrain:
  sampler:
    type: EXPRESSION
    functions: $math/functions/interpolation.yml:functions
    expression: |
      -y + base + lerp(distanceToSinkholeRim(x, z),0.5,scale*spotMinElev(x,z)+sampler2d(x,z)-20,
      0.9,elevationDetailedBlockHeight(x,z))
      //SinkholeDepth(x,z)*
    variables: *variables
    samplers:
      sampler2d:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        # This returns the normalized sinkhole shape from 0 (no sinkhole)
        # to 1 (max depth)
        expression: |
          -scale*2*SinkholeDepth(x,z) * calcHeight(x, z,
            /*distance*/      spotDistance(x, z) + erosion(x, z) * 15 + distanceWarp(x, z) * 50,
            /*erosion*/       (volcanoErosion(x, z)+1)/2,
            /*outsideHeight*/ 0,
            /*edge*/          lerp(spotEdgeRadiusPercent(x, z), 0, 0.6, 1, 0.7),
            /*radius*/        spotRadius(x, z),
            /*volcanoHeight*/ lerp(spotSizePercent(x, z) * (1 - spotEdgeRadiusPercent(x, z)),
                                0, 0.5,
                                1, 0.5
                              ),
            /*volcanoBase*/   0
          )
        samplers:
          distanceWarp:
            dimensions: 2
            type: PROBABILITY
            sampler:
              type: FBM
              sampler:
                type: OPEN_SIMPLEX_2
                frequency: 0.008
                salt: 8952

          erosion:
            dimensions: 2
            type: EXPRESSION
            expression: |
              noise(
                spotDistance(x, z)                                       + spotSizePercent(x, z) * offsetAmplitude,
                sin(spotAngle(x, z)) * spotRadius(x, z) * angleFrequency + spotSizePercent(x, z) * offsetAmplitude,
                cos(spotAngle(x, z)) * spotRadius(x, z) * angleFrequency + spotSizePercent(x, z) * offsetAmplitude
              )
            variables:
              angleFrequency: 1.5
              offsetAmplitude: 10000
            samplers:
              noise:
                dimensions: 3
                type: PROBABILITY
                sampler:
                  type: FBM
                  octaves: 3
                  sampler:
                    type: OPEN_SIMPLEX_2
                    frequency: 0.02

        functions:
          calcHeight:
            arguments:
              - x
              - z
              - distance
              - erosion
              - outsideHeight
              - edge
              - radius
              - centerHeight
              - centerBase
            expression: |
              max(
                parabolicMap(distance,
                  radius * edge, centerBase + centerHeight * lerp(centerBase+centerHeight, 0.9, 1, 1, 0),
                  radius * edge * 1.1, outsideHeight
                ),
                terraceStrata(
                  parabolicMap(distance,
                    radius + 50, outsideHeight,
                    radius * edge, centerBase + centerHeight * lerp(centerBase+centerHeight, 0.9, 1, 1, 0) * 0.8
                  ),
                  0.15, 0, 0, 0.25
                )
              )
            functions:
              "<<":
                - math/functions/interpolation.yml:functions
                - math/functions/terrace.yml:functions
  sampler-2d:
    type: CONSTANT
    value: 0