id: EQ_CHASMS
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level

  erosionStrength: 3
  erosionTopRise: 70
  erosionBottomFloor: 15

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      -y + base + elevationDetailedBlockHeight(x,z)
      - if(y<(erosionBottomFloor+base),0,
        lerp(y,
          (erosionTopRise+base), 0,
          (erosionBottomFloor+base),
            (min(|erosion(x/2, y, z/2)|/2, lerp(pillars(x,z), -0.97, 0, -0.89, 1)))
            * (-y+(erosionTopRise+base))
            * erosionStrength
        )
      )
      + ((simplex2(x/2, z/2)+1)/2 * 10 + maskSmooth(70, -0.15, -0.35, cracks(x, z))) * biomeInfluence(x,z)
    samplers:

      erosion:
        dimensions: 3
        type: OPEN_SIMPLEX_2
        frequency: 0.015
        salt: 2

      pillars:
        dimensions: 2
        type: CELLULAR
        frequency: 0.07

      cracks:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 10
        warp:
          type: FBM
          octaves: 2
          sampler:
            type: OPEN_SIMPLEX_2
            frequency: 0.03
        sampler:
          type: CELLULAR
          return: Distance2Div
          frequency: 0.003

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
