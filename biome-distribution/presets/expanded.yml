# Expanded preset - includes biomes not present in other presets
# This preset adds subtropical oceans, tropical mushroom fields, sinkholes,
# archipelagos, and other unique biomes that aren't in the standard presets.

biomes:
  type: EXTRUSION
  extrusions:
    # Standard cave extrusions
    - << biome-distribution/extrusions/add_special_caves.yml:extrusions
    - << biome-distribution/extrusions/add_cave_biomes.yml:extrusions
    - << biome-distribution/extrusions/add_deep_dark.yml:extrusions
  provider:
    type: PIPELINE
    resolution: 4
    blend:
      amplitude: 6
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 0.012
    pipeline:
      source:
        type: SAMPLER
        sampler:
          type: CELLULAR
          jitter: ${customization.yml:biomeSpread.cellJitter}
          return: NoiseLookup
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
          lookup:
            type: EXPRESSION
            expression: continents(x, z)
        biomes:
          ocean: 2
          land: 3
      stages:
        # Standard spot placement (volcanos, mesas)
        - << biome-distribution/stages/add_spots.yml:stages

        # Add sinkholes as a new spot type
        - type: REPLACE
          from: land
          to:
            - SELF: 50
            - sinkhole: 1
          sampler:
            type: EXPRESSION
            expression: if(spotDistance(x, z) < spotRadius(x, z) * 0.3, 1, -1)
            variables: $math/samplers/spots.yml:variables

        - type: REPLACE_LIST
          default-from: sinkhole
          default-to:
            - SINKHOLE_OUTER: 1
          to:
            sinkhole:
              - SINKHOLE_FOREST: 2
              - SINKHOLE_JUNGLE: 1
              - SINKHOLE_FROZEN: 1
          sampler:
            type: EXPRESSION
            expression: temperature(x, z)

        # Add large spots (vast forests, islands)
        - << biome-distribution/stages/add_large_spots.yml:stages

        # Add archipelago zones in ocean
        - type: REPLACE
          from: ocean
          to:
            - SELF: 20
            - archipelago-zone: 1
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 800
            salt: 9182

        # Add coast-lines
        - << biome-distribution/stages/add_coast.yml:stages

        # Add canyons
        - << biome-distribution/stages/special/canyons.yml:stages

        # Temperature distribution with subtropical zone
        - type: REPLACE_LIST
          sampler:
            type: EXPRESSION
            expression: temperature(x, z)
          default-from: land
          default-to:
            - ice-cap: &iceCap         1
            - tundra: &tundra         1
            - boreal-snowy: &borealSnowy    1
            - boreal-cold: &borealCold     1
            - boreal-warm: &borealWarm     1
            - boreal-hot: &borealHot      1
            - temperate-cold: &temperateCold  1
            - temperate-warm: &temperateWarm  3
            - temperate-hot: &temperateHot   2
            - tropical-savanna-wet: &tropicalCold   1
            - tropical-monsoon: &tropicalWarm   1
            - tropical-rainforest: &tropicalHot    4
          to:
            coast:
              - polar-coast: *iceCap
              - polar-coast: *tundra
              - boreal-coast: *borealSnowy
              - boreal-coast: *borealCold
              - boreal-coast: *borealWarm
              - boreal-coast: *borealHot
              - temperate-coast: *temperateCold
              - temperate-coast: *temperateWarm
              - temperate-coast: *temperateHot
              - hot-coast: *tropicalCold
              - hot-coast: *tropicalWarm
              - hot-coast: *tropicalHot
            ocean:
              - polar-ocean: *iceCap
              - polar-ocean: *tundra
              - boreal-ocean: *borealSnowy
              - boreal-ocean: *borealCold
              - lukewarm-ocean: *borealWarm
              - lukewarm-ocean: *borealHot
              - temperate-ocean: *temperateCold
              - lukewarm-ocean: *temperateWarm
              - lukewarm-ocean: *temperateHot
              - hot-ocean: *tropicalCold
              - hot-ocean: *tropicalWarm
              - hot-ocean: *tropicalHot
            archipelago-zone:
              - frozen-archipelago-zone: *iceCap
              - frozen-archipelago-zone: *tundra
              - frozen-archipelago-zone: *borealSnowy
              - archipelago-zone: *borealCold
              - archipelago-zone: *borealWarm
              - archipelago-zone: *borealHot
              - archipelago-zone: *temperateCold
              - archipelago-zone: *temperateWarm
              - archipelago-zone: *temperateHot
              - archipelago-zone: *tropicalCold
              - archipelago-zone: *tropicalWarm
              - archipelago-zone: *tropicalHot
            mesa:
              - polar-mesa: *iceCap
              - polar-mesa: *tundra
              - boreal-mesa: *borealSnowy
              - boreal-mesa: *borealCold
              - boreal-mesa: *borealWarm
              - boreal-mesa: *borealHot
              - temperate-mesa: *temperateCold
              - temperate-mesa: *temperateWarm
              - temperate-mesa: *temperateHot
              - hot-mesa: *tropicalCold
              - hot-mesa: *tropicalWarm
              - hot-mesa: *tropicalHot
            crater-lake:
              - polar-crater-lake: *iceCap
              - polar-crater-lake: *tundra
              - boreal-crater-lake: *borealSnowy
              - boreal-crater-lake: *borealCold
              - boreal-crater-lake: *borealWarm
              - boreal-crater-lake: *borealHot
              - temperate-crater-lake: *temperateCold
              - temperate-crater-lake: *temperateWarm
              - temperate-crater-lake: *temperateHot
              - hot-crater-lake: *tropicalCold
              - hot-crater-lake: *tropicalWarm
              - hot-crater-lake: *tropicalHot
            extinct-volcano:
              - polar-extinct-volcano: *iceCap
              - polar-extinct-volcano: *tundra
              - boreal-extinct-volcano: *borealSnowy
              - boreal-extinct-volcano: *borealCold
              - boreal-extinct-volcano: *borealWarm
              - boreal-extinct-volcano: *borealHot
              - temperate-extinct-volcano: *temperateCold
              - temperate-extinct-volcano: *temperateWarm
              - temperate-extinct-volcano: *temperateHot
              - hot-extinct-volcano: *tropicalCold
              - hot-extinct-volcano: *tropicalWarm
              - hot-extinct-volcano: *tropicalHot
            island:
              - polar-island: *iceCap
              - polar-island: *tundra
              - boreal-island: *borealSnowy
              - boreal-island: *borealCold
              - boreal-island: *borealWarm
              - boreal-island: *borealHot
              - temperate-island: *temperateCold
              - temperate-island: *temperateWarm
              - temperate-island: *temperateHot
              - hot-island: *tropicalCold
              - hot-island: *tropicalWarm
              - hot-island: *tropicalHot
            island-coast:
              - polar-island-coast: *iceCap
              - polar-island-coast: *tundra
              - boreal-island-coast: *borealSnowy
              - boreal-island-coast: *borealCold
              - boreal-island-coast: *borealWarm
              - boreal-island-coast: *borealHot
              - temperate-island-coast: *temperateCold
              - temperate-island-coast: *temperateWarm
              - temperate-island-coast: *temperateHot
              - hot-island-coast: *tropicalCold
              - hot-island-coast: *tropicalWarm
              - hot-island-coast: *tropicalHot
            vast-forest:
              - polar-vast-forest: *iceCap
              - polar-vast-forest: *tundra
              - polar-vast-forest: *borealSnowy
              - boreal-vast-forest: *borealCold
              - boreal-vast-forest: *borealWarm
              - boreal-vast-forest: *borealHot
              - temperate-vast-forest: *temperateCold
              - temperate-vast-forest: *temperateWarm
              - temperate-vast-forest: *temperateHot
              - tropical-vast-forest: *tropicalCold
              - tropical-vast-forest: *tropicalWarm
              - tropical-vast-forest: *tropicalHot

        # Precipitation and elevation stages
        - << biome-distribution/stages/climate/precipitation.yml:stages
        - << biome-distribution/stages/climate/elevation.yml:stages

        # Build out coast lines and islands
        - << biome-distribution/stages/add_large_spot_coast.yml:stages
        - << biome-distribution/stages/add_island_shelf.yml:stages
        - << biome-distribution/stages/add_islands.yml:stages
        - << biome-distribution/stages/climate/color.yml:stages

        # Add travertine terraces
        - << biome-distribution/stages/add_travertine_terraces.yml:stages

        # Place biomes in climates (standard)
        - << biome-distribution/stages/set_biomes_in_climates.yml:stages

        # Add lukewarm/subtropical ocean biomes
        - type: REPLACE_LIST
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 500
          default-from: lukewarm-ocean
          default-to:
            - SUBTROPICAL_OCEAN: 2
            - SUBTROPICAL_OCEAN_SLOPES: 1
            - SUBTROPICAL_OCEAN_OVERHANGS: 1
          to:
            lukewarm-deep-ocean:
              - SUBTROPICAL_DEEP_OCEAN: 2
              - SUBTROPICAL_DEEP_DEPTHS: 1

        # Convert archipelago zones to actual biomes
        - type: REPLACE
          from: archipelago-zone
          to:
            - ARCHIPELAGO: 1
          sampler:
            type: WHITE_NOISE

        - type: REPLACE
          from: frozen-archipelago-zone
          to:
            - FROZEN_ARCHIPELAGO: 1
          sampler:
            type: WHITE_NOISE

        # Add unique biomes that aren't in standard climates
        # Yellowstone - geothermal areas in temperate regions
        - type: REPLACE
          from: temperate-warm-highlands
          to:
            - SELF: 30
            - YELLOWSTONE: 1
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 600
            salt: 7823

        # Alien Marsh - rare swamp variant
        - type: REPLACE
          from: SWAMP
          to:
            - SELF: 10
            - ALIEN_MARSH: 1
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 400
            salt: 4521

        # Tropical Mushroom Fields - rare mushroom biome in tropics
        - type: REPLACE
          from: MUSHROOM_FIELDS
          to:
            - SELF: 3
            - TROPICAL_MUSHROOM_FIELDS: 1
          sampler:
            type: EXPRESSION
            expression: if(temperature(x, z) > 0.6, 1, -1)

        # Oak Savanna and Temperate Grassland in temperate zones
        - type: REPLACE
          from: PLAINS
          to:
            - SELF: 5
            - OAK_SAVANNA: 1
            - TEMPERATE_GRASSLAND: 1
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 300
            salt: 3892

        # Snowy Plains in cold regions
        - type: REPLACE
          from: SNOWY_TAIGA
          to:
            - SELF: 4
            - SNOWY_PLAINS: 1
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 400
            salt: 2934

        # Red Dry Palm Forest variant
        - type: REPLACE
          from: DRY_PALM_FOREST
          to:
            - SELF: 2
            - RED_DRY_PALM_FOREST: 1
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 / 300
            salt: 5823

        # Add color variants
        - << biome-distribution/stages/add_biome_color_variants.yml:stages

        # Border biomes
        - << biome-distribution/stages/special/border_biomes.yml:stages

        # Smoothing passes
        - type: FRACTAL_EXPAND
          sampler:
            type: WHITE_NOISE
        - type: SMOOTH
          sampler:
            type: WHITE_NOISE

        # Rivers
        - << biome-distribution/stages/add_rivers.yml:stages

        - type: SMOOTH
          sampler:
            type: WHITE_NOISE

        # Trenches (including subtropical)
        - << biome-distribution/stages/add_trenches.yml:stages
