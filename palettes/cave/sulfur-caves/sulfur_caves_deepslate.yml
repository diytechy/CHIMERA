id: SULFUR_CAVES_DEEPSLATE
type: PALETTE

# Deep band of the sulfur caves: still sulfur-dominant with cinnabar veining, blended
# into deepslate so the lower walls read a touch darker than the upper sulfur strata.
layers:
  - materials:
      - minecraft:sulfur: 6
      - minecraft:cinnabar: 2
      - minecraft:deepslate: 2
    layers: 2
  - materials:
      - minecraft:sulfur: 5
      - minecraft:cinnabar: 1
      - minecraft:deepslate: 3
    layers: 1

sampler:
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 4
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.1
  sampler:
    type: CELLULAR
    return: CellValue
    frequency: 0.08
