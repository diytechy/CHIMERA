id: BOREAL_SINKHOLE
type: BIOME
extends:
  - EQ_SPOT_SINKHOLE
  - CARVING_OCEAN
  - TAIGA
  - BASE
color: $biomes/colors.yml:BOREAL_SINKHOLE

vanilla: minecraft:taiga

tags:
  - SPECIAL_CAVES
  - LOW_CAVES
  - SINKHOLE

ocean:
  palette: BLOCK:minecraft:water
  level: $meta.yml:sinkhole-ocean-level
  sampler: $biomes/abstract/terrain/spot/eq_spot_sinkhole.yml:ocean.sampler

palette:
  - GRASS: $meta.yml:top-y
  - << meta.yml:palette-sinkhole-underwater
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.8
    palette:
      - GRASS: $meta.yml:top-y
      - << meta.yml:palette-sinkhole-underwater
      - << meta.yml:palette-bottom
  - threshold: 0.45
    palette:
      - COARSE_DIRT: $meta.yml:top-y
      - << meta.yml:palette-sinkhole-underwater
      - << meta.yml:palette-bottom
  - threshold: 0.4
    palette:
      - << meta.yml:palette-slant-generic
      - << meta.yml:palette-bottom