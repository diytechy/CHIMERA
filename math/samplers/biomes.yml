  BiomeShapeMesaTemperature:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *mesaShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false
          
  BiomeShapeMesaPrecipitation:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *mesaShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeLargelandValue:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *largelandShape
          return: CellValue

  BiomeShapeLargelandTemperature:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *largelandShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false
          
  BiomeShapeLargelandPrecipitation:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *largelandShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
