id: BASE_HYDRAXIA
type: BIOME
abstract: true
extends:
  - DEPOSITS_GENERIC
  - ORES_GENERIC
  - SULFUR_SPRING_SURFACE

slant-depth: 15

ocean:
  palette: BLOCK:minecraft:water
  level: 62
  palette: FROZEN_OCEAN

features:
  global-preprocessors:
    - LAVA_FLOOR
    #- UNDERGROUND_LAVA_COLUMNS
    - CONTAIN_FLOATING_WATER
    - CONTAIN_FLOATING_WATER_DEEPSLATE
    #- CAVE_GLOW_LICHEN
    - TEXTURED_STONE_SLANT
    #- CAVE_ENTRANCES
    #- CAVE_CARVERS
  underwater-flora:
    - KELP
    - SEAGRASS
    - SEA_PICKLES
    #- RIVER_SOULSAND
  structures:
    - MOB_ROOMS
    # World water elevators. Each variant self-gates via waterElevatorPlacement (off
    # spot-centres + off rivers) plus its own temperature/precipitation band, so wiring all
    # five here on BASE (all surface biomes; caves use BASE_CAVE) yields one climate-matched
    # well per cell. Biomes that override the 'structures' stage won't inherit these.
    - WATER_ELEVATOR_FROZEN
    - WATER_ELEVATOR_BOREAL
    - WATER_ELEVATOR_TEMPERATE
    - WATER_ELEVATOR_TROPICAL
    - WATER_ELEVATOR_DESERT
    
colors:
  grass: 0xcfffe4
  foliage: 0xcffff4
  water: 0x80f9ff
  water-fog: 0x2ed5ff
  fog: 0xa8f5ff
  sky: 0x63fcff