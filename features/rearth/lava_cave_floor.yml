id: LAVA_CAVE_FLOOR
type: FEATURE

distributor:
  type: "YES"

locator:
  type: AND
  locators:
  - type: PATTERN
    range: &range
      max: -15
      min: -38
    pattern:
      type: MATCH_AIR
      offset: 0
  - type: SAMPLER_3D
    range: *range
    sampler:
      type: EXPRESSION
      # special_caveDist: positive inside the ellipsoid, 0 at the shell, negative outside.
      # threshold -2 lets lava fill right up to the cell boundary and very rarely
      # (≤2 blocks) past it; MATCH_AIR above prevents placement in solid rock.
      expression: special_caveDist(x,y,z)
    threshold: -2

structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:lava