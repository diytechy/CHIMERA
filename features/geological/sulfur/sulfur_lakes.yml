id: SULFUR_LAKES
type: FEATURE

# Underground sulfur pools/lakes scattered densely through the sulfur caves — a
# defining feature of the biome, so the grid is tight (~36-block spacing, far denser
# than the global UNDERGROUND_WATER_LAKES at ~120). The sulfur_lake structure
# self-validates that it is surrounded by rock before carving, so the effective rate
# is somewhat lower than the grid where caves have already hollowed the rock out.
distributor:
  type: PADDED_GRID
  width: 28
  padding: 8
  salt: 9187

locator:
  type: AND
  locators:
    - type: RANDOM
      amount: 1
      height: &range
        min: ${meta.yml:bottom-y} + 6
        max: ${meta.yml:cave-top}
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: 0
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: 5
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: -5

structures:
  distribution:
    type: CONSTANT
  structures: sulfur_lake
