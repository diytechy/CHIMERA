id: EQ_GLOBAL_RIVER
type: BIOME
abstract: true

variables: &variables
  base: $customization.yml:terrain-base-y-level   # 65
  scale: $customization.yml:terrain-height         # 180

  # --- Cave erosion parameters (block units) ---
  # Cave floor: how far below base the cave floor sits
  floorDepthBlocks: 10          # ~y45 (was depth: 0.11 → 0.11*180≈20)
  floorVariationBlocks: 4       # Floor varies ±9 blocks with noise (was depthVariation: 0.05 → 0.05*180=9)
  # Cave ceiling: where the ceiling transition zone starts and how tall it is
  ceilingStartBlocks: 18        # Ceiling begins 18 blocks above base → ~y83 (was ceilingBase: 0.1 → 0.1*180=18)
  ceilingTransitionBlocks: 31   # Ceiling fades over 31 blocks → ends ~y114 (was ceilingHeight: 0.17 → 0.17*180≈31)
  ceilingSpikeAmplitude: 18     # Max stalactite offset in blocks (was 0.1 * scale)

  # --- River channel controls (continentalRiverDist: -1=center, 0=edge, +1=far) ---
  riverBedDepth: 8     # Blocks carved below surface at river center (must be > base - ocean level = 5)
  riverInner: -0.3     # Dist where flat riverbed ends and bank roll begins
  riverOuter: -0.05    # Dist where carving reaches 0 (more negative = narrower visible river)

ocean:
  level: $meta.yml:ocean-level
  # Water level rises with the river's regional elevation so rivers at higher
  # terrain still have water in them.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
    expression: if(continentalRiverBlockDist(x,z)<0,olevel + continentalRiverBlockElevChange(x, z), olevel)

terrain:
  blend:
    distance: 2     # 0 = disabled (sharp edges)
    step: 3
    weight: 3.0
  # Two-stage approach:
  #   1. The 2D sampler (elevationDetailed → elevationWithRivers) provides a smooth
  #      hermite roll from normal terrain down to the river's regional elevation.
  #      This handles the broad valley shape and ensures bed height rises with
  #      continentalRiverBlockElevChange.
  #   2. The 3D sampler carves the actual river channel below water level using a
  #      narrow hermite band controlled by riverEdge (→ continentalRiverBlockDist).
  #      Cave erosion is faded near the river to prevent caves breaking into the bed.
  
    #expression: max(scale * elevationDetailed(x, z),(continentalRiverBlockElevChange(x, z)))
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables: *variables
    expression: |
      -y + base -
      (erode(
        scale * elevationDetailed(x, z) - continentalRiverBlockElevChange(x, z),
        ceilingSpikes(x, z) * -ceilingSpikeAmplitude,
        herp(openings(x, z), 0.3, 0, 0.6, 1) * scale
      ) * (1 + erosionStrengthVariation(x/3, y, z/3)^2) *
      herp(continentalRiverDist(x,z), riverInner, 1, riverOuter, 0))
    #  -
    #riverBedDepth * herp(continentalRiverDist(x,z), riverInner, 1, riverOuter, 0)
    samplers:
      erosionStrengthVariation: # Used to roughen up the walls
        dimensions: 3
        type: FBM
        octaves: 4
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.05
          salt: 5
      openings:
        dimensions: 2
        type: EXPRESSION_NORMALIZER
        expression: "|in|"
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 1 / 1000
          salt: 9
      ceilingSpikes:
        dimensions: 2
        type: CUBIC_SPLINE
        points:
          - { from: -1, to: 1, gradient: -2 }
          - { from: -0.2, to: 0, gradient: 0 }
        sampler:
          type: CELLULAR
          distance: Euclidean
          frequency: 0.06
      depthVariation:
        dimensions: 2
        type: FBM
        octaves: 4
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.005
          salt: 9
    functions:
      
      # ──────────────────────────────────────────────────────────────────────
      # erode(delta, ceilingOffset, ceilingOpenings)
      #
      # Shapes river channel erosion from a single input:
      #   delta = detailedHeight - riverBankHeight (blocks)
      #
      # Returns how many blocks to carve below the 2D surface.
      # The 2D sampler already sets surface = max(detailed, riverBank),
      # so erode just determines how deep below that to carve.
      #
      #   delta <= 0:  river bank is at/above surface → no carve (0)
      #   delta small: river is near surface → full carve (open channel)
      #   delta large: river is deep underground → carve delta minus
      #                ceiling thickness, preserving a roof
      #
      # Ceiling logic (preserves rock above underground rivers):
      #   delta < ceilingStartBlocks:                    ceiling = 0 (open)
      #   delta > ceilingStartBlocks + ceilingTransition: ceiling = ceilingStartBlocks
      #   Between: hermite transition
      #
      #   ceilingOffset (spikes noise) shifts the transition for texture.
      #   ceilingOpenings shifts it further to force some areas open.
      # ──────────────────────────────────────────────────────────────────────
      erode:
        arguments: [ delta, ceilingOffset, ceilingOpenings ]
        expression: |
          max(0, delta - caveCeiling(delta, ceilingOffset,
            surfaceOpenings(delta, ceilingOpenings)))
        functions:
          "<<":
            - math/functions/interpolation.yml:functions

          # At shallow depths (delta < 72), openings noise can force
          # the cave open. At deep depths (delta > 108), no opening.
          # Returns 0 to ceilingOpenings (in blocks).
          surfaceOpenings:
            arguments: [ delta, ceilingOpenings ]
            expression: herp(delta, 72, ceilingOpenings, 108, 0)
            functions:
              "<<":
                - math/functions/interpolation.yml:functions

          # Returns ceiling THICKNESS (blocks of rock to preserve above river).
          # 0 = open channel, ceilingStartBlocks = full roof.
          # ceilingOffset and openingShift reduce effective delta,
          # making it easier for the cave to stay open.
          caveCeiling:
            arguments: [ delta, ceilingOffset, openingShift ]
            expression: |
              herp(delta - ceilingOffset - openingShift,
                ceilingStartBlocks, 0,
                ceilingStartBlocks + ceilingTransitionBlocks, ceilingStartBlocks)
            functions:
              "<<":
                - math/functions/interpolation.yml:functions
  
  # Will always return y value for surface
  sampler-2d:
    type: EXPRESSION
    #Make sure general surface is above riverbed leading up to river.
    expression: max(scale * elevationDetailed(x, z),(continentalRiverBlockElevChange(x, z)))
    #expression:
    variables: *variables