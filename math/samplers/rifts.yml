riftCell: &riftCell
  dimensions: 2
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.riftDistance}
  salt: 1357
  jitter: 0.5

samplers:
  riftLandDistributor:
    dimensions: 2
    type: EXPRESSION
    variables:
      riverDistThreshold: ${customization.yml:biomeSpread.cellDistance}*0.5
    # Common distributor for rift land.
    expression: |
      if(((continentalRiverDistSparseFarGrid(x, z)>riverDistThreshold)&&
      (continents(x,z)>0.1)),1,-1)

  riftHybDistFromCenter:
    <<: *riftCell
    distance: Hybrid

  riftRegions:
    <<: *riftCell
    return: CellValue

  riftTemperature:
    <<: *riftCell
    return: NoiseLookup
    lookup:
      dimensions: 2
      type: EXPRESSION
      expression: temperature(x,z)
    salt-lookup: false

  riftInRangeOfSpot:
    <<: *riftCell
    return: NoiseLookup
    lookup:
      dimensions: 2
      type: EXPRESSION
      expression: nearSpotRift(x,z)
    salt-lookup: false

  riftContinents:
    <<: *riftCell
    return: NoiseLookup
    lookup:
      dimensions: 2
      type: EXPRESSION
      variables:
        radius: ${customization.yml:biomeSpread.riftDistance}*0.4
      expression: |
        min(continentsSparse(x, z),
          min(min(min(min(
            continentsSparse(x + radius, z),
            continentsSparse(x - radius, z)),
          min(
            continentsSparse(x, z + radius),
            continentsSparse(x, z - radius))),
          min(
            continentsSparse(x + radius, z + radius),
            continentsSparse(x + radius, z - radius))),
          min(
            continentsSparse(x - radius, z + radius),
            continentsSparse(x - radius, z - radius))))
    salt-lookup: false

  riftFarRiverDist:
    <<: *riftCell
    return: NoiseLookup
    lookup:
      dimensions: 2
      type: EXPRESSION
      expression: continentalRiverDistSparseFarGrid(x,z)
    salt-lookup: false

  riftWellPlacement:
    dimensions: 2
    type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
    amplitude: 60
    warp:
      type: FBM
      octaves: 4
      gain: 0.3
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 1 / ${customization.yml:biomeSpread.riftDistance}
    sampler:
      type: EXPRESSION
      variables:
        spotActivateDist: -0.6
      expression: |
        if(riftHybDistFromCenter(x,z)<spotActivateDist,
          lerp(riftHybDistFromCenter(x,z),-1,1,spotActivateDist,0),
          -1)

  riftCanyon:
    type: EXPRESSION
    dimensions: 2
    expression: |
      (-abs(base(x,z)) + 0.3) * 2 * (1 / 0.2)
    samplers:
      base:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 1 / ${customization.yml:biomeSpread.wellDistance} * 1
      mask:
        dimensions: 2
        type: CELLULAR
        frequency: 1 / ${customization.yml:biomeSpread.wellDistance} * 0.15
        seed: 23456345


  # Value greater than threshold = Rift / canyon
  # Value less than threshold = pit
  cold_pit:
    type: EXPRESSION
    dimensions: 2
    variables:
      pit_threshold: -0.5
    expression: |
      (riftContinents(x,z)>0)&&
      (riftLandDistributor(x,z)>0)&&
      (riftFarRiverDist(x,z)>200) && 
      (riftInRangeOfSpot(x,z)<0) &&
      (riftTemperature(x,z)<-0.3) && 
      (riftRegions(x,z)<pit_threshold)
        
  warm_pit:
    type: EXPRESSION
    dimensions: 2
    variables:
      pit_threshold: -0.4
    expression: |
      (riftContinents(x,z)>0)&&
      (riftLandDistributor(x,z)>0)&&
      (riftFarRiverDist(x,z)>200) && 
      (riftInRangeOfSpot(x,z)<0) &&
      (riftTemperature(x,z)>0) && 
      (riftRegions(x,z)<pit_threshold)

  cold_rift:
    type: EXPRESSION
    dimensions: 2
    variables:
      rift_threshold: 0.6
    expression: |
      (riftContinents(x,z)>0)&&
      (riftLandDistributor(x,z)>0)&&
      (riftFarRiverDist(x,z)>200) && 
      (riftInRangeOfSpot(x,z)<0) && 
      (riftRegions(x,z)>rift_threshold) &&
      (riftTemperature(x,z)<-0.1) 

  warm_rift:
    type: EXPRESSION
    dimensions: 2
    variables:
      rift_threshold: 0.7
    expression: |
      (riftContinents(x,z)>0)&&
      (riftLandDistributor(x,z)>0)&&
      (riftFarRiverDist(x,z)>200) && 
      (riftInRangeOfSpot(x,z)<0) && 
      (riftRegions(x,z)>rift_threshold) &&
      (riftTemperature(x,z)>0) 