id: EQ_SHALLOW_OCEAN
type: BIOME
abstract: true
extends: NO_TERRAIN_2D

# Simple relatively flat terrain under ocean level.

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    expression: |
      max(
        -y + base
      ,
        -y+ocean_level-herp(RiverOceanTransitioner(x,z),0,scale*2,0,bedDepth(x, z))
      )
    variables:
      base: ${meta.yml:ocean-level} - 5
      ocean_level: $meta.yml:ocean-level
      scale: $customization.yml:terrain-ocean-depth

  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      height: 4
    expression: "|simplex(x/2, z/2)| * height"