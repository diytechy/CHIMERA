extrusions:

  - type: REPLACE
    from: LAVA_TUBES
    sampler:
      type: CONSTANT
    to:
      - LAVA_TUBES: 1
    range:
      min: $meta.yml:bottom-y
      max: ${meta.yml:ocean-level}
      
  - type: REPLACE
    from: LAND_CAVES
    sampler:
      type: EXPRESSION
      #If above the distribution threshold, set it to an actual biome, else keep current self.
      #Actual distribution weight must match selected threshold.
      #Default case is >0, which puts half of the samples below 0.
      expression: &exp if((BiomeShapeOceanValue(x,z)<0.5)&&(BiomeShapeOceanValue(x,z)>-0.5),max(((BiomeShapeOceanTemperature(x,z)+1)/2)+BiomeShapeOceanValue(x,z)*0.3,0),-1)
    to:
      - SELF: 112
      - ICE_CAVES: 3
      - ICE_MUSHROOM_CAVES: 1
      - FROSTED_CAVERNS: 2
      - FROZEN_CAVERNS: 1
      - SPIDER_CAVES: 1
      - ANCIENT_CAVES: 2
      - RESIN_ROOTS: 3
      - MUSHROOM_CAVES: 3
      - BASALT_CAVERNS: 2
      - STONE_CAVERNS: 3 #stone caverns: 5    
      - ANDESITE_CAVERNS: 3
      - BLACKSTONE_CAVERNS: 3
      - DIORITE_CAVERNS: 3
      - GRANITE_CAVERNS: 3
      - ARID_CAVERNS: 3 #dry caverns: 1                              12
      - BARREN_CAVERNS: 3
      - CRUMBLING_CAVERNS: 3
      - CALCITE_CAVERNS: 3 #misc caverns: 3                          36
      - CRYSTALLINE_CAVERNS: 3 
      - DRIPSTONE_CAVERNS: 3
      - SCULK_CAVERNS: 1
      - LUSH_CAVERNS: 5 #lush caverns: 2                            24
      - FUNGAL_CAVERNS: 3
      - LAVENDER_CAVERNS: 4
      - SPRUCE_CAVERNS: 3 #underground woodlands placeholder: 7     84
      - ACACIA_CAVERNS: 3
      - AUTUMNAL_CAVERNS: 2
      - BIRCH_CAVERNS: 2
      - LUSH_CAVES: 1
      - CORAL_COVES: 1
      - DARK_OAK_CAVERNS: 2
      - ENCHANTED_CAVERNS: 2
      - JUNGLE_CAVERNS: 2
      - MANGROVE_CAVERNS: 1
      - MAPLE_CAVERNS: 2
      - OAK_CAVERNS: 3
      - SAKURA_CAVERNS: 2
