id: WATER_ELEVATOR_FROZEN
type: FEATURE

# One of 5 climate variants of the world "water elevator". All 5 share the common shaft
# (water_elevator_core) and differ only in the L1 roof block. Each self-gates by climate
# via the temperature/precipitation samplers, so a SINGLE wiring point (CARVING_LAND) still
# yields climate-appropriate roofs without per-biome wiring. A spotDistance/spotRadius guard
# keeps wells off spot biomes (belt-and-suspenders: CARVING_LAND already excludes spots).
#
# This is the FROZEN variant: quartz roof, placed only where temperature is low.
#
# Distributor expression (SAMPLER places where value < threshold):
#   - on a spot           -> 1 (never places)
#   - off-spot, too warm  -> 1 (never places)
#   - off-spot + frozen   -> wellGrid cellular distance (small near cell centres) -> spot-like spacing
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(spotDistance(x, z) < spotRadius(x, z) + 16, 1, if(temperature(x, z) < -0.5, wellGrid(x, z), 1))
    samplers:
      spotDistance: $math/samplers/spots.yml:samplers.spotDistance
      spotRadius: $math/samplers/spots.yml:samplers.spotRadius
      temperature: $math/samplers/temperature.yml:samplers.temperature
      wellGrid:
        dimensions: 2
        type: CELLULAR
        return: Distance
        frequency: 1 / 1500
        salt: 90210
  threshold: 0.04

locator:
  type: AND
  locators:
    - type: SURFACE
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: -1
          - type: MATCH_AIR
            offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: water_elevator_frozen
