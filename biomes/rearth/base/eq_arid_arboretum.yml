id: EQ_ARID_ARBORETUM
type: BIOME
abstract: true

vars: &variables
  base: 68
  height: 9
  pillarHeight: 40

terrain:
  blend:
    distance: 3     # 0 = disabled (sharp edges)
    step: 1
    weight: 1.0
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(clamp(-y + base + elevationDetailedBlockHeight(x,z) + noiseBase(x,z) * height * biomeInfluence(x,z), -1.75, 3),
      clamp(pillars(x + noiseBase(y * 3, x / 4 + z / 5) * 5, y, z + noiseBase(y * 2.5 + 500, x / 6 + z / 2) * 5) * 24, -1.75, 3))
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers:
      pillars:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          basePillarsExistance(x,z) * (
            -basepillars(x,z) - 0.6
            + basepillarsCenter(x,z) * 0.12
            + pillarWidthRand(y, x / 10) * 0.09
            + (min(0, base + (BiomeShapeLandmassElevation(x,z) + pillarHeight) * (basepillarsCenter(x,z) * 0.4 + 1) - y) / 12)^3
          )
        samplers:
          basepillars: &pillarConf
            dimensions: 2
            type: CELLULAR
            frequency: 0.013
            jitter: 1
            distance: Euclidean
          basePillarsExistance:
            <<: *pillarConf
            return: NoiseLookup
            lookup: 
              dimensions: 2
              type: EXPRESSION
              expression: if(biomeInfluence(x,z)>0.99,1,0)
          basepillarsCenter:
            <<: *pillarConf
            return: CellValue
          pillarWidthRand:
            dimensions: 2
            type: FBM
            sampler:
              dimensions: 2
              type: OPEN_SIMPLEX_2S
              frequency: 0.1
            octaves: 2
            lacunarity: 2
            gain: 0.35
      noiseBase:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.011

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
