    - x
    - a
    - b
    expression: min(max(x, a), b)
  lerp:
    arguments:
    - t
    - at
    - a
    - bt
    - b
    expression: |-
      if(at<bt,
        if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
        if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
      )
  lerp3:
    arguments:
    - t
    - at
    - a
    - bt
    - b
    - ct
    - c
