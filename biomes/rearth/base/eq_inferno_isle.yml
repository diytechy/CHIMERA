id: EQ_INFERNO_ISLE
type: BIOME
abstract: true

vars: &variables
  middleHeight: -7
  #"<<":
  #  - biomes/equations/caverns/eq_carving_land.yml:variables

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10

carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(
        -clamp(
          // special_caves returns [-1, 0]: -1 at cell center, 0 at ellipsoid boundary.
          // Its y-component uses cave_y_curve_power (default ^4), which makes the top
          // and bottom nearly flat. The ChunkInterpolator evaluates density once per
          // 4 blocks; a flat boundary produces a 4-block staircase.
          //
          // WHY special_caves (not special_caveDist) defines the hollow:
          //   special_caveDist uses a weighted blend (f_xz*dist_xz + f_y*dist_y).
          //   Off-axis, dist_xz can be large (e.g. 45 blocks) while dist_y is small
          //   (e.g. 3 blocks). The xz weight then dominates and "uses up" most of the
          //   dist=12 budget, pulling the hollow floor closer to the y-pole surface —
          //   the opposite of what an ellipsoid should do. This manifests as the floor
          //   and ceiling appearing higher (more toward centre) than expected.
          //   A special_caves threshold always produces the correct scaled inner
          //   ellipsoid regardless of direction.
          //
          // Threshold 0.16 corresponds to ~12 blocks from the xz-equatorial shell.
          //   At the y-poles the shell is thinner (~2.5 blocks) due to the ^p curvature;
          //   this is expected for an ellipsoid and keeps the floor close to cave_lower.
          //
          // Fix: warp y by a smooth 2D noise (yWarp) before evaluating special_caves.
          //   This shifts the hollow boundary to a different y per column, dissolving
          //   the flat-top staircase into organic curves. Amplitude 6 = ~3× grid step.
          (special_caves(x, y, z) + 0.1) * 5.0

          // Wall texture: ±0.5 in expression-space ≈ ±7.5 blocks at xz equator,
          //               ±1.5 blocks at y-poles — stays within the thin pole shell.
          + wallOffset(x, y, z) * 0.5

          // Platform creation with smooth falloff
          //+ platformShape(x, y, z),

        ,-2.5, 2.5),
        -1000
        //carver_fade(x, y, z)
      )
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
      smoothstep:
        arguments: [edge0, edge1, x]
        expression: |
          if(x <= edge0, 0,
            if(x >= edge1, 1,
              ((x - edge0) / (edge1 - edge0))^2 * (3 - 2 * ((x - edge0) / (edge1 - edge0)))
            )
          )
    samplers:
      platformShape:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          // Distance from platform height
          if(abs(middleHeight - y) > 6, 0,
            // Smooth vertical falloff from platform height
            smoothstep(6, 3, abs(middleHeight - y))
            // Platform presence based on cellular pattern
            * (-platforms(x, z) - 0.25)
            // Scale by distance from cavity edge for natural integration
            * smoothstep(-0.3, -0.6, special_caves(x, y, z))
            * 3.5
          )
        functions:
          smoothstep:
            arguments: [edge0, edge1, x]
            expression: |
              if(x <= edge0, 0,
                if(x >= edge1, 1,
                  ((x - edge0) / (edge1 - edge0))^2 * (3 - 2 * ((x - edge0) / (edge1 - edge0)))
                )
              )
        samplers:
          platforms:
            dimensions: 2
            type: DOMAIN_WARP
            amplitude: 5
            warp:
              type: OPEN_SIMPLEX_2
              frequency: 0.02
            sampler:
              type: CELLULAR
              frequency: 0.05
      carver_fade:
        dimensions: 3
        type: EXPRESSION
        variables:
          act_dist: ${customization.yml:special_cave_biome_activation}
        expression: |
          // Upper hemisphere (y≥0): carver fades out 8 blocks into the shell so the
          // ceiling and side walls get an organic rocky texture. shellNoise perturbs
          // the fade boundary by ±2 blocks so the transition isn't a smooth seam.
          //
          // Lower hemisphere (y<0): tight 2-block fade, no shellNoise. Carving is
          // limited to the outer ~2 blocks of the lower shell — just enough to add
          // slight surface texture without punching through toward the hollow void.
          // The lava_cave_floor threshold of -2 fills any air created in that zone,
          // so the lava floor always covers these shallow surface carvings.
          if(y < 0,
            lerp(
              min(max(special_caveDist(x,y,z), 0), 2),
              0, carver(x,y,z), 2, -1),
            lerp(
              min(max(special_caveDist(x,y,z) + shellNoise(x,y,z)*2, 0), 8),
              0, carver(x,y,z), 8, -1))
        functions:
        samplers:
          carver: $biomes/equations/caverns/eq_carving_land.yml:carving.sampler
          # 3D noise (not 2D) so the perturbation varies vertically too — the flat
          # seam appears across the whole 3D shell surface, not just top/bottom.
          shellNoise:
            dimensions: 3
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.15
            octaves: 2
            gain: 0.5
        #dimensions: 3
        #type: EXPRESSION
        #variables: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.variables
        #expression: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.expresion

      wallOffset:
        dimensions: 3
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.035
        octaves: 3
        lacunarity: 2.2
        gain: 0.45

      # 2D FBM for y-coordinate warping. Must be 2D (not 3D) so the offset is
      # consistent for the entire vertical column at each xz position — a 3D
      # sampler would vary per block and could create mid-column discontinuities.
      # Period ~56 blocks (frequency 0.018) gives 3-4 variation cycles across a
      # typical 200-block cave diameter without introducing noisy fine-scale breaks.
      yWarp:
        dimensions: 2
        type: EXPRESSION
        expression: |
          0
          //if(y>0
          //  ceilWarp(x,z),
          //  florWarp(x,z))
          //  + 1

        samplers:
          ceilWarp:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.018
            octaves: 2
            gain: 0.5
            salt: 5678309
          florWarp:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.018
            octaves: 2
            gain: 0.5
            salt: 56783092
  #sampler-2d:
  #  dimensions: 2
  #  type: CONSTANT
  #  value: 0
