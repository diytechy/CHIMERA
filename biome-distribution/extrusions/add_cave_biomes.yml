  - type: REPLACE
    from: COLD_CAVES
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: WhiteNoiseRandomizer(BiomeShapeOceanValue(x,z),0)
    range:
      min: $meta.yml:bottom-y
      max: ${meta.yml:top-y}
    to:
      - ICE_CAVES: 3
      - ICE_MUSHROOM_CAVES: 1
      - FROSTED_CAVERNS: 2
      - FROZEN_CAVERNS: 1
      - STANDARD_CAVES: 13
      
  - type: REPLACE
    from: WARM_CAVES
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: WhiteNoiseRandomizer(BiomeShapeOceanValue(x,z),0)
    range:
      min: $meta.yml:bottom-y
      max: ${meta.yml:top-y}
    to:
      - MAGMA_CAVERNS: 2
      - BASALT_CAVERNS: 2
      - MOLTEN_PASSAGES: 2
      - STANDARD_CAVES: 16

