id: CHILLY_CREEK_RIVER #for mountain biomes
type: BIOME
extends: [ EQ_GLOBAL_RIVER, BASE_HYDRAXIA, EQ_RIVER_CARVING, DEPOSITS_RIVER ]

original-noise: &originalNoise $biomes/equations/eq_terraced_mountains.yml:terrain.sampler # Original noise to be turned into river


vanilla: minecraft:snowy_taiga

palette:
  - GRASS: 319
  - RIVER_BANK: 61
  - << palettes/rock_layers.yml:palette

slant:
  - threshold: 0.54
    palette:
      - MOSSY_STONE: 319
      - << palettes/rock_layers.yml:palette
  - threshold: 0.48
    palette:
      - MOSSY_STONE_MIX: 319
      - << palettes/rock_layers.yml:palette
  - threshold: 0.44
    palette:
      - TUFF_STONE: 319
      - << palettes/rock_layers.yml:palette
  - threshold: 0.4
    palette:
      - BLOCK:minecraft:stone: 319
      - << palettes/rock_layers.yml:palette
      
tags:
- SPECIAL_CAVES
- LOW_CAVES
features:
  landforms:
  - ICE_PILLARS_CEILING
  flora:
  - GRASS
  - TALL_GRASS
  - FERNS
  snow:
  - SNOW_LAYERS
  - SNOW_LAYERS_SINGLE_MODERATE
  - TREE_SNOW
  river-decoration:
  - COVE_FROZEN_LIGHT
  postprocessors:
  - RIVER_SOULSAND
