id: FOLIAGE_FORTRESS_OUTER
type: BIOME
vanilla: minecraft:savanna
extends:
- CARVING_LAND
- BASE
color: $biomes/colors.yml:SAVANNA
colors:
  grass: 8567917
  foliage: 6662473
  water: 937679
  water-fog: 12638463
tags:
- USE_RIVER
- LAND_CAVES
- SPECIAL_CAVES
- TEMPERATE_COAST_FLAT
vars: &id001
  base: 69
  height: 11
  stepHeight: 4
  scale: $customization.yml:terrain-height
terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *id001
    expression: |
      -y + base + height * surfaceOffset(x,z)
      + clamp(plateous(x,z) * 90, -stepHeight, stepHeight)
      - scale * elevationDetailed(x, z)
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
    samplers:
      plateous:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.01
        salt: 4
      surfaceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.006
        octaves: 3
        lacunarity: 2.4
        gain: 0.5
palette:
- GRASS_MUSHY: 319
- MUDDY_BEACH: 63
- << meta.yml:palette-bottom
slant:
- threshold: 0.75
  palette:
  - CALCITE_DIORITE_MIX: 319
  - << meta.yml:palette-bottom
features:
  flora:
  - GRASS
  - TALL_GRASS
  - POPPY_PATCH
  - DANDELION_PATCH
  - ROSE_BUSH_PATCH
  - PEONY_PATCH
  - LILAC_PATCH
  - LILY_OF_THE_VALLEY_PATCH
  trees:
  - ACACIA_TREES
