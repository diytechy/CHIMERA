id: EQ_ROCKY_REFUGE
type: BIOME
abstract: true

vars: &variables
  base: 67
  height: 22
  pillarHeight: 50
  pillarCutoff: 0.95
  pillarFlatness: 1.7
  pillarVariation: 0.03
  bendFactor: 0.8

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      -y + base + elevationDetailedBlockHeight(x,z)
      + (10 + height * terrace(surfaceOffset(x,z) * 4, 3) / 4) * biomeInfluence(x,z)
      + if (y > base+ BiomeShapeLandmassElevation(x,z) - 15 && y < base+ BiomeShapeLandmassElevation(x,z) + pillarHeight * 1.3,
        max(pillars(x + yCurve(y, 0), y, z + yCurve(y, 0)),
        max(pillars(x - yCurve(y, 0), y, z + yCurve(y, 0)), pillars(x - yCurve(y, 0) + 5000, y, z - yCurve(y, 0)))),
        0) * biomeInfluence(x,z)
    functions:
      terrace:
        arguments: [x, terraceStrength]
        expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
    samplers:
      yCurve:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: |
          curve(1 - normalizeY(x, base+ BiomeShapeLandmassElevation(x,z), pillarHeight)) * pillarHeight * bendFactor
        functions:
          normalizeY:
            arguments: [y, base, height]
            expression: (y - base) / height
          curve:
            arguments: [x]
            expression: if (x < 0.1, 0.35, 2.428571*x - 1.428571*x^2)
      pillars:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          if(pillarRand(x,z) > 0.7,
          clamp(
            (-pillars(x,z) 
              - pillarCutoff 
              - widthVariation(y, x / 4 + z / 3) * pillarVariation 
              + (y - base- BiomeShapeLandmassElevation(x,z)) / pillarHeight / 8
              + max(base+BiomeShapeLandmassElevation(x,z) - y + 4, 0) / 200
              - (1 - abs(base + BiomeShapeLandmassElevation(x,z) + pillarHeight - y + 25) / pillarHeight)^5
              // + (min(0, base + BiomeShapeLandmassElevation(x,z) + pillarHeight - y + 6))^3
              - max(-abs(erosion(x,y,z)) + 0.3, 0) * 0.095
              )
              * pillarHeight
              * (1 / (1 - pillarCutoff)) * pillarFlatness,
            -2, pillarHeight * 1.2), 0)
        samplers:
          pillars:
            dimensions: 2
            type: CELLULAR
            frequency: 0.009
          erosion:
            dimensions: 3
            type: OPEN_SIMPLEX_2S
            frequency: 0.06
          widthVariation:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2S
              frequency: 0.05
            octaves: 2
            lacunarity: 2
            gain: 0.5
          pillarRand:
            dimensions: 2
            type: CELLULAR
            frequency: 0.009
            return: NoiseLookup
            salt-lookup: false
            lookup:
              dimensions: 2
              type: EXPRESSION
              expression: if(biomeInfluence(x,z)>0.99,positiveWhiteNoise(x,z),0)
      pillarRand:
        dimensions: 2
        type: CELLULAR
        frequency: 0.009
        return: CellValue
      surfaceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.002
        octaves: 3
        lacunarity: 3.5
        gain: 0.5
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
