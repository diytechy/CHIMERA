id: SULFUR_TERRACE_WATER
type: FEATURE

# Sulfur analogue of TRAVERTINE_WATER: fills the sulfur terrace basins with water.
# Matches the sulfur terrace surface instead of calcite.
distributor:
  type: "YES"

locator:
  type: AND
  locators:
    - type: PATTERN
      range: &range
        min: ${meta.yml:ocean-level} + 2
        max: $meta.yml:top-y
      pattern:
        type: AND
        patterns:
          - type: MATCH
            block: minecraft:sulfur
            offset: 0
          - type: MATCH_AIR
            offset: 1
    - type: ADJACENT_PATTERN
      range: *range
      match-all: true
      pattern:
        type: AND
        patterns:
          - type: NOT
            pattern:
              type: MATCH_AIR
              offset: 0
          - type: MATCH_AIR
            offset: 1

structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:water
