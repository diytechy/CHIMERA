id: FROZEN_RIVER
type: BIOME
extends:
  - EQ_GLOBAL_RIVER
  - COLOR_FROZEN
  - RIVER_FROZEN
  - ENVIRONMENT_MARINE_RIVER_FROZEN
  - EQ_RIVER_CARVING
  - BASE
color: $biomes/colors.yml:FROZEN_RIVER

vanilla: minecraft:frozen_river

ocean:
  palette: FROZEN_OCEAN

palette:
  - SNOW: $meta.yml:top-y
  - << meta.yml:palette-underwater
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.3
    palette:
      - << meta.yml:palette-slant-generic
      - << meta.yml:palette-underwater
      - << meta.yml:palette-bottom
tags:
- SPECIAL_CAVES
- LOW_CAVES
features:
  slabs:
  - SNOW_LAYERS
  preprocessors:
  - ICE_COASTLINE
  processors:
  - RIVER_SOULSAND
  - RIVER_STEP_TRANSITION
  postprocessors:
  - TREE_SNOW
  - BLEND_SNOW
  river-decoration:
  - COVE_FROZEN_LIGHT
