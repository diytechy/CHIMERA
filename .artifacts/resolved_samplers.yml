        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
  AppliedMountainHeight: &AppliedMountainHeight
    dimensions: 2
    type: EXPRESSION
    expression: max(AppliedMountainHeightA(x, z), AppliedMountainHeightB(x, z))
    samplers:
