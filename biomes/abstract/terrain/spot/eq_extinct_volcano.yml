id: EQ_EXTINCT_VOLCANO
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  scale: $customization.yml:terrain-height
  "<<":
    - math/samplers/spots.yml:variables

#ocean is overwritten in active volcano biomes.
ocean:
  level: $meta.yml:ocean-level
  # Water level rises with the river's regional elevation so rivers at higher
  # terrain still have water in them.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
      base: $customization.yml:terrain-base-y-level
      scale: $customization.yml:terrain-height
      "<<":
        - math/samplers/spots.yml:variables
    expression: |
      if(distanceToVolcanicRim(x, z) < 0.1,
      olevel + scale * (spotBaseElevation(x, z) + maxExtHeight),
      olevel)

terrain:
  sampler-2d:
    type: CONSTANT
  sampler:
    type: EXPRESSION
    functions: $math/functions/interpolation.yml:functions
    expression: |
      -y + base + herp(distanceToVolcanicRim(x, z),0,sampler2d(x,z),
      1,elevationDetailedBlockHeight(x,z))
    # + elevationDetailedBlockHeight(x,z)
    variables: *variables
    samplers:
      sampler2d:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: |
          scale * (calcHeight(x, z,
            /*distance*/      spotDistance(x, z),
            /*erosion*/       (volcanoErosion(x, z)+1)/2,
            /*outsideHeight*/ 0,
            /*edge*/          spotEdgeRadius(x, z),
            /*radius*/        spotRadius(x, z),
            /*centerDepth*/   volcanoCenterDepth(x, z),
            /*volcanoHeight*/ lerp(spotSizePercent(x, z) * (1 - spotEdgeRadiusPercent(x, z)),
                                0, minExtHeight,
                                1, maxExtHeight
                              ),
            /*volcanoBase*/   0)
           + spotBaseElevation(x, z))
        functions:
          calcHeight:
            arguments:
              - x
              - z
              - distance
              - erosion
              - outsideHeight
              - edge
              - radius
              - centerDepth
              - volcanoHeight
              - volcanoBase
            expression: |
              parabolicMap(distance,
                radius, outsideHeight,
                radius * edge,
                  volcanoBase + volcanoHeight * (1 - erosion * lerp(distance, radius, 1, radius * edge, 0))
                  - parabolicMap(distance,
                    radius * edge / 3, centerDepth,
                    radius * edge, 0
                  )
              )
            functions: $math/functions/interpolation.yml:functions
