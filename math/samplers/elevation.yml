variables: &variables
  detailFactor: 0.1
  detailStart: 0
  detailEnd: 0.5

  terraceBaseScale: 0.2
  terraceScaleVariation: 0.1
  terraceOffsetVariation: 0.25
  terraceDepthVariation: 1
  terraceDepthStart: 0.1 # At what elevation should it start to be terraced
  plainsMaskZero: 0.5
  plainsMaskFull: 0.85
  hillMaxElevation: 0.3
  mountainCap: 0.9
  mountainMaskZero: 0.2
  mountainMaskFull: 0.5
  mountainContZero: 0.05
  mountainContFull: 0.5

  globalScale: $customization.yml:global-scale
  verticalLift: $customization.yml:terrain-height
  scale: $customization.yml:flatness-scale
  continentalRiseRate: 30 #The amount land should rise to when continental value reaches 1

samplers:

  ############ MOUNTAIN DEFINITIONS ############

  mountainMask:
    dimensions: 2
    type: PERLIN
    salt: 0694
    frequency: 1 / 1500

  mountain_sampler:
    dimensions: 2
    type: OPEN_SIMPLEX_2
    frequency: 1 / 900

  mountains:
    dimensions: 2
    type: EXPRESSION_NORMALIZER
    expression: ((-in+1)/2)^2
    sampler:
      type: PSEUDOEROSION
      erosion-frequency: 0.01
      lacunarity: 1.5
      branch-strength: 1
      octaves: 3
      strength: 0.15
      gain: 0.3
      sampler:
        type: FBM
        octaves: 3
        sampler: $math/samplers/elevation.yml:samplers.mountain_sampler
  mountainsB:
    dimensions: 2
    type: FBM
    octaves: 5
    lacunarity: 2.2
    gain: 0.55
    sampler:
      type: PERLIN
      frequency: (1 / ${customization.yml:continental-mountain-range-sampler-freq})
      salt: 300

  AppliedMountainHeightA:
    dimensions: 2
    type: EXPRESSION
    expression: min(parabolicMap(mountainMask(x, z), mountainMaskZero, 0, mountainMaskFull, mountains(x, z)), parabolicMap(continents(x, z), mountainContZero, 0, mountainContFull, mountains(x, z)))
    variables: *variables
    samplers:
      mountainMask: $math/samplers/elevation.yml:samplers.mountainMask
      mountains: $math/samplers/elevation.yml:samplers.mountains
      continents: $math/samplers/continents.yml:samplers.continents
    functions: $math/functions/interpolation.yml:functions

  AppliedMountainHeightB:
    dimensions: 2
    type: EXPRESSION
    expression: min(parabolicMap(-mountainMask(x, z), mountainMaskZero, 0, mountainMaskFull, abs(mountainsB(x, z))), parabolicMap(continents(x, z), mountainContZero, 0, mountainContFull, abs(mountainsB(x, z))))
    variables: *variables
    samplers:
      mountainMask: $math/samplers/elevation.yml:samplers.mountainMask
      mountainsB: $math/samplers/elevation.yml:samplers.mountainsB
      continents: $math/samplers/continents.yml:samplers.continents
    functions: $math/functions/interpolation.yml:functions

  AppliedMountainHeight:
    dimensions: 2
    type: EXPRESSION
    expression: max(AppliedMountainHeightA(x, z), AppliedMountainHeightB(x, z))
    samplers:
      AppliedMountainHeightA: $math/samplers/elevation.yml:samplers.AppliedMountainHeightA
      AppliedMountainHeightB: $math/samplers/elevation.yml:samplers.AppliedMountainHeightB

  ############ MESA DEFINITIONS ############
  mesaMaskRaw:
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 300
    sampler:
      dimensions: 2
      type: FBM
      octaves: 2
      lacunarity: 1.7
      gain: 0.7
      sampler:
        type: PERLIN
        frequency: (1 / ${customization.yml:continental-mesa-region-allowed-distance})
        salt: 200
    warp:
      type: RIDGED
      lacunarity: 3
      gain: 0.45
      octaves: 4
      sampler:
        type: OPEN_SIMPLEX_2
        salt: 1
        frequency: (1/5000)

  mesaMask:
    dimensions: 2
    type: CACHE
    exp: 2
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: max(min((sampler(x - 6000, z - 6000)-mesa_threshold)/(0.6-mesa_threshold), continents(x, z)),0)
    #2.75-mesa_threshold
      variables:
        mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
      samplers:
        continents: $math/samplers/continents.yml:samplers.continents
        sampler: $math/samplers/elevation.yml:samplers.mesaMaskRaw
  # Defines a very slow rolling peak height, primarily intended to impact mesa height so tops are not perfectly flat.
  PeakHeightMultiplierAtPosition:
    dimensions: 2
    type: EXPRESSION
    expression: (max_elev_prob(x,z)*VarianceRatio + (1 - VarianceRatio))
    variables:
      VarianceRatio: $customization.yml:continental-MaxPeakVariability
    samplers:
      max_elev_prob:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          salt: 697.0
          frequency: (1 / ${customization.yml:continental-large-features-threshold-variance-distance})

  # How many steps the mesa should have
  prefiltered_mesa_step_ratio:
    dimensions: 2
    type: EXPRESSION
    expression: |
      max(min(round(mesaMask(x, z)* MaxNMesSteps),MaxNMesSteps),0) /MaxNMesSteps
    variables:
      MaxNMesSteps: $customization.yml:continental-MaxNMesSteps
      MaxPeakElev: $customization.yml:continental-MaxMesaPeakHeightRatio
      mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
      mesaMask: $math/samplers/elevation.yml:samplers.mesaMask
      PeakHeightMultiplierAtPosition: $math/samplers/elevation.yml:samplers.PeakHeightMultiplierAtPosition

  # Equivalent height
  prefiltered_mesa_elev:
    dimensions: 2
    type: EXPRESSION
    expression: |
      max((prefiltered_mesa_step_ratio(x,z)* MaxPeakElev * PeakHeightMultiplierAtPosition(x,z)),elevation(x,z))
    variables:
      MaxNMesSteps: $customization.yml:continental-MaxNMesSteps
      MaxPeakElev: $customization.yml:continental-MaxMesaPeakHeightRatio
      mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
      prefiltered_mesa_step_ratio: $math/samplers/elevation.yml:samplers.prefiltered_mesa_step_ratio
      PeakHeightMultiplierAtPosition: $math/samplers/elevation.yml:samplers.PeakHeightMultiplierAtPosition
      elevation: $math/samplers/elevation.yml:samplers.elevation

  # Find lower corresponding shelf, depends on elevation sampler below:
  prefiltered_mesa_floor:
    dimensions: 2
    type: EXPRESSION
    expression: |
      max(((prefiltered_mesa_step_ratio(x,z)-(1/(MaxNMesSteps)))* MaxPeakElev * PeakHeightMultiplierAtPosition(x,z)),elevation(x,z))
    variables:
      MaxNMesSteps: $customization.yml:continental-MaxNMesSteps
      MaxPeakElev: $customization.yml:continental-MaxMesaPeakHeightRatio
      mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
      prefiltered_mesa_step_ratio: $math/samplers/elevation.yml:samplers.prefiltered_mesa_step_ratio
      PeakHeightMultiplierAtPosition: $math/samplers/elevation.yml:samplers.PeakHeightMultiplierAtPosition
      elevation: $math/samplers/elevation.yml:samplers.elevation

  # Find Transition distance into next step, used to create smoother transition between steps
  mesa_floor_step_dist:
    dimensions: 2
    type: EXPRESSION
    expression: |
      max(if(prefiltered_mesa_step_ratio(x,z), (mesaMask(x, z)*MaxNMesSteps+0.5) - (prefiltered_mesa_step_ratio(x,z)*MaxNMesSteps),0), 0)
    variables:
      MaxNMesSteps: $customization.yml:continental-MaxNMesSteps
      MaxPeakElev: $customization.yml:continental-MaxMesaPeakHeightRatio
      mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      prefiltered_mesa_step_ratio: $math/samplers/elevation.yml:samplers.prefiltered_mesa_step_ratio
      mesaMask: $math/samplers/elevation.yml:samplers.mesaMask

  ############ Other land attributes ############

  hills:
    dimensions: 2
    type: EXPRESSION_NORMALIZER
    expression: ((in+1)/2)^2
    sampler:
      type: FBM
      octaves: 6
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 1 / 2000


  plainsMask:
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x,z)
    samplers:
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        amplitude: 0.3
        salt: 67
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 1 / 2000

  hillsApplied:
    dimensions: 2
    type: EXPRESSION
    expression: |
      min(parabolicMap(abs(mountainMask(x, z)), mountainMaskZero, 1, mountainMaskFull, 0),
        parabolicMap(abs(plainsMask(x, z)), plainsMaskZero, 1, plainsMaskFull, 0))*hills(x, z)
    variables: *variables
    samplers:
      mountainMask: $math/samplers/elevation.yml:samplers.mountainMask
      plainsMask: $math/samplers/elevation.yml:samplers.plainsMask
      hills: $math/samplers/elevation.yml:samplers.hills
    functions: $math/functions/interpolation.yml:functions


### BLENDING DEFINITIONS ############
  continentalRise:
    dimensions: 2
    type: EXPRESSION
    expression: continents(x,z)^2*(continentalRiseRate / (continentalRiseRate+verticalLift))
    variables: *variables
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents

  continentalRiseApplied:
    dimensions: 2
    type: EXPRESSION
    expression: |
      parabolicMap(plainsMask(x, z), plainsMaskZero, continentalRise(x,z), plainsMaskFull, continental_sampler(x,z)*(continentalRiseRate / (continentalRiseRate+verticalLift)))
    variables: *variables
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
      plainsMask: $math/samplers/elevation.yml:samplers.plainsMask
      continental_sampler: $math/samplers/continents.yml:samplers.continental_sampler
      continentalRise: $math/samplers/elevation.yml:samplers.continentalRise
    functions: $math/functions/interpolation.yml:functions

  rawFlatness:
    dimensions: 2
    type: EXPRESSION
    expression: noise(x / scale / globalScale, z / scale / globalScale)
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:flatness-scale
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: PROBABILITY
          sampler:
            type: FBM
            gain: 0.3
            lacunarity: 2.3
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 1 / 1000

  flatness:
    dimensions: 2
    type: EXPRESSION
    expression: herp(rawFlatness(x, z), threshold, factor, threshold + blend, 0)
    functions: $math/functions/interpolation.yml:functions
    variables:
      threshold: $customization.yml:flatness-percent
      blend: $customization.yml:flatness-blend
      factor: $customization.yml:flatness-factor
    samplers:
      rawFlatness: $math/samplers/elevation.yml:samplers.rawFlatness

  rawElevation:
    dimensions: 2
    type: EXPRESSION
    expression: noise(x, z ) * multiplier + offset
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:elevation-scale
      multiplier: $customization.yml:elevation-multiplier
      offset: $customization.yml:elevation-offset
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 0
        z: 0
        sampler:
          type: EXPRESSION
          expression: |
            continentalRise(x,z) +
            combine(
              hillsApplied(x,z) * hillMaxElevation,
              AppliedMountainHeight(x,z),
              mountainCap)
          variables: *variables
          functions:
            parabolicMap: $math/functions/interpolation.yml:functions.parabolicMap
            lerp: $math/functions/interpolation.yml:functions.lerp
            herp: $math/functions/interpolation.yml:functions.herp
            combine: # Stacks scaled mountain noise on top of hill noise
              arguments:
              - hills
              - mountains
              - mountainCap
              expression: hills + mountains

          samplers:
            continentalRise: $math/samplers/elevation.yml:samplers.continentalRiseApplied
            AppliedMountainHeight: $math/samplers/elevation.yml:samplers.AppliedMountainHeight
            hillsApplied: $math/samplers/elevation.yml:samplers.hillsApplied
  elevation:
    dimensions: 2
    type: CACHE
    exp: 2
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        rawElevation(x, z) * (1-flatness(x, z))
        * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
        * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
      functions: $math/functions/interpolation.yml:functions
      variables:
        continentZero: $customization.yml:elevation-continental-flat-threshold
        continentFull: $customization.yml:elevation-continental-full-height-threshold
        factorContinental: $customization.yml:elevation-factor-continental
        factorRiver: $customization.yml:elevation-factor-rivers
        factorSpawnIsland: $customization.yml:elevation-factor-spawn-island
        spawnIslandScale: $customization.yml:elevation-spawn-island-scale
      samplers:
        rawElevation: $math/samplers/elevation.yml:samplers.rawElevation
        flatness: $math/samplers/elevation.yml:samplers.flatness
        continents: $math/samplers/continents.yml:samplers.continents
        spawnIsland: $math/samplers/spawnIsland.yml:samplers.spawnIsland

  # Now place mesas into elevation.
  # Blend the floor and nominal step height based on the distance to ramp from step to step.
  elevation_with_mesas:
    dimensions: 2
    type: EXPRESSION
    expression: |
      herp(mesa_floor_step_dist(x, z), 0, prefiltered_mesa_floor(x,z), 0.25, prefiltered_mesa_elev(x,z))
    variables:
      MaxNMesSteps: $customization.yml:continental-MaxNMesSteps
      MaxPeakElev: $customization.yml:continental-MaxMesaPeakHeightRatio
      mesa_threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      mesa_floor_step_dist: $math/samplers/elevation.yml:samplers.mesa_floor_step_dist
      prefiltered_mesa_floor: $math/samplers/elevation.yml:samplers.prefiltered_mesa_floor
      prefiltered_mesa_elev: $math/samplers/elevation.yml:samplers.prefiltered_mesa_elev
    functions: $math/functions/interpolation.yml:functions


  # Elevation-shifted mesa elevation sampler - uses current elevation as offset
  elevation_shifted_prefiltered_mesa_elev:
    dimensions: 2
    type: EXPRESSION
    expression: max(prefiltered_mesa_elev(x,z) - elevation(x,z), 0)
    samplers:
      elevation: $math/samplers/elevation.yml:samplers.elevation
      prefiltered_mesa_elev: $math/samplers/elevation.yml:samplers.prefiltered_mesa_elev

  # Mesa height modifier that works with current elevation
  elevation_MesaHeightModifier:
    dimensions: 2
    type: EXPRESSION
    expression: (abs(mesaMask(x, z))>MesaRegionActiveThresh) && (continents(x,z))
    variables:
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
      threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation: $math/samplers/elevation.yml:samplers.elevation
      mesaMask: $math/samplers/elevation.yml:samplers.mesaMask
      continents: $math/samplers/continents.yml:samplers.continents

  # Mesa distance calculators using current elevation
  elevation_MesaDownwardDistFromTransPnt:
    dimensions: 2
    type: EXPRESSION
    expression: max(max((MesaRegionActiveThresh-mesaMask(x, z)),(threshold-max(continents(x,z),0))), 0)
    variables:
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
      threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation: $math/samplers/elevation.yml:samplers.elevation
      mesaMask: $math/samplers/elevation.yml:samplers.mesaMask
      continents: $math/samplers/continents.yml:samplers.continents

  elevation_MesaUpwardDistFromTransPnt:
    dimensions: 2
    type: EXPRESSION
    expression: max(max((mesaMask(x, z) - MesaRegionActiveThresh),(elevation(x,z)-threshold)), 0)
    variables:
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
      threshold: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation: $math/samplers/elevation.yml:samplers.elevation
      mesaMask: $math/samplers/elevation.yml:samplers.mesaMask

  # Region-filtered mesa height modifier using current elevation
  RegionFilteredMesaHeightModifier:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(elevation_MesaHeightModifier(x,z),
        // If above the transition threshold and the wall transition delta, need to transition to flat top.
        if(elevation_MesaUpwardDistFromTransPnt(x,z)>0,
          ((elevation_shifted_prefiltered_mesa_elev(x,z)/2) +
            ((elevation_MesaUpwardDistFromTransPnt(x,z)*elevation_shifted_prefiltered_mesa_elev(x,z)/2)/
            (MesaFlattopTransitionRate+elevation_MesaUpwardDistFromTransPnt(x,z)))),
          //Else return the transition down to floor height
          if(elevation_MesaDownwardDistFromTransPnt(x,z)>0,
          (elevation_shifted_prefiltered_mesa_elev(x,z)/2) -
            ((elevation_MesaDownwardDistFromTransPnt(x,z)*elevation_shifted_prefiltered_mesa_elev(x,z)/2)/
            (MesaFlattopTransitionRate+elevation_MesaDownwardDistFromTransPnt(x,z))),
            0)
        ),
        0)
    variables:
      MesaFlattopTransitionDelta: $customization.yml:continental-mesa-flattop-trans-delta
      MesaFlattopTransitionRate: $customization.yml:continental-mesa-flattop-trans-rate
      MesaRegionActiveThresh: $customization.yml:continental-mesa-region-allowed-threshold
    samplers:
      elevation_shifted_prefiltered_mesa_elev: $math/samplers/elevation.yml:samplers.elevation_shifted_prefiltered_mesa_elev
      elevation_MesaHeightModifier: $math/samplers/elevation.yml:samplers.elevation_MesaHeightModifier
      elevation_MesaUpwardDistFromTransPnt: $math/samplers/elevation.yml:samplers.elevation_MesaUpwardDistFromTransPnt
      elevation_MesaDownwardDistFromTransPnt: $math/samplers/elevation.yml:samplers.elevation_MesaDownwardDistFromTransPnt
    functions: $math/functions/interpolation.yml:functions

  elevationDetailed:
    dimensions: 2
    type: EXPRESSION
    expression: |
      terrace(
        combine(
          elevation(x, z),
          detailStart, 0,
          detailEnd, detail(x, z) * detailFactor
        ),
        terraceBaseScale + terraceScale(x, z) * terraceScaleVariation,
        terraceOffset(x, z) * terraceOffsetVariation,
        0,
        (terraceDepth(x, z)^3) * terraceDepthVariation,
        0, terraceDepthStart
      )
    variables: *variables
    samplers:
      elevation:
        dimensions: 2
        type: DOMAIN_WARP
        sampler: $math/samplers/elevation.yml:samplers.elevation
        # Elevation is warped slightly by white noise, creating a small fuzzy
        # or dithered look to break up perfectly smooth noise. Produces small
        # 1 block divots in terrain, especially apparent on steeper terrain and
        # countours which is good because these areas tend to look too perfect / artifical.
        amplitude: $customization.yml:elevation-fuzz
        warp:
          type: WHITE_NOISE
          salt: 2394
      terraceScale:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.002
        salt: 1926
      terraceDepth:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 5812
      terraceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 8512
      detail:
        dimensions: 2
        type: FBM
        octaves: 4
        lacunarity: 2
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.008
          salt: 5912

    functions:
      terrace: # Terrace function but with depth masked by input value, so terracing doesn't cut down below ocean level
        arguments:
        - i    # Input
        - sc   # Scale
        - o    # Offset
        - g    # Gap
        - d    # Terrace depth
        - tz   # Value of i where depth = 0
        - tf   # Value of i where depth = d
        expression: terraceParalinear(i,sc,o,g,lerp(i,tz,0,tf,d))
        functions:
          "<<":
          - math/functions/terrace.yml:functions
          - math/functions/interpolation.yml:functions
      combine: # Stacks a layer of noise on top scaled according to the base noise
        arguments:
        - x
        - at
        - a
        - bt
        - b
        expression: x+lerp(x,at,a,bt,b)
        functions: $math/functions/interpolation.yml:functions

  oceanElevation:
    dimensions: 2
    type: EXPRESSION
    expression: |
      (-1+rawElevation(x, z))
      * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
    functions: $math/functions/interpolation.yml:functions
    variables:
      continentZero: 0
      continentFull: -0.8
      factorContinental: $customization.yml:elevation-factor-continental
    samplers:
      rawElevation: $math/samplers/elevation.yml:samplers.rawElevation
      continents: $math/samplers/continents.yml:samplers.continents
