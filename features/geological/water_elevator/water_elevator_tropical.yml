id: WATER_ELEVATOR_TROPICAL
type: FEATURE
extends: WATER_ELEVATOR_SURFACE_LOCATOR

# TROPICAL water-elevator variant (mossy-cobblestone roof). The warm temperature band is
# split by precipitation: this places only off-spot, where temperature is high AND
# precipitation is wet. See WATER_ELEVATOR_FROZEN for the full rationale.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(temperature(x, z) >= 0.55 && precipitation(x, z) >= 0.0, waterElevatorPlacement(x, z), 1)
    samplers:
      temperature: $math/samplers/temperature.yml:samplers.temperature
      precipitation: $math/samplers/precipitation.yml:samplers.precipitation
      waterElevatorPlacement: $math/samplers/spots.yml:samplers.waterElevatorPlacement
  threshold: 0

structures:
  distribution:
    type: CONSTANT
  structures: water_elevator_tropical
