stages:
  #Distribute land into large temperature breaks to separate major canyon sections, since canyons changing vegitation mid trench is a little strange.
  - type: REPLACE
    sampler:
      type: EXPRESSION
      expression: if(((continentalRiverDist(x, z)>=1)&&(continents(x,z)>0.15)),temperature(x, z),0)
    from: land
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    to:
      _cold_canyon: 8
      land: 3
      _warm_canyon: 8
      
  #Perform cellular distribution to create zones where canyons will actually occur so they are not everywhere in the land-mass.
  - type: REPLACE_LIST
    sampler:
      dimensions: 2
      type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
      amplitude: 60 
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.002
      sampler:
        type: CELLULAR
        salt: 1234
        return: CellValue
        frequency: 1 /  ${customization.yml:biomeSpread.regionDistance}
    from: land
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    default-from: _warm_canyon
    default-to:
      - SELF: &CanyonDist     1
      - land: &LandDist       2
    to:
      _cold_canyon:
        - SELF: *CanyonDist
        - land: *LandDist

  - type: REPLACE_LIST
    sampler:
      type: EXPRESSION
      dimensions: 2
      variables:
        canyonStrength: ${customization.yml:biomeSpread.canyons.canyonAmount}
      expression: |
        min(max(-mask(x,z * 1.3) - canyonStrength, 0) * 18, 1) *
        max((-abs(base(x,z)) + 0.3) * 2, 0) * (1 / 0.2)
      samplers:
        base:
          dimensions: 2
          type: OPEN_SIMPLEX_2S
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance} * 1
        mask:
          dimensions: 2
          type: CELLULAR
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance} * 0.15
          seed: 23456345
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    from: _warm_canyon
    default-from: _warm_canyon
    default-to: # 0 = outer, 1 = inner
      - land: &CanyonLandDist             16
      - SANDY_SPLITS: &CanyonFloorDist     9
    to: # 0 = outer, 1 = inner
      _cold_canyon:
      - land: *CanyonLandDist
      - ICY_INCISIONS: *CanyonFloorDist