samplers:
  spotSizePercent: &spotSizePercent
    dimensions: 2
    type: PROBABILITY
    sampler:
      dimensions: 2
      type: CELLULAR
      frequency: 0.0006666666667
      salt: 3.0
      jitter: 0.8
      return: CellValue
  spotRadius: &spotRadius
    dimensions: 2
    type: EXPRESSION
    expression: lerp(spotSizePercent(x, z), 0, minRadius, 1, maxRadius)
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
    variables:
      spread: 1500
      largeSpawnRadiusOffset: 2000
      biomeBorder: 20
      largeBiomeBorder: 100
      minRadius: 50
      maxRadius: 150
      minHeight: 0.05
      maxHeight: 0.5
      spotMinEdgeRadius: 0.1
      spotMaxEdgeRadius: 0.5
      largeMinRadius: 500
      largeMaxRadius: 1500
      volcanoMinCenterDepth: 0.01
      volcanoMaxCenterDepth: 0.3
      prismaticMinCenterDepth: 0.01
      prismaticMaxCenterDepth: 0.15
    samplers:
      spotSizePercent: *spotSizePercent
  PeakHeightMultiplierAtPosition: &PeakHeightMultiplierAtPosition
    dimensions: 2
    type: EXPRESSION
    expression: (max_elev_prob(x,z)*VarianceRatio + (1 - VarianceRatio))
    variables:
      VarianceRatio: 0.3
    samplers:
      max_elev_prob:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          salt: 697.0
          frequency: 0.0003333333333
  spotDistance: &spotDistance
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 7
    warp:
      type: OPEN_SIMPLEX_2
      frequency: 0.015
    sampler:
      type: EXPRESSION
      expression: (noise(x, z)+1)*spread
      variables:
        spread: 1500
        largeSpawnRadiusOffset: 2000
        biomeBorder: 20
        largeBiomeBorder: 100
        minRadius: 50
        maxRadius: 150
        minHeight: 0.05
        maxHeight: 0.5
        spotMinEdgeRadius: 0.1
        spotMaxEdgeRadius: 0.5
        largeMinRadius: 500
        largeMaxRadius: 1500
        volcanoMinCenterDepth: 0.01
        volcanoMaxCenterDepth: 0.3
        prismaticMinCenterDepth: 0.01
        prismaticMaxCenterDepth: 0.15
      samplers:
        noise:
          dimensions: 2
          type: CELLULAR
          frequency: 0.0006666666667
          salt: 3.0
          jitter: 0.8
          distance: Euclidean
  spawnIsland: &spawnIsland
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 150
    warp:
      type: FBM
      octaves: 2
      sampler:
        type: TRANSLATE
        x: 5000
        z: -5000
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.004
    sampler:
      type: EXPRESSION_NORMALIZER
      expression: |
        if(in < middleRadius/outerRadius,
          herp        (in, innerRadius/outerRadius,  1, middleRadius/outerRadius, 0),
          parabolicMap(in, middleRadius/outerRadius, 0, 1,                       -1))
      variables:
        innerRadius: 20
        middleRadius: 125
        outerRadius: 400
      functions:
        lerp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
              if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
            )
        lerp3:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          - ct
          - c
          expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
          functions:
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
        herp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            hermite:
              arguments:
              - x
              expression: 3*x^2-2*x^3
        parabolicMap:
          arguments:
          - t
          - bt
          - b
          - at
          - a
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            interpolation:
              arguments:
              - x
              expression: x^2
      sampler:
        type: PROBABILITY
        sampler:
          type: DISTANCE
          point:
            x: 0
            z: 0
          normalize: true
          radius: 400
  continental_sampler: &continental_sampler
    dimensions: 2
    type: CACHE
    sampler:
      type: EXPRESSION
      expression: sampler(x - 100000, z - 100000)
      samplers:
        sampler:
          dimensions: 2
          type: TRANSLATE
          x: 10000
          z: 10000
          sampler:
            type: FBM
            gain: 0.7
            octaves: 3
            lacunarity: 1.8121866
            sampler:
              type: PERLIN
              frequency: 0.0002
  continental_landmass: &continental_landmass
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(continental_sampler(x,z) < island_threshold,
        // Islands: 0 to max island ratio, need to normalize with land range
        lerp(continental_sampler(x,z),-0.5,max_island_ratio,island_threshold,-1),
        if(continental_sampler(x,z) < land_threshold,
          //Ocean: 0 to 1
          lerp(continental_sampler(x,z),island_threshold,-1,land_threshold,0),
          //Check for lakes / continental land-masses.
          if(continental_sampler(x,z) > lake_threshold,
            // Lakes: 0 to -max lake ratio, need to normalize with ocean range.
            lerp(continental_sampler(x,z),lake_threshold,1,0.5,-max_lake_ratio),
            // Continents: 0 to 1
            lerp(continental_sampler(x,z),land_threshold,0,lake_threshold,1)
          )
        )
      )
    variables:
      island_threshold: -0.35
      land_threshold: 0.0
      lake_threshold: 0.35
      max_island_ratio: 0.4
      max_lake_ratio: 0.1
    samplers:
      continental_sampler: *continental_sampler
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
  continents: &continents
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        max(
          max(
            sampler(x / scale / globalScale, z / scale / globalScale),
            spawnIsland(x, z)
          ),
          // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
          // and decrease quadratically moving further outwards
          spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2))
      variables:
        globalScale: 1
        scale: 2
        spotContinentalFactor: 0.3
      samplers:
        spawnIsland: *spawnIsland
        spotDistance: *spotDistance
        spotRadius: *spotRadius
        sampler:
          dimensions: 2
          type: DOMAIN_WARP
          amplitude: 1500
          sampler: *continental_landmass
          warp:
            type: RIDGED
            lacunarity: 3
            gain: 0.45
            octaves: 4
            sampler:
              type: OPEN_SIMPLEX_2
              salt: 1.0
              frequency: 0.0002
  mesaMask: &mesaMask
    dimensions: 2
    type: EXPRESSION
    expression: max(min((sampler(x - 6000, z - 6000)-mesa_threshold)/(0.5-mesa_threshold), continents(x, z)),0)
    variables:
      mesa_threshold: 0.33
    samplers:
      continents: *continents
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        lacunarity: 1.7
        gain: 0.4
        sampler:
          type: PERLIN
          frequency: 0.0005
          salt: 200.0
  prefiltered_mesa_steps: &prefiltered_mesa_steps
    dimensions: 2
    type: EXPRESSION
    expression: |
      max(min(ceil(mesaMask(x, z)* MaxNMesSteps),MaxNMesSteps),0)
    variables:
      MaxNMesSteps: 3
      MaxPeakElev: 0.8
      mesa_threshold: 0.33
    samplers:
      continents: *continents
      mesaMask: *mesaMask
      PeakHeightMultiplierAtPosition: *PeakHeightMultiplierAtPosition
  mountainsB: &mountainsB
    dimensions: 2
    type: FBM
    octaves: 5
    lacunarity: 2.2
    gain: 0.55
    sampler:
      type: PERLIN
      frequency: 0.0006666666667
      salt: 300.0
  mountainMask: &mountainMask
    dimensions: 2
    type: PERLIN
    salt: 694.0
    frequency: 0.0006666666667
  AppliedMountainHeightB: &AppliedMountainHeightB
    dimensions: 2
    type: EXPRESSION
    expression: min(parabolicMap(-mountainMask(x, z), mountainMaskZero, 0, mountainMaskFull, abs(mountainsB(x, z))), parabolicMap(continents(x,
      z), mountainContZero, 0, mountainContFull, abs(mountainsB(x, z))))
    variables:
      detailFactor: 0.1
      detailStart: 0
      detailEnd: 0.5
      terraceBaseScale: 0.2
      terraceScaleVariation: 0.1
      terraceOffsetVariation: 0.25
      terraceDepthVariation: 1
      terraceDepthStart: 0.1
      plainsMaskZero: 0.5
      plainsMaskFull: 0.85
      hillMaxElevation: 0.3
      mountainCap: 0.9
      mountainMaskZero: 0.2
      mountainMaskFull: 0.5
      mountainContZero: 0.05
      mountainContFull: 0.5
      globalScale: 1
      verticalLift: 180
      scale: 1.05
      continentalRiseRate: 30
    samplers:
      mountainMask: *mountainMask
      mountainsB: *mountainsB
      continents: *continents
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
