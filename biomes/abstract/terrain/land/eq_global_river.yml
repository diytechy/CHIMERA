id: EQ_GLOBAL_RIVER
type: BIOME
abstract: true

variables: &variables
  base: $customization.yml:terrain-base-y-level   # 65
  scale: $customization.yml:terrain-height         # 180

  # --- Cave erosion parameters (block units) ---
  # Cave floor: how far below base the cave floor sits
  floorDepthBlocks: 20          # ~y45 (was depth: 0.11 → 0.11*180≈20)
  floorVariationBlocks: 9       # Floor varies ±9 blocks with noise (was depthVariation: 0.05 → 0.05*180=9)
  # Cave ceiling: where the ceiling transition zone starts and how tall it is
  ceilingStartBlocks: 18        # Ceiling begins 18 blocks above base → ~y83 (was ceilingBase: 0.1 → 0.1*180=18)
  ceilingTransitionBlocks: 31   # Ceiling fades over 31 blocks → ends ~y114 (was ceilingHeight: 0.17 → 0.17*180≈31)

  # --- River channel controls (continentalRiverDist: -1=center, 0=edge, +1=far) ---
  riverBedDepth: 8     # Blocks carved below surface at river center (must be > base - ocean level = 5)
  riverInner: -0.3     # Dist where flat riverbed ends and bank roll begins
  riverOuter: -0.05    # Dist where carving reaches 0 (more negative = narrower visible river)

ocean:
  level: $meta.yml:ocean-level
  # Water level rises with the river's regional elevation so rivers at higher
  # terrain still have water in them.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
    expression: olevel + continentalRiverBlockElevChange(x, z)

terrain:
  blend:
    distance: 2     # 0 = disabled (sharp edges)
    step: 3
    weight: 1.0
  # Two-stage approach:
  #   1. The 2D sampler (elevationDetailed → elevationWithRivers) provides a smooth
  #      hermite roll from normal terrain down to the river's regional elevation.
  #      This handles the broad valley shape and ensures bed height rises with
  #      continentalRiverBlockElevChange.
  #   2. The 3D sampler carves the actual river channel below water level using a
  #      narrow hermite band controlled by riverEdge (→ continentalRiverBlockDist).
  #      Cave erosion is faded near the river to prevent caves breaking into the bed.
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables: *variables
    expression: |
      -y + base -
      (erode(
        base,
        elevationWithRivers(x, z),
        scale,
        (y - base) / scale,
        (floorDepthBlocks - ((1 + depthVariation(x,z)) * floorVariationBlocks)) / scale,
        ceilingStartBlocks / scale,
        ceilingTransitionBlocks / scale,
        ceilingSpikes(x, z) * -0.1,
        herp(openings(x, z), 0.3, 0, 0.6, 1)
      ) * (1 + erosionStrengthVariation(x/3, y, z/3)^2) *
      herp(continentalRiverDist(x,z), riverInner, 0, 0.15, 1)) -
      riverBedDepth * herp(continentalRiverDist(x,z), riverInner, 1, riverOuter, 0)
    samplers:
      erosionStrengthVariation: # Used to roughen up the walls
        dimensions: 3
        type: FBM
        octaves: 4
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.05
          salt: 5
      openings:
        dimensions: 2
        type: EXPRESSION_NORMALIZER
        expression: "|in|"
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 1 / 1000
          salt: 9
      ceilingSpikes:
        dimensions: 2
        type: CUBIC_SPLINE
        points:
          - { from: -1, to: 1, gradient: -2 }
          - { from: -0.2, to: 0, gradient: 0 }
        sampler:
          type: CELLULAR
          distance: Euclidean
          frequency: 0.06
      depthVariation:
        dimensions: 2
        type: FBM
        octaves: 4
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.005
          salt: 9
    functions:
      # ──────────────────────────────────────────────────────────────────────
      # erode() — Carves a cave-like void into the terrain.
      #
      # All y/depth/ceiling values are NORMALIZED (0-1 of scale).
      # The function returns a positive value where terrain should be removed.
      #
      # Two independent controls shape the cave:
      #
      #   FLOOR (caveFloor):
      #     Prevents erosion below a depth limit.
      #     At y <= -depth (e.g. y45): erosion = 0 → solid floor
      #     At y >= 0      (e.g. y65): erosion = full → open cave
      #     Between: hermite transition (rounded cave floor)
      #
      #   CEILING (caveCeiling):
      #     Creates an overhanging roof that caps the cave.
      #     At y < ceilingBase (e.g. y83):  erosion = FULL (open cave)
      #     At y > ceilingBase+ceilingHeight (e.g. y114): erosion = 0 → solid cap
      #     Between: hermite transition (rounded cave ceiling)
      #
      #     The ceiling position is shifted by:
      #       - ceilingOffset: noise-driven spikes that create stalactite shapes
      #       - surfaceOpenings: at low elevations (<0.4), the ceiling opens up,
      #         allowing the cave to breach the surface (river valleys, ravines)
      #
      #   The FULL erosion value is: -y + base + elevation*scale
      #     This equals the distance from current y to the terrain surface,
      #     guaranteeing that any "fully eroded" point becomes air regardless
      #     of how deep below the surface it is.
      #
      # Combined (floor × ceiling):
      #   y < floor depth:  solid (floor wins, erosion=0)
      #   floor → ceilingBase: open cave (both allow full erosion)
      #   ceilingBase → ceilingBase+ceilingHeight: ceiling transition
      #   above ceiling: solid cap (ceiling wins, erosion=0)
      # ──────────────────────────────────────────────────────────────────────
      erode:
        arguments: [ base, elevation, scale, y, depth, ceilingBase, ceilingHeight, ceilingOffset, ceilingOpenings ]
        expression: |
          caveFloor(y, depth,
            caveCeiling(y, base, elevation, scale, ceilingBase, ceilingHeight, ceilingOffset,
              surfaceOpenings(elevation, ceilingOpenings)))
        functions:
          "<<":
            - math/functions/interpolation.yml:functions

          # How much the ceiling shifts down at low elevations, allowing caves
          # to open to the surface. Returns 0-1 (ceilingOpenings value).
          #   elevation <= 0.4: full opening (= ceilingOpenings)
          #   elevation >= 0.6: no opening (= 0)
          surfaceOpenings:
            arguments: [ elevation, ceilingOpenings ]
            expression: herp(elevation, 0.4, ceilingOpenings, 0.6, 0)

          # Ceiling shaper — returns the erosion amount above the cave floor.
          # Transitions from full erosion (below ceilingBase) to 0 (above
          # ceilingBase + ceilingHeight). The "full erosion" value is the
          # distance-to-surface (-y + base + elevation*scale), ensuring
          # complete block removal in the open cave zone.
          caveCeiling:
            arguments: [ y, base, elevation, scale, ceilingBase, ceilingHeight, ceilingOffset, openingShift ]
            expression: |
              herp(y - ceilingOffset - openingShift,
                ceilingBase, -y + base + elevation * scale,
                ceilingBase + ceilingHeight, 0)

          # Floor limiter — prevents erosion below the depth limit.
          # Wraps the ceiling result: at y <= -depth, returns 0 (solid floor).
          # At y >= 0, passes through the ceiling erosion value unchanged.
          caveFloor:
            arguments: [ y, depth, ceilingErosion ]
            expression: herp(y, -depth, 0, 0, ceilingErosion)
  
  # Will always return y value for surface
  sampler-2d:
    type: EXPRESSION
    expression: scale * elevationDetailed(x, z)
    variables: *variables