                    - t
                    - at
                    - a
                    - bt
                    - b
                    expression: |
                      if(at<bt,
                        if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                        if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                      )
              herp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                    if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                  )
                functions:
                  hermite:
                    arguments:
                    - x
                    expression: 3*x^2-2*x^3
              parabolicMap:
                arguments:
                - t
                - bt
                - b
                - at
                - a
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                    if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                  )
                functions:
                  interpolation:
                    arguments:
                    - x
                    expression: x^2
          warp:
            type: RIDGED
            lacunarity: 3
            gain: 0.45
            octaves: 4
            sampler:
              type: OPEN_SIMPLEX_2
              salt: 1.0
              frequency: 0.0002
