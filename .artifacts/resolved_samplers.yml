samplers:
  spawnIsland:
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 150
    warp:
      type: FBM
      octaves: 2
      sampler:
        type: TRANSLATE
        x: 5000
        z: -5000
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.004
    sampler:
      type: EXPRESSION_NORMALIZER
      expression: |
        if(in < middleRadius/outerRadius,
          herp        (in, innerRadius/outerRadius,  1, middleRadius/outerRadius, 0),
          parabolicMap(in, middleRadius/outerRadius, 0, 1,                       -1))
      variables:
        innerRadius: 20
        middleRadius: 125
        outerRadius: 400
      functions:
        lerp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
              if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
            )
        lerp3:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          - ct
          - c
          expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
          functions:
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
        herp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            hermite:
              arguments:
              - x
              expression: 3*x^2-2*x^3
        parabolicMap:
          arguments:
          - t
          - bt
          - b
          - at
          - a
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            interpolation:
              arguments:
              - x
              expression: x^2
      sampler:
        type: PROBABILITY
        sampler:
          type: DISTANCE
          point:
            x: 0
            z: 0
          normalize: true
          radius: 400
  riftHybDistFromCenter:
    dimensions: 2
    type: CELLULAR
    frequency: 0.003333333333
    salt: 1357.0
    jitter: 0.5
    distance: Hybrid
  trenchDistance:
    dimensions: 2
    type: EXPRESSION
    expression: '|trenchNoise(x*trenchFrequency, z*trenchFrequency)|'
    variables:
      notTrenchValue: 2
      borderValue: 1
      trenchValue: 0
      trenchFrequency: 0.025
      trenchThreshold: 0.3
      trenchMinWidth: 8
      trenchMaxWidth: 13
      erosionMaxDistance: 0.3
      erosionMax: 0.95
      erosionMin: 0
  trenchNoise:
    dimensions: 2
    type: TRANSLATE
    x: -10000
    z: -10000
    sampler:
      type: DOMAIN_WARP
      amplitude: 3
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.1
      sampler:
        type: OPEN_SIMPLEX_2
        salt: 4357.0
  trenchBiomeMap:
    dimensions: 2
    type: EXPRESSION
    expression: |
      trenchBiomeMap(
        x,
        lerp(width(x*trenchFrequency, z*trenchFrequency), -0.75, trenchMinWidth, 0.75, trenchMaxWidth),
        z
      )
    variables:
      notTrenchValue: 2
      borderValue: 1
      trenchValue: 0
      trenchFrequency: 0.025
      trenchThreshold: 0.3
      trenchMinWidth: 8
      trenchMaxWidth: 13
      erosionMaxDistance: 0.3
      erosionMax: 0.95
      erosionMin: 0
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
    samplers:
      width:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.05
        salt: 5346.0
      trenchBiomeMap:
        dimensions: 3
        type: EXPRESSION
        expression: |
          if(trenchDistance(x, z)>trenchThreshold,
            notTrenchValue,
            if(trenchKerneled((x-y)/y, y, (z-y)/y)!=0,
              trenchValue,
              borderValue
            )
          )
        variables:
          notTrenchValue: 2
          borderValue: 1
          trenchValue: 0
          trenchFrequency: 0.025
          trenchThreshold: 0.3
          trenchMinWidth: 8
          trenchMaxWidth: 13
          erosionMaxDistance: 0.3
          erosionMax: 0.95
          erosionMin: 0
        samplers:
          trenchKerneled:
            dimensions: 3
            type: KERNEL
            kernel:
            - - 0
              - 1
              - 0
            - - 1
              - -4
              - 1
            - - 0
              - 1
              - 0
            sampler:
              type: EXPRESSION
              expression: trenchNoise(x*y*trenchFrequency, z*y*trenchFrequency)>0
              variables:
                notTrenchValue: 2
                borderValue: 1
                trenchValue: 0
                trenchFrequency: 0.025
                trenchThreshold: 0.3
                trenchMinWidth: 8
                trenchMaxWidth: 13
                erosionMaxDistance: 0.3
                erosionMax: 0.95
                erosionMin: 0
              samplers: {}
  continental_landmass:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(continental_sampler(x,z) < island_threshold,
        // Islands: 0 to max island ratio, need to normalize with land range
        lerp(continental_sampler(x,z),-0.5,max_island_ratio,island_threshold,-1),
        if(continental_sampler(x,z) < land_threshold,
          //Ocean: 0 to 1
          lerp(continental_sampler(x,z),island_threshold,-1,land_threshold,0),
          //Check for lakes / continental land-masses.
          if(continental_sampler(x,z) > lake_threshold,
            // Lakes: 0 to -max lake ratio, need to normalize with ocean range.
            lerp(continental_sampler(x,z),lake_threshold,1,0.5,-max_lake_ratio),
            // Continents: 0 to 1
            lerp(continental_sampler(x,z),land_threshold,0,lake_threshold,1)
          )
        )
      )
    variables:
      island_threshold: -0.35
      land_threshold: -0.2
      lake_threshold: 0.35
      max_island_ratio: 0.4
      max_lake_ratio: 0.1
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
  continents:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        max(
          sampler(x / scale / globalScale, z / scale / globalScale),
          spawnIsland(x, z)
        )
      variables:
        globalScale: 1
        scale: 2
      samplers:
        sampler:
          dimensions: 2
          type: DOMAIN_WARP
          amplitude: 1500
          sampler:
            dimensions: 2
            type: EXPRESSION
            expression: |
              if(continental_sampler(x,z) < island_threshold,
                // Islands: 0 to max island ratio, need to normalize with land range
                lerp(continental_sampler(x,z),-0.5,max_island_ratio,island_threshold,-1),
                if(continental_sampler(x,z) < land_threshold,
                  //Ocean: 0 to 1
                  lerp(continental_sampler(x,z),island_threshold,-1,land_threshold,0),
                  //Check for lakes / continental land-masses.
                  if(continental_sampler(x,z) > lake_threshold,
                    // Lakes: 0 to -max lake ratio, need to normalize with ocean range.
                    lerp(continental_sampler(x,z),lake_threshold,1,0.5,-max_lake_ratio),
                    // Continents: 0 to 1
                    lerp(continental_sampler(x,z),land_threshold,0,lake_threshold,1)
                  )
                )
              )
            variables:
              island_threshold: -0.35
              land_threshold: -0.2
              lake_threshold: 0.35
              max_island_ratio: 0.4
              max_lake_ratio: 0.1
            functions:
              lerp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                    if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                  )
              lerp3:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                - ct
                - c
                expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
                functions:
                  lerp:
                    arguments:
                    - t
                    - at
                    - a
                    - bt
                    - b
                    expression: |
                      if(at<bt,
                        if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                        if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                      )
              herp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                    if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                  )
                functions:
                  hermite:
                    arguments:
                    - x
                    expression: 3*x^2-2*x^3
              parabolicMap:
                arguments:
                - t
                - bt
                - b
                - at
                - a
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                    if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                  )
                functions:
                  interpolation:
                    arguments:
                    - x
                    expression: x^2
          warp:
            type: RIDGED
            lacunarity: 3
            gain: 0.45
            octaves: 4
            sampler:
              type: OPEN_SIMPLEX_2
              salt: 1.0
              frequency: 0.0002
    int: true
    resolution: 4
  rawElevation:
    dimensions: 2
    type: EXPRESSION
    expression: |
      combine(continentalRise(x,z) * (1-flatness(x, z)),
      hillsApplied(x,z) * hillMaxElevation * max(1,(1.5-flatness(x, z))),
      AppliedMountainHeight(x,z)*PeakHeightMultiplierAtPosition(x,z),
      mountainCap)
    variables:
      detailFactor: 0.1
      detailStart: 0
      detailEnd: 0.5
      terraceBaseScale: 0.2
      terraceScaleVariation: 0.1
      terraceOffsetVariation: 0.25
      terraceDepthVariation: 1
      terraceDepthStart: 0.1
      plainsMaskZero: 0.5
      plainsMaskFull: 0.85
      hillMaxElevation: 0.2
      mountainCap: 0.9
      mountainMaskZero: 0.3
      mountainMaskFull: 0.55
      mountainContZero: 0.05
      mountainContFull: 0.5
      globalScale: 1
      verticalLift: 180
      scale: 1.05
      continentalRiseRate: 30
    functions:
      combine:
        arguments:
        - continents
        - hills
        - mountains
        - mountainCap
        expression: continents + hills + mountains*min(1 - hills-continents, mountainCap)
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
  elevation:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        rawElevation(x, z)
        * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
        * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
      functions:
        lerp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
