stages:
  - type: REPLACE_LIST
    sampler:
      #type: OPEN_SIMPLEX_2
      #salt: 6893
      #frequency: 1 / 1000 / ${customization.yml:variation-scale} / ${customization.yml:global-scale}
      type: EXPRESSION
      expression: BiomeShapeLandmassColor(x, z)
    default-from: hot-desert-flat
    default-to:
      - hot-desert-flat-black: &black 3
      - hot-desert-flat-red: &red 2
      - hot-desert-flat-orange: &orange 2
      - hot-desert-flat-white: &white 4
    to:
      hot-desert:
        - hot-desert-black: *black
        - hot-desert-red: *red
        - hot-desert-orange: *orange
        - hot-desert-white: *white
      hot-desert-highlands:
        - hot-desert-highlands-black: *black
        - hot-desert-highlands-red: *red
        - hot-desert-highlands-orange: *orange
        - hot-desert-highlands-white: *white

      hot-steppe-flat:
        - hot-steppe-flat-black: *black
        - hot-steppe-flat-red: *red
        - hot-steppe-flat-orange: *orange
        - hot-steppe-flat-white: *white
      hot-steppe:
        - hot-steppe-black: *black
        - hot-steppe-red: *red
        - hot-steppe-orange: *orange
        - hot-steppe-white: *white
      hot-steppe-highlands:
        - hot-steppe-highlands-black: *black
        - hot-steppe-highlands-red: *red
        - hot-steppe-highlands-orange: *orange
        - hot-steppe-highlands-white: *white
      arid-pale-garden:
        - BLACK_ARID_PALE_GARDEN: *black
        - RED_ARID_PALE_GARDEN: *red
        - ORANGE_ARID_PALE_GARDEN: *orange
        - ARID_PALE_GARDEN: *white

      # Vast forests (humid) ride the SAME color bands/weights as the deserts above (shared
      # BiomeShapeLandmassColor sampler + &black/&red/&orange/&white), so the world's color
      # shift stays consistent. White is the pale-garden forest itself; the other bands are
      # the dedicated *_VAST_FOREST variants. Polar vast forests stay pale (snow-dominant).
      polar-vast-forest:
        - POLAR_PALE_GARDEN: 1
      boreal-vast-forest: &vast-forest-colors
        - BLACK_VAST_FOREST: *black
        - RED_VAST_FOREST: *red
        - ORANGE_VAST_FOREST: *orange
        - PALE_GARDEN: *white
      temperate-vast-forest: *vast-forest-colors
      tropical-vast-forest: *vast-forest-colors