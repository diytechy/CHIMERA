id: PILLOW_PLAINS_MIDDLE
type: BIOME
vanilla: minecraft:plains
color: $biomes/colors.yml:SAKURA_GROVE
extends:
- CARVING_LAND
- BASE
colors:
  grass: 7399021
  water: 6141935
  leaves: 7399021
vars: &id001
  base: 70
  height: 4
terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *id001
    expression: '// positive / higher = solid

      -y + base + surfaceVariation(x,z) * height

      '
    functions:
      remapY:
        arguments:
        - y
        - base
        - depth
        expression: (base - y) / depth
      clamp:
        arguments:
        - x
        - a
        - b
        expression: min(max(x, a), b)
      pillarWidth:
        arguments:
        - x
        expression: 8.416667*x - 19.25*x^2 + 10.83333*x^3
    samplers:
      surfaceVariation:
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: 0.011
      flatCells:
        dimensions: 2
        type: CELLULAR
        frequency: 0.018
        jitter: 1
        distance: Euclidean
      largeFlatAreas:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.0055
        octaves: 3
        lacunarity: 1
        gain: 0.5
      pillarSizing:
        dimensions: 2
        type: CELLULAR
        frequency: 0.018
        jitter: 1
        return: CellValue
palette:
- GRASS_WHITE_PILLAR: 319
- << meta.yml:palette-bottom
features:
  flora:
  - GRASS
  - LOW_GRASS
  - POPPY_PATCH
  - OXEYE_DAISY_PATCH
  - CORNFLOWER_PATCH
  - ALLIUM_PATCH
  - PUMPKIN_PATCHES
  trees:
  - SPRUCE_TREE_PATCHES
  landforms:
  - BOULDERS
  - SMALL_BOULDER_PATCHES
tags:
- LAND_CAVES
- SPECIAL_CAVES
