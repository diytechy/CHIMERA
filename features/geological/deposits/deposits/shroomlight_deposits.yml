id: SHROOMLIGHT_DEPOSITS
type: FEATURE

anchors:
  - &densityThreshold 1/256 * ${features/geological/deposits/distribution.yml:shroomlight.averageCountPerChunk} # Divide by 16^2 to get % per column
  - &salt $features/geological/deposits/distribution.yml:shroomlight.salt
  - &range $features/geological/deposits/distribution.yml:shroomlight.range
  - &min $features/geological/deposits/distribution.yml:shroomlight.range.min
  - &max $features/geological/deposits/distribution.yml:shroomlight.range.max

distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    # Gate to warm-ish climate, but use rawTemperature (base climate noise) rather than
    # temperature(): the latter subtracts an altitude-lapse term that pulls in the heavy
    # elevation sampler stack, evaluated per column in every biome carrying this deposit.
    # The lapse correction is meaningless for an underground deposit (range 10-55), so
    # rawTemperature is both far cheaper and a better fit here.
    expression: if(rawTemperature(x,z)>-0.4, positiveWhiteNoise(x, z), 1)
    samplers:

  threshold: *densityThreshold

locator:
  type: AND
  locators:
  - type: RANDOM
    height:
      min: *min
      max: *max
    amount: 1
    salt: 234678
  - type: PATTERN
    range: *range
    pattern:
      type: MATCH_SOLID
      offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:shroomlight