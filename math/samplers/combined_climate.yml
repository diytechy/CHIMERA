# =============================================================================
# Combined Climate Samplers
# =============================================================================
#
# AUTO-GENERATED by generate_combined_climate.py
# DO NOT EDIT MANUALLY - regenerate by running the script
#
# This file was derived by analyzing:
#   - math/samplers/continents.yml
#   - math/samplers/spawnIsland.yml
#   - math/samplers/elevation.yml
#   - math/samplers/temperature.yml
#   - math/samplers/precipitation.yml
#   - math/samplers/spots.yml
#
# The expressions below were automatically combined to eliminate redundant
# calculations. Shared dependencies (like continents) are computed once.
#
# Encoding: climateIndex = (tempIdx * 24) + (precipIdx * 4) + elevIdx
# =============================================================================

samplers:
  combinedClimate:
    dimensions: 2
    type: EXPRESSION
    expression: |
      // ===== COMBINED CLIMATE EXPRESSION =====
      // Auto-derived from source sampler files
      
      // --- Shared: Continent value (used by elevation and precipitation) ---
      // Derived from: continents.yml
      c = max(
        max(
          -continentNoise(x / scale / globalScale, z / scale / globalScale) * spread + offset,
          spawnIsland(x, z)
        ),
        // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
        // and decrease quadratically moving further outwards
        spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2));
      
      // --- Elevation calculation ---
      // Derived from: elevation.yml
      elev = rawElevation(x, z) * (1-flatness(x, z))
      * if(factorContinental, herp(c, continentZero, 0, continentFull, 1), 1)
      * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
      * if(factorRiver, (1-riverTerrainErosion(x, z)), 1);
      
      // --- Temperature calculation ---
      // Derived from: temperature.yml
      temp = rawTemperature(x, z) - lerp(elev, lapseStart, 0, 1, lapseRate);
      
      // --- Precipitation calculation ---
      // Derived from: precipitation.yml
      precip = lerp(c, oceanThreshold, 1, landThreshold, rawPrecipitation(x, z));
      
      // --- Climate Index Encoding ---
      // Convert continuous T/P/E to discrete indices and encode
      tempIdx = floor(clamp((temp + 1) / 2, 0, 0.9999) * 12);
      precipIdx = floor(clamp((precip + 1) / 2, 0, 0.9999) * 6);
      elevIdx = floor(clamp(elev * 4, 0, 3.9999));
      
      // Final encoded value in [-1, 1] range
      (tempIdx * 24 + precipIdx * 4 + elevIdx) / 287 * 2 - 1

    variables:
      # Continent variables (from continents.yml)
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:continental-scale
      offset: $customization.yml:continental-offset
      spread: $customization.yml:continental-spread
      spotContinentalFactor: 0.3
      # Elevation variables (from elevation.yml)
      continentZero: $customization.yml:elevation-continental-flat-threshold
      continentFull: $customization.yml:elevation-continental-full-height-threshold
      factorContinental: $customization.yml:elevation-factor-continental
      factorRiver: $customization.yml:elevation-factor-rivers
      factorSpawnIsland: $customization.yml:elevation-factor-spawn-island
      spawnIslandScale: $customization.yml:elevation-spawn-island-scale
      threshold: $customization.yml:flatness-percent
      blend: $customization.yml:flatness-blend
      factor: $customization.yml:flatness-factor
      # Temperature variables (from temperature.yml)
      lapseRate: $customization.yml:temperature-altitude-lapse-rate
      lapseStart: $customization.yml:temperature-altitude-lapse-start
      # Precipitation variables (from precipitation.yml)
      oceanThreshold: $customization.yml:precipitation-ocean-threshold
      landThreshold: $customization.yml:precipitation-land-threshold

    functions:
      "<<": $math/functions/interpolation.yml:functions
      clamp:
        arguments: [x, minVal, maxVal]
        expression: max(min(x, maxVal), minVal)

    samplers:
      # Continent noise (from continents.yml)
      continentNoise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: RIDGED
          lacunarity: 3
          gain: 0.35
          octaves: 3
          sampler:
            type: OPEN_SIMPLEX_2
            salt: 1
            frequency: 1 / 5000
      # Spawn island (from spawnIsland.yml)
      spawnIsland:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 150
        warp:
          type: FBM
          octaves: 2
          sampler:
            type: TRANSLATE
            x: 5000
            z: -5000
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.004
        sampler:
          type: EXPRESSION_NORMALIZER
          expression: "if(in < middleRadius/outerRadius,\n  herp        (in, innerRadius/outerRadius,\
            \  1, middleRadius/outerRadius, 0),\n  parabolicMap(in, middleRadius/outerRadius,\
            \ 0, 1,                       -1))\n"
          variables:
            innerRadius: $customization.yml:spawn-island-radius-inner
            middleRadius: $customization.yml:spawn-island-radius-middle
            outerRadius: $customization.yml:spawn-island-radius-outer
          functions: $math/functions/interpolation.yml:functions
          sampler:
            type: PROBABILITY
            sampler:
              type: DISTANCE
              point:
                x: $customization.yml:spawn-island-origin-x
                z: $customization.yml:spawn-island-origin-z
              normalize: true
              radius: $customization.yml:spawn-island-radius-outer
      # Spot samplers (from spots.yml)
      spotDistance: $math/samplers/spots.yml:samplers.spotDistance
      spotRadius: $math/samplers/spots.yml:samplers.spotRadius
      # Raw elevation (from elevation.yml)
      rawElevation: $math/samplers/elevation.yml:samplers.rawElevation
      # Flatness (from elevation.yml)
      flatness: $math/samplers/elevation.yml:samplers.flatness
      # River terrain erosion (from rivers.yml)
      riverTerrainErosion: $math/samplers/rivers.yml:samplers.riverTerrainErosion
      # Temperature noise (from temperature.yml)
      rawTemperature: $math/samplers/temperature.yml:samplers.rawTemperature
      # Precipitation noise (from precipitation.yml)
      rawPrecipitation: $math/samplers/precipitation.yml:samplers.rawPrecipitation
