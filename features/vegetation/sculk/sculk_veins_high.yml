id: SCULK_VEINS_HIGH
type: FEATURE

distributor:
  type: "YES"

locator:
  type: AND
  locators:
    - type: PATTERN
      range: &range
        min: ${meta.yml:ocean-level} - 7
        max: ${meta.yml:top-y}
      pattern:
        type: MATCH_AIR
        offset: 0
    - type: ADJACENT_PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: 0

structures:
  distribution:
    type: OPEN_SIMPLEX_2
    frequency: 0.02
    salt: 727
  structures: 
    - blank: 1
    - sculk_vein: 5