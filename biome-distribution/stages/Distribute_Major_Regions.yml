stages:
#Create vast forest distributions
  - type: REPLACE_LIST
    from: land
    sampler:
      dimensions: 2
      type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
      amplitude: 60 
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.002
      sampler:
        type: CELLULAR
        return: CellValue
        frequency: 1 /  ${customization.yml:biomeSpread.regionDistance}
    default-from: land
    #Note, keep order / distribution the same below so that coasts are aligned with their major regions.
    default-to:
      mesa: 1
      vast-forest: 1
      SELF: 9
    to:
      coast:
        mesa: 1
        vast-forest-coast: 1
        SELF: 9
#Add islands
  - type: REPLACE
    from: ocean
    sampler:
      dimensions: 2
      type: DOMAIN_WARP
      amplitude: 100 
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.002
      sampler:
        type: CELLULAR
        return: CellValue
        frequency: 1 /  ${customization.yml:biomeSpread.islandDistance}
        salt: 2001
        jitter: 1.2
        distance: Hybrid
    to:
      o1: 1
      o2: 1
      o3: 1
      o4: 1
      o5: 1
 #Create island coastlines
  - type: BORDER
    sampler:
      type: CONSTANT
    from: island
    replace: ocean
    to: island-coast