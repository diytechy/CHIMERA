id: EQ_SMALL_BIOME_VALLEY_TRANSITION
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  scale: $customization.yml:terrain-height
  valley_dist: $customization.yml:valley-dist

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    expression: -y + base
    variables: *variables

  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    expression: herp(BiomeShapeLandmassDistance(x, z),valley_dist,0,0,scale * elevationDetailed(x, z))
    variables: *variables
    functions: $math/functions/interpolation.yml:functions
