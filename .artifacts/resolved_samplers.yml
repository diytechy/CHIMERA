  caveCarverFade:
    dimensions: 3
    type: EXPRESSION
    variables:
      act_dist: '0.05'
      act_thresh: '-0.05'
      act_trans: '-0.1'
      act_full: '-0.15'
    expression: "herp(y, \n  -4, //Below -4, don't carve all the way through, but fade out near shell.\n  lerp(special_caves(x,y,z),\
      \ 0, -0.5, act_dist, carver(x,y,z)),\n  4, //When above 4, smooth fade all the way through to the activation threshold\n\
      \  lerp3(special_caves(x,y,z), act_full, -0.5, act_trans, 0, act_dist, carver(x,y,z)))\n"
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
    samplers:
      carver:
        dimensions: 3
        type: EXPRESSION
        variables:
          carvingThreshold: 0.54
          carvingMinHeight: -63
          carvingMinTaper: 8
          carvingMaxHeight: '300'
          carvingMaxTaper: 25
          carvingCap: 1
          cheeseStrength: 0.8
          cheeseHorizontalFrequency: 1.5
          cheeseVerticalFrequency: 3
          cheeseMaxHeight: 90
          cheeseMaxTaper: 40
          spaghettiStrengthLarge: 0.6
          spaghettiStrengthSmall: 0.56
          pillarStrength: 0.5
          pillarRadius: 0.02
          megaCaveStrength: 0.3
          megaCaveSize: 0.3
          pitCaveTunnel_enabled: 0
        expression: "max(\n  -carvingThreshold\n  + if(y<carvingMinHeight||y>carvingMaxHeight,0,maskSmooth(maskSmooth( // Skip\
          \ unnecessary calculations\n    min(carvingCap,\n      max(\n        // Spaghetti Caves\n        max(\n          spaghettiStrengthLarge\
          \ * ((-(|simplex3(x,y+0000,z)|+|simplex3(x,y+1000,z)|)/2)+1),\n          spaghettiStrengthSmall * ((-(|simplex3(x,y+2000,z)|+|simplex3(x,y+3000,z)|)/2)+1)\n\
          \        ),\n        // Cheese caves\n        if(y>cheeseMaxHeight,0,\n          maskSmooth(\n            cheeseStrength\
          \ * (simplex3(\n              x * cheeseHorizontalFrequency,\n              (y + simplex2(x, z) * 5) * cheeseVerticalFrequency,\n\
          \              z * cheeseHorizontalFrequency\n            )+1)/2\n            // Mega caves\n            +lerp(megaCaves(x,\
          \ y, z), 1-megaCaveSize, 0, 1, megaCaveStrength)\n            // Pillars\n            -lerp(cavePillars(x, z),-1+pillarRadius,0,-1,1)\
          \ * pillarStrength,\n  \n            // Cheese clamp parameters\n            cheeseMaxHeight, cheeseMaxHeight - cheeseMaxTaper,\
          \ y\n          )\n        )\n      )\n    ),\n    // Clamp parameters\n    carvingMinHeight, carvingMinHeight + carvingMinTaper,\
          \ y\n    ),\n    carvingMaxHeight, carvingMaxHeight - carvingMaxTaper, y\n  )),\n  // ── Pit-cave upper-hemisphere\
          \ tunnel ──────────────────────────────────\n  // Carves a passage from the special-cave dome to overlapping pit walls.\n\
          \  // Comment out the following line (or set pitCaveTunnel_enabled: 0) to suppress.\n  if(pitCaveTunnel_enabled,pitCaveTunnel(x,\
          \ y, z),-carvingThreshold)\n  )\n"
        samplers:
          cavePillars:
            dimensions: 2
            type: CELLULAR
            frequency: 0.05
          megaCaves:
            dimensions: 3
            type: OPEN_SIMPLEX_2
            salt: 777.0
            frequency: 0.003
          pitCaveTunnel:
            dimensions: 3
            type: EXPRESSION
            variables:
              cave_pit_thresh: '0.1'
              cave_pit_trans: '0.4'
              cave_upper: '40'
              ymin_outer: 0
              mag: 0.8
              noise_amp: 5
              fade: 5
              str_cap: 0.7
              trans_bulk: 0.0
              cave_shell_r: 0.5
            expression: "// ── Early exit: no carving outside the pit overlap zone ──────────────\nif(warped_pit(x,z) <= 0,\
              \ -0.5,\n\n  // ── Strength mask with trans_bulk ──────────────────────────────────\n  // raw = (riftWellPlacement\
              \ + B) × (special_radius + B) / (1 + B)²\n  //   • Positive when cave and pit are simultaneously reachable; B\
              \ widens reach.\n  //   • Negative near the pit outer surface (riftWellPlacement << 0) → solid.\n  // NOTE: must\
              \ use special_radius_norm (not 1-special_radius). The latter peaks at\n  //   the cave CENTRE (sr=0 → 1-sr=1)\
              \ and is negative outside the shell, so the\n  //   conditional only fires INSIDE the cave — carving extra void\
              \ where the cave\n  //   already exists. special_radius_norm = max(pit_transition, special_radius)\n  //   is\
              \ non-negative everywhere and rises through the pit/cave transition band.\n  if((riftWellPlacement(x,z) + trans_bulk)\
              \ * (special_radius_norm(x,z) + trans_bulk) <= 0,\n    -0.5,\n\n    // norm_strength = raw ^ 0.3\n    //   ^0.3\
              \ keeps the passageway broadly strong while rolling to 0 at the\n    //   raw-zero boundary (riftWellPlacement\
              \ = −trans_bulk on the pit side).\n    ((riftWellPlacement(x,z) + trans_bulk) * (special_radius_norm(x,z) + trans_bulk)\n\
              \      / ((1 + trans_bulk) * (1 + trans_bulk)))^0.3\n\n    // ── Passageway-end fades ────────────────────────────────────────\n\
              \    // Cave-centre fade (passageway = −1 → 0):\n    //   0 when special_radius_norm = 0 (cave centre), 1 when\
              \ special_radius_norm ≥ cave_shell_r.\n    * min(1, special_radius_norm(x,z) / cave_shell_r)\n    // Pit-centre\
              \  fade (passageway = 1 → 2): \n    //   1 when riftWellPlacement = 0 (pit edge), 0 when riftWellPlacement = 1\
              \ (pit centre).\n    * max(0, min(1, 1 - riftWellPlacement(x,z)))\n\n    // ── Vertical tunnel mask ────────────────────────────────────────\n\
              \    // ymin: linearly interpolated from ymin_outer (at riftWellPlacement = −cave_pit_trans,\n    //       passageway\
              \ = 0) to pit_floor (at riftWellPlacement = 0, passageway = 1),\n    //       with FBM noise for organic variation.\n\
              \    // Lower ramp: 0 at y = ymin → 1 at y = ymin + fade.\n    * min(1, max(0,\n        (y - (lerp(riftWellPlacement(x,z),\
              \ -cave_pit_trans, ymin_outer,\n                   0, elevationDetailedBlockHeight(x,z))\n              + tunnelNoise(x,z)\
              \ * noise_amp))\n        / fade\n      ))\n\n    // ymax = cave_upper × norm_strength × mag + ymin.\n    // Upper\
              \ ramp: 1 at y = ymax − fade → 0 at y = ymax.\n    * min(1, max(0,\n        ( cave_upper\n          * ((riftWellPlacement(x,z)\
              \ + trans_bulk) * (special_radius_norm(x,z) + trans_bulk)\n             / ((1 + trans_bulk) * (1 + trans_bulk)))^0.3\n\
              \          * mag\n          + lerp(riftWellPlacement(x,z), -cave_pit_trans, ymin_outer,\n                 0, elevationDetailedBlockHeight(x,z))\n\
              \          + tunnelNoise(x,z) * noise_amp\n          - y)\n        / fade\n      ))\n\n    * str_cap\n  )\n)\n"
            functions:
              lerp:
                arguments:
                - t
                - at
                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                    if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                  )
            samplers:
              tunnelNoise:
                dimensions: 2
                type: FBM
                octaves: 3
                gain: 0.5
                lacunarity: 2.0
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 0.015
                  salt: 55503.0
