id: EQ_INFERNO_ISLE
type: BIOME
abstract: true

vars: &variables
  middleHeight: -7
  #"<<":
  #  - biomes/equations/caverns/eq_carving_land.yml:variables

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10
    
carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      10
      //-clamp(max((special_caves(x, y * 2, z) + 1.0) * 50 + wallOffset(x,y,z) * 3, -2)
      //+ max((4.9 - abs(middleHeight - y)), 0) * (-platforms(x,z) - 0.29), -10, 10) * 16
      //+ carver_fade(x,y,z)
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers: 
      carver_fade: 
        dimensions: 3
        type: EXPRESSION
        variables:
          act_dist: ${customization.yml:special_cave_biome_activation}
        expression: min(0,carver(x,y,z) + if(y<0, min(y,lerp(special_caves(x, y * 2, z),act_dist+0.05,-10,act_dist,0)),0))
        samplers:
          carver: $biomes/equations/caverns/eq_carving_land.yml:carving.sampler
        #dimensions: 3
        #type: EXPRESSION
        #variables: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.variables
        #expression: $biomes/equations/caverns/eq_carving_land.yml:carving:sampler.expresion
        
      platforms:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 5
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.02
        sampler:
          type: CELLULAR
          frequency: 0.05
      wallOffset:
        dimensions: 3
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.025
        octaves: 2
        lacunarity: 2.8
        gain: 0.5
  #sampler-2d:
  #  dimensions: 2
  #  type: CONSTANT
  #  value: 0
