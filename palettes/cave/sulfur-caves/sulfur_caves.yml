id: SULFUR_CAVES
type: PALETTE

# Sulfur caves are a heavily mineralized biome: sulfur is the dominant matrix with
# strong cinnabar (red mercury-sulfide) veining and minor calcite/tuff accents.
# Both sulfur and cinnabar are decorative biome blocks in Paper 26.2 (no ores), so
# the high concentration comes from the palette, not from ore placement.
layers:
  - materials:
      - minecraft:sulfur: 7
      - minecraft:cinnabar: 2
      - minecraft:calcite: 1
    layers: 2
  - materials:
      - minecraft:sulfur: 6
      - minecraft:cinnabar: 2
      - minecraft:tuff: 1
      - minecraft:calcite: 1
    layers: 1

sampler:
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 4
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.1
  sampler:
    type: CELLULAR
    return: CellValue
    frequency: 0.08
