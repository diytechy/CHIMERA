id: PRISMATIC_SPRING_SMOKE
type: FEATURE

distributor:
  type: PADDED_GRID
  width: 5
  padding: 3
  salt: 6478

locator:
  type: AND
  locators:
    - type: PATTERN
      range:
        min: $meta.yml:bottom-y
        max: $meta.yml:top-y
      pattern:
        type: AND
        patterns:
          - type: MATCH
            block: minecraft:cyan_terracotta
            offset: 1
          - type: MATCH_SOLID
            offset: 0
    - type: SAMPLER_3D
      sampler:
        type: EXPRESSION
        expression: |
          if(distanceToPrismaticRim(x, z) < 0,
            if(prismaticFluidLevel(x, z) > 0,
              -y + base + scale * (spotBaseElevation(x, z) + (prismaticFluidLevel(x, z) - 1) * prismaticCenterDepth(x, z)),
              if(distanceToPrismaticRim(x, z) < -0.5, 1, -1)
            ),
            -1)
        variables:
          base: $customization.yml:terrain-base-y-level
          scale: $customization.yml:terrain-height

structures:
  distribution:
    type: CONSTANT
  structures: magma_smoke