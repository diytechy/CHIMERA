id: EQ_MURKY_MARSHLANDS
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  height: 18

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      -y + base + BiomeShapeSealevelElevation(x,z) + (1.1 + height * cells(x,z)) * biomeInfluence(x,z)
    samplers:
      cells:
        dimensions: 2
        type: CELLULAR
        frequency: 0.06
        jitter: 0.9
        return: NoiseLookup
        lookup:
          type: FBM
          sampler:
            type: OPEN_SIMPLEX_2S
            frequency: 0.01
          octaves: 2
          lacunarity: 2
          gain: 0.5
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
