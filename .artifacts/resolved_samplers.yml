      continentalRiseRate: 30
    samplers:
      terraceScale:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.002
        salt: 1926.0
      terraceDepth:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 5812.0
      terraceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.001
          salt: 8512.0
      detail:
        dimensions: 2
        type: FBM
        octaves: 4
        lacunarity: 2
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.008
          salt: 5912.0
    functions:
      terrace:
        arguments:
        - i
        - sc
        - o
        - g
        - d
        - tz
        - tf
        expression: terraceParalinear(i,sc,o,g,lerp(i,tz,0,tf,d))
        functions:
          terrace:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
                expression: x - floor(x/i) * i
              profile:
                arguments:
                - x
                expression: '|x - 0.5| - 0.5'
          terraceStrata:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
                expression: x - floor(x/i) * i
              profile:
                arguments:
                - x
                expression: -if(x>0.95,-(x-1)/0.05,x/0.95)
          terraceParabolic:
            arguments:
            - i
            - sc
            - o
            - g
            - d
            expression: d * sc * profile(clamp(floorMod(i/sc-o, 1+g))) + i
            functions:
              clamp:
                arguments:
                - x
                expression: if(0 <= x && x < 1, x, 0)
              floorMod:
                arguments:
                - x
                - i
