id: BLACK_DESERT_BOG
type: BIOME
extends:
  - EQ_BARRIER_BOG
  #- EQ_FLAT_BUMPY
  - CARVING_OCEAN
  - BASE
color: $biomes/colors.yml:BLACK_SAND_BEACH

colors:
  fog: 0xc0d8ff
  water: 0x000000
  water-fog: 0x157CAB
  sky: 0x78a7ff
  grass: 0x888888
  foliage: 0xAA4444

climate:
  precipitation: false
  temperature: 0.8

vanilla: minecraft:dripstone_caves

# Replace Terra's default sub-sealevel water with lava, but only inside the bog
# basin (biomeInfluence > 0.5). The fluid fills from sea level down to the terrain
# floor; outside the lip the fluid surface is dropped to the world floor so no
# liquid (water or lava) is ever placed.
ocean:
  level: $meta.yml:ocean-level
  palette: BLOCK:minecraft:lava
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
      nofill: $meta.yml:bottom-y
    expression: |
      if(biomeInfluence(x, z) > 0.75, olevel, nofill)

tags:
  - LOW_CAVES
  - SPECIAL_CAVES
  - USE_BLACK_RIVER

palette:
  - BLACK_DESERT: $meta.yml:top-y
  # - BLACKSTONE: $meta.yml:ocean-level
  - BLOCK:minecraft:black_terracotta: ${meta.yml:ocean-level} - 1
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.4
    palette:
      - BLACK_DESERT: $meta.yml:top-y
      # - BLACKSTONE: $meta.yml:ocean-level
      - BLOCK:minecraft:black_terracotta: ${meta.yml:ocean-level} - 1
      - << meta.yml:palette-bottom


features:
  landforms:
    - FOSSIL_RIBS
  flora:
    - OAK_BUSHES_SPARSE
    - FERNS_SPARSE
  trees:
    - PALM_TREES_SPARSE
  structures:
    - MOB_ROOMS
    - SPARSE_FOSSILS
  postprocessors:
    - BOG_SMOKE
    #- OAK_BUSHES
    #- SPARSE_OAK_TREES
    #- MESQUITE_TREES
    #- DEAD_TREES_SPARSE
    #- SPARSE_FALLEN_OAK_TREES
    #- SPARSE_FALLEN_NORMAL_DARK_OAK_TREES