id: EQ_PRISMATIC_SPRING
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  scale: $customization.yml:terrain-height
  "<<":
    - math/samplers/spots.yml:variables

ocean:
  level: $meta.yml:ocean-level
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
      base: $customization.yml:terrain-base-y-level
      scale: $customization.yml:terrain-height
    # Fluid spans crater bottom (spotFluidPercent=0) to rim (spotFluidPercent=1).
    # Uses spotFluidPercent — fully decoupled from spotSizePercent and spotHeightPercent.
    expression: |
      if(distanceToPrismaticRim(x, z) < 0,
        base + scale * (spotBaseElevation(x, z) + (spotFluidPercent(x, z) - 1) * prismaticCenterDepth(x, z)),
        olevel)

terrain:
  sampler-2d:
    dimensions: 2
    type: CONSTANT
  sampler:
    type: EXPRESSION
    expression: |
      -y + base + herp(distanceToPrismaticRim(x, z),0,sampler2d(x,z),
      1,elevationDetailedBlockHeight(x,z))
    variables: *variables
    samplers:
      sampler2d:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: |
          scale * (calcHeight(x, z,
            /*distance*/      spotDistance(x, z),
            /*erosion*/       (volcanoErosion(x, z)+1)/2,
            /*outsideHeight*/ 0,
            /*edge*/          prismaticEdgeRadius(x, z),
            /*radius*/        spotRadius(x, z),
            /*centerDepth*/   prismaticCenterDepth(x, z),
            /*volcanoHeight*/ lerp((spotSizePercent(x, z) * 0.6 + spotHeightPercent(x, z) * 0.4) * (1 - spotEdgeRadiusPercent(x, z)),
                                0, prismaticMinHeight,
                                1, prismaticMaxHeight
                              ),
            /*volcanoBase*/   0)
           + spotBaseElevation(x, z))
        functions:
          calcHeight:
            arguments:
              - x
              - z
              - distance
              - erosion
              - outsideHeight
              - edge
              - radius
              - centerDepth
              - volcanoHeight
              - volcanoBase
            expression: |
              parabolicMap(distance,
                radius, outsideHeight,
                radius * edge,
                  volcanoBase + volcanoHeight * (1 - erosion * lerp(distance, radius, 1, radius * edge, 0))
                  - parabolicMap(distance,
                    radius * edge / 3, centerDepth,
                    radius * edge, 0
                  )
              )
            functions: $math/functions/interpolation.yml:functions
