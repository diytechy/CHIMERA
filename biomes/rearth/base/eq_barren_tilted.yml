id: EQ_BARREN_TILTED
type: BIOME
abstract: true

vars: &variables
  base: 85
  height: 14
  tiltStrength: 0.028
  cellHeightVariation: 16
  mountainHeight: 30

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      // positive / higher = solid
        -y + base + elevationDetailedBlockHeight(x,z)
        + (cellLean(x,z) * height * remapCellRange(cells(x,z)) + cells(x,z) * cellHeightVariation
        + surfaceBase(x,z) * mountainHeight) * biomeInfluence(x,z)
    functions:
      remapCellRange:
        arguments: [x]
        expression: if(abs(x) < 0.4, 1, x)
      rotate:
        arguments: [x, y, rad]
        expression: x * cos(rad) - y * sin(rad)
    samplers:
      cells:
        dimensions: 2
        type: CELLULAR
        frequency: 0.028
        return: CellValue
      surfaceBase:
        dimensions: 2
        type: CELLULAR
        frequency: 0.028
        return: NoiseLookup
        lookup:
          dimensions: 2
          type: OPEN_SIMPLEX_2S
          frequency: 0.003
      cellLean:
        dimensions: 2
        type: CELLULAR
        frequency: 0.028
        return: LocalNoiseLookup
        lookup:
          type: EXPRESSION
          variables: *variables
          dimensions: 2
          expression: |
            x * tiltStrength + z * tiltStrength * 0.7
          samplers:
            variation:
              dimensions: 2
              type: OPEN_SIMPLEX_2S
              frequency: 0.06
