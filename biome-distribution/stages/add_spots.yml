stages:
  - type: REPLACE
    from: ALL
    to:
      - SELF: 2
      - spot: 1
    sampler:
      type: EXPRESSION
      expression: if(spotDistance(x, z) < spotRadius(x, z) + biomeBorder, 1, -1)
      variables: $math/samplers/spots.yml:variables


  - type: REPLACE
    from: spot
    to:
      - extinct-volcano: 7
      - crater-lake: 5
      - live-volcano: 4
      - PRISMATIC_SPRING: 1
      - mesa: 2
    sampler:
      dimensions: 2
      type: DOMAIN_WARP
      amplitude: 20 
      warp:
        type: SIMPLEX
        frequency: 0.02
      sampler:
        type: EXPRESSION
        expression: spotSizePercent(x, z)*2-1

  - type: BORDER
    from: live-volcano
    replace: ocean
    to:
      - ocean: 1
      - volcano-coast: 1
    sampler:
      type: EXPRESSION
      expression: if(spotDistance(x, z) < spotRadius(x, z) + biomeBorder + 35, 1, -1)
      variables: $math/samplers/spots.yml:variables