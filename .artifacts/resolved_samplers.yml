type: EXPRESSION
expression: y
samplers:
  continents:
    dimensions: 2
    type: EXPRESSION
    expression: |
      max(
        max(
          -sampler(x / scale / globalScale, z / scale / globalScale) * spread + offset,
          spawnIsland(x, z)
        ),
        // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
        // and decrease quadratically moving further outwards
        spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2))
    variables:
      globalScale: 1
      scale: 2
      offset: 0.1
      spread: 1
      spotContinentalFactor: 0.3
    samplers:
      spawnIsland: &id002
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 150
        warp:
          type: FBM
          octaves: 2
          sampler:
            type: TRANSLATE
            x: 5000
            z: -5000
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.004
        sampler:
          type: EXPRESSION_NORMALIZER
          expression: |
            if(in < middleRadius/outerRadius,
              herp        (in, innerRadius/outerRadius,  1, middleRadius/outerRadius, 0),
              parabolicMap(in, middleRadius/outerRadius, 0, 1,                       -1))
          variables:
            innerRadius: 20
            middleRadius: 125
            outerRadius: 400
          functions: &id001
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
            lerp3:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              - ct
              - c
              expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
              functions:
                lerp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                      if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                    )
            herp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                  if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                )
              functions:
                hermite:
                  arguments:
                  - x
                  expression: 3*x^2-2*x^3
            parabolicMap:
              arguments:
              - t
              - bt
              - b
              - at
              - a
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                  if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                )
              functions:
                interpolation:
                  arguments:
                  - x
                  expression: x^2
          sampler:
            type: PROBABILITY
            sampler:
              type: DISTANCE
              point:
                x: 0
                z: 0
              normalize: true
              radius: 400
      spotDistance: &id003
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 7
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.015
        sampler:
          type: EXPRESSION
          expression: (noise(x, z)+1)*spread
          variables:
            spread: 1500
            largeSpawnRadiusOffset: 2000
            biomeBorder: 15
            largeBiomeBorder: 100
            minRadius: 50
            maxRadius: 150
            minHeight: 0.05
            maxHeight: 0.5
            spotMinEdgeRadius: 0.1
            spotMaxEdgeRadius: 0.5
            largeMinRadius: 500
            largeMaxRadius: 1500
            volcanoMinCenterDepth: 0.01
            volcanoMaxCenterDepth: 0.3
            prismaticMinCenterDepth: 0.01
            prismaticMaxCenterDepth: 0.15
          samplers:
            noise:
              dimensions: 2
              type: CELLULAR
              frequency: 1 / 1500
              salt: 3
              jitter: 1-2*(150/1500)
              distance: Euclidean
      spotRadius: &id004
        dimensions: 2
        type: EXPRESSION
        expression: lerp(spotSizePercent(x, z), 0, minRadius, 1, maxRadius)
        functions: *id001
        variables:
          spread: 1500
          largeSpawnRadiusOffset: 2000
          biomeBorder: 15
          largeBiomeBorder: 100
          minRadius: 50
          maxRadius: 150
          minHeight: 0.05
          maxHeight: 0.5
          spotMinEdgeRadius: 0.1
          spotMaxEdgeRadius: 0.5
          largeMinRadius: 500
          largeMaxRadius: 1500
          volcanoMinCenterDepth: 0.01
          volcanoMaxCenterDepth: 0.3
          prismaticMinCenterDepth: 0.01
          prismaticMaxCenterDepth: 0.15
        samplers:
          spotSizePercent: &id007
            dimensions: 2
            type: PROBABILITY
            sampler:
              dimensions: 2
              type: CELLULAR
              frequency: 1 / 1500
              salt: 3
              jitter: 1-2*(150/1500)
              return: CellValue
      sampler:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: RIDGED
          lacunarity: 3
          gain: 0.35
          octaves: 3
          sampler:
            type: OPEN_SIMPLEX_2
            salt: 1
            frequency: 1 / 5000
  continentBorder:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(inRange(continents(x, z), -threshold, threshold),
        if(continentsEdge((x-width)/width, (z-width)/width) != 0, 1, -1),
        -1
      )
    variables:
      width: 55 * 1
      threshold: 55
    functions:
      inRange:
        arguments:
        - x
        - lower
        - upper
        expression: x >= lower && x <= upper
    samplers:
      continents:
        dimensions: 2
        type: EXPRESSION
        expression: |
          max(
            max(
              -sampler(x / scale / globalScale, z / scale / globalScale) * spread + offset,
              spawnIsland(x, z)
            ),
            // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
            // and decrease quadratically moving further outwards
            spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2))
        variables:
          globalScale: 1
          scale: 2
          offset: 0.1
          spread: 1
          spotContinentalFactor: 0.3
        samplers:
          spawnIsland: *id002
          spotDistance: *id003
          spotRadius: *id004
          sampler:
            dimensions: 2
            type: TRANSLATE
            x: 10000
            z: 10000
            sampler:
              type: RIDGED
              lacunarity: 3
              gain: 0.35
              octaves: 3
              sampler:
                type: OPEN_SIMPLEX_2
                salt: 1
                frequency: 1 / 5000
      continentsEdge:
        dimensions: 2
        type: KERNEL
        kernel:
        - - 0
          - 1
          - 0
        - - 1
          - -4
          - 1
        - - 0
          - 1
          - 0
        sampler:
          type: EXPRESSION
          expression: continents(x*width, z*width) > 0
          variables:
            width: 55 * 1
            threshold: 55
          samplers:
            continents:
              dimensions: 2
              type: EXPRESSION
              expression: |
                max(
                  max(
                    -sampler(x / scale / globalScale, z / scale / globalScale) * spread + offset,
                    spawnIsland(x, z)
                  ),
                  // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
                  // and decrease quadratically moving further outwards
                  spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2))
              variables:
                globalScale: 1
                scale: 2
                offset: 0.1
                spread: 1
                spotContinentalFactor: 0.3
              samplers:
                spawnIsland: *id002
                spotDistance: *id003
                spotRadius: *id004
                sampler:
                  dimensions: 2
                  type: TRANSLATE
                  x: 10000
                  z: 10000
                  sampler:
                    type: RIDGED
                    lacunarity: 3
                    gain: 0.35
                    octaves: 3
                    sampler:
                      type: OPEN_SIMPLEX_2
                      salt: 1
                      frequency: 1 / 5000
  rawFlatness:
    dimensions: 2
    type: EXPRESSION
    expression: noise(x / scale / globalScale, z / scale / globalScale)
    variables:
      globalScale: 1
      scale: 1.05
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: PROBABILITY
          sampler:
            type: FBM
            gain: 0.3
            lacunarity: 2.3
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 1 / 1000
  flatness:
    dimensions: 2
    type: EXPRESSION
    expression: herp(rawFlatness(x, z), threshold, factor, threshold + blend, 0)
    functions: *id001
    variables:
      threshold: 0.26
      blend: 0.35
      factor: 0.95
    samplers:
      rawFlatness:
        dimensions: 2
        type: EXPRESSION
        expression: noise(x / scale / globalScale, z / scale / globalScale)
        variables:
          globalScale: 1
          scale: 1.05
        samplers:
          noise:
            dimensions: 2
            type: TRANSLATE
            x: 10000
            z: 10000
            sampler:
              type: PROBABILITY
              sampler:
                type: FBM
                gain: 0.3
                lacunarity: 2.3
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 1 / 1000
  rawElevation:
    dimensions: 2
    type: EXPRESSION
    expression: noise(x / scale / globalScale, z / scale / globalScale) * multiplier + offset
    variables:
      globalScale: 1
      scale: 1.05
      multiplier: 1
      offset: 0
    samplers:
      noise:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: EXPRESSION
          expression: |
            combine(
              hills(x, z) * hillMaxElevation,
              parabolicMap(mountainMask(x, z), mountainZero, 0, mountainFull, mountains(x, z)),
              mountainCap)
          variables:
            mountainZero: 0.3
            mountainFull: 0.6
            hillMaxElevation: 0.3
            mountainCap: 0.9
          functions:
            lerp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
            lerp3:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              - ct
              - c
              expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
              functions:
                lerp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                      if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                    )
            herp:
              arguments:
              - t
              - at
              - a
              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                  if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                )
              functions:
                hermite:
                  arguments:
                  - x
                  expression: 3*x^2-2*x^3
            parabolicMap:
              arguments:
              - t
              - bt
              - b
              - at
              - a
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                  if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                )
              functions:
                interpolation:
                  arguments:
                  - x
                  expression: x^2
            combine:
              arguments:
              - hills
              - mountains
              - mountainCap
              expression: hills + mountains * min(1 - hills, mountainCap)
          samplers:
            mountainMask:
              dimensions: 2
              type: PROBABILITY
              sampler:
                type: OPEN_SIMPLEX_2
                salt: 0694
                frequency: 1 / 1500
            mountains:
              dimensions: 2
              type: EXPRESSION_NORMALIZER
              expression: ((-in+1)/2)^2
              sampler:
                type: PSEUDOEROSION
                erosion-frequency: 0.01
                lacunarity: 1.5
                branch-strength: 1
                octaves: 3
                strength: 0.15
                gain: 0.3
                sampler:
                  type: FBM
                  octaves: 3
                  sampler:
                    type: OPEN_SIMPLEX_2
                    frequency: 1 / 900
            hills:
              dimensions: 2
              type: EXPRESSION_NORMALIZER
              expression: ((in+1)/2)^2
              sampler:
                type: FBM
                octaves: 6
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 1 / 2000
  elevation:
    dimensions: 2
    type: EXPRESSION
    expression: |
      rawElevation(x, z) * (1-flatness(x, z))
      * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
      * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
      * if(factorRiver, (1-riverTerrainErosion(x, z)), 1)
    functions: *id001
    variables:
      continentZero: -0.3
      continentFull: 0.35
      factorContinental: 1
      factorRiver: 1
      factorSpawnIsland: 1
      spawnIslandScale: 0.2
    samplers:
      rawElevation:
        dimensions: 2
        type: EXPRESSION
        expression: noise(x / scale / globalScale, z / scale / globalScale) * multiplier + offset
        variables:
          globalScale: 1
          scale: 1.05
          multiplier: 1
          offset: 0
        samplers:
          noise:
            dimensions: 2
            type: TRANSLATE
            x: 10000
            z: 10000
            sampler:
              type: EXPRESSION
              expression: |
                combine(
                  hills(x, z) * hillMaxElevation,
                  parabolicMap(mountainMask(x, z), mountainZero, 0, mountainFull, mountains(x, z)),
                  mountainCap)
              variables:
                mountainZero: 0.3
                mountainFull: 0.6
                hillMaxElevation: 0.3
                mountainCap: 0.9
              functions:
                lerp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                      if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                    )
                lerp3:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  - ct
                  - c
                  expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
                  functions:
                    lerp:
                      arguments:
                      - t
                      - at
                      - a
                      - bt
                      - b
                      expression: |
                        if(at<bt,
                          if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                          if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                        )
                herp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                      if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                    )
                  functions:
                    hermite:
                      arguments:
                      - x
                      expression: 3*x^2-2*x^3
                parabolicMap:
                  arguments:
                  - t
                  - bt
                  - b
                  - at
                  - a
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                      if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                    )
                  functions:
                    interpolation:
                      arguments:
                      - x
                      expression: x^2
                combine:
                  arguments:
                  - hills
                  - mountains
                  - mountainCap
                  expression: hills + mountains * min(1 - hills, mountainCap)
              samplers:
                mountainMask:
                  dimensions: 2
                  type: PROBABILITY
                  sampler:
                    type: OPEN_SIMPLEX_2
                    salt: 0694
                    frequency: 1 / 1500
                mountains:
                  dimensions: 2
                  type: EXPRESSION_NORMALIZER
                  expression: ((-in+1)/2)^2
                  sampler:
                    type: PSEUDOEROSION
                    erosion-frequency: 0.01
                    lacunarity: 1.5
                    branch-strength: 1
                    octaves: 3
                    strength: 0.15
                    gain: 0.3
                    sampler:
                      type: FBM
                      octaves: 3
                      sampler:
                        type: OPEN_SIMPLEX_2
                        frequency: 1 / 900
                hills:
                  dimensions: 2
                  type: EXPRESSION_NORMALIZER
                  expression: ((in+1)/2)^2
                  sampler:
                    type: FBM
                    octaves: 6
                    sampler:
                      type: OPEN_SIMPLEX_2
                      frequency: 1 / 2000
      flatness:
        dimensions: 2
        type: EXPRESSION
        expression: herp(rawFlatness(x, z), threshold, factor, threshold + blend, 0)
        functions: *id001
        variables:
          threshold: 0.26
          blend: 0.35
          factor: 0.95
        samplers:
          rawFlatness:
            dimensions: 2
            type: EXPRESSION
            expression: noise(x / scale / globalScale, z / scale / globalScale)
            variables:
              globalScale: 1
              scale: 1.05
            samplers:
              noise:
                dimensions: 2
                type: TRANSLATE
                x: 10000
                z: 10000
                sampler:
                  type: PROBABILITY
                  sampler:
                    type: FBM
                    gain: 0.3
                    lacunarity: 2.3
                    sampler:
                      type: OPEN_SIMPLEX_2
                      frequency: 1 / 1000
      continents: &id005
        dimensions: 2
        type: EXPRESSION
        expression: |
          max(
            max(
              -sampler(x / scale / globalScale, z / scale / globalScale) * spread + offset,
              spawnIsland(x, z)
            ),
            // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
            // and decrease quadratically moving further outwards
            spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2))
        variables:
          globalScale: 1
          scale: 2
          offset: 0.1
          spread: 1
          spotContinentalFactor: 0.3
        samplers:
          spawnIsland: *id002
          spotDistance: *id003
          spotRadius: *id004
          sampler:
            dimensions: 2
            type: TRANSLATE
            x: 10000
            z: 10000
            sampler:
              type: RIDGED
              lacunarity: 3
              gain: 0.35
              octaves: 3
              sampler:
                type: OPEN_SIMPLEX_2
                salt: 1
                frequency: 1 / 5000
      spawnIsland: *id002
      riverTerrainErosion: &id006
        dimensions: 2
        type: EXPRESSION
        expression: "herp(riverDistance(x, z) + herp(erosionStrength(x, z), 0.6, erosionMaxDistance, 0.4, 0),\n  0, erosionMax,\n\
          \  erosionMaxDistance, erosionMin\n) \n"
        variables:
          notRiverValue: 2
          borderValue: 1
          riverValue: 0
          riverFrequency: 1 / 40 / 1 / 1
          riverThreshold: 0.3
          riverMinWidth: 11 * 1
          riverMaxWidth: 20 * 1
          erosionMaxDistance: 0.3
          erosionMax: 0.95
          erosionMin: 0
        functions: *id001
        samplers:
          riverDistance:
            dimensions: 2
            type: EXPRESSION
            expression: '|riverNoise(x*riverFrequency, z*riverFrequency)|'
            variables:
              notRiverValue: 2
              borderValue: 1
              riverValue: 0
              riverFrequency: 1 / 40 / 1 / 1
              riverThreshold: 0.3
              riverMinWidth: 11 * 1
              riverMaxWidth: 20 * 1
              erosionMaxDistance: 0.3
              erosionMax: 0.95
              erosionMin: 0
            samplers:
              riverNoise:
                dimensions: 2
                type: TRANSLATE
                x: 10000
                z: 10000
                sampler:
                  type: DOMAIN_WARP
                  amplitude: 3
                  warp:
                    type: OPEN_SIMPLEX_2
                    frequency: 0.1
                  sampler:
                    type: OPEN_SIMPLEX_2
          erosionStrength:
            dimensions: 2
            type: PROBABILITY
            sampler:
              type: FBM
              octaves: 2
              sampler:
                type: OPEN_SIMPLEX_2
                frequency: 1 / 1000
                salt: 2175
  elevationDetailed:
    dimensions: 2
    type: EXPRESSION
    expression: |
      terrace(
        combine(
          elevation(x, z),
          detailStart, 0,
          detailEnd, detail(x, z) * detailFactor
        ),
        terraceBaseScale + terraceScale(x, z) * terraceScaleVariation,
        terraceOffset(x, z) * terraceOffsetVariation,
        0,
        (terraceDepth(x, z)^3) * terraceDepthVariation,
        0, terraceDepthStart
      )
    variables:
      detailFactor: 0.1
      detailStart: 0
      detailEnd: 0.5
      terraceBaseScale: 0.2
      terraceScaleVariation: 0.1
      terraceOffsetVariation: 0.25
      terraceDepthVariation: 1
      terraceDepthStart: 0.1
    samplers:
      elevation:
        dimensions: 2
        type: DOMAIN_WARP
        sampler:
          dimensions: 2
          type: EXPRESSION
          expression: |
            rawElevation(x, z) * (1-flatness(x, z))
            * if(factorContinental, herp(continents(x, z), continentZero, 0, continentFull, 1), 1)
            * if(factorSpawnIsland, herp(spawnIsland(x, z), 0, spawnIslandScale, -1, 1), 1)
            * if(factorRiver, (1-riverTerrainErosion(x, z)), 1)
          functions: *id001
          variables:
            continentZero: -0.3
            continentFull: 0.35
            factorContinental: 1
            factorRiver: 1
            factorSpawnIsland: 1
            spawnIslandScale: 0.2
          samplers:
            rawElevation:
              dimensions: 2
              type: EXPRESSION
              expression: noise(x / scale / globalScale, z / scale / globalScale) * multiplier + offset
              variables:
                globalScale: 1
                scale: 1.05
                multiplier: 1
                offset: 0
              samplers:
                noise:
                  dimensions: 2
                  type: TRANSLATE
                  x: 10000
                  z: 10000
                  sampler:
                    type: EXPRESSION
                    expression: |
                      combine(
                        hills(x, z) * hillMaxElevation,
                        parabolicMap(mountainMask(x, z), mountainZero, 0, mountainFull, mountains(x, z)),
                        mountainCap)
                    variables:
                      mountainZero: 0.3
                      mountainFull: 0.6
                      hillMaxElevation: 0.3
                      mountainCap: 0.9
                    functions:
                      lerp:
                        arguments:
                        - t
                        - at
                        - a
                        - bt
                        - b
                        expression: |
                          if(at<bt,
                            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                          )
                      lerp3:
                        arguments:
                        - t
                        - at
                        - a
                        - bt
                        - b
                        - ct
                        - c
                        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
                        functions:
                          lerp:
                            arguments:
                            - t
                            - at
                            - a
                            - bt
                            - b
