vars: &variables
  max_lower_limit: ${meta.yml:ocean-level} - 13
  base: ${customization.yml:terrain-base-y-level}
  scale: $customization.yml:terrain-height

# If inside cave percentages-temp threshold, prescribe to inner biome dist.
#Else if just inside temp threshold, prescribe to edge biome dist or random inner dist based on randomizer.
#Else outside all, set to self.
extrusions:
  - type: REPLACE
    from: LAVA_TUBES
    sampler:
      type: EXPRESSION
      variables: *variables
      #If beneath the spot, set to lava tubes.
      expression: if(y<(base+scale * spotBaseElevation(x, z)),-1,1)
    to:
      - LAVA_TUBES: 1
      - SELF: 1
    range:
      min: ${meta.yml:bottom-y}+1
      max: ${meta.yml:cave-top}

  - type: REPLACE
    from: PRISMATIC_SPRING
    sampler:
      type: EXPRESSION
      variables: *variables
      #If beneath the spot, set to sulfur caves.
      expression: if(y<(base+scale * spotBaseElevation(x, z)-16),-1,1)
    to:
      - SULFUR_CAVES: 1
      - SELF: 1
    range:
      min: ${meta.yml:bottom-y}+1
      max: ${meta.yml:cave-top}
      
      
    # Replace from low land spots (rifts / sinkholes)
  - type: REPLACE
    range:
      min: $meta.yml:cave-bottom
      max: ${customization.yml:biomeSpread.canyons.minY} - 20
    sampler:
      type: EXPRESSION
      variables: *variables
      #If above the distribution threshold, set it to an actual biome, else keep current self.
      #Actual distribution weight must match selected threshold.
      #Default case is >0, which puts half of the samples below 0.
      expression: BiomeShapeOceanTemperature(x,z)
    from: LOW_CAVES
    to:
      - COLD_CAVES: 1
      - STANDARD_CAVES: 1
      - WARM_CAVES: 1
      
  - type: REPLACE
    range:
      min: $meta.yml:cave-bottom
      max: ${meta.yml:cave-top}
    sampler:
      type: EXPRESSION
      variables: *variables
      #If above the distribution threshold, set it to an actual biome, else keep current self.
      #Actual distribution weight must match selected threshold.
      #Default case is >0, which puts half of the samples below 0.
      expression: |
        if(y>max(max_lower_limit,base+BiomeShapeMinimumElevation(x,z)-20),-1,
        (BiomeShapeOceanTemperature(x,z)+1)/2)
    # Below the weight of SELF must match the weight of all other caves + 1.
    # This way caves start at a distributor values >0, aligning with
    # the distribution function above.
    from: LAND_CAVES
    to:
      - SELF: 3
      - COLD_CAVES: 1
      - STANDARD_CAVES: 1
      - WARM_CAVES: 1
      
  - type: REPLACE
    range:
      min: $meta.yml:cave-bottom
      max: ${meta.yml:cave-top}
    sampler:
      type: EXPRESSION
      variables: 
       base: $customization.yml:terrain-ocean-base-y-level
       scale: $customization.yml:terrain-ocean-depth
       max_lower_limit: ${meta.yml:cave-bottom} + 1
      expression: |
        if(y>max(max_lower_limit,base+oceanElevation(x, z)*scale-20),-1,
        (BiomeShapeOceanTemperature(x,z)+1)/2)
    # Below the weight of SELF must match the weight of all other caves + 1.
    # This way caves start at a distributor values >0, aligning with
    # the distribution function above.
    from: OCEAN_CAVES
    to:
      - SELF: 3
      - COLD_CAVES: 1
      - STANDARD_CAVES: 1
      - WARM_CAVES: 1

      
  - type: REPLACE
    from: COLD_CAVES
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: WhiteNoiseRandomizer(BiomeShapeOceanValue(x,z)*1000,0)
    range:
      min: $meta.yml:cave-bottom
      max: ${meta.yml:cave-top}
    to:
      - ICE_CAVES: 3
      - ICE_MUSHROOM_CAVES: 1
      - FROSTED_CAVERNS: 2
      - FROZEN_CAVERNS: 1
      - STANDARD_CAVES: 13
      

  - type: REPLACE
    from: WARM_CAVES
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: WhiteNoiseRandomizer(BiomeShapeOceanValue(x,z)*1000,0)
    range:
      min: $meta.yml:cave-bottom
      max: ${meta.yml:cave-top}
    to:
      - MAGMA_CAVERNS: 2
      - BASALT_CAVERNS: 2
      - MOLTEN_PASSAGES: 2
      - SULFUR_CAVES: 1
      - STANDARD_CAVES: 16
  
  
  # Within standard caves, perform smaller cave distribution before larger sections.
  - type: REPLACE
    from: STANDARD_CAVES
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: |
        BiomeShapeSmallCaveSpecialValue(x,z)
    range:
      min: $meta.yml:cave-bottom
      max: ${meta.yml:cave-top}
    #NOTE: Sums below of non-self biomes must equal the weight of SELF.
    to:
      - SELF: 2
      - SPIDER_CAVES: 1
      - SULFUR_CAVES: 1

  - type: REPLACE
    from: STANDARD_CAVES
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: WhiteNoiseRandomizer(BiomeShapeOceanValue(x,z)*1000,0)
    range:
      min: $meta.yml:cave-bottom
      max: ${meta.yml:cave-top}
    to:
      - ANCIENT_CAVES: 2
      - RESIN_ROOTS: 3
      - MUSHROOM_CAVES: 3
      - BASALT_CAVERNS: 2
      - STONE_CAVERNS: 3 #stone caverns: 5    
      - ANDESITE_CAVERNS: 3
      - BLACKSTONE_CAVERNS: 3
      - DIORITE_CAVERNS: 3
      - GRANITE_CAVERNS: 3
      - ARID_CAVERNS: 3 #dry caverns: 1                              12
      - BARREN_CAVERNS: 3
      - CRUMBLING_CAVERNS: 3
      - CALCITE_CAVERNS: 3 #misc caverns: 3                          36
      - CRYSTALLINE_CAVERNS: 3 
      - DRIPSTONE_CAVERNS: 3
      - SCULK_CAVERNS: 1
      - LUSH_CAVERNS: 5 #lush caverns: 2                            24
      - FUNGAL_CAVERNS: 3
      - LAVENDER_CAVERNS: 4
      - SPRUCE_CAVERNS: 3 #underground woodlands placeholder: 7     84
      - ACACIA_CAVERNS: 3
      - AUTUMNAL_CAVERNS: 2
      - BIRCH_CAVERNS: 2
      - LUSH_CAVES: 2
      #- CORAL_COVES: 1
      - DARK_OAK_CAVERNS: 2
      - ENCHANTED_CAVERNS: 2
      - JUNGLE_CAVERNS: 2
      - MANGROVE_CAVERNS: 1
      - MAPLE_CAVERNS: 2
      - OAK_CAVERNS: 3
      - SAKURA_CAVERNS: 2
      - SPRUCE_CAVERNS: 2
      - HONEY_GROTTO: 1
      - OVERGROWN_DUGOUT: 3
      - SANDY_CHAMBERS: 2
      - SUBTERRANEAN_MESA: 2
