id: ICE_SPIKES_SINKHOLE
type: FEATURE

distributor:
  type: AND
  distributors:
    - type: PADDED_GRID
      width: 6
      padding: 2
      salt: 7234
    - type: SAMPLER
      sampler:
        type: EXPRESSION
        expression: -riftWellPlacement(x,z)
      threshold: -0.2
      
locator:
  type: AND
  locators:
    - type: TOP
      range: &range
        min: $meta.yml:bottom-y
        max: $meta.yml:top-y
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SET
        blocks:
          - minecraft:air
          - minecraft:snow
        offset: 0
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SET
        blocks:
          - minecraft:snow_block
        offset: -1


structures:
  distribution:
    type: CONSTANT
  structures:
    - ice_spike: 1
  