id: COVE_GLOW_LICHEN
type: FEATURE

distributor:
  type: AND
  distributors:
    - type: SAMPLER
      sampler:
        type: POSITIVE_WHITE_NOISE
        salt: 2313
      threshold: 0.9
  

height: &range
  min: ${meta.yml:ocean-level} + 2
  max: ${meta.yml:ocean-level} + 112
  
locator:
  type: AND
  locators:
    # Random heights
    #- type: RANDOM
    #  height: &range
    #    min: ${meta.yml:ocean-level} + 2
    #    max: ${meta.yml:ocean-level} + 12
    #  amount: 1
    #  salt: 2913
    #In range
    #- type: SAMPLER
    #  samplers:
    #    type: EXPRESSION
    #    expression: glowLichenRange(x,y,z)
    #  threshold: 0.1
    # Require either air or water
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_AIR
        offset: 0
    # Require an adjacent solid block
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: 1

structures:
  distribution:
    type: CONSTANT
  structures: glow_lichen