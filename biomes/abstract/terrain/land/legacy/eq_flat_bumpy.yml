id: EQ_FLAT_BUMPY
type: BIOME
abstract: true


# Perfectly flat terrain.

vars: &variables
  base: $customization.yml:terrain-base-y-level

terrain:
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables: *variables
    expression: -y + base + elevationDetailedBlockHeight(x,z) + (simplex(x*20, z*20)+1) * biomeInfluence(x,z)

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
