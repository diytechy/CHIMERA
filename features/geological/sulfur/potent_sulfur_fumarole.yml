id: POTENT_SULFUR_FUMAROLE
type: FEATURE

# Active fumaroles for erupted volcanoes. Biased onto the cone/rim
# (distanceToVolcanicRim < 0.4: negative inside the crater, ~0 at the rim) and made
# sparse by a white-noise mask.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    # SAMPLER places where value < threshold: in-band -> rarity; out-of-band -> 1 (never).
    expression: if(distanceToVolcanicRim(x, z) < 0.4, rarity(x, z), 1)
    samplers:
      distanceToVolcanicRim: $math/samplers/spots.yml:samplers.distanceToVolcanicRim
      rarity:
        dimensions: 2
        type: POSITIVE_WHITE_NOISE
        salt: 55121
  threshold: 0.05

locator:
  type: AND
  locators:
    - type: SURFACE
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: 0
          - type: MATCH_AIR
            offset: 1

structures:
  distribution:
    type: CONSTANT
  structures: potent_sulfur_erupting
