variables: &variables
  notRiverValue: 2 # Value the sampler outputs for areas where there is not a river.
  borderValue: 1 # Value the sampler outputs for areas bordering rivers.
  riverValue: 0 # Value the sampler outputs where there should be a river.
  riverFrequency: 1 / 40 / ${customization.yml:river-spread-scale} / ${customization.yml:global-scale}
  riverThreshold: 0.3 # Determines the area calculated as river, which also determines how far away river borders will be.
  riverMinWidth: ${customization.yml:river-min-width} * ${customization.yml:global-scale} # Determines the minimum width of rivers within riverThreshold.
  riverMaxWidth: ${customization.yml:river-max-width} * ${customization.yml:global-scale} # Determines the maximum width of rivers within riverThreshold.

  erosionMaxDistance: 0.3
  erosionMax: 0.95
  erosionMin: 0

samplers:
  riverBiomeMap:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(continentalRiverDist(x,z)<0,
        riverValue,
        if(continentalRiverDist(x,z)>=1,
          notRiverValue,
          borderValue
        )
      )
    variables: *variables
    functions: $math/functions/interpolation.yml:functions
    samplers:
      continentalRiverDist: $math/samplers/rivers.yml:samplers.continentalRiverDist

  # Assumes sampled with 4 values, quartiles, so return end condition and upper quartile, so borders are considered upper limit when evaluated as two.
  riverSampler:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(continentalRiverDist(x,z)>=1,
        -1,
        if(continentalRiverDist(x,z)<=0,
          1,
          -0.25
        )
      )
    variables: *variables
    samplers:
      continentalRiverDist: $math/samplers/rivers.yml:samplers.continentalRiverDist

############# DENDRY BASED RIVER IMPLIMENTATION BELOW ##############

  continentalRiverWidth:
    dimensions: 2
    type: EXPRESSION
    expression: |
      ((maximum_continental_river_width + minimum_continental_river_width) / 2) + 
      (perlin(x, z) * (maximum_continental_river_width - minimum_continental_river_width)/2)
    variables:
      minimum_continental_river_width: $customization.yml:minimum-continental-river-width
      maximum_continental_river_width: $customization.yml:maximum-continental-river-width
    samplers:
      perlin:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 1 / ${customization.yml:continental-river-width-period}

  riverBoundaryDistance:
    dimensions: 2
    type: EXPRESSION
    expression: |
      river_nominal_boundary + (perlin(x, z) * river_boundary_variance_magnitude)
    variables:
      river_nominal_boundary: $customization.yml:river-nominal-boundary
      river_boundary_variance_magnitude: $customization.yml:river-boundary-variance-magnitude
    samplers:
      perlin:
        dimensions: 2
        type: PERLIN
        frequency: 1 / ${customization.yml:river-boundary-variance-period}
        
  RiverBranchingProbability:
    dimensions: 2
    type: EXPRESSION
    expression: if((continents(x, z)<=0.0||mesaPresent(x, z)>0.0||precipitation(x, z)<0.25), 0,  rawPrecipitation(x, z)*1.5)
    samplers:
      rawPrecipitation: $math/samplers/precipitation.yml:samplers.rawPrecipitation
      mesaPresent: $math/samplers/elevation.yml:samplers.mesaPresent
      continents: $math/samplers/continents.yml:samplers.continents
      precipitation: $math/samplers/precipitation.yml:samplers.precipitation

  continentalDendryRivers:
    dimensions: 3
    type: DENDRY
    sampler: 
      dimensions: 2
      type: EXPRESSION
      expression: if(continents(x,z)>0.0, elevationTerraced(x,z), 0.0)
      samplers:
        elevationTerraced: $math/samplers/elevation.yml:samplers.elevationTerraced
        continents: $math/samplers/continents.yml:samplers.continents
    riverwidth: $math/samplers/rivers.yml:samplers.continentalRiverWidth
    borderwidth: $math/samplers/rivers.yml:samplers.riverBoundaryDistance
    branches: $math/samplers/rivers.yml:samplers.RiverBranchingProbability
    default-riverwidth: 30
    default-borderwidth: 50

  continentalRiverElev:
    dimensions: 2
    type: EXPRESSION
    expression: (continentalDendryRivers(x,1.0,z) * 0.9)
    samplers:
      continentalDendryRivers: $math/samplers/rivers.yml:samplers.continentalDendryRivers

  continentalRiverDist:
    dimensions: 2
    type: EXPRESSION
    expression: continentalDendryRivers(x,0.0,z)
    samplers:
      continentalDendryRivers: $math/samplers/rivers.yml:samplers.continentalDendryRivers

  continentalRiverDistFarGrid:
    dimensions: 2
    type: EXPRESSION
    expression: continentalDendryRivers(x,-1.0,z)
    samplers:
      continentalDendryRivers: $math/samplers/rivers.yml:samplers.continentalDendryRivers