            expression: x^2
  mountain_sampler: &mountain_sampler
    dimensions: 2
    type: OPEN_SIMPLEX_2
    frequency: 0.001111111111
  mountains: &mountains
    dimensions: 2
    type: EXPRESSION_NORMALIZER
    expression: ((-in+1)/2)^2
    sampler:
      type: PSEUDOEROSION
      erosion-frequency: 0.01
      lacunarity: 1.5
      branch-strength: 1
      octaves: 3
      strength: 0.15
      gain: 0.3
      sampler:
        type: FBM
        octaves: 3
        sampler: *mountain_sampler
  AppliedMountainHeightA: &AppliedMountainHeightA
