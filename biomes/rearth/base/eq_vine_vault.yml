id: EQ_VINE_VAULT
type: BIOME
abstract: true

vars: &variables
  # y-positions of the three rock-platform bands.
  # Each level is spaced ≥20 blocks apart to avoid overlap (platform half-width = ±6).
  platformLowY:  -18   # near cave floor — where vines terminate and moss begins
  platformMidY:    5   # cave midpoint — main vine-anchor tier
  platformHighY:  25   # near ceiling — where ceiling vines originate

  act_thresh: $customization.yml:special_cave_void_activation
  #act_thresh: 12.0
  #special_cave_void_activation: ${customization.yml:special_cave_void_activation}special_cave_void_activation
  #"<<":
  #  - biomes/equations/caverns/eq_carving_land.yml:variables

terrain:
  blend:
    distance: 0     # 0 = disabled (sharp edges)
    step: 4
    weight: 1.0
  sampler:
    dimensions: 3
    type: CONSTANT
    value: 10

carving:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      max(
        -clamp(
          // special_caves returns [-1, 0]: -1 at cell center, 0 at ellipsoid boundary.
          // Its y-component uses cave_y_curve_power (default ^4), which makes the top
          // and bottom nearly flat. The ChunkInterpolator evaluates density once per
          // 4 blocks; a flat boundary produces a 4-block staircase.
          //
          // WHY special_caves (not special_caveDist) defines the hollow:
          //   special_caveDist uses a weighted blend (f_xz*dist_xz + f_y*dist_y).
          //   Off-axis, dist_xz can be large (e.g. 45 blocks) while dist_y is small
          //   (e.g. 3 blocks). The xz weight then dominates and "uses up" most of the
          //   dist=12 budget, pulling the hollow floor closer to the y-pole surface —
          //   the opposite of what an ellipsoid should do. This manifests as the floor
          //   and ceiling appearing higher (more toward centre) than expected.
          //   A special_caves threshold always produces the correct scaled inner
          //   ellipsoid regardless of direction.
          //
          // Threshold 0.16 corresponds to ~12 blocks from the xz-equatorial shell.
          //   At the y-poles the shell is thinner (~2.5 blocks) due to the ^p curvature;
          //   this is expected for an ellipsoid and keeps the floor close to cave_lower.
          //
          // Fix: warp y by a smooth 2D noise (yWarp) before evaluating special_caves.
          //   This shifts the hollow boundary to a different y per column, dissolving
          //   the flat-top staircase into organic curves. Amplitude 6 = ~3× grid step.
          (special_caves(x, y, z) - act_thresh) * 5.0

          // Wall texture: ±0.5 in expression-space ≈ ±7.5 blocks at xz equator,
          //               ±1.5 blocks at y-poles — stays within the thin pole shell.
          // Shared pack-level sampler (special_cave_carving.yml:caveWallOffset).
          + caveWallOffset(x, y, z) * 0.4

          // Platform creation with smooth falloff
          + platformShape(x, y, z)

        // Clamp matched to standard carver range [-0.54, +0.46].
        // Old ±2.5 caused void bleed at shell (~+0.98 midpoint between interior +2.5
        //   and standard-cave solid -0.54) and blocky platform edges.
        // [-0.6, +0.5]: midpoint(+0.5, -0.54) = -0.02 solid ✓; midpoint(-0.6, +0.46) = -0.07 solid ✓.
        ,-0.6, 0.5),
        //-1000
        caveCarverFade(x, y, z)
      )
    functions:
      clamp:
        arguments: [x, a, b]
        expression: min(max(x, a), b)
    samplers:
      platformShape:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          // Three rock-platform bands, each evaluated by platformAt(h, y, platVal, caveVal).
          // Samplers cannot be called inside function bodies — all sampler results are
          // evaluated here and forwarded as arguments.
          //   platVal = platforms(x,z)       — local CELLULAR sampler
          //   caveVal = special_caves(x,y,z) — pack-level ellipsoid sampler
          // max() keeps whichever tier contributes the strongest solid signal at (x,y,z).
          max(platformAt(platformLowY,  y, platforms(x, z), special_caves(x, y, z)),
          max(platformAt(platformMidY,  y, platforms(x, z), special_caves(x, y, z)),
              platformAt(platformHighY, y, platforms(x, z), special_caves(x, y, z))))
        functions:
          platformAt:
            # Solid contribution of a single platform tier centred at height h.
            # Returns 0 outside the ±6-block vertical band, otherwise:
            #   smooth vertical falloff (1 at h, 0 at h±6)
            #   × cellular platform presence (~0.75 at cell centres, ~-0.25 at edges)
            #   × wall-proximity fade (active only near the cave shell, 0 deep in void)
            #   × overall scale
            # platVal: platforms(x,z)       — pre-evaluated by outer expression (local sampler)
            # caveVal: special_caves(x,y,z) — pre-evaluated by outer expression (pack sampler)
            arguments: [h, py, platVal, caveVal]
            expression: |
              if(abs(h - py) > 6, 0,
                // Smooth vertical falloff: 1 at h, 0 at ±6 blocks.
                (1 - smoothstep(0, 6, abs(h - py)))
                // Platform presence: CELLULAR returning ~[-1,0];
                // -platVal-0.25 is positive at cell centres, negative at edges.
                * (-platVal - 0.25)
                // Wall-proximity fade: active only in the near-wall band
                // (special_caves > -0.3), zero deep in the void (≤ -0.6).
                * smoothstep(-0.3, -0.6, caveVal)
                * 3.5
              )
            functions:
              smoothstep:
                arguments: [edge0, edge1, x]
                expression: |
                  if(x <= edge0, 0,
                    if(x >= edge1, 1,
                      ((x - edge0) / (edge1 - edge0))^2 * (3 - 2 * ((x - edge0) / (edge1 - edge0)))
                    )
                  )
        samplers:
          platforms:
            dimensions: 2
            type: DOMAIN_WARP
            amplitude: 5
            warp:
              type: OPEN_SIMPLEX_2
              frequency: 0.02
            sampler:
              type: CELLULAR
              frequency: 0.05
      # carver_fade removed — definition is now pack-level caveCarverFade(x,y,z)
      #   in math/samplers/special_cave_carving.yml (identical expression).
      # wallOffset removed — replaced by pack-level caveWallOffset(x,y,z).
      # shellNoise removed — replaced by pack-level caveShellNoise(x,y,z).

      # 2D FBM for y-coordinate warping. Must be 2D (not 3D) so the offset is
      # consistent for the entire vertical column at each xz position — a 3D
      # sampler would vary per block and could create mid-column discontinuities.
      # Period ~56 blocks (frequency 0.018) gives 3-4 variation cycles across a
      # typical 200-block cave diameter without introducing noisy fine-scale breaks.
      yWarp:
        dimensions: 2
        type: EXPRESSION
        expression: |
          0
          //if(y>0
          //  ceilWarp(x,z),
          //  florWarp(x,z))
          //  + 1

        samplers:
          ceilWarp:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.018
            octaves: 2
            gain: 0.5
            salt: 5678309
          florWarp:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2
              frequency: 0.018
            octaves: 2
            gain: 0.5
            salt: 56783092
  #sampler-2d:
  #  dimensions: 2
  #  type: CONSTANT
  #  value: 0
