id: EQ_SUBMERGED_OVERHANGS
type: BIOME
abstract: true

variables: &variables
  base: $customization.yml:terrain-ocean-base-y-level
  scale: $customization.yml:terrain-ocean-depth
  ocean_level: $meta.yml:ocean-level
  overhangStrength: 50
  overhangStartPercent: 0.1 # Percentage from base max depth where
                            # overhangs become full strength, strength
                            # gradually increases with depth.
  shelfSize: 0.25
  shelfStrength: 0.6

terrain:
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables: *variables
    expression: |
      max(
        -y + base + lerp(biomeInfluence(x,z),
          0, oceanElevationBlockHeight(x,z),
          1, sampler2d(x,z)
        )
        + overhangs(x, y*3, z) * parabolicMap(y,
          base - scale * overhangStartPercent,
          overhangStrength, base, 0) * biomeInfluence(x,z)
      ,
        -y+ocean_level-herp(RiverOceanTransitioner(x,z),0,scale*2,0,bedDepth(x, z))
      )
    samplers:
      sampler2d:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: |
          scale * shelf(oceanElevation(x, z), 0, shelfSize, -shelfStrength)
      overhangs:
        dimensions: 3
        type: PROBABILITY
        sampler:
          type: FBM
          octaves: 3
          sampler:
            type: OPEN_SIMPLEX_2
            frequency: 0.01
            salt: 4957

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
