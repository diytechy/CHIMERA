                  sampler:
                    type: OPEN_SIMPLEX_2
                    frequency: 0.001111111111
            hills:
              dimensions: 2
              type: EXPRESSION_NORMALIZER
              expression: ((in+1)/2)^2
              sampler:
                type: FBM
                octaves: 6
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 0.0005
