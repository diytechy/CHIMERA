id: WATER_ELEVATOR_TEMPERATE
type: FEATURE
extends: WATER_ELEVATOR_SURFACE_LOCATOR

# TEMPERATE water-elevator variant (cobblestone roof). See WATER_ELEVATOR_FROZEN for the
# full rationale. Places only off-spot and where temperature is in the temperate band.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(temperature(x, z) >= 0.0 && temperature(x, z) < 0.55, waterElevatorPlacement(x, z), 1)
    samplers:
      temperature: $math/samplers/temperature.yml:samplers.temperature
      waterElevatorPlacement: $math/samplers/spots.yml:samplers.waterElevatorPlacement
  threshold: 0

structures:
  distribution:
    type: CONSTANT
  structures: water_elevator_temperate
