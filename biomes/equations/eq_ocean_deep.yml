id: EQ_OCEAN_DEEP
type: BIOME
abstract: true

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    expression: |
      max(
        -y + base
      ,
        -y+ocean_level-herp(RiverOceanTransitioner(x,z),0,scale*2,0,bedDepth(x, z))
      )
    variables:
      base: 20
      ocean_level: $meta.yml:ocean-level
      scale: $customization.yml:terrain-ocean-depth

  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      height: 30
    expression: "|simplex2(x/2, z/2)| * height"