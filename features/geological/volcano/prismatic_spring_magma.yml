id: PRISMATIC_SPRING_MAGMA
type: FEATURE

distributor:
  type: AND
  distributors:
    - type: SAMPLER
      sampler:
        dimensions: 2
        type: EXPRESSION
        expression: distanceToPrismaticRim(x, z)-spotFluidPercent(x, z)
    - type: PADDED_GRID
      width: 6
      padding: 4
      salt: 27377


locator:
  type: AND
  locators:
    - type: PATTERN
      range:
        min: $meta.yml:bottom-y
        max: $meta.yml:top-y
      pattern:
        type: AND
        patterns:
          - type: MATCH
            block: minecraft:cyan_terracotta
            offset: 0
          - type: MATCH
            block: minecraft:water
            offset: 1

structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:magma_block