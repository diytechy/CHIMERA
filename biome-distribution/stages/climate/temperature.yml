stages:
  - type: REPLACE_LIST
    sampler:
      type: EXPRESSION
      expression: BiomeShapeLandmassTemperature(x, z)

    default-from: land
    default-to:
      - ice-cap: &iceCap         2
      - tundra: &tundra         1
      - boreal-snowy: &borealSnowy    3
      - boreal-cold: &borealCold     1
      - boreal-warm: &borealWarm     1
      - boreal-hot: &borealHot      1
      - temperate-cold: &temperateCold  1
      - temperate-warm: &temperateWarm  2
      - temperate-hot: &temperateHot   2
      - tropical-savanna-wet: &tropicalCold   2
      - tropical-monsoon: &tropicalWarm   2
      - tropical-rainforest: &tropicalHot    2
    to:
      island:
        - polar-island: *iceCap
        - polar-island: *tundra
        - polar-island: *borealSnowy
        - island: *borealCold
        - island: *borealWarm
        - island: *borealHot
        - island: *temperateCold
        - island: *temperateWarm
        - island: *temperateHot
        - tropical-island: *tropicalCold
        - tropical-island: *tropicalWarm
        - tropical-island: *tropicalHot
      #NOTE: MARSHLANDS CURRENTLY DISABLED, DISTRIBUTED AS A PART OF FLATLANDS
      #marshland:
      #  - polar-marsh: *iceCap
      #  - polar-marsh: *tundra
      #  - polar-marsh: *borealSnowy
      #  - marsh: *borealCold
      #  - marsh: *borealWarm
      #  - marsh: *borealHot
      #  - marsh: *temperateCold
      #  - marsh: *temperateWarm
      #  - marsh: *temperateHot
      #  - tropical-marsh: *tropicalCold
      #  - tropical-marsh: *tropicalWarm
      #  - tropical-marsh: *tropicalHot

  - type: REPLACE_LIST
    sampler:
      type: EXPRESSION
      expression: BiomeShapeOceanTemperature(x, z)
    default-from: ocean
    default-to:
      - polar-ocean: *iceCap
      - polar-ocean: *tundra
      - boreal-ocean: *borealSnowy
      - boreal-ocean: *borealCold
      - boreal-ocean: *borealWarm
      - boreal-ocean: *borealHot
      - lukewarm-ocean: *temperateCold
      - lukewarm-ocean: *temperateWarm
      - temperate-ocean: *temperateHot
      - temperate-ocean: *tropicalCold
      - hot-ocean: *tropicalWarm
      - hot-ocean: *tropicalHot
    to:
      archipelago-zone:
        - frozen-archipelago-zone: *iceCap
        - frozen-archipelago-zone: *tundra
        - frozen-archipelago-zone: *borealSnowy
        - archipelago-zone: *borealCold
        - archipelago-zone: *borealWarm
        - archipelago-zone: *borealHot
        - archipelago-zone: *temperateCold
        - archipelago-zone: *temperateWarm
        - archipelago-zone: *temperateHot
        - archipelago-zone: *tropicalCold
        - archipelago-zone: *tropicalWarm
        - archipelago-zone: *tropicalHot

  - type: REPLACE
    sampler:
      type: EXPRESSION
      expression: BiomeShapeMesaTemperature(x, z)
    from: mesa
    to:
      - ice-cap-mesa: *iceCap
      - polar-mesa: *tundra
      - boreal-mesa: *borealSnowy
      - boreal-mesa: *borealCold
      - boreal-mesa: *borealWarm
      - boreal-mesa: *borealHot
      - temperate-mesa: *temperateCold
      - temperate-mesa: *temperateWarm
      - temperate-mesa: *temperateHot
      - hot-mesa: *tropicalCold
      - hot-mesa: *tropicalWarm
      - hot-mesa: *tropicalHot

  - type: REPLACE
    sampler:
      type: EXPRESSION
      expression: if((BiomeShapeLargelandPrecipitation(x, z)<0.1)&&(BiomeShapeLargelandTemperature(x, z)>-0.1),1,-1)
    from: vast-forest
    to:
      - SELF: 1
      - arid-pale-garden: 1

  - type: REPLACE
    sampler:
      type: EXPRESSION
      expression: BiomeShapeLargelandTemperature(x, z)
    from: vast-forest
    to:
      - polar-vast-forest: *iceCap
      - polar-vast-forest: *tundra
      - polar-vast-forest: *borealSnowy
      - boreal-vast-forest: *borealCold
      - boreal-vast-forest: *borealWarm
      - boreal-vast-forest: *borealHot
      - temperate-vast-forest: *temperateCold
      - temperate-vast-forest: *temperateWarm
      - temperate-vast-forest: *temperateHot
      - tropical-vast-forest: *tropicalCold
      - tropical-vast-forest: *tropicalWarm
      - tropical-vast-forest: *tropicalHot

  - type: REPLACE_LIST
    sampler:
      type: EXPRESSION
      expression: spotTemperature(x, z)
    #NOTE: Defaults here are not actually used.  Just establish replacement listing.
    default-from: land
    default-to:
      - ice-cap: *iceCap
      - tundra: *tundra
      - boreal-snowy: *borealSnowy
      - boreal-cold: *borealCold
      - boreal-warm: *borealWarm
      - boreal-hot: *borealHot
      - temperate-cold: *temperateCold
      - temperate-warm: *temperateWarm
      - temperate-hot: *temperateHot
      - tropical-savanna-wet: *tropicalCold
      - tropical-monsoon: *tropicalWarm
      - tropical-rainforest: *tropicalHot
    to:
      crater-lake:
        - polar-crater-lake: *iceCap
        - polar-crater-lake: *tundra
        - boreal-crater-lake: *borealSnowy
        - boreal-crater-lake: *borealCold
        - boreal-crater-lake: *borealWarm
        - boreal-crater-lake: *borealHot
        - temperate-crater-lake: *temperateCold
        - temperate-crater-lake: *temperateWarm
        - temperate-crater-lake: *temperateHot
        - hot-crater-lake: *tropicalCold
        - hot-crater-lake: *tropicalWarm
        - hot-crater-lake: *tropicalHot
      sinkhole:
        - polar-sinkhole: *iceCap
        - polar-sinkhole: *tundra
        - boreal-sinkhole: *borealSnowy
        - boreal-sinkhole: *borealCold
        - boreal-sinkhole: *borealWarm
        - boreal-sinkhole: *borealHot
        - temperate-sinkhole: *temperateCold
        - temperate-sinkhole: *temperateWarm
        - temperate-sinkhole: *temperateHot
        - hot-sinkhole: *tropicalCold
        - hot-sinkhole: *tropicalWarm
        - hot-sinkhole: *tropicalHot
      sinkhole-border:
        - polar-sinkhole-border: *iceCap
        - polar-sinkhole-border: *tundra
        - boreal-sinkhole-border: *borealSnowy
        - boreal-sinkhole-border: *borealCold
        - boreal-sinkhole-border: *borealWarm
        - boreal-sinkhole-border: *borealHot
        - temperate-sinkhole-border: *temperateCold
        - temperate-sinkhole-border: *temperateWarm
        - temperate-sinkhole-border: *temperateHot
        - hot-sinkhole-border: *tropicalCold
        - hot-sinkhole-border: *tropicalWarm
        - hot-sinkhole-border: *tropicalHot
      sinkhole-border-ocean:
        - polar-sinkhole-border-ocean: *iceCap
        - polar-sinkhole-border-ocean: *tundra
        - boreal-sinkhole-border-ocean: *borealSnowy
        - boreal-sinkhole-border-ocean: *borealCold
        - boreal-sinkhole-border-ocean: *borealWarm
        - boreal-sinkhole-border-ocean: *borealHot
        - temperate-sinkhole-border-ocean: *temperateCold
        - temperate-sinkhole-border-ocean: *temperateWarm
        - temperate-sinkhole-border-ocean: *temperateHot
        - hot-sinkhole-border-ocean: *tropicalCold
        - hot-sinkhole-border-ocean: *tropicalWarm
        - hot-sinkhole-border-ocean: *tropicalHot
      extinct-volcano:
        - polar-extinct-volcano: *iceCap
        - polar-extinct-volcano: *tundra
        - boreal-extinct-volcano: *borealSnowy
        - boreal-extinct-volcano: *borealCold
        - boreal-extinct-volcano: *borealWarm
        - boreal-extinct-volcano: *borealHot
        - temperate-extinct-volcano: *temperateCold
        - temperate-extinct-volcano: *temperateWarm
        - temperate-extinct-volcano: *temperateHot
        - hot-extinct-volcano: *tropicalCold
        - hot-extinct-volcano: *tropicalWarm
        - hot-extinct-volcano: *tropicalHot