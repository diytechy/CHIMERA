biomeSpread:
  # Basic size of biomes (distance between 2 biome centers)
  # Increase to make biomes bigger
  cellDistance: 320
  wellDistance: 100
  cellDistanceLarge: 500
  distAtFullInfluence: 20
  distAtFullNormDist: 50
  #How many blocks deep do we have to be in biome before terrain features for biome
  #are realized (depends on terrain sampler used)
  
  # Rift region distance for cells that will contain rifts.
  riftDistance: 250
  
  # Basic size of island region features
  # Increase to make regions larger.
  islandDistance: 400

  # how far biome centers can vary away from their centers
  # Increase to make biome sizes vary more (scale 0-1)

  cellJitter: 0.9

  # Frequency of rivers. Increase to make rivers closer together and smaller, decrease for bigger, more spaced out rivers
  riverScale: 0.0013

  # applies to biomes with borders, controls the ratio of inner/outer biomes
  borderBiomes:
    edgeThreshold: 0.8

  # sink holes have a chance to generate in the world. They go down to -50 and generate a smaller biome there. Placed anywhere over other biomes
  sinkHoles:
    stretchFactor: 2.5  # Length-width ratio of the sinkholes. Increase for more stretched/longer sinkholes
    angle: 0.435        # Angle in which they are spawned. In radians (0.425 = 25 Degrees)
    size: 0.83          # Sizing of the invidial sinkholes. Inversed, increase to make them smaller. Scale 0-1
    borderSize: 0.02   # Size of the border biome around the sinkhole
    frequency: 0.0025   # frequency of sinkhole placement. Increase for more smaller sinkholes, decrease for fewer, but larger ones

  mountainFrequency: 0.004  # shared frequence of some larger mountain biomes, allows them to blend easier

  canyons:
    minY: 40 # how deep down the canyons will go. This is an absolute Y height. Increase to make the canyons shallower
    canyonAmount: 0.0 # How rare the canyons should be. Range 0-1, with 1 disabling all canyons

# This file provides various general options for configuring this config pack.
# The options are specific to this config pack (and are not general to Terra as a whole!)
#
# Other config files reference reference these options via the metaconfiguration system,
# See http://terra.polydev.org/config/development/meta-configuration.html for further
# explanation of how this works.

global-scale: 1
# Modifies the scale of all biome distribution, you can use this parameter
# to if you want just about every biome to be larger or smaller.
# By doubling the scale, you double the length & width of everything,
# e.g. if you have a biome that is 300 blocks wide with a scale of 1, and
# increase that scale to 2, that biome will generate 600 blocks wide.
# This value only applies to horizontal scale, NOT vertical scale.
# Default: 1

# ---
# Terrain
# ---

# Options that are focused on controlling terrain shaping.
# All the terrain options below are primarily used by biome terrain parameters
# implemented by abstract biome configs found in the biomes/abstract/terrain directory.

terrain-base-y-level: 65
# The base terrain y level. Generally the lowest y level for terrain, this is just a
# guide and some configs will lower terrain below this point (however not by much).
# Default: 65

legacy-terrain-base-y-level: 80
# Special level for legacy terrain, which uses different samplers to drive terrain changes.

terrain-base-biome-shift: 0.95
# How much should biomes be shifted upward according to their position on the continent.
# Only used for biomes that don't explicitly use an elevation-based sampler.

min-river-support-height: 45
#How far down should river support be projected

min-river-support-height-norm: 400
#How to normalize support below ocean level, nominally elliptical (ocean base - support height)^2

terrain-height: 180
# Number of blocks above the base terrain level that terrain can go do, similarly to
# terrain-base-y-level this number is also a guide and some configs will produce terrain
# above this number (however not by much). Note that the sum of terrain-height and 
# terrain-base-y-level should no exceed the world height, otherwise you may see terrain
# clipping.
# Default: 230

origen-terrain-height: 100
# Terrain height for origen / rearth specific biomes that were designed before the height increase.

valley-srt: .4
valley-dist: 0.82
# The distance from the edge of small biomes where valley terrain starts to generate.
# Higher values give more gradual falloff into valley, but leave less space for actual valley region.

terrain-ocean-base-y-level: 60
# The base ocean terrain y level, generally the highest level for terrain for ocean biomes.
# Default 60

terrain-ocean-depth: 100
# The number of blocks below terain-ocean-base-y-level that ocean terrain will go. Note
# that this number subtracted from terrain-ocean-base-y-level should not be lower than
# the lower bound of the world height range, otherwise you might end up with void holes in
# the world.
# Default: 100

#Roughens terrain using FBM, ratio of overall height.
terrain-roughness-value: 0.01
terrain-roughness-p2p: 100

# ---
# Continental
# ---

# Options that defines large region (contental details)
continental-baseline-distance: 6000
continental-large-features-allowed-threshold: .07
continental-large-feature-allowed-threshold-variance: 0.03
continental-sub-ocean-large-features-allowed-threshold: -0.05
continental-large-features-height-flux-dist: 1000

#Affects the variance of what elevation mountians / mesas start to protrude at:

continental-large-features-threshold-variance-distance: 3000

#Affect how apart mountain ranges are allowed to generate, and the absolute squared filter value (from -0.25 to 0.25) the region filter must exceed for mountain details to be added.  Refer to use in continental sampler funciton.
continental-mountain-region-allowed-distance: 2000
continental-mountain-region-allowed-threshold: .10 #0 - 0.5
continental-mountain-region-transition-base-height: .1
continental-mountain-range-sampler-freq: 1500

#Affect how apart mesa ranges are allowed to generate, and the absolute squared filter value (from -0.25 to 0.25) the region filter must exceed for mountain details to be added.  Refer to use in continental sampler funciton.
continental-mesa-region-allowed-distance: 2000
continental-mesa-region-allowed-threshold: .31


#Both mesas and mountains are regulated to a maximum peak height, which slowly changes over height across the map to give slight range to range variance.  Can be anything from 0.5 to inf, but will cause coastal lines to grow correspondedly flatter.

continental-MaxMesaPeakHeightRatio: 0.7 #Keep less than mountain peak height ratio.
continental-MaxMountainPeakHeightRatio: 1
continental-UnderwaterPeakHeightRatio: 0.4 # Ratio of mountain peak height
continental-MaxPeakVariability: 0.3
continental-MaxNMesSteps: 4 #Max number of mesa steps to create


# Rolling hill to hill rough distance, but passed through FBM filter with 2 octives by default with lunarcity 2, so value here should be 4x bump2bump dist as a rough approximation.
continental-hill2hill-distance: 150

#The hill ratio, how high / agressively sloped hilly regions are compared to the lowest possible max mountian height.
#The applied hill ratio then is (MaxMountaiinPeakHeightRatio-MountainPeakVariance)*MaxHillElevRatio.
continental-MaxHillElevRatio: 0.3


continental-scale: 1
# Controls the scale of land / coastal / oceanic distribution. Increasing
# this produces larger landmasses and larger oceans, and vice-versa when
# this is decreased.

continental-island-threshold: -0.35
# Threshold the continental_sampler must be below for continental value to change
# to prepare for islands.
# Default: -0.3

continental-land-threshold: -0.1
# Threshold the continental_sampler must exceed for standard continents to appear.
# Higher values result in smaller continents.
# Default: 0.1

continental-lake-threshold: 0.35
# Threshold the continental_sampler must exceed for continental value to change
# to prepare for lakes.

continental-max-island-ratio: 0.4
# Maximum ratio that an island can have compared to the continental maximum (0 to 1).
# 0 = no islands, 1 = islands can be as large as continents.
# Default: 0.6

continental-max-lake-ratio: 0.1
# Maximum ratio that a lake can have compared to the continental minimum (0 to 1).
# 0 = no lakes, 1 = lakes can be as deep as oceans.
# Default: 0.4
# of expected zones.

continental-coast-cutoff: 0.02
#Defines how much of the continental ratio will be reserved for coastal biomes. Higher values will result in wider coastal regions, while lower values will result in thinner coastal regions.

# ---
# Special caves
# ---

special_cave_biome_activation: 0
cave_dia: 150
cave_dist: 300
cave_upper: 40
cave_lower: -30
cave_y_curve_power: 2
# Exponent for the y-axis term of the special cave ellipsoid shape.
# Higher values (e.g. 4) flatten the top/bottom cap and steepen the side walls;
# lower values (approaching 2) give a more uniform sphere-like cross-section.
# Used in special_caves and special_caveDist (carver fade / lava floor boundary).
# NOTE: special_caves defines the hollow boundary (correct inner ellipsoid shape).
#       special_caveDist is only used near the shell surface (carver fade width,
#       lava floor threshold) where its block-distance approximation is accurate.
# Default: 4

# ---
# Elevation
# ---

# Options that control the elevation / height map.
# An elevation value of 0 corresponds to the lowest elevation, while a value of 1
# correspons to the highest elevation.
# These options are primarily used in the math/samplers/elevation.yml config file.

elevation-scale: 1.00
# Controls the scale of the elevation noise map. A larger scale results in larger distances
# between aspects like mountain ranges and flat areas. If you want more gradual changes in
# elevation, you can increase this. Conversely, if you want more sudden changes in elevation,
# you can decrease this.
# Note - This does not affect how tall the terrain is in individual biomes, for that you
#        can check out the parameters under the 'Terrain' section.
# Default: 1

elevation-multiplier: 1
# Multiplier on the elevation value.
# If set to 0, elevation will be the value set by 'elevation-offset' defined below
# Default: 1

elevation-offset: 0
# Adds / subtracts from the raw elevation value.
# Default: 0

elevation-highlands-threshold: 0.4
# Areas with an elevation value greater than this will be considered highlands in
# biome distribution.
# Default: 0.4

elevation-lowlands-threshold: 0.15
# Areas with an elevation value lower than this will be considered lowlands in
# biome distribution.
# Default: 0.1

elevation-factor-continental: 1
# Determines if terrain height will be reduced closer to coasts. This
# is used to prevent mountains forming right up against the ocean, and
# gradually smooths the terrain into coasts. The continental values at which
# terrain goes from 100% to flat can be customized with the options below.
# 1 = true, 0 = false
# Default: 1

elevation-continental-full-height-threshold: 0.35
# The continental value at which terrain height is 100%, only applicable if
# the terrain-factor-continental option is enabled
# Default: 0.35

elevation-continental-flat-threshold: -0.3
# The continental value at which terrain height will be flat, only applicable if
# the terrain-factor-continental option is enabled
# Default: -0.3

elevation-factor-rivers: 1
# Determines if terrain will gradually reduce closer to rivers.
# 1 = true, 0 = false
# Default: 1

elevation-factor-spawn-island: 1
# Determines if spawn island noise affects terrain, 1 = true, 0 = false
# Default: 1

elevation-spawn-island-scale: 0.2
# Scales elevation within the spawn island. E.g 0.3 means elevation is set to 30%
# within the spawn island.
# Default: 0.2

elevation-fuzz: 0.25
# Adds a slight bit of fuzziness to elevation, roughening terrain block countours
# and steep hills that look overly smooth. Small 1 block divots tend to be produced
# by this fuzzing. Recommended to be a small number between 0 and 0.5.
# Setting to 0 removes any fuzzing.
# Default: 0.25

# ---
# Flatness
# ---

flatness-noise-scale: 1800
#How often flatness noise oscillates

forced-sealevel-activation-threshold: 0.1
# Default: TODO
# Value that controls when the flatness mask fully activates.
# Decrease to get more flat biome distribution, will cut into mid-level biomes.
# Range from 0 to 1.

# Controls how gradual the transition is between flat and mountainous biomes. Higher values result in more gradual blending, while lower values result in more sudden transitions.
forced-sealevel-blend: 0.15
# Default: TODO

forced-sealevel-factor: 0.85
# How much to flatten by. 1 = 100% flat, 0 = no flattening
# Default: 0.95

# ---
# Temperature
# ---

temperature-scale: 1.2
# Controls the scale of temperature zones. Most biomes are placed according to
# a temperature map so hot biomes can't generate next to cold biomes, as well as
# allowing for biomes of similar temperatures to generate together. Increasing this
# will increase the distance between temperature changes, which results in things like
# hot and cold biomes generating further apart - and vice versa when decreasing it.
# Default: 0.95

temperature-min: -1.1
# Default: -1

temperature-max: 1.25
# Default: 1

temperature-altitude-lapse-rate: 0.5
# How fast temperature drops with altitude
# Default: 1.3

temperature-altitude-lapse-start: 0.2
# The altitude temperature should begin to drop at
# Default: 0.2

# ---
# Precipitation
# ---

precipitation-scale: 1
# Controls the scale of precipitation zones. Same idea as temperature zones, where
# humid biomes generate away from arid biomes, and biomes of similar precipitation
# generate together.
# Default: 1

precipitation-min: -1.1
# Default -1

precipitation-max: 1.1
# Default: 1

precipitation-ocean-threshold: -1
# Default -1

precipitation-land-threshold: 0.4
# Default: 0.4

# ---
# Variation
# ---

variation-scale: 1.5
# Controls scale of biome variations within each climate zone.
# Decreasing this will result in more smaller biomes to generate in any given
# climate, while increasing it will result in larger climate variations.
# Default: 1.5

# ---
# Caves
# ---

cave-biome-scale: 1
# Controls the scale of the placement of cave biomes, larger scale = bigger areas of
# any given cave biome, smaller scale = smaller cave biomes.
# Default: 1

# ---
# Oceans
# ---

ocean-shallow-threshold: -0.15
# Elevation above this threshold is set to generate as shallow ocean. Lower number = larger area of shallow ocean
# and vice versa.
# Default: -0.1

ocean-deep-threshold: -0.8
# Elevation at which deep oceans are placed. Higher number = larger area of deep ocean
# and vice versa.
# Default: -0.8

# ---
# Rivers
# ---

river-spread-scale: 1
# Controls how far / close apart rivers generally are, larger scale = further apart
# rivers, smaller scale = closer packed together rivers.
# Default: 1

river-min-width: 11
# Controls in blocks the minimum width of rivers.
# Default: 11

river-max-width: 20
# Maximum width of rivers in blocks.
# Default: 20

minimum-continental-river-width: 12
# Minimum width of continental rivers in blocks.
# Default: 12

maximum-continental-river-width: 25
# Maximum width of continental rivers in blocks.
# Default: 30

continental-river-width-period: 100
# Period for continental river width variation using Perlin noise.
# Higher values create more gradual width changes.
# Default: 50

river-nominal-boundary: 50
# Nominal distance from river center to boundary in blocks.
# Default: 25

river-boundary-variance-magnitude: 20
# Magnitude of variance in river boundary distance.
# Default: 17

river-boundary-variance-period: 200
# Frequency of river boundary variance using Perlin noise.
# Default: 50

river-biome-activation-threshold: 0.15

#How far from river edges do river biomes activate.  In theory would be best right at rivers edge (0), but due to current
#terrain sampling, need more distance to blend down to bank.

# ---
# Trenches
# ---

trench-spread-scale: 1
# Controls how far / close apart trenches generally are, larger scale = further apart
# trenches, smaller scale = closer packed together trenches.
# Default: 1

trench-min-width: 8
# Controls in blocks the minimum width of trenches.
# Default: 8

trench-max-width: 13
# Controls in blocks the maximum width of trenches.
# Default: 13

# ---
# Spawn Island
# ---

# Options for the spawn island, a feature that ensures that the area near spawn is land,
# so players do not spawn in the ocean.

spawn-island-origin-x: 0
# The x coordinate of the center of the spawn island.
# Default: 0

spawn-island-origin-z: 0
# The y coordinate of the center of the spawn island.
# Default: 0

spawn-island-radius-inner: 20
# Radius in blocks from origin where the continental value is set to 1, i.e inland.
# Default: 20

spawn-island-radius-middle: 125
# Radius in blocks from origin where the continental value is set to 0, i.e where
# the coast of the spawn island is is.
# Default: 125

spawn-island-radius-outer: 400
# Radius in blocks from origin where continental value is set to -1, i.e deep ocean.
# Default: 400

# ---
# Spot Biomes
# ---

# Spot biomes are special circular biomes scattered around the world.
# Examples include volcanoes, prismatic springs, and crater lakes

spot-spread: 1500
# Roughly how many blocks apart each spot biome will be
# Default: 2220

spot-radius-min: 50
# Default: 50

spot-radius-max: 150
# Default: 150

large-spot-spawn-radius-offset: 2000
# Roughly how far large spots will generate away from spawn
# Default: 2000

large-spot-spread: 4150
# Roughly how many blocks apart each spot biome will be
# Default: 2000

large-spot-radius-min: 500
# Default: 750

large-spot-radius-max: 1500
# Default: 2000