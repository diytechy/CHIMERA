id: EQ_CARVING_CREAKS
type: BIOME
abstract: true

vars: &variables
  floor: 67
  base: 110
  height: 3
  terraceCount: 15

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: '-y + base + height * baseRandom(x,z)

      - min(terrace(easeInOut(max(0, -abs(rivers(x,z)) + 0.5)) * terraceCount, 9)
      / terraceCount * 200, base - floor)

      - max(0, -abs(rivers(x,z)) + 0.23)  * 45

      '
    functions:
      easeInOut:
        arguments: [x]
        expression: x * x * (3.0 - 2.0 * x)
      terrace:
        arguments: [x, terraceStrength]
        expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
    samplers:
      rivers:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: ${customization.yml:biomeSpread.riverScale}
      baseRandom:
        dimensions: 2
        type: OPEN_SIMPLEX_2
        frequency: 0.01
        salt: 20
