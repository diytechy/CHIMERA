extrusions:

  - type: REPLACE
    from: LAVA_TUBES
    sampler:
      type: CONSTANT
    to:
      - LAVA_TUBES: 1
    range:
      min: $meta.yml:bottom-y
      max: ${meta.yml:ocean-level}
      
  - type: REPLACE
    from: LAND_CAVES
    sampler:
      type: EXPRESSION
      expression: BiomeShapeOceanTemperature(x,z)+BiomeShapeOceanValue(x,z)*0.7
    to:
      - _cold_caves: &ColdCaveDist 1
      - _norm_caves: &NormCaveDist 15
      - _warm_caves: &WarmCaveDist 1
    range:
      min: $meta.yml:deepslate-bottom
      max: ${meta.yml:ocean-level} - 13
      
  - type: REPLACE
    from: CAVERNS
    sampler:
      type: EXPRESSION
      expression: BiomeShapeOceanTemperature(x,z)+BiomeShapeOceanValue(x,z)*0.7
    to:
      - _cold_caves: *ColdCaveDist
      - _norm_caves: *NormCaveDist
      - _warm_caves: *WarmCaveDist
    range:
      min: $meta.yml:deepslate-bottom
      max: ${meta.yml:ocean-level} - 13

  - type: REPLACE
    from: _cold_caves
    sampler:
      type: EXPRESSION
      expression: BiomeShapeOceanValue(x,z)
    to:
      - SELF: 6
      - ICE_CAVES: 3
      - ICE_MUSHROOM_CAVES: 1
      - FROSTED_CAVERNS: 2
      - FROZEN_CAVERNS: 1

  - type: REPLACE
    from: _warm_caves
    sampler:
      type: EXPRESSION
      expression: BiomeShapeOceanValue(x,z)
    to:
      - SELF: 6
      - TROPICAL_MUSHROOM_CAVES: 1
      - JUNGLE_CAVES: 3
      - MAGMA_CAVERNS: 2
      - BASALT_CAVERNS: 2
      - MOLTEN_PASSAGES: 2

  - type: REPLACE
    from: _norm_caves
    sampler:
      type: EXPRESSION
      expression: BiomeShapeOceanValue(x,z)
    to:
      - SELF: 30
      - SPIDER_CAVES: 1
      - ANCIENT_CAVES: 2
      - RESIN_ROOTS: 3
      - MUSHROOM_CAVES: 3
      - BASALT_CAVERNS: 2
      - STONE_CAVERNS: 3 #stone caverns: 5    

      - ANDESITE_CAVERNS: 3
      - BLACKSTONE_CAVERNS: 3
      - DIORITE_CAVERNS: 3
      - GRANITE_CAVERNS: 3
      - ARID_CAVERNS: 3 #dry caverns: 1                              12
      - BARREN_CAVERNS: 3
      - CRUMBLING_CAVERNS: 3
      - CALCITE_CAVERNS: 3 #misc caverns: 3                          36
      - CRYSTALLINE_CAVERNS: 3 
      - DRIPSTONE_CAVERNS: 3
      - SCULK_CAVERNS: 1
      - LUSH_CAVERNS: 5 #lush caverns: 2                            24
      - FUNGAL_CAVERNS: 3
      - LAVENDER_CAVERNS: 4
