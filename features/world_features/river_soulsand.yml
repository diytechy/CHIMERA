id: RIVER_SOULSAND
type: FEATURE

#distributor:
#  type: "YES"

distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(RiverSoulsandLocations(x,z),-1,1)

#Method:
  #Block is solid AND
  #Above block is water AND
  #Water surface changes height:
    #A. For the first air block above the water surface an adjacent block next to the air is water.
    #B. The continentalRiverBlockElevChange sampler changes between current block position and adjacent.
locator:
  type: PATTERN
  range:
    min: ${meta.yml:ocean-level} -25
    max: ${customization.yml:terrain-height} * ${customization.yml:terrain-base-biome-shift} + ${meta.yml:ocean-level}
  pattern:
    type: AND
    patterns:
      - type: MATCH_SOLID
        offset: 0
      - type: MATCH
        block: minecraft:water
        offset: 1

structures:
  #NOTE: river_soulsand places soul sand (with a bedrock signature below) directly.
  #Soul sand under water produces the bubble column on the first tick update.
  #The "BubblesOnChunkGen" addon then freezes that column's water so the river does
  #not expand, restores griefed soul sand, and (rarely) fills the dedication chest.
  #
  #The structure selector is a checkerboard: the selector value picks an entry from
  #the weighted list below (value < 0 -> index 0, value > 0 -> index 1). Soul-sand
  #columns land on odd cells (x+z odd), and the dedication chest only on even cells,
  #so a chest can never overwrite a column. The chest structure additionally fails
  #the vast majority of the time, so most even cells are left untouched.
  distribution:
    type: EXPRESSION
    expression: |
      if((noise(x,z)<0.001)&&(noise(x,z)>-0.01), 1, -1)
    #expression: |
    #  if(abs(floor(x) + floor(z)) % 2 > 0.5, -1, 1)
    samplers:
      noise:
        dimensions: 2
        type: WHITE_NOISE
        salt: 1234
        
  structures:
    - river_soulsand: 1
    - dedication_chest: 1

  