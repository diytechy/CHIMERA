                - a
                - bt
                - b
                expression: |
                  if(at<bt,
                    if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                    if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                  )
          herp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              hermite:
                arguments:
                - x
                expression: 3*x^2-2*x^3
          parabolicMap:
            arguments:
            - t
            - bt
            - b
            - at
            - a
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
              )
            functions:
              interpolation:
                arguments:
                - x
                expression: x^2
        samplers:
          riverDistance:
            dimensions: 2
            type: EXPRESSION
            expression: '|riverNoise(x*riverFrequency, z*riverFrequency)|'
            variables:
              notRiverValue: 2
              borderValue: 1
              riverValue: 0
              riverFrequency: 0.025
              riverThreshold: 0.3
              riverMinWidth: 11
              riverMaxWidth: 20
              erosionMaxDistance: 0.3
              erosionMax: 0.95
              erosionMin: 0
            samplers:
              riverNoise:
                dimensions: 2
                type: TRANSLATE
                x: 10000
                z: 10000
                sampler:
                  type: DOMAIN_WARP
                  amplitude: 3
                  warp:
                    type: OPEN_SIMPLEX_2
                    frequency: 0.1
                  sampler:
                    type: OPEN_SIMPLEX_2
          erosionStrength:
            dimensions: 2
            type: PROBABILITY
            sampler:
              type: FBM
              octaves: 2
              sampler:
                type: OPEN_SIMPLEX_2
                frequency: 0.001
                salt: 2175.0
      rawTemperature:
        dimensions: 2
        type: EXPRESSION
        expression: sampler(x / temperatureScale / globalScale, z / temperatureScale / globalScale) * temperatureSpread + temperatureOffset
        variables:
          globalScale: 1
          temperatureScale: 1.2
          temperatureOffset: -0.0075
          temperatureSpread: 1.0325
        samplers:
          sampler:
            dimensions: 2
