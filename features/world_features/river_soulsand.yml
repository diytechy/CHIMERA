id: RIVER_SOULSAND
type: FEATURE

distributor:
  type: "YES"

#Method:
  #Block is solid AND
  #Above block is water AND
  #Water surface changes height:
    #A. For the first air block above the water surface an adjacent block next to the air is water.
    #B. The continentalRiverBlockElevChange sampler changes between current block position and adjacent.
locator:
  type: AND
  locators:
  - type: PATTERN
    range: &range
      min: ${meta.yml:sinkhole-ocean-level} -15
      max: ${customization.yml:terrain-height}
    pattern:
      type: AND
      patterns:
        - type: MATCH_SOLID
          offset: 0
        - type: MATCH
          block: minecraft:water
          offset: +1
  - type: SAMPLER
    samplers: 
    - type: EXPRESSION
      expression: continentalRiverBlockElevShift(x,z)
      samplers:
        continentalRiverBlockElevShift: $math/samplers/rivers.yml:samplers.continentalRiverBlockElevShift


structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:soul_sand