id: EQ_GLOBAL_RIVER
type: BIOME
abstract: true

ocean:
  level: $meta.yml:ocean-level
  # Water level rises with the river's regional elevation so rivers at higher
  # terrain still have water in them.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      olevel: $meta.yml:ocean-level
    expression: if(continentalRiverDist(x,z)<0,olevel + continentalRiverBlockElevChange(x, z), olevel)

terrain:
  blend:
    distance: 3     # 0 = disabled (sharp edges)
    step: 3
    weight: 1.0
  min-density:
    sampler:
      dimensions: 3
      type: EXPRESSION
      expression: RiverSupportDensity(x,y,z)
    smooth: false      # Smooth or hard
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables:
      scale: $customization.yml:terrain-height
    expression: riverTerrainSampler(x, y, z) - scale * elevationDetailed(x, z)

  # sampler-2d matches neighboring land biomes (scale * elevationDetailed) so the
  # 2D elevation blend is continuous across the river boundary. The 3D sampler
  # subtracts the same value, keeping riverTerrainSampler's net contribution correct.
  sampler-2d:
    type: EXPRESSION
    dimensions: 2
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
