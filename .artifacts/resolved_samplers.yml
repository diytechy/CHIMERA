functions:
  clamp:
    arguments:
    - x
    - a
    - b
    expression: min(max(x, a), b)
  lerp:
    arguments:
    - t
    - at
    - a
    - bt
    - b
    expression: |-
      if(at<bt,
        if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
        if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
      )
  lerp3:
    arguments:
    - t
    - at
    - a
    - bt
    - b
    - ct
    - c
    expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
  herp:
    arguments:
    - t
    - at
    - a
    - bt
    - b
    expression: |
      if(at<bt,
        if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
        if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
      )
    functions:
      hermite:
        arguments:
        - x
        expression: 3*x^2-2*x^3
  parabolicMap:
    arguments:
    - t
    - bt
    - b
    - at
    - a
    expression: |
      if(at<bt,
        if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
        if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
      )
    functions:
      interpolation:
        arguments:
        - x
        expression: x^2
  maskSmooth:
    arguments:
    - v
    - lb
    - ub
    - m
    expression: |
      if(lb<ub,
        if(m<=lb,0,if(m>=ub,v,v*hermite((m-lb)/(ub-lb)))),
        if(m>=lb,0,if(m<=ub,v,v*hermite((m-lb)/(ub-lb))))
      )
    functions:
      hermite:
        arguments:
        - x
        expression: 3*x^2-2*x^3
  shelf:
    arguments:
    - x
