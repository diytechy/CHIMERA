              - bt
              - b
              expression: |
                if(at<bt,
                  if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                  if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                )
        herp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            hermite:
              arguments:
              - x
              expression: 3*x^2-2*x^3
        parabolicMap:
          arguments:
          - t
          - bt
          - b
          - at
          - a
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
              if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
            )
          functions:
            interpolation:
              arguments:
              - x
              expression: x^2
      variables:
        continentZero: -0.3
        continentFull: 0.35
        factorContinental: 1
        factorRiver: 1
        factorSpawnIsland: 1
        spawnIslandScale: 0.2
      samplers: {}
    int: true
    resolution: 4
  rawTemperature:
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x / temperatureScale / globalScale, z / temperatureScale / globalScale) * temperatureSpread + temperatureOffset
    variables:
      globalScale: 1
      temperatureScale: 1.2
      temperatureOffset: -0.0075
      temperatureSpread: 1.0325
    samplers:
      sampler:
        dimensions: 2
        type: TRANSLATE
        x: 10000
        z: 10000
        sampler:
          type: FBM
          gain: 0.4
          octaves: 2
          sampler:
            type: OPEN_SIMPLEX_2
            salt: 3.0
            frequency: 0.0002
  temperature:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: rawTemperature(x, z) - lerp(elevation(x, z), lapseStart, 0, 1, lapseRate)
      functions:
        lerp:
          arguments:
          - t
          - at
          - a
          - bt
          - b
          expression: |
            if(at<bt,
              if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
              if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
