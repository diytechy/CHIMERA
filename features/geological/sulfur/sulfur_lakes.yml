id: SULFUR_LAKES
type: FEATURE

# Mirrors vanilla sulfur_pool's PLACEMENT STRATEGY, which is what was missing:
# vanilla does count:256 random-XZ attempts PER CHUNK (in_square), spreading pools
# across the whole chunk and validating each against a cave floor.
#
# Our old PADDED_GRID (width 7/padding 5) only triggered at ~2 XZ columns per chunk,
# then RANDOM amount:40 stacked pools VERTICALLY in those same columns — so raising the
# amount never spread them out, it just stacked more in 2 spots.
#
# Now: a per-column noise trigger (SAMPLER) fires in many columns spread across the
# chunk, and a floor PATTERN drops a pool at the cave floor(s) in each. `threshold` is
# the density lever (higher = more columns = more pools).
distributor:
  type: SAMPLER
  sampler:
    type: POSITIVE_WHITE_NOISE
    salt: 9187
  threshold: 0.05

locator:
  type: PATTERN
  range:
    min: ${meta.yml:cave-bottom}
    max: ${meta.yml:cave-top}
  pattern:
    type: AND
    patterns:
      - type: MATCH_SOLID
        offset: 0       # cave-floor top block (carved into)
      - type: MATCH_AIR
        offset: 1       # open cave above -> the pool is visible

structures:
  distribution:
    type: CONSTANT
  structures: sulfur_lake
