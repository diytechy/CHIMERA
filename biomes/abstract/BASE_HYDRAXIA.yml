id: BASE_HYDRAXIA
type: BIOME
abstract: true
extends:
  - DEPOSITS_GENERIC
  - ORES_GENERIC
  - SULFUR_SPRING_SURFACE

slant-depth: 15

ocean:
  palette: BLOCK:minecraft:water
  level: 62
  palette: FROZEN_OCEAN

features:
  global-preprocessors:
    - LAVA_FLOOR
    #- UNDERGROUND_LAVA_COLUMNS
    - CONTAIN_FLOATING_WATER
    - CONTAIN_FLOATING_WATER_DEEPSLATE
    #- CAVE_GLOW_LICHEN
    - TEXTURED_STONE_SLANT
    #- CAVE_ENTRANCES
    #- CAVE_CARVERS
  underwater-flora:
    - KELP
    - SEAGRASS
    - SEA_PICKLES
    #- RIVER_SOULSAND
  structures:
    - MOB_ROOMS
    # World water elevators. The single WATER_ELEVATOR feature picks one column per grid cell
    # (PADDED_GRID) and self-selects the climate-matched roof (or skips on spot-centres/rivers)
    # in its structure distribution, so wiring it once here on BASE (all surface biomes; caves
    # use BASE_CAVE) yields one well per cell. Biomes that override 'structures' won't inherit it.
    - WATER_ELEVATOR
    # World abandoned camps (26.3 reconstruction). Same single-feature pattern: PADDED_GRID at
    # the vanilla camp spacing self-selects a climate-matched camp and skips ocean/spot/river.
    - ABANDONED_CAMP

colors:
  grass: 0xcfffe4
  foliage: 0xcffff4
  water: 0x80f9ff
  water-fog: 0x2ed5ff
  fog: 0xa8f5ff
  sky: 0x63fcff