id: FROSTY_FINGERS
type: BIOME
vanilla: minecraft:ice_spikes
extends:
- COLOR_FROZEN
- SNOWY_PLAINS
color: $biomes/colors.yml:ICE_SPIKES
tags:
- USE_RIVER
- LAND_CAVES
- SPECIAL_CAVES
variables: &id001
  base: $customization.yml:terrain-base-y-level
  scale: $customization.yml:terrain-height
  duneFactor: 0.4
  duneStart: 0
  duneEnd: 0.8
  mountainPeakStart: 0.5
  mountainPeakEnd: 0.9
  mountainPeakFactor: 0.2
  duneSpacing: 15
  duneFrequency: 0.24
  duneRotationRange: 0.07
terrain:
  sampler:
    type: EXPRESSION
    expression: -y + base
    variables: *id001
  sampler-2d:
    type: EXPRESSION
    expression: "scale *\ncombine(\n  combine(\n    elevation(x, z) * 0.1,\n    mountainPeakStart,\
      \ 0,\n    mountainPeakEnd, mountainPeaks(x,z) * mountainPeakFactor\n  ),\n \
      \ duneStart, dunes(x*duneFrequency,z*duneFrequency) * duneFactor,\n  duneEnd,\
      \ 0\n)\n"
    variables: *id001
    samplers:
      dunes:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 5
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.04
        sampler:
          type: DOMAIN_WARP
          amplitude: 15
          warp:
            type: OPEN_SIMPLEX_2
            frequency: 0.02
            salt: 1
          sampler:
            type: EXPRESSION
            variables: *id001
            expression: "-mask(x, z) * (-|sin((\n   x*sin(rotation(x,z)*duneRotationRange)\n\
              \  +z*cos(rotation(x,z)*duneRotationRange))/duneSpacing)|+1)\n"
            samplers:
              height:
                dimensions: 2
                type: CELLULAR
                frequency: 0.01
              rotation:
                dimensions: 2
                type: CELLULAR
                frequency: 0.01
                return: CellValue
              mask:
                dimensions: 2
                type: CELLULAR
                frequency: 0.01
                return: Distance2Div
      mountainPeaks:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 5
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.03
          salt: 812
        sampler:
          type: RIDGED
          octaves: 2
          sampler:
            type: OPEN_SIMPLEX_2
            frequency: 0.005
            salt: 7129
    functions:
      combine:
        arguments:
        - x
        - at
        - a
        - bt
        - b
        expression: x+lerp(x,at,a,bt,b)
        functions: $math/functions/interpolation.yml:functions
palette:
- SNOW: 319
- SAND: 62
- << meta.yml:palette-bottom
slant:
- threshold: 0.8
  palette:
  - ICE_STONE_MIX: 319
  - ICE_STONE_MIX_DARK: 74
  - << meta.yml:palette-bottom
features:
  trees:
  - ICE_SPIKES_VALLEY
  preprocessors:
  - ICE_COASTLINE
  postprocessors:
  - TREE_SNOW
