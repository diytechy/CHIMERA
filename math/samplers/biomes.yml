  BiomeShapeLandmassStandardTemperature:
    dimensions: 2
    type: CACHE
    size: 1
    sampler:
      type: CELLULAR
      frequency: 0.003333
      salt: 101
      jitter: 1.2
      distance: Hybrid
      return: NoiseLookup
      salt-lookup: false
      lookup:
        type: EXPRESSION
        expression: temperature(x, z)
        samplers:
