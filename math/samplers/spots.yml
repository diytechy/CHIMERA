variables: &variables
  spread: $customization.yml:spot-spread

  largeSpawnRadiusOffset: $customization.yml:large-spot-spawn-radius-offset

  biomeBorder: 20

  largeBiomeBorder: 100

  minRadius: $customization.yml:spot-radius-min
  maxRadius: $customization.yml:spot-radius-max

  minHeight: 0.05
  maxHeight: 0.5

  spotMinEdgeRadius: 0.1
  spotMaxEdgeRadius: 0.5

  largeMinRadius: $customization.yml:large-spot-radius-min
  largeMaxRadius: $customization.yml:large-spot-radius-max
  volcanoMinCenterDepth: 0.01
  volcanoMaxCenterDepth: 0.3

  prismaticMinCenterDepth: 0.01
  prismaticMaxCenterDepth: 0.15

smallCellular: &smallCellular
  dimensions: 2
  type: CELLULAR
  frequency: 1 / ${customization.yml:spot-spread}
  salt: 3
  jitter: 1-2*(${customization.yml:spot-radius-max}/${customization.yml:spot-spread})

largeCellular: &largeCellular
  dimensions: 2
  type: CELLULAR
  frequency: 1 / ${customization.yml:large-spot-spread}
  salt: 1236
  jitter: 1-2*(${customization.yml:large-spot-radius-max}/${customization.yml:large-spot-spread})

samplers:
  spotDistance: # Returns block distance from closest spot center
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 7
    warp:
      type: OPEN_SIMPLEX_2
      frequency: 0.015
    sampler:
      type: EXPRESSION
      expression: (noise(x, z)+1)*spread
      variables: *variables
      samplers:
        noise:
          <<: *smallCellular
          distance: Euclidean

  spotSizePercent: # Returns a random value between 0 and 1 that determines the size of the spot
    dimensions: 2
    type: PROBABILITY
    sampler:
      <<: *smallCellular
      return: CellValue

  spotRadius: # Returns the radius of the spot in blocks
    dimensions: 2
    type: EXPRESSION
    expression: lerp(spotSizePercent(x, z), 0, minRadius, 1, maxRadius)
    functions: $math/functions/interpolation.yml:functions
    variables: *variables
    samplers:
      spotSizePercent: $math/samplers/spots.yml:samplers.spotSizePercent

  spotAngle:
    <<: *smallCellular
    return: Angle

  nearSpot:
    dimensions: 2
    type: CACHE
    exp: 2
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: if(spotDistance(x, z) < spotRadius(x, z) + biomeBorder + 35, 1, -1)
      variables: *variables
      samplers:
        spotDistance: $math/samplers/spots.yml:samplers.spotDistance
        spotRadius: $math/samplers/spots.yml:samplers.spotRadius

  spotCenterRiverDistFar:
    <<: *smallCellular
    return: NoiseLookup
    lookup: $math/samplers/rivers.yml:samplers.continentalRiverDistFarGrid

  spotApproxRiverDist:
    dimensions: 2
    type: CACHE
    sampler:
      <<: *smallCellular
      return: NoiseLookup
      salt-lookup: false
      lookup:
        type: EXPRESSION
        expression: spotCenterRiverDistFar(x, z)
        samplers:
          spotCenterRiverDistFar: $math/samplers/spots.yml:samplers.spotCenterRiverDistFar

  spotCenterNotNearRiver:
    dimensions: 2
    type: EXPRESSION
    expression: if(spotApproxRiverDist(x,z)>150,1,0)
    samplers:
      spotApproxRiverDist: $math/samplers/spots.yml:samplers.spotApproxRiverDist

  spotCenterContinents:
    dimensions: 2
    type: CACHE
    sampler:
      <<: *smallCellular
      return: NoiseLookup
      salt-lookup: false
      lookup:
        type: EXPRESSION
        expression: continents(x, z)
        samplers:
          continents: $math/samplers/continents.yml:samplers.continents

  spotCenterOnOcean:
    dimensions: 2
    type: EXPRESSION
    expression: if(spotCenterContinents(x,z)<-0.1,1,0)
    samplers:
      spotCenterContinents: $math/samplers/spots.yml:samplers.spotCenterContinents

  spotCenterOnLand:
    dimensions: 2
    type: EXPRESSION
    expression: if((spotCenterContinents(x,z)>0 && spotCenterNotNearRiver(x,z)),1,0)
    samplers:
      spotCenterNotNearRiver: $math/samplers/spots.yml:samplers.spotCenterNotNearRiver
      spotCenterContinents: $math/samplers/spots.yml:samplers.spotCenterContinents

  spotBaseElevation: # Returns the elevation value at the center of the spot
    <<: *smallCellular
    return: NoiseLookup
    salt-lookup: false
    lookup:
      type: EXPRESSION
      expression: elevation(x, z)
      samplers:
        elevation: $math/samplers/elevation.yml:samplers.elevation

  largeSpotDistance: # Returns block distance from closest large spot center
    dimensions: 2
    type: DOMAIN_WARP
    amplitude: 7
    warp:
      type: OPEN_SIMPLEX_2
      frequency: 0.010
    sampler:
      type: EXPRESSION
      expression: (noise(x, z)+1)*spread
      variables: *variables
      samplers:
        noise:
          <<: *largeCellular
          distance: Euclidean

  largeSpotSizePercent: # Returns a random value between 0 and 1 that determines the size of the large spot
    dimensions: 2
    type: PROBABILITY
    sampler:
      <<: *largeCellular
      return: CellValue

  largeSpotRadius: # Returns the radius of the large spot in blocks
    dimensions: 2
    type: EXPRESSION
    expression: lerp(spotSizePercent(x, z), 0, minRadius, 1, maxRadius)
    functions: $math/functions/interpolation.yml:functions
    variables: *variables
    samplers:
      spotSizePercent: $math/samplers/spots.yml:samplers.largeSpotSizePercent

  largeSpotAngle:
    <<: *largeCellular
    return: Angle

  largeSpotBaseElevation: # Returns the elevation value at the center of the large spot
    <<: *largeCellular
    return: NoiseLookup
    salt-lookup: false
    lookup:
      type: EXPRESSION
      expression: elevation(x, z)
      samplers:
        elevation: $math/samplers/elevation.yml:samplers.elevation
  # ---
  # Volcano Samplers
  # ---
  spotEdgeRadiusPercent:
    dimensions: 2
    type: CACHE
    exp: 2
    sampler:
      <<: *smallCellular
      return: NoiseLookup
      lookup:
        type: EXPRESSION
        expression: quinticEaseInOut(noise(x, z)) # Use in/out easing to favour extreme values over middle values
        samplers:
          noise:
            dimensions: 2
            type: POSITIVE_WHITE_NOISE
            salt: 5812
        functions:
          quinticEaseInOut:
            arguments: [x]
            expression: if(x<0.5,16*x^5,1-((-2*x+2)^5)/2)

  spotEdgeRadius:
    dimensions: 2
    type: EXPRESSION
    expression: lerp(spotEdgeRadiusPercent(x, z), 0, spotMinEdgeRadius, 1, spotMaxEdgeRadius)
    functions: $math/functions/interpolation.yml:functions
    variables: *variables
    samplers:
      spotEdgeRadiusPercent: $math/samplers/spots.yml:samplers.spotEdgeRadiusPercent

  volcanoActivity:
    <<: *smallCellular
    return: NoiseLookup
    lookup:
      type: WHITE_NOISE
      salt: 4128

  volcanoCenterDepth:
    dimensions: 2
    type: EXPRESSION
    expression: lerp(spotSizePercent(x, z), 0, volcanoMinCenterDepth, 1, volcanoMaxCenterDepth)
    functions: $math/functions/interpolation.yml:functions
    variables: *variables
    samplers:
      spotSizePercent: $math/samplers/spots.yml:samplers.spotSizePercent

  prismaticCenterDepth:
    dimensions: 2
    type: EXPRESSION
    expression: lerp(spotSizePercent(x, z), 0, prismaticMinCenterDepth, 1, prismaticMaxCenterDepth)
    functions: $math/functions/interpolation.yml:functions
    variables: *variables
    samplers:
      spotSizePercent: $math/samplers/spots.yml:samplers.spotSizePercent

  volcanoErosion: # Creates streaks from the center of the volcano, emulating erosion
    dimensions: 2
    type: EXPRESSION
    expression: |
      noise(
        spotDistance(x, z) + spotSizePercent(x, z) * offsetAmplitude,
        sin(spotAngle(x, z)) * angleFrequency + spotSizePercent(x, z) * offsetAmplitude,
        cos(spotAngle(x, z)) * angleFrequency + spotSizePercent(x, z) * offsetAmplitude
      )
    variables:
      angleFrequency: 150
      offsetAmplitude: 10000 # Translates sample position per cell so the erosion pattern is unique for each volcano
    samplers:
      spotDistance: $math/samplers/spots.yml:samplers.spotDistance
      spotAngle: $math/samplers/spots.yml:samplers.spotAngle
      spotSizePercent: $math/samplers/spots.yml:samplers.spotSizePercent
      noise:
        dimensions: 3
        type: FBM
        octaves: 3
        sampler:
          type: OPEN_SIMPLEX_2
          frequency: 0.033

  #spotPlacer: -1 for oceanSpot, 0 for non-spot, 1 for landSpot
  spotPlacer:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(spotDistance(x, z) < spotRadius(x, z) + biomeBorder,
        if(spotCenterOnOcean(x,z), -1.0,
          if(spotCenterOnLand(x,z), 1.0, 0.0)),0.0)
    samplers:
      spotDistance: $math/samplers/spots.yml:samplers.spotDistance
      spotCenterOnOcean: $math/samplers/spots.yml:samplers.spotCenterOnOcean
      spotRadius: $math/samplers/spots.yml:samplers.spotRadius
      spotCenterOnLand: $math/samplers/spots.yml:samplers.spotCenterOnLand
    variables: $math/samplers/spots.yml:variables
