id: PRISMATIC_SPRING_SMOKE
type: FEATURE

# Steam/smoke rising off the DRY apron ring around the spring (distanceToPrismaticRim
# 0.02 .. 0.55, i.e. just outside the waterline). A signal campfire on dry ground emits
# a tall smoke column via the geothermal_steam_vent structure.
#
# Why this replaced the old in-pool emitter: the previous version located the campfire
# on the submerged floor (cyan_terracotta under water), where a campfire is extinguished
# and emits NO smoke. Placing the source on the exposed apron instead is what makes the
# smoke actually appear. Sparse via a white-noise mask gated to the apron band.

distributor:
  type: AND
  distributors:
    - type: SAMPLER
      sampler:
        type: EXPRESSION
        dimensions: 2
        expression: distanceToPrismaticRim(x, z)
      threshold: 0.00
    - type: PADDED_GRID
      width: 4
      padding: 2
      salt: 27377

locator:
  type: AND
  locators:
    - type: SURFACE
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: -1
          - type: MATCH
            block: minecraft:water
            offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: geothermal_steam_vent
