id: LAVA_CAVE_FLOOR
type: FEATURE

distributor:
  type: "YES"

locator:
  type: AND
  locators:
  - type: PATTERN
    range: &range
      max: -15
      min: -38
    pattern:
      type: MATCH_AIR
      offset: 0
  - type: SAMPLER_3D
    range: *range
    sampler:
      type: EXPRESSION
      expression: -special_caves(x,y,z)
    threshold: 0.05

structures:
  distribution:
    type: CONSTANT
  structures: BLOCK:minecraft:lava