stages:
#Create mesa distributions
  - type: REPLACE_LIST
    from: land
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: (mesaPresent(x, z)>0)
    samplers:
      mesaPresent: $math/samplers/elevation.yml:samplers.mesaPresent
    default-from: land
    #Note, keep order / distribution the same below so that coasts are aligned with their major regions.
    default-to:
      SELF: 2
      mesa: 1
    to:
      coast:
        SELF: 2
        mesa: 1
#Create vast forest distributions
  - type: REPLACE_LIST
    from: land
    sampler:
      dimensions: 2
      type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
      amplitude: 60 
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.002
      sampler:
        type: CELLULAR
        return: CellValue
        frequency: 1 /  ${customization.yml:biomeSpread.regionDistance}
    default-from: land
    #Note, keep order / distribution the same below so that coasts are aligned with their major regions.
    default-to:
      vast-forest: 1
      SELF: 6
    to:
      coast:
        vast-forest-coast: 1
        SELF: 6