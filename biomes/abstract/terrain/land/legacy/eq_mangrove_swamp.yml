id: EQ_MANGROVE_SWAMP
type: BIOME
abstract: true

vars: &variables
  base: ${customization.yml:terrain-base-y-level} - 9
  height: 14

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: -y + base + BiomeShapeFlattenedElevation(x,z) + (noise(x,z)+1)/2 * height * biomeInfluence(x,z)
    samplers:
      noise:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 30
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.005
        sampler:
          type: FBM
          octaves: 2
          sampler:
            type: OPEN_SIMPLEX_2
            frequency: 0.0275

  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
