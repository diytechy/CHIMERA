id: EQ_PLAINS
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  height: 10

terrain:
  sampler:
    type: EXPRESSION
    dimensions: 3
    variables: *variables
    expression: -y+base+BiomeShapeLandmassBaseOffset(x,z)

  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables: *variables
    expression: (simplex2(x, z)+1)/2 * height