            frequency: 0.0002
  temperature:
    dimensions: 2
    type: EXPRESSION
    expression: rawTemperature(x, z) - lerp(tempElevationReference(x, z), lapseStart, 0, 1, lapseRate)
    functions:
      lerp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
            if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
          )
      lerp3:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        - ct
        - c
        expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
        functions:
          lerp:
            arguments:
            - t
            - at
            - a
            - bt
            - b
            expression: |
              if(at<bt,
                if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
              )
      herp:
        arguments:
        - t
        - at
        - a
        - bt
        - b
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          hermite:
            arguments:
            - x
            expression: 3*x^2-2*x^3
      smoothstep:
        arguments:
        - edge0
        - edge1
        - x
        expression: |
          if(x <= edge0, 0,
            if(x >= edge1, 1,
              ((x - edge0) / (edge1 - edge0))^2 * (3 - 2 * ((x - edge0) / (edge1 - edge0)))
            )
          )
      parabolicMap:
        arguments:
        - t
        - bt
        - b
        - at
        - a
        expression: |
          if(at<bt,
            if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
            if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
          )
        functions:
          interpolation:
            arguments:
            - x
            expression: x^2
    variables:
      lapseRate: 0.7
      lapseStart: 0.2
