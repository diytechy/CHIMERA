id: WATER_ELEVATOR_BOREAL
type: FEATURE
extends: WATER_ELEVATOR_SURFACE_LOCATOR

# BOREAL water-elevator variant (stone-brick roof). See WATER_ELEVATOR_FROZEN for the full
# rationale. Shares the waterElevatorPlacement sampler with the other variants and gates on
# the boreal temperature band, so each grid cell yields exactly one climate-matched well.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(temperature(x, z) >= -0.5 && temperature(x, z) < 0.0, waterElevatorPlacement(x, z), 1)
    samplers:
      temperature: $math/samplers/temperature.yml:samplers.temperature
      waterElevatorPlacement: $math/samplers/spots.yml:samplers.waterElevatorPlacement
  threshold: 0

structures:
  distribution:
    type: CONSTANT
  structures: water_elevator_boreal
