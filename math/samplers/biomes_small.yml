BaseBiomeCell: &BaseBiomeCell
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
  jitter: 0.9
  distance: Hybrid

_landmassShape: &landmassShape
  <<: *BaseBiomeCell
  salt: 101

_highlandShape:
  <<: *BaseBiomeCell
  salt: 102

_oceanShape: &oceanShape
  <<: *BaseBiomeCell
  salt: 105

_outerWarpSmall: &outerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpSmall: &midWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpSmall: &innerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001


samplers:
  BiomeShapeLandmassValue:
    dimensions: 2
    type: CACHE
    int: true
    resolution: 2
    sampler:
      <<: *outerWarpSmall
      sampler:
        <<: *midWarpSmall
        sampler:
          <<: *innerWarpSmall
          sampler:
            <<: *landmassShape
            return: CellValue

  BiomeShapeLandmassTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false

  BiomeShapeLandmassPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeLandmassBaseOffset:
    dimensions: 2
    type: CACHE
    sampler:
      type: EXPRESSION
      dimensions: 2
      expression: max(elevation(x,z) * offset_scale * land_scale * 1.5, 0)
      samplers:
        elevation: $math/samplers/elevation.yml:samplers.elevation
      variables:
        land_scale: $customization.yml:terrain-height
        offset_scale: $customization.yml:terrain-base-biome-shift

    int: true
    resolution: 2

  BiomeShapeOceanValue:
    dimensions: 2
    type: CACHE
    int: true
    resolution: 2
    sampler:
      <<: *outerWarpSmall
      sampler:
        <<: *midWarpSmall
        sampler:
          <<: *innerWarpSmall
          sampler:
            <<: *oceanShape
            return: CellValue
            
  BiomeShapeOceanValue2:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: NoiseLookup
          lookup:
            type: WHITE_NOISE
            salt: 4233
          salt-lookup: false

  BiomeShapeOceanTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false

  BiomeShapeOceanContinents:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: NoiseLookup
          lookup: $math/samplers/continents.yml:samplers.continents
          salt-lookup: false

