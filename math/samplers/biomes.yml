BaseBiomeCell: &BaseBiomeCell
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
  jitter: 1.2
  distance: Hybrid

BaseBiomeCellLarge: &BaseBiomeCellLarge
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistanceLarge}
  jitter: 1.2
  distance: Hybrid

_landmassShape: &landmassShape
  <<: *BaseBiomeCell
  salt: 101

_highlandShape: &highlandShape
  <<: *BaseBiomeCell
  salt: 102

_mesaShape: &mesaShape
  <<: *BaseBiomeCellLarge
  salt: 103

_largelandShape: &largelandShape
  <<: *BaseBiomeCellLarge
  salt: 104

_oceanShape: &oceanShape
  <<: *BaseBiomeCell
  salt: 105

# Shared warp layer definitions (used via << merge in samplers below)
_outerWarpSmall: &outerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpSmall: &midWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpSmall: &innerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001

_outerWarpLarge: &outerWarpLarge
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpLarge: &midWarpLarge
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpLarge: &innerWarpLarge
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001

    
# Shared warp layer definitions (used via << merge in samplers below)

samplers:
  BiomeShapeLandmassValue:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: CellValue

  BiomeShapeLandmassTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false
          
  BiomeShapeLandmassPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeHighlandValue:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *highlandShape
          return: CellValue

  BiomeShapeHighlandTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *highlandShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false
          
  BiomeShapeHighlandPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *highlandShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeMesaValue:
    <<: *outerWarpLarge
    sampler:
      <<: *midWarpLarge
      sampler:
        <<: *innerWarpLarge
        sampler:
          <<: *mesaShape
