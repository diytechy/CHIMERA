id: RIVER_SOULSAND
type: FEATURE

#distributor:
#  type: "YES"

distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(continentalRiverBlockElevShift(x,z),-1,1)
    #expression: |
    #  1-continentalRiverBlockElevShift(x,z)
    samplers:
      continentalRiverBlockElevShift: $math/samplers/rivers.yml:samplers.continentalRiverBlockElevShift
  #threshold: 0.5
  #threshold: 0.0

#Method:
  #Block is solid AND
  #Above block is water AND
  #Water surface changes height:
    #A. For the first air block above the water surface an adjacent block next to the air is water.
    #B. The continentalRiverBlockElevChange sampler changes between current block position and adjacent.
locator:
  type: PATTERN
  range:
    min: ${meta.yml:ocean-level} -25
    max: ${customization.yml:terrain-height}
  pattern:
    type: AND
    patterns:
      - type: MATCH_SOLID
        offset: 0
      - type: MATCH
        block: minecraft:water
        offset: 1

structures:
  distribution:
    type: CONSTANT
  #NOTE: The plugin "BubblesOnChunkGen" is needed to convert blue concrete to soulsand
  #This method is used to ensure the tick update occurs and actually produces a bubble column.
  structures: BLOCK:minecraft:blue_concrete

  