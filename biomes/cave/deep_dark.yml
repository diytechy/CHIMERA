id: DEEP_DARK
type: BIOME
extends:
  - CAVE
color: $biomes/colors.yml:DEEP_DARK

vanilla: minecraft:deep_dark

colors:
  fog: 0x000000
  water: 0x102e38
  water-fog: 0x171921
  sky: 0x1c2742
  grass: 0x163b46
  foliage: 0x195a58

climate:
  precipitation: true
  temperature: 1.0
  downfall: 1.0
tags:
  - SPECIAL_CAVES
  - DEEP_DARK
palette:
  - BLOCK:minecraft:stone: $meta.yml:top-y
  - << meta.yml:palette-bottom

features:
  preprocessors:
    - SCULK_WEBS
    - SCULK_PATCHES
    - SCULK_TENDRIL
  trees:
    - SCULK_BLOBS
    # Vanilla-style cheaper alternative (surface random-walk). To A/B compare, comment
    # out SCULK_BLOBS above and enable SCULK_SPREAD below — they seed at the same spots.
    #- SCULK_SPREAD
  flora:
    - SCULK_FLORA