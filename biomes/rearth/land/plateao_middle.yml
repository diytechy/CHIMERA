id: FOLIAGE_FORTRESS_MIDDLE
type: BIOME
vanilla: minecraft:savanna
extends:
- CARVING_LAND
- BASE
color: $biomes/colors.yml:SAVANNA
colors:
  grass: 8567917
  foliage: 6662473
  water: 937679
  water-fog: 12638463
tags:
- USE_RIVER
- LAND_CAVES
- SPECIAL_CAVES
- TEMPERATE_COAST_FLAT
vars: &id001
  base: 69
  top: 109
  topWidth: 6
  biomeVariationStrength: 15
  surfaceVariationStrength: 8
  scale: $customization.yml:terrain-height
terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *id001
    expression: |
      max(
        -y + base,
        -abs(top - y - topWidth) + topWidth
      ) + wallVariation(x,y,z) * clamp((-abs(base + (top - base) / 2 - y) + 10), 0, 1) * 10
    samplers:
      wallVariation:
        dimensions: 3
        type: OPEN_SIMPLEX_2S
        frequency: 0.035
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
palette:
- GRASS_VARIATION: 319
- GRASS_MUSHY: 78
- MUDDY_BEACH: 63
- << meta.yml:palette-bottom
slant:
- threshold: 0.3
  palette:
  - BLOCK:minecraft:stone: 319
  - << meta.yml:palette-bottom
features:
  preprocessors:
  - PLATEAO_PILLARS
  flora:
  - GRASS
  - TALL_GRASS
  - CROSSING_VINES
  - LARGE_LEAF_VINES
  - LARGE_CEILING_VINES
  - POPPY_PATCH
  - DANDELION_PATCH
  - ROSE_BUSH_PATCH
  - PEONY_PATCH
  - LILAC_PATCH
  - LILY_OF_THE_VALLEY_PATCH
  trees:
  - SPARSE_ACACIA_TREES
