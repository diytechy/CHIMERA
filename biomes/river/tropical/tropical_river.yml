id: TROPICAL_RIVER
type: BIOME
extends:
  - RIVER_BASIC
  - ENVIRONMENT_MARINE_RIVER_WARM
  - EQ_GLOBAL_RIVER
  - CARVING_OCEAN
  - BASE
color: $biomes/colors.yml:TROPICAL_RIVER

vanilla: minecraft:river

ocean:
  level: $meta.yml:ocean-level
  # Water level varies ±3 blocks with regional terrain elevation so that the river
  # surface follows the landscape gradient rather than sitting at a fixed Y.
  sampler:
    dimensions: 2
    type: EXPRESSION
    variables:
      base: $meta.yml:ocean-level
    expression: base + elevation(x, z) * 3

palette:
  - GRASS: $meta.yml:top-y
  - MUDDY_BEACH: ${meta.yml:ocean-level} + 3
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.8
    palette:
      - GRASS: $meta.yml:top-y
      - MUDDY_BEACH: ${meta.yml:ocean-level} - 1
      - << meta.yml:palette-bottom
  - threshold: 0.5
    palette:
      - BLOCK:minecraft:stone: $meta.yml:top-y
      - << meta.yml:palette-bottom

colors:
  grass: 0x8eb971
  foliage: 0x71a74d
  water: 0x02b0e5
  water-fog: 0x0686ca

features:
  flora:
    - SUGAR_CANE
    - GRASS
    - SEA_PICKLES