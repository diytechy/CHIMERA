stages:
  - type: REPLACE
    from: 
      - tundra
      - boreal-snowy
      - boreal-cold
    sampler:
      dimensions: 2
      type: EXPRESSION
      variables: 
        edgeThreshold: ${customization.yml:biomeSpread.borderBiomes.edgeThreshold}
      expression: if(cells(x,z) < -edgeThreshold, 1, -1)
      samplers:
        cells:
          dimensions: 2
          type: CELLULAR
          jitter: ${customization.yml:biomeSpread.cellJitter}
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
    to: # 0 = outer, 1 = inner
      SELF: 1
      ICY_INCISIONS: 1
  - type: REPLACE
    from: 
      - temperate-warm
      - temperate-hot
      - tropical-monsoon
      - tropical-rainforest
    sampler:
      dimensions: 2
      type: EXPRESSION
      variables: 
        edgeThreshold: ${customization.yml:biomeSpread.borderBiomes.edgeThreshold}
      expression: if(cells(x,z) < -edgeThreshold, 1, -1)
      samplers:
        cells:
          dimensions: 2
          type: CELLULAR
          jitter: ${customization.yml:biomeSpread.cellJitter}
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
    to: # 0 = outer, 1 = inner
      SELF: 1
      _warm_canyon: 1
  - type: REPLACE
    sampler:
      type: EXPRESSION
      dimensions: 2
      variables:
        canyonStrength: ${customization.yml:biomeSpread.canyons.canyonAmount}
      expression: |
        min(max(-mask(x,z * 1.3) - canyonStrength, 0) * 18, 1) *
        max((-abs(base(x,z)) + 0.3) * 2, 0) * (1 / 0.2)
      samplers:
        base:
          dimensions: 2
          type: OPEN_SIMPLEX_2S
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance} * 1
        mask:
          dimensions: 2
          type: CELLULAR
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance} * 0.15
          seed: 23456345
    from: _warm_canyon
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    to:
      SELF: 16
      SANDY_SPLITS: 5