samplers:
  #Determines the variance
  continental_large_features_allowed_threshold_with_variance:
    dimensions: 2
    type: EXPRESSION
    expression: (applied_threshold_variance(x,z)-0.5)*variance  + nominal_value
    variables:
      nominal_value: $customization.yml:continental-large-features-allowed-threshold
      variance: $customization.yml:continental-large-feature-allowed-threshold-variance
    samplers:
      applied_threshold_variance:
        dimensions: 2
        type: PROBABILITY
        sampler:
          #type: OPEN_SIMPLEX_2
          type: PERLIN
          salt: 697.0
          #frequency: 1/300
          frequency: (1 / ${customization.yml:continental-large-features-threshold-variance-distance})
  PeakHeightMultiplierAtPosition:
    dimensions: 2
    type: EXPRESSION
    expression: (max_elev_prob(x,z)*VarianceRatio + (1 - VarianceRatio))
    variables:
      VarianceRatio: $customization.yml:continental-MaxPeakVariability
    samplers:
      max_elev_prob:
        dimensions: 2
        type: PROBABILITY
        sampler:
          type: OPEN_SIMPLEX_2
          salt: 697.0
          #frequency: 1/300
          frequency: (1 / ${customization.yml:continental-large-features-threshold-variance-distance})
  # continental_landmass: Large-scale landmass shape.
  #   Low frequency = very large features (continents, major landmasses).
  #   Used as base terrain and for coastal rolloff calculation.
  continental_sampler:
    dimensions: 2
    type: CACHE
    sampler:
      type: EXPRESSION
      expression: sampler(x - 100000, z - 100000)
      samplers:
        sampler:
          dimensions: 2
          type: TRANSLATE
          x: 10000
          z: 10000
          sampler:
            type: FBM
            gain: 0.7
            octaves: 3
            lacunarity: 1.8121866
            sampler:
              type: PERLIN
              frequency: (1 / ${customization.yml:continental-baseline-distance})
  continental_landmass:
    dimensions: 2
    type: EXPRESSION
    # Assumes range from -0.5 to 0.5 from continental_sampler.
    expression: |
      if(continental_sampler(x,z) < island_threshold,
        // Islands: 0 to max island ratio, need to normalize with land range
        lerp(continental_sampler(x,z),-0.5,max_island_ratio,island_threshold,-1),
        if(continental_sampler(x,z) < land_threshold,
          //Ocean: 0 to 1
          lerp(continental_sampler(x,z),island_threshold,-1,land_threshold,0),
          //Check for lakes / continental land-masses.
          if(continental_sampler(x,z) > lake_threshold,
            // Lakes: 0 to -max lake ratio, need to normalize with ocean range.
            lerp(continental_sampler(x,z),lake_threshold,1,0.5,-max_lake_ratio),
            // Continents: 0 to 1
            lerp(continental_sampler(x,z),land_threshold,0,lake_threshold,1)
          )
        )
      )
    variables:
      island_threshold: $customization.yml:continental-island-threshold
      land_threshold: $customization.yml:continental-land-threshold
      lake_threshold: $customization.yml:continental-lake-threshold
      max_island_ratio: $customization.yml:continental-max-island-ratio
      max_lake_ratio: $customization.yml:continental-max-lake-ratio
    samplers:
      continental_sampler: $math/samplers/continents.yml:samplers.continental_sampler
    functions: $math/functions/interpolation.yml:functions
  islandMask:
    dimensions: 2
    type: EXPRESSION
    expression: if(continental_sampler(x,z) < ((island_threshold+land_threshold)/2), 1, -1)
    variables:
      island_threshold: $customization.yml:continental-island-threshold
      land_threshold: $customization.yml:continental-land-threshold
    samplers:
      continental_sampler: $math/samplers/continents.yml:samplers.continental_sampler
  mnt_and_ocean_valleys:
    dimensions: 2
    type: FBM
    octaves: 5
    lacunarity: 2.2
    gain: 0.55
    sampler:
      type: PERLIN
      frequency: (1 / ${customization.yml:continental-mountain-range-sampler-freq})
      salt: 300
  mountain_gen_region:
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x - 3000, z - 3000)
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:continental-scale
    samplers:
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        lacunarity: 2.0
        gain: 0.4
        sampler:
          type: PERLIN
          frequency: (1 / ${customization.yml:continental-mountain-region-allowed-distance})
          salt: 100
  mesa_gen_region:
    dimensions: 2
    type: EXPRESSION
    expression: sampler(x - 6000, z - 6000)
    variables:
      globalScale: $customization.yml:global-scale
      scale: $customization.yml:continental-scale
    samplers:
      sampler:
        dimensions: 2
        type: FBM
        octaves: 2
        lacunarity: 2.0
        gain: 0.4
        sampler:
          type: PERLIN
          frequency: (1 / ${customization.yml:continental-mesa-region-allowed-distance})
          salt: 200

  continents:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        max(
          sampler(x / scale / globalScale, z / scale / globalScale),
          spawnIsland(x, z)
        )
      variables:
        globalScale: $customization.yml:global-scale
        scale: $customization.yml:continental-scale
      samplers:
        spawnIsland: $math/samplers/spawnIsland.yml:samplers.spawnIsland
        sampler:
          dimensions: 2
          type: DOMAIN_WARP
          amplitude: 1500
          sampler: $math/samplers/continents.yml:samplers.continental_landmass
          warp:
            type: RIDGED
            lacunarity: 3
            gain: 0.45
            octaves: 4
            sampler:
              type: OPEN_SIMPLEX_2
              salt: 1
              frequency: (1/5000)

  blotSpots:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        if(max(spotCenterOnLand(x,z),spotCenterOnOcean(x,z)),
          spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2),
          -1)

      variables:
        globalScale: $customization.yml:global-scale
        spotContinentalFactor: 0.3
      samplers:
        spawnIsland: $math/samplers/spawnIsland.yml:samplers.spawnIsland
        spotDistance: $math/samplers/spots.yml:samplers.spotDistance
        spotRadius: $math/samplers/spots.yml:samplers.spotRadius
        continents: $math/samplers/continents.yml:samplers.continents
        spotCenterOnLand: $math/samplers/spots.yml:samplers.spotCenterOnLand
        spotCenterOnOcean: $math/samplers/spots.yml:samplers.spotCenterOnOcean

  continentsWithSpots:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        max(
          continents(x, z),
          blotSpots(x,z))
      samplers:
        blotSpots: $math/samplers/continents.yml:samplers.blotSpots
        continents: $math/samplers/continents.yml:samplers.continents

  continentalDistribution:
    dimensions: 2
    type: CACHE
    sampler:
      dimensions: 2
      type: EXPRESSION
      expression: |
        if(continentsWithSpots(x,z)>=0,continentsWithSpots(x,z),-1)
      samplers:
        continentsWithSpots: $math/samplers/continents.yml:samplers.continentsWithSpots



############# UNUSED ##############

  continentBorder:
    dimensions: 2
    type: EXPRESSION
    expression: |
      if(inRange(continents(x, z), -threshold, threshold),
        if(continentsEdge((x-width)/width, (z-width)/width) != 0, 1, -1),
        -1
      )
    variables: &continentBorderVariables
      width: ${customization.yml:continental-coast-width} * ${customization.yml:global-scale}
      threshold: $customization.yml:continental-coast-width
    functions:
      inRange:
        arguments:
        - x
        - lower
        - upper
        expression: x >= lower && x <= upper
    samplers:
      continents: $math/samplers/continents.yml:samplers.continents
      continentsEdge:
        dimensions: 2
        type: KERNEL
        kernel: [[0, 1, 0], [1, -4, 1], [0, 1, 0]]
        sampler:
          type: EXPRESSION
          expression: continents(x*width, z*width) > 0
          variables: *continentBorderVariables
          samplers:
            continents: $math/samplers/continents.yml:samplers.continents
