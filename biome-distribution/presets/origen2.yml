biomes:
  type: EXTRUSION
  extrusions:
    - << biome-distribution/extrusions/add_special_caves.yml:extrusions
    - << biome-distribution/extrusions/add_cave_biomes.yml:extrusions
    - << biome-distribution/extrusions/add_deep_dark.yml:extrusions
  provider:
    type: PIPELINE
    resolution: 4
    blend:
      amplitude: 6
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 0.012
    pipeline:
      source:
        type: SAMPLER
        sampler:
          type: CELLULAR
          jitter: ${customization.yml:biomeSpread.cellJitter}
          return: NoiseLookup
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
          lookup:
            type: EXPRESSION
            expression: continents(x, z)
        biomes:
          ocean: 2
          land: 3
          #Generate initial biome distribution of land and ocean.
      stages:
        #Add spots to drop large POIs like volcanos / mesas
        #Input: ocean / land
        #Output: ocean / land / various spot locations (mesa / volcano) / coastal regions.
        - << biome-distribution/stages/add_spots.yml:stages
        
        #Break apart land into major transitionals
        #Input: ocean / land
        #Output: land / vast-forest / island / ocean.
        - << biome-distribution/stages/add_large_spots.yml:stages
        
        
        #Add coast-lines between land / ocean.  Might need to return and add transition from forest?
        #Input: ocean / land
        #Output: ocean / land / coast
        - << biome-distribution/stages/add_coast.yml:stages
        
        
        #Split land into canyon (effectively a basin) / land distribution.
        #Input: land
        #Output: land, ICY_INCISIONS, SANDY_SPLITS (temperature based)
        - << biome-distribution/stages/special/canyons.yml:stages
        
        #Future placeholder to add sinkholes
        #Input: land
        #Output: sink hole zones
        
        #Using temperature / precipitation / elevation, generate biome distribution.
        - << biome-distribution/stages/climate/temperature.yml:stages
        - << biome-distribution/stages/climate/precipitation.yml:stages
        - << biome-distribution/stages/climate/elevation.yml:stages
        
        
        #Build out coast lines and islands.
        - << biome-distribution/stages/add_large_spot_coast.yml:stages
        - << biome-distribution/stages/add_island_shelf.yml:stages
        - << biome-distribution/stages/add_islands.yml:stages
        - << biome-distribution/stages/climate/color.yml:stages
        
        #Add in terraces
        - << biome-distribution/stages/add_travertine_terraces.yml:stages
        
        #Place remaining biome regions into actual biome definitions
        - << biome-distribution/stages/set_biomes_in_climates.yml:stages
        
        #Add color variants to special biomes.
        - << biome-distribution/stages/add_biome_color_variants.yml:stages
        
        #Integrate special borders.
        - << biome-distribution/stages/special/border_biomes.yml:stages

        - type: FRACTAL_EXPAND
          sampler:
            type: WHITE_NOISE
        - type: SMOOTH
          sampler:
            type: WHITE_NOISE

        - << biome-distribution/stages/add_rivers.yml:stages
        
        - type: SMOOTH
          sampler:
            type: WHITE_NOISE


        - << biome-distribution/stages/add_trenches.yml:stages
