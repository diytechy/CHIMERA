id: AMETHYST_CLUSTER_STRIPS
type: FEATURE

distributor:
  type: "YES"

locator:
  # Place a cluster on an AIR cell that has budding amethyst above, below, or
  # horizontally adjacent. The air check comes first so the (cheap) MATCH_AIR
  # rejects the majority-solid cells before the (expensive) ADJACENT_PATTERN
  # neighbour scan runs, and so clusters are never buried inside solid rock
  # (matches vanilla GeodeFeature, which only grows clusters into air/water).
  # Range is trimmed to the cave band since budding amethyst only exists there.
  type: AND
  locators:
    - type: PATTERN
      range: &range
        min: ${meta.yml:cave-bottom}
        max: ${meta.yml:cave-top}
      pattern:
        type: MATCH_AIR
        offset: 0
    - type: OR
      locators:
        - type: PATTERN
          range: *range
          pattern:
            type: MATCH
            block: minecraft:budding_amethyst
            offset: -1
        - type: PATTERN
          range: *range
          pattern:
            type: MATCH
            block: minecraft:budding_amethyst
            offset: 1
        - type: ADJACENT_PATTERN
          range: *range
          pattern:
            type: MATCH
            block: minecraft:budding_amethyst
            offset: 0

structures:
  distribution:
    type: WHITE_NOISE
  structures: amethyst_cluster_strips