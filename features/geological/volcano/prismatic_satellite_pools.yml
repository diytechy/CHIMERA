id: PRISMATIC_SATELLITE_POOLS
type: FEATURE

# Small secondary hot pools dotted around the apron (distanceToPrismaticRim
# 0.15 .. 0.50). Rare, so each spring gets only a handful.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    dimensions: 2
    # place where value < threshold; out-of-band sentinel 1 never places.
    expression: if(distanceToPrismaticRim(x, z) > 0.15 && distanceToPrismaticRim(x, z) < 0.50, rarity(x, z), 1)
    samplers:
      rarity:
        dimensions: 2
        type: POSITIVE_WHITE_NOISE
        salt: 71012
  threshold: 0.01

locator:
  type: AND
  locators:
    - type: SURFACE
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: -1
          - type: MATCH_AIR
            offset: 0

structures:
  distribution:
    type: CONSTANT
  structures: geothermal_pool
