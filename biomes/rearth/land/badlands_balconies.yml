id: BADLANDS_BALCONIES
type: BIOME
vanilla: minecraft:badlands
color: $biomes/colors.yml:BADLANDS_BUTTES
extends:
- CARVING_LAND
- BASE
tags:
- USE_BAD_BALCOONIES_RIVER
- LAND_CAVES
- SPECIAL_CAVES
- TROPICAL_COAST_FLAT
colors:
  grass: 12433235
  foliage: 11379754
  water: 13494015
  water-fog: 13494015
vars: &id001
  base: 65
  height: 54
  variationHeight: 4
  terraceHeight: 2.5  // inverted
  terraceThinness: 3.3
  terraceStrength: 13
terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *id001
    expression: "// positive / higher = solid\n-y + base + (height / 2)\n+ lerp(mountainBasicShape(x,z)\
      \ * height, \n  -10, lerp(terracingMask(x,z), \n    0.2, mountainResult(x,z),\
      \ \n    -0.2, mountainBasicShape(x,z) * height + vallyNoise(x,z) * variationHeight\
      \ * 4\n    ),\n  -25, vallyNoise(x,z) * variationHeight - 30\n)\n"
    samplers:
      mountainBasicShape: &id002
        dimensions: 2
        type: OPEN_SIMPLEX_2S
        frequency: ${customization.yml:biomeSpread.mountainFrequency}
      vallyNoise:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.02
        octaves: 2
        lacunarity: 3
        gain: 0.3
      terracingMask:
        dimensions: 2
        type: CELLULAR
        frequency: 0.025
        jitter: 0.7
        return: CellValue
      mountainResult:
        dimensions: 2
        type: EXPRESSION
        variables: *id001
        expression: 'terrace(mountainBasicShape(x,z) * 2.5, 7) * height / 2.5

          '
        functions:
          terrace:
            arguments:
            - x
            - terraceStrength
            expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
        samplers:
          mountainBasicShape: *id002
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
slant-depth: 20
slant:
- threshold: 0.7
  palette:
  - TERRACOTTA_STRATA_RED: 319
  - TERRACOTTA_STRATA: 98
  - TERRACOTTA_STRATA_VERTICAL: 82
  - SAND: 63
palette:
- WOODED_BADLANDS: 319
- WOODED_BADLANDS_LOW: 75
- SAND: 64
- << meta.yml:palette-bottom
features:
  flora:
  - GRASS_SPARSE
  trees:
  - BADLANDS_OAK_TREES
  - OAK_BUSH_PATCHES
  - DEAD_TREES_SPARSE
