id: EQ_BAMBOO_BASIN
type: BIOME
abstract: true

vars: &variables
  base: $customization.yml:terrain-base-y-level
  height: 3

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    # Works but not very much water, with height 3:
    #expression: |
    #  // positive / higher = solid
    #  -y + base + BiomeShapeSealevelElevation(x,z) 
    #  - 3 * biomeInfluence(x,z)
    #  + (min(-cells(x,z), 0.8) * height * biomeInfluence(x,z)
    #  + riverMask(x, y, z) * 10) * biomeInfluence(x,z)
    expression: |
      // positive / higher = solid
      -y + base + BiomeShapeSealevelElevation(x,z) 
      //Shift elevation down to get near ocean level.
      - 1.5 * biomeInfluence(x,z)
      + (min(-cells(x,z), 0.8) * height
      //Erode for rivers / lakes to form.
      + riverMask(x, y, z) * 30) * biomeInfluence(x,z)
    samplers:
      cells:
        dimensions: 2
        type: CELLULAR
        frequency: 0.045
        jitter: 0.9
        return: NoiseLookup
        lookup:
          dimensions: 2
          type: LINEAR
          min: -1
          max: 0.2
          sampler: &cellMountains
            dimensions: 2
            type: CELLULAR
            frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
            jitter: ${customization.yml:biomeSpread.cellJitter}
            distance: Euclidean
      riverMask:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          clamp(abs(abs(riverBaseAngle(x,z) * 3) +    // basic line from center
            riverAngleVariation(cellMountains(x,z) * 300, 0) * 0.24   // vary angle slightly going outwards
            - rivers(x,z)) % (6.28 / 5) * lerp(cellMountains(x,z), -0.98, -0.15, -0.2, 3.5) // ensure river has proper width, add lake on top
            - 0.25, -0.21, 0)   // set river width, clamp at max depth
        samplers:
          cellMountains: *cellMountains
          rivers:
            dimensions: 2
            type: CELLULAR
            frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
            jitter: ${customization.yml:biomeSpread.cellJitter}
            distance: Euclidean
            return: Angle
          riverAngleVariation:
            dimensions: 2
            type: OPEN_SIMPLEX_2S
            frequency: 0.014
          riverBaseAngle:
            dimensions: 2
            type: CELLULAR
            frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
            jitter: ${customization.yml:biomeSpread.cellJitter}
            distance: Euclidean
            return: CellValue
