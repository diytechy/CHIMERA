# ExploreExpand preset - Biomes NOT in default, origen2, or rearth presets
# This preset contains only biomes that don't appear in the main presets,
# allowing exploration of rare/unused biomes. Not intended for normal gameplay.

biomes:
  type: EXTRUSION
  extrusions:
    # All cave extrusions
    - << biome-distribution/extrusions/add_special_caves.yml:extrusions
    - << biome-distribution/extrusions/extrude_caverns.yml:extrusions 
    - << biome-distribution/extrusions/add_cave_biomes.yml:extrusions
    - << biome-distribution/extrusions/add_deep_dark.yml:extrusions
  provider:
    type: PIPELINE
    resolution: 4
    blend:
      amplitude: 6
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 0.02
    pipeline:
      source:
        type: SAMPLER
        sampler:
          type: EXPRESSION
          expression: spotPlacer(x, z)
        biomes:
          _ocean_spot: 1
          _non_spot: 1
          _land_spot: 1
      stages:
        
        #********* This section should only be uncommented to test intermittent distribution before climate
        #Input: All distributions so far
        #Resolvable biomes
        #- << biome-distribution/stages/PopulateTestBiomes.yml:stages
        #- << biome-distribution/stages/PopulateTestStage.yml:stages
        #*************************************
        
        ##Add spots to drop large POIs like volcanos / mesas
        ##Input: ocean / land
        ##Output: ocean / land / various spot locations (mesa / volcano) / coastal regions.
        - << biome-distribution/stages/add_spots.yml:stages
        #
        ##Segment temperature regions for respective canyon valleys / sinkholes
        - << biome-distribution/stages/special/build_rift_regions_1.yml:stages
        #
        ##Further segment into subzones so canyons are not everywhere.
        #- << biome-distribution/stages/special/build_rift_regions_2.yml:stages
        #
        ##Now actually distribute the canyons
        #- << biome-distribution/stages/special/build_rift_regions_3.yml:stages
        #
        ##Input: land
        ##Output: sink hole zones
        - << biome-distribution/stages/special/build_well_regions.yml:stages
        #
        ##Replace outer boundary zones to prevent sink-hole / canyon valley generation back to land.
        #- << biome-distribution/stages/special/return_boundary_to_land.yml:stages
        #
        ##*************************************
        ##Should sinkholes / canyons be placed after rivers?...
        ##*************************************
        #
        ##Output: land / vast-forest / island / ocean / island-coast
        #- << biome-distribution/stages/Distribute_Major_Regions.yml:stages
        
        ###Build out climate regions
        #- << biome-distribution/stages/climate/elevation.yml:stages
        #- << biome-distribution/stages/climate/temperature.yml:stages
        #- << biome-distribution/stages/climate/precipitation.yml:stages
        ##- << biome-distribution/stages/climate/combined_climate.yml:stages
        #
        #- << biome-distribution/stages/set_island_types.yml:stages
#
        #- << biome-distribution/stages/climate/color.yml:stages
        #- << biome-distribution/stages/add_travertine_terraces.yml:stages
        #
        #- << biome-distribution/stages/set_biomes_in_climates_origen.yml:stages
        #- << biome-distribution/stages/add_biome_color_variants.yml:stages
        #- << biome-distribution/stages/special/border_biomes.yml:stages
        #
        #- << biome-distribution/stages/fill_coasts.yml:stages
        
        # ========================================
        # SMOOTHING PASSES
        # ========================================
        - type: FRACTAL_EXPAND
          sampler:
            type: WHITE_NOISE
        - type: SMOOTH
          sampler:
            type: WHITE_NOISE

        - << biome-distribution/stages/PopulateTestStage.yml:stages
        - << biome-distribution/stages/add_rivers.yml:stages
        

