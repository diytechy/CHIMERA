id: WATER_ELEVATOR_FROZEN
type: FEATURE
extends: WATER_ELEVATOR_SURFACE_LOCATOR

# One of 5 climate variants of the world "water elevator". All 5 share the common shaft
# (water_elevator_core) and the shared waterElevatorPlacement sampler (spots.yml), differing
# only in the L1 roof block and the climate band they gate on. waterElevatorPlacement handles
# WHERE (one cell-centre column per grid cell, off spot-centres, off rivers); each feature
# just ANDs its temperature/precipitation band so exactly one climate-matched variant places
# per cell. All 5 are wired once on BASE (all surface biomes; caves use BASE_CAVE).
#
# This is the FROZEN variant: quartz roof, placed only where temperature is low.
#
# Distributor (SAMPLER places where value < 0). waterElevatorPlacement returns -1 only at a
# placeable grid-cell centre (the tuned threshold lives there); the climate band gates the rest:
#   - off-spot + off-river + frozen -> waterElevatorPlacement = -1 -> places
#   - anywhere else / wrong climate -> 1 (never places)
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    expression: if(temperature(x, z) < -0.5, waterElevatorPlacement(x, z), 1)
    samplers:
      temperature: $math/samplers/temperature.yml:samplers.temperature
      waterElevatorPlacement: $math/samplers/spots.yml:samplers.waterElevatorPlacement
  threshold: 0

structures:
  distribution:
    type: CONSTANT
  structures: water_elevator_frozen
