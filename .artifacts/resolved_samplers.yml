    expression: "-y + base +\nif(y <= base + minimumRiverBankHeight(x, z),\n  // ── Case 1: Riverbed ──\n  minimumRiverBankHeight(x,\
      \ z) - bedDepth(x, z),\n\n  // ── Cases 2 & 3: Above bank, blended by enclosure ──\n  //Since the 2d sampler already forces\
