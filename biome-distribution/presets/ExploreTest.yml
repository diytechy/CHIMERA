# ExploreExpand preset - Biomes NOT in default, origen2, or rearth presets
# This preset contains only biomes that don't appear in the main presets,
# allowing exploration of rare/unused biomes. Not intended for normal gameplay.

biomes:
  type: EXTRUSION
  extrusions:
    # All cave extrusions
    - << biome-distribution/extrusions/add_special_caves.yml:extrusions
    - << biome-distribution/extrusions/add_cave_biomes.yml:extrusions
    - << biome-distribution/extrusions/add_deep_dark.yml:extrusions
  provider:
    type: PIPELINE
    resolution: 4
    blend:
      amplitude: 6
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 0.012
    pipeline:
      source:
        type: SAMPLER
        sampler:
          type: CELLULAR
          jitter: ${customization.yml:biomeSpread.cellJitter}
          return: NoiseLookup
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
          lookup:
            type: EXPRESSION
            expression: continents(x, z)
        biomes:
          ocean: 3
          land: 1
      stages:
        #Add spots to drop large POIs like volcanos / mesas
        #Input: ocean / land
        #Output: ocean / land / various spot locations (mesa / volcano) / coastal regions.
        - << biome-distribution/stages/add_spots.yml:stages
        
        #Break apart land into major transitionals
        #Input: ocean / land
        #Output: land / vast-forest / island / ocean.
        #- << biome-distribution/stages/add_large_spots.yml:stages
        
        
        #Add coast-lines between land / ocean.  Might need to return and add transition from forest?
        #Input: ocean / land
        #Output: ocean / land / coast
        #- << biome-distribution/stages/add_coast.yml:stages
        
        
        #Split land into canyon (effectively a basin) / land distribution.
        #Input: land
        #Output: land, ICY_INCISIONS, SANDY_SPLITS (temperature based)
        #- << biome-distribution/stages/special/build_canyon_regions_1.yml:stages
        #- << biome-distribution/stages/special/build_canyon_regions_2.yml:stages
        #- << biome-distribution/stages/special/build_canyon_regions_3.yml:stages
        #- << biome-distribution/stages/special/build_canyon_regions_4.yml:stages
        
        
        #Input: land
        #Output: sink hole zones
        #- << biome-distribution/stages/special/build_sinkhole_regions.yml:stages
        
        #Input: land
        #Output: sink hole zones
        - << biome-distribution/stages/PopulateTestStage.yml:stages
        

        # ========================================
        # SMOOTHING PASSES
        # ========================================
        - type: FRACTAL_EXPAND
          sampler:
            type: WHITE_NOISE
        - type: SMOOTH
          sampler:
            type: WHITE_NOISE
