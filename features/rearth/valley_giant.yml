id: VALLEY_GIANT
type: FEATURE

distributor:
  type: AND
  distributors:
    - type: SAMPLER
      sampler:
        dimensions: 2
        type: CELLULAR
        frequency: 0.0065
        jitter: 0.3
      threshold: -0.999 # magic number to hit exactly one block in the middle of the cell

locator:
  type: AND
  locators:
    - type: SAMPLER_3D
      sampler:
        dimensions: 3
        type: EXPRESSION
        variables:
          valley_low: $biomes/rearth/base/eq_secluded_valley.yml:vars.valley_low
          valley_offset: $biomes/rearth/base/eq_secluded_valley.yml:vars.valley_offset
        expression: valley_low + BiomeShapeFlattenedElevation(x,z) + y
      threshold: 0
    - type: SURFACE
      range: &range
        min: ${meta.yml:bottom-y}
        max: 50
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SET
        blocks:
          - minecraft:snow
          - minecraft:air
          - minecraft:short_grass
        offset: 0
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SET
        blocks: $features/vegetation/meta.yml:plantable-blocks
        offset: -1

structures:
  distribution:
    type: WHITE_NOISE
  structures:
    - custom_sakura_tree: 1
