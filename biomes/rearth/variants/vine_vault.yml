id: VINE_VAULT
type: BIOME
extends: [ ORES_DEFAULT , EQ_VINE_VAULT]
vanilla: minecraft:lush_caves
color: $biomes/colors.yml:DRIPSTONE_CAVES

colors:
  grass: 0x3abf13
  foliage: 0x00aa17
  water: 0x1e97f2
  water-fog: 0x1e97f2
tags:
  - SPECIAL_CAVES

slant:
  - threshold: 0.9
    palette:
      - MOSS_STONE: $meta.yml:top-y
      - BEDROCK: $meta.yml:bedrock-top
      - BLOCK:minecraft:bedrock: $meta.yml:bottom-y
  - threshold: 0.4
    palette:
      - MOSSY_COBBLESTONE_STONE: $meta.yml:top-y
      - BEDROCK: $meta.yml:bedrock-top
      - BLOCK:minecraft:bedrock: $meta.yml:bottom-y

palette:
  - GRASS_DENSE_MOSSY: 319
  - << meta.yml:palette-bedrock

carving:
  update-palette: true  # Cave void increments paletteLevel by default (acts as solid depth).
                        # For a ~70-block tall cave this pushes the floor to paletteLevel≈70 → stone.
                        # Setting true resets the counter on each carved block so the cave floor
                        # gets depth 0 (grass/moss) and depth 1 (dirt) from GRASS_DENSE_MOSSY,
                        # satisfying the plantable-blocks check needed for tree feature placement.

features:
  global-preprocessors:
    - CAVE_GLOW_LICHEN
  flora:
    - LARGE_LEAF_VINES_UNDERGROUND
    - MOSS_CARPET
    - VALLEY_PETALS
    - CAVE_GLOW_BERRIES
    - CAVE_SPORE_BLOSSOMS
    - SMALL_DRIPLEAF_CAVES
    - BIG_DRIPLEAF_CAVES
    - GRASS_CAVES
    - CROSSING_VINES_CAVES
    - LARGE_CEILING_VINES_CAVES
  trees:
    - VINE_VAULT_JUNGLE_TREES