  maskSmooth:
    arguments:
    - v
    - lb
    - ub
    - m
    expression: |
      if(lb<ub,
        if(m<=lb,0,if(m>=ub,v,v*hermite((m-lb)/(ub-lb)))),
        if(m>=lb,0,if(m<=ub,v,v*hermite((m-lb)/(ub-lb))))
      )
    functions:
