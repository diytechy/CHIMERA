stages:

  #land spots
  - type: REPLACE
    from: ALL
    to:
      - SELF: 1
      - land_spot: 1
    sampler:
      type: EXPRESSION
      expression: |
        if(spotDistance(x, z) < spotRadius(x, z) + biomeBorder,
          if(spotCenterOnOcean(x,z), -1,
            if(spotCenterNotNearRiver(x,z), 1, -1)),
          -1)
          
      variables: $math/samplers/spots.yml:variables
      
  #ocean spots
  - type: REPLACE
    from: ALL
    to:
      - SELF: 1
      - ocean_spot: 1
    sampler:
      type: EXPRESSION
      expression: |
        if(spotDistance(x, z) < spotRadius(x, z) + biomeBorder,
          if(spotCenterOnOcean(x,z), 1, -1),
          -1)
      variables: $math/samplers/spots.yml:variables

  #land spot
  - type: REPLACE
    from: land_spot
    to:
      - volcano: 1
      - mesa: 1
      - sinkhole: 1
    sampler:
      type: EXPRESSION
      expression: spotSizePercent(x, z)*2-1

  #ocean spot
  - type: REPLACE
    from: ocean_spot
    to:
      - volcano: 1
      - mesa: 1
      - sinkhole: 1
    sampler:
      type: EXPRESSION
      expression: spotSizePercent(x, z)*2-1

  - type: REPLACE
    from: volcano
    to:
      - extinct-volcano: 5
      - active-volcano: 1
    sampler:
      type: EXPRESSION
      expression: volcanoActivity(x, z)

  - type: REPLACE
    from: extinct-volcano
    to:
      - extinct-volcano: 4
      # - crater-lake: 1 # Crater lakes are disabled until a good method of adding fluid is implemented
    sampler:
      type: EXPRESSION
      expression: spotEdgeRadiusPercent(x, z)*2-1

  - type: REPLACE
    from: active-volcano
    to:
      - live-volcano: 4
      - PRISMATIC_SPRING: 1
    sampler:
      type: EXPRESSION
      expression: spotEdgeRadiusPercent(x, z)*2-1

  - type: BORDER
    from: live-volcano
    replace: ocean
    to:
      - ocean: 1
      - volcano-coast: 1
    sampler:
      type: EXPRESSION
      expression: nearSpot(x, z)
      variables: $math/samplers/spots.yml:variables

  - type: BORDER
    from: sinkhole
    replace: land
    to: sinkhole-border
    sampler:
      type: CONSTANT

  - type: BORDER
    from: sinkhole
    replace: ocean
    to: sinkhole-border-ocean
    sampler:
      type: CONSTANT