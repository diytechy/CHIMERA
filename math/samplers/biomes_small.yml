BaseBiomeCell: &BaseBiomeCell
  type: CELLULAR
  frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
  jitter: 1.2
  distance: Hybrid

_landmassShape: &landmassShape
  <<: *BaseBiomeCell
  salt: 101

_highlandShape: &highlandShape
  <<: *BaseBiomeCell
  salt: 102

_oceanShape: &oceanShape
  <<: *BaseBiomeCell
  salt: 105

_outerWarpSmall: &outerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 20
  warp:
    type: SIMPLEX
    frequency: 0.02

_midWarpSmall: &midWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 60
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.003

_innerWarpSmall: &innerWarpSmall
  dimensions: 2
  type: DOMAIN_WARP
  amplitude: 300
  warp:
    type: OPEN_SIMPLEX_2
    frequency: 0.0001


samplers:
  BiomeShapeLandmassValue:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: CellValue

  BiomeShapeLandmassTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false

  BiomeShapeLandmassPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeLandmassContinents:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: NoiseLookup
          lookup: $math/samplers/continents.yml:samplers.continents
          salt-lookup: false

  BiomeShapeLandmassDistance:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: Distance
          lookup: $math/samplers/continents.yml:samplers.continents
          salt-lookup: false
          
  BiomeShapeLandmassDistance2:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *landmassShape
          return: Distance2
          lookup: $math/samplers/continents.yml:samplers.continents
          salt-lookup: false

  BiomeShapeLandmassBorderDistance:
    type: EXPRESSION
    expression: |
      abs(BiomeShapeLandmassDistance2(x,z)-BiomeShapeLandmassDistance(x,z))
    samplers:
      BiomeShapeLandmassDistance: $math/samplers/biomes_small.yml:samplers.BiomeShapeLandmassDistance
      BiomeShapeLandmassDistance2: $math/samplers/biomes_small.yml:samplers.BiomeShapeLandmassDistance2
          
  BiomeShapeLandmassBaseOffset:
    type: EXPRESSION
    dimensions: 2
    expression: max(BiomeShapeLandmassContinents(x,z) * offset_scale * land_scale, 0)
    samplers:
      BiomeShapeLandmassContinents: $math/samplers/biomes_small.yml:samplers.BiomeShapeLandmassContinents
    variables:
      land_scale: $customization.yml:terrain-height
      offset_scale: $customization.yml:terrain-base-biome-shift

  BiomeShapeHighlandValue:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *highlandShape
          return: CellValue

  BiomeShapeHighlandTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *highlandShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false

  BiomeShapeHighlandPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *highlandShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeOceanValue:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: CellValue

  BiomeShapeOceanTemperature:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: NoiseLookup
          lookup: $math/samplers/temperature.yml:samplers.temperature
          salt-lookup: false

  BiomeShapeOceanPrecipitation:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: NoiseLookup
          lookup: $math/samplers/precipitation.yml:samplers.precipitation
          salt-lookup: false

  BiomeShapeOceanContinents:
    <<: *outerWarpSmall
    sampler:
      <<: *midWarpSmall
      sampler:
        <<: *innerWarpSmall
        sampler:
          <<: *oceanShape
          return: NoiseLookup
          lookup: $math/samplers/continents.yml:samplers.continents
          salt-lookup: false

