stages:
#Create vast forest distributions
  - type: REPLACE_LIST
    from: land
    sampler:
      dimensions: 2
      type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
      amplitude: 60 
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.002
      sampler:
        type: CELLULAR
        return: CellValue
        frequency: 1 /  ${customization.yml:biomeSpread.regionDistance}
    default-from: land
    #Note, keep order / distribution the same below so that coasts are aligned with their major regions.
    default-to:
      mesa: 1
      vast-forest: 1
      SELF: 9
    to:
      coast:
        mesa: 1
        vast-forest-coast: 1
        SELF: 9
#Add islands
  - type: REPLACE_LIST
    default-from: ocean
    sampler:
      dimensions: 2
      type: DOMAIN_WARP
      amplitude: 20 
      warp:
        type: SIMPLEX
        frequency: 0.02
      sampler:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 60 
        warp:
          type: OPEN_SIMPLEX_2
          frequency: 0.003
        sampler:
          dimensions: 2
          type: DOMAIN_WARP
          amplitude: 300 
          warp:
            type: OPEN_SIMPLEX_2
            frequency: 0.0001
          sampler:
            type: CELLULAR
            return: CellValue
            frequency: 1 /  ${customization.yml:biomeSpread.islandDistance}
            salt: 2001
            jitter: 1.2
            distance: Hybrid
            # Ratios for default-to and to must be maintained for proper land merging with island intersections with coasts.
    default-to: 
      island-land: &LandMassDist 3
      island:      &SpecIslandDist 1
      mesa:        &MesaMassDist 1
      ocean:       &NoChangeDist 150
    to:
      coast:
        land:    *LandMassDist
        coast:   *SpecIslandDist
        mesa:    *MesaMassDist
        coast:   *NoChangeDist
 #Create island coastlines
  - type: BORDER
    sampler:
      type: CONSTANT
    from: island
    replace: ocean
    to: island-coast
  - type: BORDER
    sampler:
      type: CONSTANT
    from: island-land
    replace: ocean
    to: island-coast
  - type: REPLACE
    from: island-land
    sampler:
      type: CONSTANT
    to: land
      