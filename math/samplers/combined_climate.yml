# =============================================================================
# Combined Climate Samplers
# =============================================================================
#
# AUTO-GENERATED by generate_combined_climate.py
# DO NOT EDIT MANUALLY - changes will be overwritten
#
# These samplers compute multiple climate factors in a single pass, eliminating
# redundant calculations that occur when temperature, precipitation, and elevation
# are computed separately.
#
# Source files resolved:
#   - math/samplers/continents.yml
#   - math/samplers/spawnIsland.yml
#   - math/samplers/elevation.yml
#   - math/samplers/temperature.yml
#   - math/samplers/precipitation.yml
#   - math/samplers/spots.yml
#
# Encoding scheme:
#   climateIndex = (tempIndex * 24) + (precipIndex * 4) + elevIndex
#   where:
#     tempIndex: 0-11 (12 temperature zones)
#     precipIndex: 0-5 (6 precipitation levels)
#     elevIndex: 0-3 (4 elevation variants)
#
# The climateIndex ranges from 0 to 287, normalized to [-1, 1] for weighted lists.
# =============================================================================

samplers:
  combinedContinent:
    dimensions: 2
    type: EXPRESSION
    expression: |-
      max(
        max(
          continentsBase(x, z),
          spawnIslandValue(x, z)
        ),
        spotContinentalFactor * max(0, 1-(spotDist(x, z)/spotRad(x, z))^2)
      )
    variables:
      spotContinentalFactor: 0.3
    samplers:
      continentsBase:
        dimensions: 2
        type: EXPRESSION
        expression: |
          max(
            max(
              -sampler(x / scale / globalScale, z / scale / globalScale) * spread + offset,
              spawnIsland(x, z)
            ),
            // Set continentalness to spotContinentalFactor in center of spots, 0 on spot edges,
            // and decrease quadratically moving further outwards
            spotContinentalFactor * (1-(spotDistance(x,z)/spotRadius(x,z))^2))
        variables:
          globalScale: 1
          scale: 2
          offset: 0.1
          spread: 1
          spotContinentalFactor: 0.3
        samplers:
          spawnIsland:
            dimensions: 2
            type: DOMAIN_WARP
            amplitude: 150
            warp:
              type: FBM
              octaves: 2
              sampler:
                type: TRANSLATE
                x: 5000
                z: -5000
                sampler:
                  type: OPEN_SIMPLEX_2
                  frequency: 0.004
            sampler:
              type: EXPRESSION_NORMALIZER
              expression: |
                if(in < middleRadius/outerRadius,
                  herp        (in, innerRadius/outerRadius,  1, middleRadius/outerRadius, 0),
                  parabolicMap(in, middleRadius/outerRadius, 0, 1,                       -1))
              variables:
                innerRadius: 20
                middleRadius: 125
                outerRadius: 400
              functions: &id001
                lerp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                      if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                    )
                lerp3:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  - ct
                  - c
                  expression: lerp(t, at, a, bt, lerp(t, bt, b, ct, c))
                  functions:
                    lerp:
                      arguments:
                      - t
                      - at
                      - a
                      - bt
                      - b
                      expression: |
                        if(at<bt,
                          if(t<=at,a,if(t>=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at))),
                          if(t>=at,a,if(t<=bt,b,a*(t-bt)/(at-bt)+b*(t-at)/(bt-at)))
                        )
                herp:
                  arguments:
                  - t
                  - at
                  - a
                  - bt
                  - b
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b )),
                      if(t>=at,a,if(t<=bt,b, hermite((t-bt)/(at-bt))*(a-b)+b ))
                    )
                  functions:
                    hermite:
                      arguments:
                      - x
                      expression: 3*x^2-2*x^3
                parabolicMap:
                  arguments:
                  - t
                  - bt
                  - b
                  - at
                  - a
                  expression: |
                    if(at<bt,
                      if(t<=at,a,if(t>=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b )),
                      if(t>=at,a,if(t<=bt,b, interpolation((t-bt)/(at-bt))*(a-b)+b ))
                    )
                  functions:
                    interpolation:
                      arguments:
                      - x
                      expression: x^2
              sampler:
                type: PROBABILITY
                sampler:
                  type: DISTANCE
                  point:
                    x: 0
                    z: 0
                  normalize: true
                  radius: 400
          spotDistance:
            dimensions: 2
            type: DOMAIN_WARP
            amplitude: 7
            warp:
              type: OPEN_SIMPLEX_2
              frequency: 0.015
            sampler:
              type: EXPRESSION
              expression: (noise(x, z)+1)*spread
              variables:
                spread: 1500
                largeSpawnRadiusOffset: 2000
                biomeBorder: 15
                largeBiomeBorder: 100
                minRadius: 50
                maxRadius: 150
                minHeight: 0.05
                maxHeight: 0.5
                spotMinEdgeRadius: 0.1
                spotMaxEdgeRadius: 0.5
                largeMinRadius: 500
                largeMaxRadius: 1500
                volcanoMinCenterDepth: 0.01
                volcanoMaxCenterDepth: 0.3
                prismaticMinCenterDepth: 0.01
                prismaticMaxCenterDepth: 0.15
              samplers:
                noise:
                  dimensions: 2
                  type: CELLULAR
                  frequency: 1 / 1500
                  salt: 3
                  jitter: 1-2*(150/1500)
                  distance: Euclidean
          spotRadius:
            dimensions: 2
            type: EXPRESSION
            expression: lerp(spotSizePercent(x, z), 0, minRadius, 1, maxRadius)
            functions: *id001
            variables:
