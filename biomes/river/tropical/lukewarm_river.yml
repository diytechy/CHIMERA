id: LUKEWARM_RIVER
type: BIOME
extends:
  - EQ_GLOBAL_RIVER
  - RIVER_BASIC
  - ENVIRONMENT_MARINE_RIVER_LUKEWARM
  - EQ_RIVER_CARVING
  - BASE
color: $biomes/colors.yml:LUKEWARM_RIVER

vanilla: minecraft:river

palette:
  - GRASS: $meta.yml:top-y
  - MUDDY_BEACH: ${meta.yml:ocean-level} + 3
  - << meta.yml:palette-bottom

slant:
  - threshold: 0.8
    palette:
      - GRASS: $meta.yml:top-y
      - MUDDY_BEACH: ${meta.yml:ocean-level} - 1
      - << meta.yml:palette-bottom
  - threshold: 0.5
    palette:
      - BLOCK:minecraft:stone: $meta.yml:top-y
      - << meta.yml:palette-bottom
tags:
- SPECIAL_CAVES
- LOW_CAVES
features:
  flora:
  - SUGAR_CANE
  - GRASS
  river-decoration:
  - COVE_GLOW_LICHEN
  processors:
  - RIVER_SOULSAND