id: EQ_ROCKY_REFUGE
type: BIOME
abstract: true

vars: &variables
  base: 68
  height: 22
  pillarHeight: 50
  pillarCutoff: 0.95
  pillarFlatness: 1.7
  pillarVariation: 0.03
  bendFactor: 0.8

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: "-y + base + height * terrace(surfaceOffset(x,z) * 4, 3) / 4\n+ if\
      \ (y > base - 15 && y < base + pillarHeight * 1.3, \n  max(pillars(x + yCurve(y,\
      \ 0), y, z + yCurve(y, 0)), \n  max(pillars(x - yCurve(y, 0), y, z + yCurve(y,\
      \ 0)), pillars(x - yCurve(y, 0) + 5000, y, z - yCurve(y, 0)))),\n  0)\n"
    functions:
      terrace:
        arguments: [x, terraceStrength]
        expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
    samplers:
      yCurve:
        dimensions: 2
        type: EXPRESSION
        variables: *variables
        expression: 'curve(1 - normalizeY(x, base, pillarHeight)) * pillarHeight *
          bendFactor

          '
        functions:
          normalizeY:
            arguments: [y, base, height]
            expression: (y - base) / height
          curve:
            arguments: [x]
            expression: if (x < 0.1, 0.35, 2.428571*x - 1.428571*x^2)
      pillars:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: "if(pillarRand(x,z) > 0.7,\nclamp(\n  (-pillars(x,z) \n    - pillarCutoff\
          \ \n    - widthVariation(y, x / 4 + z / 3) * pillarVariation \n    + (y\
          \ - base) / pillarHeight / 8\n    + max(base - y + 4, 0) / 200\n    - (1\
          \ - abs(base + pillarHeight - y + 25) / pillarHeight)^5\n    // + (min(0,\
          \ base + pillarHeight - y + 6))^3\n    - max(-abs(erosion(x,y,z)) + 0.3,\
          \ 0) * 0.095\n    )\n    * pillarHeight\n    * (1 / (1 - pillarCutoff))\
          \ * pillarFlatness,\n  -2, pillarHeight * 1.2), 0)\n"
        samplers:
          pillars:
            dimensions: 2
            type: CELLULAR
            frequency: 0.009
          erosion:
            dimensions: 3
            type: OPEN_SIMPLEX_2S
            frequency: 0.06
          widthVariation:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2S
              frequency: 0.05
            octaves: 2
            lacunarity: 2
            gain: 0.5
          pillarRand:
            dimensions: 2
            type: CELLULAR
            frequency: 0.009
            return: CellValue
      pillarRand:
        dimensions: 2
        type: CELLULAR
        frequency: 0.009
        return: CellValue
      surfaceOffset:
        dimensions: 2
        type: FBM
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.002
        octaves: 3
        lacunarity: 3.5
        gain: 0.5
  sampler-2d:
    dimensions: 2
    type: EXPRESSION
    variables:
      scale: $customization.yml:terrain-height
    expression: scale * elevationDetailed(x, z)
