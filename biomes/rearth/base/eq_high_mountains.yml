id: EQ_HIGH_MOUNTAINS
type: BIOME
abstract: true

vars: &variables
  base: 65
  height: 75
  peaks: 40
  warpStrength: 0.29
  varPackStrength: 128000

terrain:
  sampler:
    dimensions: 3
    type: EXPRESSION
    variables: *variables
    expression: |
      // positive / higher = solid
      //BiomeShapeFlattenedElevation
      //elevationDetailedBlockHeight
      //BiomeShapeSealevelElevation
      -y + base + elevationDetailedBlockHeight(x,z)
      + main(mountainBasicShape(x,z), y, x * varPackStrength + z) * biomeInfluence(x,z)  // packed into a subsampler to only have to sample mountainBasicShape once, and then we need to pack x&z into one coordinate
    samplers:
      mountainBasicShape:
        dimensions: 2
        type: DOMAIN_WARP
        amplitude: 25
        warp:
          type: OPEN_SIMPLEX_2S
          frequency: 0.01
        sampler:
          type: OPEN_SIMPLEX_2S
          frequency: 0.004
      main:
        dimensions: 3
        type: EXPRESSION
        variables: *variables
        expression: |
          lerp(x, 
            -0.1, lerp(x,
              -0.2, terrace(x  * 14, 99) / 14 * height * 0.25 - 4,
              0, (terrace(x * 5, 7) / 4.8 - warping((z - z % varPackStrength) / varPackStrength,y / 2,z % varPackStrength) * warpStrength * 0.7) * height),
            0.1, lerp(x, 
              0.6, (x - warping((z - z % varPackStrength) / varPackStrength,y / 1.5,z % varPackStrength) * warpStrength) * height,
              0.8, x * height * 1.4 + peaks((z - z % varPackStrength) / varPackStrength, z % varPackStrength) * peaks))
        functions:
          terrace:
            arguments: [x, terraceStrength]
            expression: round(x) + 0.5 * (2*(x - round(x)))^terraceStrength
        samplers:
          warping:
            dimensions: 3
            type: OPEN_SIMPLEX_2S
            frequency: 0.034
            salt: 89745
          peaks:
            dimensions: 2
            type: FBM
            sampler:
              type: OPEN_SIMPLEX_2S
              frequency: 0.02
            octaves: 2
            lacunarity: 2
            gain: 0.5
  sampler-2d:
    dimensions: 2
    type: CONSTANT
    value: 0
