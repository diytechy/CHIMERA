id: PRISMATIC_STEAM_VENTS
type: FEATURE

# Steam wisps rising off the apron ring (distanceToPrismaticRim 0.0 .. 0.55) around a
# prismatic spring. Reuses the magma_smoke emitter, gated to the apron and thinned by
# a white-noise mask.
distributor:
  type: SAMPLER
  sampler:
    type: EXPRESSION
    dimensions: 2
    # SAMPLER distributor places where value < threshold: in-band -> rarity (places
    # the threshold-fraction of columns); out-of-band -> 1 (never < threshold).
    expression: if(distanceToPrismaticRim(x, z) > 0.0 && distanceToPrismaticRim(x, z) < 0.55, rarity(x, z), 1)
    samplers:
      rarity:
        dimensions: 2
        type: POSITIVE_WHITE_NOISE
        salt: 71010
  threshold: 0.02

locator:
  type: AND
  locators:
    - type: SURFACE
      range: &range
        min: ${meta.yml:ocean-level}
        max: 250
    - type: PATTERN
      range: *range
      pattern:
        type: AND
        patterns:
          - type: MATCH_SOLID
            offset: 1
          - type: BLOCK
            block: minecraft:water
            offset: 2

structures:
  distribution:
    type: CONSTANT
  structures: magma_smoke
