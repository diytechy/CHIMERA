stages:
  #Distribute land into large temperature breaks to separate major canyon sections, since canyons changing vegitation mid trench is a little strange.
  - type: REPLACE
    sampler:
      type: EXPRESSION
      expression: if(((continentalRiverDist(x, z)>=1)&&(continents(x,z)>0.15)),1,-1)
    from: land
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    to:
      land: 1
      _rift_land: 1
      
  #Perform cellular distribution to create zones where canyons will actually occur so they are not everywhere in the land-mass.
  - type: REPLACE
    sampler:
      dimensions: 2
      type: DOMAIN_WARP #Tried with A = 400, warp freq = 0.001, lots of overlap
      amplitude: 60 
      warp:
        type: OPEN_SIMPLEX_2
        frequency: 0.002
      sampler:
        type: EXPRESSION
        #Lower band is colder, upper band is warmer, white noise salted based on cell value to randomize placement.
        expression: |
          if((riftFarRiverDist(x,z)>200) && (if(riftInRangeOfSpot(x,z)>0,0,1)),
            if(riftTemperature(x,z)>0,0.55+riftRegions(x,z)/2,
              if(riftTemperature(x,z)<-0.3,-0.55+riftRegions(x,z)/2,0)),
            0)
        samplers: 
          riftTemperature: $math/samplers/rifts.yml:samplers.riftTemperature
          riftRegions: $math/samplers/rifts.yml:samplers.riftRegions
          riftFarRiverDist: $math/samplers/rifts.yml:samplers.riftFarRiverDist
          riftInRangeOfSpot: $math/samplers/rifts.yml:samplers.riftInRangeOfSpot
    #from: land
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    from: _rift_land
    to:
      _cold_rift: 1
      _cold_well: 4
      land: 16
      _warm_well: 3
      _warm_rift: 1

  - type: REPLACE_LIST
    sampler:
      type: EXPRESSION
      dimensions: 2
      variables:
        canyonStrength: ${customization.yml:biomeSpread.canyons.canyonAmount}
      expression: |
        (-abs(base(x,z)) + 0.3) * 2 * (1 / 0.2)
      #  max(-mask(x,z * 1.3) - canyonStrength, 0) * 18
      #  min(max(-mask(x,z * 1.3) - canyonStrength, 0) * 18, 1) *
      #  max((-abs(base(x,z)) + 0.3) * 2, 0) * (1 / 0.2)
      samplers:
        base:
          dimensions: 2
          type: OPEN_SIMPLEX_2S
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance} * 1
        mask:
          dimensions: 2
          type: CELLULAR
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance} * 0.15
          seed: 23456345
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    from: _warm_rift
    default-from: _warm_rift
    default-to: # 0 = outer, 1 = inner
      - land: &CanyonLandDist             16
      - SANDY_SPLITS: &CanyonFloorDist     9
    to: # 0 = outer, 1 = inner
      _cold_rift:
      - land: *CanyonLandDist
      - ICY_INCISIONS: *CanyonFloorDist
      
  #Perform cellular distribution to create zones where canyons will actually occur so they are not everywhere in the land-mass.
  - type: REPLACE_LIST
    sampler: $math/samplers/rifts.yml:samplers.riftWellPlacement
    range:
      min: ${customization.yml:biomeSpread.canyons.minY}
      max: 319
    default-from: _cold_well
    default-to:
      - land: &SinkholeSurrDist         1
      - SINKHOLE_FROZEN: &NotSinkholeLandDist     1
    to:
      _warm_well:
        - land: *SinkholeSurrDist
        - SINKHOLE_JUNGLE: *NotSinkholeLandDist