# ExploreExpand preset - Equal distribution of ALL biomes for exploration/testing
# This preset gives roughly equal weight to all surface biomes to allow easy exploration
# of the full biome set. Not intended for normal gameplay.
# ALL biomes are placed directly - no reliance on tag-based generation stages.

biomes:
  type: EXTRUSION
  extrusions:
    # All cave extrusions
    - << biome-distribution/extrusions/add_special_caves.yml:extrusions
    - << biome-distribution/extrusions/add_cave_biomes.yml:extrusions
    - << biome-distribution/extrusions/add_deep_dark.yml:extrusions
  provider:
    type: PIPELINE
    resolution: 4
    blend:
      amplitude: 6
      sampler:
        type: OPEN_SIMPLEX_2
        frequency: 0.012
    pipeline:
      source:
        type: SAMPLER
        sampler:
          type: CELLULAR
          jitter: ${customization.yml:biomeSpread.cellJitter}
          return: NoiseLookup
          frequency: 1 / ${customization.yml:biomeSpread.cellDistance}
          lookup:
            type: EXPRESSION
            expression: continents(x, z)
        biomes:
          ocean: 1
          land: 1
      stages:
        # ========================================
        # LAND BIOMES - Equal distribution of all
        # Including rivers, coasts, and archipelagos
        # ========================================
        - type: REPLACE
          from: land
          to:
            # Polar/Arctic biomes
            - ICE_CAPS: 1
            - ICE_SPIKES: 1
            - SNOWY_PLAINS: 1
            - SNOWY_MEADOW: 1
            - SNOWY_MOUNTAINS: 1
            - SNOWY_BLACKSTONE_MOUNTAINS: 1
            - SNOWY_TUFF_MOUNTAINS: 1
            - SNOWY_TAIGA: 1
            - SNOWY_BIRCH_FOREST: 1
            - SNOWY_BADLANDS: 1
            - SNOWY_DUNES: 1
            - SNOWY_SPIRES: 1
            - LAND_GLACIER: 1
            - FROSTY_FINGERS: 1
            - FROZEN_FUNGI: 1
            - FROZEN_MARSH: 1
            - MONTANE_FOREST: 1
            - TUNDRA: 1
            - TUNDRA_TRACKS: 1
            # Boreal/Taiga biomes
            - TAIGA: 1
            - TAIGA_CLEARING: 1
            - FIR_FIELDS: 1
            - DRY_FIR_FIELDS: 1
            - PINE_CANOPY: 1
            - BOREAL_SHRUBLAND: 1
            - SEQUOIA_FOREST: 1
            - OLD_GROWTH_SEQUOIA_FOREST: 1
            - STEPPE: 1
            - COLD_STEPPE: 1
            - PRAIRIE: 1
            - SUNFLOWER_PRAIRIE: 1
            - MAPLE_GROVE: 1
            - RED_MAPLE_GROVE: 1
            - YELLOW_MAPLE_GROVE: 1
            - MOUNTAINS: 1
            - MOUNTAIN_MIRRORS: 1
            - ALPINE_ASCENDANCY: 1
            # Temperate biomes
            - OAK_FOREST: 1
            - BIRCH_FOREST: 1
            - ASPEN_FOREST: 1
            - DARK_FOREST: 1
            - BLACK_FOREST: 1
            - BROADLEAF_FOREST: 1
            - FLOWERING_FOREST: 1
            - TEMPERATE_RAINFOREST: 1
            - TEMPERATE_MONTANE_RAINFOREST: 1
            - AZALEA_FOREST: 1
            - TEMPERATE_MOUNTAINS: 1
            - TEMPERATE_ALPHA_MOUNTAINS: 1
            - DRY_TEMPERATE_MOUNTAINS: 1
            - DRY_TEMPERATE_WHITE_MOUNTAINS: 1
            - HIGHLANDS: 1
