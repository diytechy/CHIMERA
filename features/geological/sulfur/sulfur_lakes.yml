id: SULFUR_LAKES
type: FEATURE

# Underground sulfur lakes scattered through the sulfur caves. Placed on a padded
# grid (denser than the global UNDERGROUND_WATER_LAKES) wherever there is solid rock
# to enclose the basin; the sulfur_lake structure self-validates that it is fully
# surrounded by rock before carving.
distributor:
  type: PADDED_GRID
  width: 28
  padding: 52
  salt: 9187

locator:
  type: AND
  locators:
    - type: RANDOM
      amount: 1
      height: &range
        min: ${meta.yml:bottom-y} + 6
        max: ${meta.yml:cave-top}
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: 0
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: 5
    - type: PATTERN
      range: *range
      pattern:
        type: MATCH_SOLID
        offset: -5

structures:
  distribution:
    type: CONSTANT
  structures: sulfur_lake
